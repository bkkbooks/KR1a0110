body:
  text: 易象正卷十一明黃道周撰中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也象曰澤上有風中孚君子以議獄緩死正曰豐旅噬嗑賁皆獄也獄迅而多死雷火之道也中孚非火而疑於火非雷而疑於雷外有疑形內有疑情則君子議緩之矣舟不覆於江湖而覆於陂澤澤上有風君子之所慎也風雨將至則豚魚先沸豚魚感隂者也風雨不時舟楫亂行人亂於上魚亂於下則世之必其性命者鮮矣詩曰匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃於淵言于信義未孚而冒險難濟者也君子信以求身仁以量人恕已及物而後天下歸之詩曰永言配命成王之孚是之謂也然則是信也而謂之疑何也曰議而多緩則民信之矣澤中有風不出於澤獄中議緩不出於獄雖有失出不為大過及其究也以行過乎恭喪過乎哀用過乎儉初九中孚之渙中孚豚魚吉利涉大川利貞渙亨王假有廟利涉大川利貞虞吉有他不燕象曰初九虞吉志未變也正曰虞者喪祭之疑者也廟祀之始於虞也哀而始思質而始文衆志初合禮樂未致猶之遷國者之始作廟也各既其誠敬焉耳蒸嘗禘祫則猶未之敢與也然則比之終有他吉何也曰比之有孚衆順也衆順而質一陽在於上同柔而歸誠雖云不燕而他吉從之中孚之渙衆散也衆散而文二隂宅於中欲合而未合雖云將吉而他不燕從之君子之於衆志各致其誠敬焉耳商書曰若虞機張往省括於度則釋夫亦有所疑也而往省之省之而釋則不復疑矣不疑乃燕書曰率乃祖攸行惟朕以懌是之謂也九二中孚之益中孚豚魚吉利涉大川利貞益利有攸往利涉大川鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也正曰彖之言涉大川者七焉謙頥三涉然不間值也再值之者中孚而已初九之渙兩利而不燕九二之益兩利而和縻猶之涉川也而中德之與初虞相去逺矣君子之於刑賞各致其和敬也刑而使人怨賞而使人不勸則無為貴刑賞矣子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎鄭伯享趙孟于垂隴子展伯有子西子産子太叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺且觀七子之志子展賦草蟲子西賦黍苗之四章子産賦隰桑子太叔賦野有蔓草印段賦蟋蟀公孫段賦桑扈趙孟皆謝嘉貺也而伯有賦鶉之賁賁趙孟告叔向曰伯有將為戮矣叔向曰是不五稔及韓起聘鄭鄭六卿餞之於郊宣子亦請賦且觀鄭志子齹賦野有蔓草宣子善之子産賦鄭之羔裘宣子謝不堪子太叔賦褰裳宣子謝不敢勤也子太叔拜宣子重謝之子游賦風雨子旗賦有女同車子栁賦籜兮宣子喜曰二三君子數世之主也可無懼矣先是趙孟叔孫豹曹大夫過鄭鄭伯兼享之子皮戒賔趙孟賦匏葉穆叔謂子皮曰趙孟欲一獻子其從之乃具五獻之籩于幕而從趙孟之戒也禮終穆叔賦鵲巢又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安厖也可使無吠穆叔子皮及曹大夫興拜舉兕爵曰小國賴子知免於戾矣故善言衆和好爵共靡君子之所貴也鄭以小國嫻於詩書而晉楚相視莫之敢干中孚之益則諸君子皆有焉故小畜者易之所貴也小畜之文德有涉大川者三焉說輻之中孚不逺其室攣如之大畜富以其鄰月幾望之需有待而往是三涉川也皆以陽德乘於時位中孚兩涉體用皆併而渙猶以之虞益乃以之和故議獄緩死忠恕之心也遷善改過達人之憲也以忠信之心收和縻之益非達人而能之乎商頌曰天命降監下民有嚴不僭不濫不敢怠遑是乃得中孚之實盡涉川之義者矣六三中孚之小畜中孚豚魚吉利涉大川利貞小畜亨密雲不雨自我西郊得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也正曰信矣而復疑之孚則不畜畜則孚變孚畜相持乃信乃亂或鼓或罷或泣或歌固其所矣君子信已而與人使人不疑擇賢而任之則亦不復疑人也詩曰弗躬弗親庶民弗信弗問弗仕勿罔君子齊書曰與賢者任之復使不賢者謀之此害霸也君子用人親任其事知其善敗詢事考言以授能者周書曰籲俊尊上帝迪知忱恂于九德之行以齊桓之能夷吾之器猶且孚信如彼而况於孚式天下躬親王者之業者乎六四中孚之履中孚豚魚吉利涉大川利貞履虎尾不嘻人亨月幾望馬匹亡無咎象曰馬匹亡絶類上也正曰月幾望不為貴也馬匹亡不為富也忠信而知禮高而不危滿而不溢以下則不陵上以上則不掩下以是事君又何咎乎齊有陳氏富於齊國晏子守之以禮持之以儉猶且歾身不睹其敗故曰禮者所以已亂也仲虺之誥曰以禮制心垂裕後昆又曰殖有禮覆昏暴中孚而能履以長保富貴不為異也何嘻人之有九五中孚之損中孚豚魚吉利涉大川利貞損有孚元吉無咎可貞利有攸往曷之用二簋可用享有孚攣如無咎象曰有孚攣如位正當也正曰何以信人有所利於人則人以謂之寶何以信己有所捨於己則己以謂之道故益者人之所為寶損者己之所為道也中孚之損損其二簋而孚在四鄰秦穆捐其駿馬趙孟畀其壺飱涓埃之惠猶或信之况以爵祿而縻賢士者乎詩曰彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼓既設一朝酬之有孚之攣如用此道也上九中孚之節中孚豚魚吉利涉大川利貞節亨苦節不可貞翰音登于天貞凶象曰翰音登于天何可長也正曰貞矣而有利有不利夫其時物也豚魚之信及於淵而翰音之信不及於天世固有不恃其節而恃其才如此者乎雄雉能飛不能晨夜晨雞司夜不能晨飛使節必兼才則世無完物且使有才之士必皆厲節則潔身警露者共栖于榤也故節之上六自信其節雖貞而無悔中孚之上九欲用其才雖不悔而終凶君子諒身而恕物信已而及人茍不拂於禮義逺於經常則亦已矣必自以為獨往抗駕於聖賢之前亦聖賢之所願望難見也中孚之變六十四其體盡變則為小過不變而反易則猶之中孚也故中孚不别為用用其似頥大過者以為離火之變體取於巽兑合兩而一寓是地德之終亦天道之所畏也一爻單變則正體備矣五爻遞變有見有伏取諸小過恆豫謙咸旅亦猶之小過一爻獨用者是皆法之乾坤也中孚之中孚中孚豚魚吉利涉大川利貞象曰澤上有風中孚君子以議獄緩死正曰凡諸反卦六十四變皆有之也以之立限則不皆有之也皆有之則不可以獨舉不皆有之則獨舉何舉之舉其以巽兑而為離火地交天中火因之先水火水相次以起兩濟之義也中孚之豐初七三六四六五九上九二九中孚豚魚吉利涉大川利貞豐亨王假之勿憂宜日中正曰中孚之豐議緩之而又折致之何也議緩之仁也折致之義也楚釋鄭伯而天下仁之魯贖衛侯而天下義之亦謂其慎也慎以成信故雷電息而白日出春秋者白日之書也僖公二十八年春晉侯伐衛衛有可伐之道伐之義也衛人出君衛侯出奔于襄牛出君不義也故襄牛之事不見於經公子買戍衛不卒戍刺之楚人救衛明乎其責魯楚也責魯楚則重責衛也以中夏之侯不與盟主而外國是求以為斂盂之盟見絶而去則是未知罪也城濮之役晉既克楚天王在於踐土衛不歸命於天王以請方伯而身自入楚叛中國以即夷狄春秋書曰衛侯出奔楚又曰六月衛侯鄭自楚復歸于衛著其所自以為罪本則其為衛楚衛之也衛元咺出奔晉為其訴叔武也而春秋不書衛侯鄭殺其弟叔武元咺之奔不書大夫則是衛之奔楚晉得而治之元咺之奔晉衛亦得而治之也晉得以盟主治天下之諸侯衛得以諸侯治其國之大夫冬晉人執衛侯歸之于京師衛元咺自晉復歸于衛衛侯之歸京師元咺之復歸衛儼然若兩諸侯者則是晉人之命元咺也元咺歸而立公子瑕春秋不書衛人立子瑕則是叔武與子瑕均之乎未立也諸侯以故出疆無王命而立諸侯立之與攝均罪也盟主之所右天子亦右之盟主之所左天子亦左之夫以為議緩與緩則可矣而以為罪皆在晉侯何也春秋歸罪於元咺使臣子斂過於君不得以無道播於天下而晉侯無與焉穀梁之哀元咺公羊之咎晉侯亦未為不是也而衛侯已僭春秋之與曹而罪衛未有咎晉侯者何為不咎晉侯曰曹伯襄復歸于曹遂㑹諸侯圍許明乎其與曹也曹改慝而衛不改慝僖公三十年秋衛殺其大夫元咺及公子瑕衛侯鄭復歸于衛元咺之不去大夫子瑕之不去公子明乎非衛侯之所得殺也以一盟主討不義煩天子之讞二三年一再立君皆不克終非恃有楚而能如此乎鄭之服楚迫也衛無楚患而以楚抗於天子盟主春秋猶不深誅之若以為國無怨焉耳以好惡與國不以好惡與晉若曰猶是康叔唐叔之後也以國治之猶與天下共治之也是則春秋所議緩而又折致之意也然則寧武子貨醫衍以出衛侯夫子是之豎侯獳貨筮史以釋曹伯世無譽者何也春秋之治止於大夫不及家臣止於家臣不及𨽻人中孚之恆二七六三六四九五上九初九中孚豚魚吉利涉大川利貞恆亨無咎利貞利有攸往正曰中孚之恆立信而不易方有之乎曰有之晉文公之伐原是也荀吳之伐鮮虞是乎荀吳伐鮮虞圍鼓鼓人請以城叛穆子弗許左右靳之穆子曰吾聞諸叔向好惡不愆民知所適事無不濟或以吾城叛吾甚惡之人以叛來又何好焉賞所甚惡如所好何若其弗賞是爽信也使鼓人殺叛者而繕守僃圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城弗取何以事君穆子曰吾以事君也獲一邑而教民怠將安用邑鼓人能事君我亦能之率義不爽好惡不愆獲城而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而還不戮一人以鼓子䳒鞮歸然則華元子反可謂此乎曰華元已蹙子反已疏是非所以事君也曰豚魚之通於風雨者耳中孚之豫三八九二六四九五上九初九中孚豚魚吉利涉大川利貞豫利建侯行師正曰中孚之豫信而怠信則可為也怠則不可為也然則涉川行師何為也曰謂其謀之蚤也信則不待謀之蚤也近義焉耳羅汭之師吳敗楚於鵲岸蹶繇犒楚師楚人執之將以釁鼓問曰汝卜來吉乎曰吉寡君聞君之將治兵也卜以守龜曰亟使人犒師以觀王怒之疾徐而豫為之備龜兆告吉曰克可知也君若歡焉好逆使臣敝邑休怠滋忘其死則殆矣若奮焉馮怒虐執使臣則知備矣難易有備可謂吉矣且吳亦社稷是卜豈為一人楚子信之乃弗殺也蹶繇善為辭然而已信矣信之得恆於其蚤備而失於其怠緩也詩曰靡聖管管不實於亶則可謂冥豫者矣中孚之謙四八九二六三九五上九初九中孚豚魚吉利涉大川利貞謙亨君子有終正曰中孚之謙孚者多情謙者多文情者內也文者外也內外兼粲吾未之見也要以裒益平稱則亦可以逃死矣鄭公孫黑肱有疾歸邑于公召室老宗人立段使黜官薄祭足以供祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君生在敬戒不在富也公孫子張則可謂中孚而謙者也公叔文子聽史鰌之言解邑辭田以卒免於難陳桓子從晏子之誨讓陳鮑之室以請老於莒是猶教諫而治也趙文子之不取州田則可信讓矣欒氏初喪州縣趙文子欲之范韓二宣子曰自郤稱以别三𫝊矣誰獲治之文子乃舍之二子曰吾不可以正義自與也皆舍之及文子為政趙獲曰可以取州矣文子曰退二子之言義也違義禍也不能治豫縣又焉用州言州者死甚矣文子之自治也夫亦猶裒益之意乎書曰毋總于貨寶生生自庸則亦可以緩死也已中孚之咸五七九二六三六四上九初九中孚豚魚吉利涉大川利貞咸亨利貞取女吉正曰中孚之咸是不可大事也澤枯而處於下巽反而據於上風冒於金水竭於土涉川而不貞一似有求於人何以正之其惟誠乎攢咸之㑹郤成子求成於衆狄衆狄苦赤狄之役也遂服於晉初成子欲㑹狄也諸大夫欲召之成子曰吾聞之非德莫若勤非勤何以役人能勤有繼勤誠之屬也然則隱公之㑹戎于潛盟于唐可不謂勤乎曰可謂虛矣內不足而求於外齊援未成而宋好不貞茫乎若山澤之自呼也以為信而不足以應鄭子忽之失國亦猶是也然則信不為虛應乎曰信者實與而虛受之泛應敗事泛與敗德詩曰毋信人之言人實迋女郤成子則信諸已也然猶未至於誠也中孚之旅上七九二六三六四九五初九中孚豚魚吉利涉大川利貞旅小亨旅貞吉正曰或謂是吉卦也可以作外可以行逺是則未之可也焚巢不動而亡矢譽來若豚魚之鼓泳也夫或有取之者矣以謂巽動而離得其毋亦猶逆旅之得其行主也然則信不貴有終歟曰是終限也而寡於大德科條相係名法相競若甘大夫之與晉訟閻田也晉人遂伐潁至煩天子為之致辭是不以褻乎猶婦喪其茀而使行道斷之也季孫意如止於晉理直且歸惠伯請盟晉人患之樂王鮒詷以西河之館而季孫行逃猶咀豚魚者之懼毒也信則信矣其道已絀大人於是有所不問也其不問之如何曰明於內者不眩於外明大者燭小硜硜不處或去之矣詩曰不留不處三事就緒是之謂也中孚可立限不立限何也曰猶之頥大過坎離也分限為七十二合限為六十四故復與小過通限也小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉正曰震龍也雷也車也三者之厯於山皆未有過也譬之飛鳥乘風者上懷音者下各從其遇然而上不如下之順也然則小過之德固不如頥之順歟曰夫亦其象也頥著於身小過著於物過恭過哀過儉是亦言語飲食之事也然則澤滅木之為大過何也澤盛而滅木衆人皆憂君子不得不憂衆人皆懼君子不得不懼然且君子不憂不懼則是非言語飲食之事也然則不懼無悶之亦有過歟曰過非君子之幸也雷之在山木之值金值其剋勝不過不濟故大過者食分之大者也小過者食分之小者也食有淺深而暗有大小已過則過矣别方域而差之猶之無過也君子不幸其無過而幸其過與衆見之不幸其過小而幸其已過之後可以不過然則日月之食無復再過歟曰再交而過則是當過也頻月而過則是二過也一嵗再交其有頻月而過者則亦少矣君子辟禍莫若大擇過莫若小言過乎慎心過乎慈其究也以議獄緩死初六小過之象豐正變小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉豐亨王假之勿憂宜日中飛鳥以凶象曰飛鳥以凶不可如何也正曰是謂當食者也太隂之行麗於日道盛而當中則陽光蔽虧從下望之若飛鳥之搏也見斗見沫則於是始矣君子不幸值於豐蔀上下無援左右蒙隂一朝之患厲於飛鳥君子曰是亦吾過也吾自反無尤焉耳日月之食不過踰時日中而食月廓少攝四鄰之光固猶在也過七十分則盡復矣故兩過剝復聖人所深謹于日月也人君謹於兩德則日月不食非不食也食而旋復若不食者雖有豐蔀勿憂之矣六二小過之恆小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉恆亨無咎利貞利有攸往過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也正曰小過之恆常也日月之食各有常度日食于正交則月食于半交過正交之後則遇半交之前不及正交之前則遇半交之後九道盤旋或嬴或縮或過不及各有所遇之故人道屈伸明晦之間各有所遇不可逃也日祖而月妣日君而月臣過於朔而遇於望過於望前而遇於望後與不及於朔始而遇於望前皆遇也詩曰彼月而食則維其常此日而食于何不臧聖人不敢以月食為常猶且修其隂德登社鳴金縈絲而救之以教于祖妣君臣之無所親疏也是同體之義也曰然則不言父母何也曰避於乾坤也父而母之則綦親祖而妣之則綦尊日月言其尊者也九三小過正變象之豫小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉豫利建侯行師弗過防之從或戕之凶象曰從或戕之凶如何也正曰防之貴豫也以為小過而不之防則戕我者至矣故豫者所以防患也為干戈以防暴亂為爼豆以防干戈作樂崇德者建侯行師之所從出也重門擊柝而後暴客不作克勤細物而後嘉績可集詩曰既作泮宫淮夷攸服蓋言豫也日月之行託於天載或遇或過而人猶知之况於人事成敗得失魄兆先見者乎書曰怨豈在明不見是圖小過之豫蓋欲圖之蚤也然則聖人固亦善防歟曰非防人也防過而已九四小過之謙小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉謙亨君子有終無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也正曰日月當食又何咎乎九四之間為正交中折其十三六日七分日月過之則不復遇遇之則不復過弗過遇之則亦君子之命也君子惕厲以存其學戒懼以存其性和柔平通以存其命往厲必戒勿用永貞聖人於此則必有取之矣詩曰日月告凶不用其行四國無政不用其良去凶而用良擇吉而用行謙謙之卑以尊而光夫非善圖厥終而能如此乎六五小過之咸小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉咸亨利貞取女吉密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也正曰時已過矣而乃感之若似諱食者也然而非諱食也密雲之於豐蔀異道也君子反德各當其度而已雲雨晦冥在穴不移飛鳥之藏弋人是知日月食矣而隂雲蔽之日月不以隂雲輒改其度君子有過而左右護之君子不以左右而忘其故公弋取彼在穴是君子之虛受也詩曰肆戎疾不殄烈假不瑕不聞亦式不諫亦入文王則得弋取之義者也上六小過之旅小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉旅小亨旅貞吉弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也正曰弗遇則非正交也非正交未有食者也而又有過之何也日度遲疾之有紆驟也雖智數未之能測也飛鳥征厲過而離之若過客之離於旅舍也詩曰魚網之設鴻則離之是猶之無妄也無妄而得災眚君子未有不戒懼者也然則小過之旅文王亦用之乎曰小畜無妄文王皆用之也然則小畜之彖獨見於咸無妄之眚獨見於旅何也曰是位也時也或遇之或過之皆命也命之所值君子皆引為已過故上不懟於天地下有以警於大衆詩曰天命不徹我不敢效我友自逸雲漢之詩曰耗斁下土寧丁我躬是猶遇之而不敢避者也然則日月之行是天道也裸轉而歌無與於人而必曰是人事者何也曰春秋二百四十二年臣子弒君三十有六其奔走覆亡者無算也或過之而弗遇或遇之而弗過其過之以為相失也而或適以免禍其遇之以為相得也而或適以不免突忽之出入其稱伯公子則未有處也衎剽之立歸其或出或弒亦未適定也以為過之若飛鳥之過遇之則飛鳥之遇也師矌侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之乾侯之變趙簡子問於史墨曰季氏出其君而民服焉諸侯莫之罪也對曰天生季氏以二魯侯為日久矣魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然詩曰高岸為谷深谷為陵三后之姓於今為庶主所知也甚矣史墨之言不如師矌之順也然而聞之足以戒故史墨之言則謂小過之旅也飛鳥之災眚是也師矌之言則謂小過之謙也往厲之必戒是也然則過其祖遇其妣不及其君遇其臣之果何謂也謂夫小過之恆也致謙而已六二柔也六五亦柔也柔不可過剛尤不可過也過其祖而遇其妣不及其君而遇其臣為臣子則宜如此也子産作慧而子國叱之曰童子何知范文子掩人於朝武子杖之折笄夫亦有防戕弋穴之心乎何其戒之蚤也然則六五之咸非小畜也而亦曰密雲不雨自我西郊何也曰咸與畜皆未之敢決也取其至隂感其少陽取其至柔感其少剛密雲之義或在此乎小過之變六十四其體盡變復為中孚不變而反易則猶之小過也故小過不别為用用其似中孚者以謂坎水之變體取於震艮合兩而一寓是隂節之終亦隂節之所謂也五爻遞變有渙益小畜履損節猶之中孚一爻獨用者是亦法之乾坤也小過之小過小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉正曰天交地中雷以之上山孚過相次為大離坎亦兩濟之義也小過之渙初八九三九四六五上六六二小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉渙亨王假有廟利涉大川利貞正曰小過之渙鳥體皆動而垂翼不舉以是涉川則滅頂隨之矣天下之為小過者恭儉哀三者而已過此以往則皆大過也慢之無小若蕭同叔子之笑跛眇也汏之無小若蔡昭侯之作珮裘也樂事無小若衛懿公之好鶴也王子頽享五大夫樂及遍舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也大司寇行戮君為不舉而况樂禍乎夫子頽奸君之位迫逐天子鄭伯不之討也而討其遍舞謂其舉小以彰大也然則子頽不遍舞鄭虢遂立之乎曰東西周之禍則必從此始矣故享帝立廟誠敬而已鐘鼓玉帛君子冇所不敢舉也小過之益二八九三九四六五上六初六小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉益利有攸往利涉大川正曰小過之益在古人之稱杜蕢也杜蕢者屠蒯也晉荀盈如齊還卒未葬晉侯飲酒樂膳宰屠蒯趨而入請佐使尊許之遂酌以飲矌曰子卯不樂謂之疾日女為君耳將司聰也股肱或虧何痛如之女聞而樂是不聰也又酌以飲外嬖叔曰女為君目將司明也事有其物物有其容今君之容非其物也而女不見是不明也又執以自罰曰味以行氣氣以定言臣實司味二官弗御而君弗命臣之罪也公說徹酒為是不敢廢知氏而立外嬖故杜蕢之遺音則可謂益矣益以遷善改過晉侯之不廢知氏而立外嬖小過之益晉侯亦有焉小過之小畜三七六二九四六五上六初六小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小畜亨密雲不雨自我西郊正曰隂陽之滯於中皆過也過而止猶可以寡則小畜近於寡過也或曰是皆非大事也為之分過焉鞍之㑹韓獻子將斬人卻獻子馳將救之至則斬之矣卻子使速以殉告其僕曰聊以分謗也宋皇國父為太宰築臺妨農子罕請之弗許築者謳曰澤門之晢實興我役邑中之黔實慰我心子罕聞之親執撲以抶不勉或問其故曰宋國區區而有詛有祝禍之本也韓獻子與皇國父小過也獻子與子罕則所謂小畜也二至而食謂之過密雲而雨謂之畜小過之履四七六二九三六五上六初六小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉履虎尾不嘻人亨正曰小過之履則猶為正者乎曰恐其已懦也震乾也艮澤也乾動而彊澤淖而汚是有凶事畏其陷也君子秉道而行以禮自持趙宣子驟諌靈公不從夜使人刺之入其庭登其堂厯其寢無人焉宣子方朝服而假寐刺者投刃而出觸槐而死晏平仲以士禮居桓子之喪以下大夫祀其宗崔杼之難三召不往而不敢難也季文子與於仲遂之事賂齊以濟西之田叔肸非之文子為之斂約妾不衣帛馬不食粟而卒以成名於天下故小過之履君子之所樂與也恐其卒不中於禮若魏人所刺褊心者則君子所不事也小過之損五八六二九三九四上六初六小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉損有孚元吉無咎可貞利有攸往曷之用二簋可用享正曰小過之損以懲窒過行可以往亦可以享范宣子與蘇大夫爭田三年矣將討之問於諸大夫室老皆以職辭無對者問於叔向叔向曰盍問之祏訾乎見祏訾祏訾辭以祀事謂明德之可以祭也爭田而祀則其為祀者少矣子産聘於晉就小國之賦焉㑹於楚獻侯伯享公之禮六雖晉之墨臣楚之傲主莫敢難也故天下之可以免過者其惟禮乎忿欲克則仁禮復仁禮復則天下歸君子所從事則必於此矣小過之節上八六二九三九四六五初六小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉節亨苦節不可貞正曰小過矣而又為制數度議德行何也夫謂小過之不足與制議乎制議之而無過則遂無過也然而已窮矣是其動皆不中下悅而上險若范文子與叔孫昭子之祈死也無所置其制議焉宋伯姬之死君子謂之女而不婦臧堅之死君子謂之婦而不夫防之戰衛人獲臧孫堅齊侯使夙沙衛唁之夙沙衛幸也且曰母死藏堅稽首曰拜命之辱抑君賜不終姑使其刑臣禮於士遂以杙抉傷而死臧堅則可謂貞矣然不如死鼓之勇也然則曹沫賢於臧堅乎曰曹沫則可與議數度矣然則夫子之與叔肹不與公子札何也曰何為其不與札也曰叔肹之卒書曰公弟叔肹卒季札之聘書曰吳子使札來聘則是不與札也曰為其國絀也有使之者或受其惡焉臣子為國受惡則是可議德行也咸亨至中孚小過十六卦一千八十六年餘九十六日加孚過二反復為一千二百二十二年餘二百八十八日七十二限計之餘兩濟及乾日月食分於是盡矣梓慎曰二分同道二至過之大過猶之同道小過則明乎其為過也限至小過而盡矣正曰頥則陽也直於南政大過隂也直於北政小過從頤大過從中孚從爻者也頤從中孚大過從小過從象者也乾坤之象頤大過坎離之象中孚小過日月皆交食有淺深至於兩濟而既矣既者天地既之非既之旬朔也序卦傳曰節而信之故受之以中孚有其信者必行之故受之以小過是豈謂不信者發乎宋背金之盟非過也守金之盟非信也宋之失信在遼而不在金其過信在和而不在戰也理宗七年辛卯限在中孚明年伐金又明年金主守緒走蔡州又明年甲午蒙古入蔡州殺守緒及其立主承麟於是金亡金亡在中孚之初距徽欽北狩百有十年巽兑之中交中夏之正孚過之初交邉域之際也於是趙范議復中原㑹兵趨汴旋即棄汴而歸丙申王旻作亂遂棄襄陽孟珙既復襄陽與余玠共收西蜀二賢戮力奄忽俱凋漸經分道而來朝廷所倚獨一賈似道似道降書甫出於袖捷音騰播於朝又拘留信使以掩厥醜度宗初六俯躬答拜以朴簌之臭承尚父之寵既而樊襄俱陷元師東下汪立信之䇿不行文天祥之謨已晚伯顔有言汝國取天下於小兒失天下於小兒復何辭乎度宗之先甲子孚過中交宋統已絶而猶栖遲十一二年乃覆於崖陵之下自古亡國之異亦未有如此者庚辰元殺文天祥己丑殺謝枋得乙未元成宗立又十一年武宗海山立中原豪傑之士所受治於元者可屈指而數也自周平王四十九年己未春秋立元凡三十限體卦厯實二千一十八年而屆於元成宗之丙申後限六十七止於癸卯明年而金陵啓祚乾龍乃興中交三十五年建文受之前限六十七年上於周宣王癸丑中交三十五年而在共和之初坤元分濟故中交者天地之所立限也乾坤成列南北分中各二千一百八十四年通朞合體之數也實厯二千一百五十三年餘三十日四分凡三十卦實厯二千一十八年加一卦為二千八十五年餘三百二十三日又半交三十三年一百八十三日合為二千一百二十年洪武丁丑三月清明之末候也以桓王三年甲子步之得永樂壬午嵗前冬至交於乾中或曰是未濟之中也曰前際坤元入於宣幽何為其兩濟之交也然則用卦專乘之數如何曰體卦三十限用卦二十四限四六五六遞相及也用卦八十五年餘五十九日以二十四限積之二千四十三年益以通朞之數三十年為二千七十三年外加四十三年甲辰交於震艮之中內減四十三年己卯而交於鼎革之中鼎革己卯即張陸過涉之嵗也故易之繩凖必在中交也日月星辰之所取道也然則體用兼乘之數如何曰兼乘之數七十五年餘二百五十四日以二十八限乘之得二千一百十九年餘百七十二日洪武丁丑嵗夏至前十日也以桓王三年甲子步之得永樂壬午嵗夏至前十日燕師鷹揚之㑹也二十四限交者得震艮二十六限交者得漸歸妹是皆序卦也衡圖南北則各有所取之矣然則是皆不泝之幽平乎曰前限則幽平也圖之有平王元年何也曰平王四十八年足以洪建三十五年泛厯二載則亦可取也而聖人業有其繩凖引伸觸類夫有不勝取者矣既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之正曰既濟之終亂何也曰怠也然則豫之不亂何也曰豫知戒者也既濟不知戒者也人自謂無患也而或患生焉湯誥曰尚克時忱乃亦有終多方曰時惟爾初不克敬于和則無我怨三代之子孫藉其先德自謂既濟者多矣而不濟者比比也詩曰天生蒸民其命匪諶靡不有初鮮克有終盤庚曰汝不謀長以思乃災汝誕勸憂今其有今罔後故慎修思永古人之所貴也然則水在火上何也曰水者火之蒸氣也蒸氣上盈降而滅火雖强主亦有女禍詩曰燎之方揚寧或滅之赫赫宗周褒姒滅之君子為患即不至於滅祀而喪茀殺牛其所繇來不可不審矣故思患豫防既濟之象也􅳢焚於已熱鼎覆於已熟或生或殺或甘或毒其究也為慎辨物居方初九既濟之蹇既濟亨小利貞初吉終亂蹇利西南不利東北利見大人貞吉曵其輪濡其尾無咎象曰曵其輪義無咎也正曰既濟矣而猶且蹇反身修德則是未忘難也趙簡子使尹鐸為晉陽曰必墮其壘培若見壘培是見寅與吉射也尹鐸往而增之簡子怒欲殺尹鐸郵無正曰昔先主文子少釁於難從姬氏於公宫無典刑師保基於其身以復其所及景子亦長於公宫纂受先業無謗於國乃擇言以教子擇師保以相子而子皆疏之以及於難尹鐸曰思樂而喜思難而懼人之道也委土可為師保吾何為不增簡子說乃以免難之賞賞尹鐸故如簡子可謂不忘難矣濟難而不忘雖曵輪濡尾何咎之有六二既濟之需既濟亨小利貞初吉終亂需有孚光亨貞吉利涉大川婦喪其茀勿逐七日得象曰七日得以中道也正曰既濟而思患者鮮矣需以宴樂宴樂而喪茀左右之借房闥之蔽是可以勿逐也君子濟難去其瑣節以惟大政慎默以居之寬綽以舒之喜怒笑詈不濫於僕御如是則可謂知治者矣晉文公之出也寺人勃鞮斬袪於蒲城里鳬須竊其守藏及其入也而公皆見之是以吕冀之亂獲免於公宫故需而喪茀喪茀而又逐之禍亂未平而怨惡沓至非內順之道也洛誥曰彼裕我民無逺用戾君陳曰寬而有制從容以和是則既濟之需之謂也九三既濟之屯既濟亨小利貞初吉終亂屯元亨利貞勿用有攸往利建侯高宗用伐鬼方三年克之小人勿用象曰三年克之憊也正曰既濟之屯亦未免難也夫是有挾其才智以侈為功名者矣伐鬼方而克之可用也三年而後克之則不可用也三年克之則猶可用也使君子侈其名而小人侈其功則不可用也古之聖人亦有以馳騁僨事者隆本而持末慎始而要終善為經綸者日守此草昧也詩曰匪安匪舒淮夷來鋪又曰不留不處三事就緒疲中國以事遐方功成則不得不賞不成則勞費十倍此先王所以慎固封守不勤逺略也建侯不寧亦庶乎無時或怨矣然則易之屢稱帝乙高宗何也曰君也師也成湯之永終知敝武丁之思亂豫防二者先王之所貴也夏以妹喜殷以妲已周以褒姒雖飛亷惡來韋顧昆吾未有其竪韌也湯誥曰殖有禮覆昏暴說命曰惟事事乃其有備有備無患二者其子孫有不能守也然則高宗之時亦有小人乎曰帝乙之時而有女謁讒夫況其中葉乎君子以禮制其內以義制其外故為歸妹以治女謁為既濟以治讒夫女謁之與讒夫兩者相為倚伏否泰治亂之所終始也易於兩濟正言治亂以閫外之治治之於否泰不言治亂則猶以閫內之治治之也故泰於歸妹既濟於未濟兩王同辭春秋之畏戎狄不甚於畏女謁也楚吳越之僭也始而國之既而人之既而子之杞叔姬一女子往還父母之國而四見於經然則少齊之卒公卿再反而不著少齊何也曰微之也著其禮者而微其非禮者亦猶以外治治之若姜氏之出入則不得以外治治之也然則勞兵逺師春秋亦與高宗乎曰撻伐秉鉞再見於詩何為其不與高宗也春秋所不與者夙沙釐之殿逢丑父之替賈舉州綽邴師之毅雖可而春秋不與也至於小國逺與盟㑹以攘夷狄則春秋無所不與者天子之斧逺及四海周書曰其克詰爾戎兵以陟禹之迹方行天下至於海表罔有不服猶恐有小人依附女謁以興戎於內故又曰繼自今後王立政其惟克用常人然則女謁之盛何詩似之曰維秦風乎閻趙之禍兆於寺人以寺人而達君子猶鬼之籲帝也其詩曰未見君子寺人之令見君子而並坐鼓瑟猶見病而投之毒也不如不見之矣故其詩曰今者不樂逝者其耋夫君子之惡小人則亦謂此也以房中之好與於寺人而猶有死亡之憂况於秉鉞從征於萬里之外者乎六四既濟之革既濟亨小利貞初吉終亂革已日乃孚元亨利貞悔亡繻有衣袽終日戒象曰終日戒有所疑也正曰已日乃孚而曰終日戒何也甲己之合則猶六日焉故未可革新未可取衣袽之苴漏茍塞而已茍塞而心戒雖既濟有未濟之懼也君子之濟事可革則革之不可革不以身試也盤庚曰爾忱不屬惟胥以沈詩曰其何能淑載胥及溺長慮者所以屬忱序爵者所以拯溺也長慮之不用序爵之不試以濟大川鮮不覆矣詩曰如彼泉流無淪胥以敗九五既濟之明夷既濟亨小利貞初吉終亂明夷利艱貞東鄰之殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也正曰既濟之明夷是當文王與紂之事也小過之西郊既濟之西鄰文王則用以自與也鬼神之魄兆發於東北而宅於西南其榮實發於東南而收於西北夫亦其德而已矣不在於位既濟之九五水則為政也水尅牝牛火伏而傷柔順文明未受其祥然而時則已至矣詩曰既克有定靡人弗勝有皇上帝伊誰云憎是則文王之謂也故易之有先甲先庚東鄰西鄰爻象相取是聖人之明㫖也上六既濟之家人既濟亨小利貞初吉終亂家人利女貞濡其首厲象曰濡其首厲何可久也正曰既濟之上且亂矣亂而以家人治之蓋多所不治也故女貞者所以保吉非所以濟亂也四方有敗猶之一家濡首以救之未為失也然而道非豫設變不一適殞身而救人君子不為也然則女貞之利謂不救人者歟曰潔身智也潔身而亂義則亦不智也然則智者固不潔身歟曰濡其首而益於人則為之濡其首而厲於人則亦不為也詩曰就其深矣方之舟之就其淺矣泳之游之何有何亡黽勉求之是既濟之家人之謂也未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也象曰火在水上未濟君子以慎辨物居方正曰辨物居方何也是易之終義也易有天地之義六焉經星所麗屬於河漢出入兩濟以為首尾一也七緯所纒厯於次舍朔望薄食凌犯生焉以為災祥二也南北距極盈縮入厯行隂行陽一南一北嵗月日辰各視其積以稽世運以知得失三也地道繇之以司八方以正分野察其星物四也水土之合五緯遞變形象類居龍虎龜鳥燦及牛馬降於狐鼠或動或交逆數順舉五也生寄歸藏以廟以兆尚象而制咎譽功凶各得其意六也有是六者以别其剛柔相其方位以生萬物而命六十四事如星之在於天而水之在於地也故月之命潮星之命丘南首而北尾古之聖人則必有取之也君子於是致慎焉耳慎之如何曰察其義類而正之以禮體剛而用柔賤疑而貴斷狐者物之善疑者也龍者物之善斷者也屈伸進退斷之以道得失憂虞斷之以命故曰樂天知命故不憂安土敦仁故能愛窮理盡性故不惑獨立遂志故無懼慎是四者則可去小狐之恥進於乾龍之用矣慎者易之大用也易以誠始誠故無息易以慎終慎故無患惟其無患故能與民同患其究也曰思患豫防思患豫防與慎辨物居方斯兩者堅氷龍戰之所不至也初六未濟之睽未濟亨小狐汔濟濡其尾無攸利睽小事吉濡其尾吝象曰濡其尾亦不知極也正曰未濟而有異同亦可以止矣有異同而往則是濡尾也君子濟世不違衆志不違龜筮夫有卿士與庶民俱逆而王者猶用之夫非聖人而能之乎君子量力而動叶衆而謀慎始而慮終行其明不行其疑敬其初以極其歸詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或又以衆人為無謀以獨往為能斷恃其一得以憑大川者是小狐之智也九二未濟之晉未濟亨小狐汔濟濡其尾無攸利晉康侯用錫馬蕃庶晝日三接曵其輪貞吉象曰九二貞吉中以行正也正曰未濟而能濟非藉賢而誰乎晉之三接以貴貴則有功以賢賢則有親詩曰君子之車既庶且多君子之馬既間且馳以君子之車馬敷求賢人雖日中昃不遑暇食未為過也趙簡子將行召董安于三趨之乃至至而後簡子有求於執事三往三反而安于皆備之故安于之皆備安于之所以後至也詩曰招招舟子人涉卬否人涉卬否卬須我友有是友也以曳其輪何遲之有六三未濟之鼎未濟亨小狐汔濟濡其尾無攸利鼎元吉亨未濟征凶利涉大川象曰未濟征凶位不當也正曰征凶而利涉何也謂其取新也已濟而去故猶或疑之未濟而取新則不已驟乎曰大川在前漏舟在後不革不鼎何驟之有然則其征凶何也曰於衆則猶未信也伊尹之遇汝鳩汝方膠鬲之遇商洛諸侯則猶未之遽信也未遽信而往危道也然且出險矣頤之上九則非出險也而亦曰利涉大川何也曰頤而復未濟而鼎其德皆足以濟矣德勝其位需同人蠱大畜益渙中孚則亦其德也然則謙之明夷而亦利涉何也是德之勝時也然則頤之益獨為無德歟曰頤而益之何德之有故涉川之義非為出險也亦各求其濟而已九四未濟之蒙未濟亨小狐汔濟濡其尾無攸利蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也正曰兩濟之屯蒙皆試於鬼方何也乾坤之位帝王之業繇近而逺離火之動燥逺而明甲胄戈兵逖出乃光夫有柄臣剛夫欲建經綸以嘗新主則必自此始矣殷室之盛也聲靈赫濯其詩曰撻彼殷武奮伐荆楚罙入其阻裒荆之旅其衰也炮烋沈湎詩曰小大近喪人尚乎由行內奰于中國覃及鬼方故曰遐逖之民有道則先治無道則先亂先王察其治亂以為之制或用以賞或用以罰先罰則師不憊後賞則衆志定賞而不建則侯度不二詩曰不僭不濫不敢怠遑命于下國封建厥福以是而逺征則可謂不瀆者矣不瀆而後果行果行而後有功高宗之治五十有九年詩曰夀考且寧以保我後生是之謂也六五未濟之訟未濟亨小狐汔濟濡其尾無攸利訟有孚窒惕中吉終凶利見大人不利涉大川貞吉無悔君子之光有孚吉象曰君子之光其暉吉也正曰未濟之訟不利涉大川而曰貞吉無悔何也未濟而不涉未為不知也兩濟之間南曰井鬼北曰尾箕涉井出鬼涉箕出斗天地之大限也兩濟之需訟麗於井鬼或出或入需在河漢之中訟出太微之庭矣故需涉川者也訟不涉川者也既濟之需自尾而鬼厯於冬夏至於斗而濡首矣一出再入順行於河漢之間與日同道辰星為主故明夷為政而需不為政也未濟之訟自尾而鬼厯於斗首逆行栖遲或伏或留月二十七交而熒惑乃終熒惑為主則月不為主故訟為政而晉不為政也聖人之於言也顯而微其於理也隱而費需訟屯蒙漸反而之乾坤星物方位辨於其居環而視之則二至之交在兩濟之端衡而視之則二分之中直黃赤之路也故辨物居方則必於兩濟焉取之易象之要義也然則訟之德彖何取乎曰訟之言慎也慎始而謀終亦未濟之所甚貴也上九未濟之解未濟亨小狐汔濟濡其尾無攸利解利西南無所往其來復吉有攸往夙吉有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也正曰未濟而解解而飲酒則已緩矣君子之於濟也或失則已急或失則已緩鼎則已急解則已緩緩而知節則猶未為失也秦穆公之置服也三世十九年而後濟晉勾踐之持節也反國七年而後興師夫各未知道也而皆有以自信君子之為道也欲通於衆通於衆欲適於用也未濟已窮窮而後通通而變變而久解緩濡首何為者乎君子不舍已而殉人不遺人而樂身既濟殉物濡首則已急未濟樂身濡首則已緩詩曰匏有苦葉濟有深涉深則厲淺則揭夫亦各有其節也何弗辨乎易之稱孚則二五俱倍何也中也未濟之上而有孚何也曰六則不終九則有終九可信六不可信者也上九之爻三十有二其凶者噬嗑無妄中孚巽旅益六卦而已獲吉之數二十有六上六之爻三十有二其吉者臨隨謙升井解蹇七卦而已凶平雜半二十有五需之上六可以終吉而聖人猶以為未當位故聖人之信上六不如上九之信也然則益之三五小畜之四五比之初二革之三四五皆屢言有孚何也曰是自本卦而言之則皆當位也益之三不當位而有凶故聖人之信六不如九之信也信而又信之以為是當位者窮而不變不變不通則於是有失矣故德義名節亦時不可信也所可信者曰仁而已仁不失貞貞不失元貞元相資而亨利隨之記曰造次必於是顛沛必於是必於是者不失是也夫以危急而必於是又以解緩而失之自以為才可濟而猶且未濟故聖人之學絶而王佐之才不見於世也夫亦大可慨矣未濟在斗井之西栁星在焉辨物居方者或於此有取之乎曰需之飲酒宴樂則亦不取於此也且是未濟猶在觜觹之間也未濟將終而自為既濟雖不濡首亦有醉飽之心焉故需在氐房之間則亦待濟者也天下之待濟者視其可濟亦不踰時而濟矣詩曰雍雍鳴雁旭日始旦士如歸妻逮冰未泮言夫可濟而不可不濟者也可濟而不濟故王道衰而霸功亦熄也然則濟之時義不亦大乎兩濟三隂三陽南北兩正於是盡矣孚過中分南北之間間以兩濟北正之盡中孚十有七卦南正之盡小過十有八卦贏縮兩候之所從出也兩濟在孚過之間為日月之正交道南贏而北縮故自冬至以至春分八十七日而浹度自夏至以至秋分九十三日而浹度贏縮之間約差六日七分歸於兩濟而距象平等故否泰隨蠱漸歸妹兩濟與體卦相間猶六律之間有三鍾三吕也每卦相成六十四卦統旬積嵗南北遞分四千三百六十九以四判之各一千九十二餘二分有半以七十二卦分之四分之卦各得十八兩濟出於其中而戎夏卒猝國無定君民無定主故坎離兩濟君子之所重戒也以上下定序而論體卦則坎離為腹兩濟為終以南北兩正而論體卦則坎離頤大過為四立兩濟為二分四立之間猶有代謝兩濟之交未有不亂者也故易曰初吉終亂無攸利聖人之防患深至如此也然則六十四卦三百八十四爻積卦推爻不足以紀治亂歟曰猶是象數也範圍曲成莫之或逃也莫之或逃則必用七十二卦何也曰治亂之故著於爻象積漸之數生於卦差故體用積差參伍相稽十二圖者君子所並用不厭微賾也義理昭然不爽錙黍神而明之存乎其人序卦傳曰有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉雜卦傳曰既濟定也未濟男之窮也是何義也曰是亂際也治亂之際匪夷所思思之與不思同義也古人不以思致辭曰若是禀於自然焉耳然且不敢紊其終始元成宗戊戌是入既濟又十年戊申武宗海山立又四年壬子仁宗立又七年辛酉英宗立仁英亦皆賢主也儒臣嚮用而胡人主兵癸亥南坡之變御史大夫鐵失手刃英宗於卧幄亦唐宋數百年所未有也泰定五年上崩皇太子即位見併於懷王懷王即位既還授明宗不半嵗而懷王又自取之是為文宗又五載上崩酈王立酈王明宗子也不一載順帝立順帝亦明宗子也文宗之后再舍其子而立其姪為難能也然亦以亡其國而卒以亡其身至正十一年辛卯劉福通徐夀輝兵起順帝在位於是十九年矣又明年癸已張士誠兵起明年明師起嵗在乙未則猶漢祖入關之年也丙申克金陵辛丑伐漢拔江州癸卯滅漢誅陳友諒明年建號稱吳於是在乾元之初交故易之大象非言辭之所能治也羲文治其象周孔治其辭辭不盡意而象無盡辭理義者象數之精魂也象數不得喪其體魄象數不持精魂乃離當兩濟之中交文宗辛未遣皇子出居立酈王為帝時已伏庚辰廢遷之禍然猶中外冥豫守兄弟終及之議逮於庚辰論定燭斧搖真吉刺后與古思兒亦無以自白於天下綱常久斁淫放日增即徐韓張陳奮魚狐之智亦足以亡其天下而猶舂容十八年以待聖主特起豈非天乎然則坎離之際皆有戰國衡交諸圖值於孚過華夷之亂常十百年而龍奮之㑹以十四年廓清海宇何也曰已倍於漢高之年矣秦滅七國為時尚暫方肉方爼著於人心宋役北朝為時已久鮑肆蕕蒸習而安之我又起於江南徒步赤手以挽天地宜其久也然則甲辰之厯遂當寶籙乎曰隂陽之節後起者勝前縮後贏徐應者長以春秋魯厯應之則甲辰為仲尼所立元以桓王周厯應之則戊申為天地所立元仲尼與天地所治命一也然則已未立元至龍飛戊申實得二千九十嵗以三十一卦實厯二千八十五年零三百二十三日步之實得吳前癸卯立冬後三日破陳友諒還金陵犒賚之日也體用兼乘之卦外餘四限渙節孚過兩濟乾元自戊寅而後三百二年餘二百八十六日是天地中限百世帝王之所凝厯也然則天地分周自平王辛未而始東遷周公所卜召公所營至辛未乃定何取之歟曰諸圖皆取之也而體卦通基用其全厯幽平之間五十九年中際二千九十洪建三十五通為二千一百八十四年是全易之分體也去幽王之十一存平王之四十八以引用卦二千四十三年暨於定都析木之嵗是則二十五限之所從究也故以周平王辛未為元暨於永樂壬午二千一百二十五年又三年乙酉定鼎燕都而革鼎之限始究是周公之立元與天地仲尼併申其治命也周遷而以衰明遷而以興周云救而明云授也體用兼乘之數舉其通基為二十八限得二千一百五十嵗亦始於幽王之元年去幽存平二千一百三十八又益以半交三十八嵗為二千一百七十六年亦始於洛邑而究於燕都故聖人之與天地相似也聖人而不與天地相似則無所用參天地者矣然則已已之限如何曰是半交也用卦之數二十五限在於震艮實厯二千一百二十九年加漸歸妹半交四十三年為已已夏至後十日又二十九日夏秋之間也故聖人察其中交以為苞桑之繫用卦二十四限在元英宗之壬戌中交四十二為明命之甲辰兼乘二十七限亦在元英宗之壬戌中交三十七而方國珍來降為明初之戊戌贏縮少差亦皆中交也中交之差在隱公已未與桓王壬戌春秋已未與天元甲子參伍之間也然則聖人察於中交而前宋靖康西晉建興皆過不遇之何也曰體卦巽兑交於丙午靖康之元年兼卦革鼎始於宣和之乙已兼卦頤過交於建興之丙子用卦頤過始於建興之乙亥夫固已治之矣何為其莫遇之也然則新室之初始固莫治之歟曰用卦八限隨蠱終於孝成之元年已丑後四十一年已已新室乃廢孺子兼卦九限臨觀亦終於孝成之元年已丑後三十八年丙寅為居攝二年是皆正中交也故天下變故天地未嘗不先而治之也先天不違後天奉時天地與聖人均不獲已也然且聖人不言之何也曰德至者其言簡言至者其意密古之治厯者皆未有如今之細也而晦望式序交食不錯其求之愈細則其抵牾者愈衆矣然而聖人必不使其道終晦於天下知道者得象以該數得數以該義理義得而禮樂興禮樂興即天地鬼神亦有所不能治也諸治道禮樂皆在六十四事中又為十二圖中差略附於後焉三體卦限厯差圖七十二限差積實通朞每限各加一年積餘為嵗三較立差一限六十七餘一百五一限七十五十四二五餘二百五一限八十五餘五十八上差八十九餘百四上差十七十八餘三百一下差九六十九餘一百二限一百三十四餘二百十二限一百五十一餘一百四十五二限一百七十餘百十六上差十六餘三百上差三十十二餘二百七下差十八十六餘三百三三限二百一十五餘三百一三限二百二十六餘三十二三限二百五十五餘一百七十四上差二十四餘八十二上差五十三四餘二百二十下差二十九二餘一百四十四限二百六十九餘五十四四限三百二十六四限三百四十十二餘二百八餘二百三上差三十三二餘二百三十上差七十一八餘一百七十下差三十七一餘三百一十五限三百三十六餘一百六十五限三百七十八餘二百六十五五限四百二十五餘二百九十上差四十二餘一百五上差八十九餘一百三十下差四十七餘二十五六限四百三十五餘二百六六限四百五十四餘六十四六限五百一十四餘二百八十上差五十十四餘一百六上差一百十餘一百八十下差六十十六餘二百一七限四百七十一餘五百七限五百二十九餘三百十八七限五百九十六餘二十五上差五十八餘三百十三上差百二十五餘二十下差六十六餘七十二八限五百三十八餘八十一八限六百八十二餘一百一八限六百八十一餘九十九上差七十十一餘一百三上差一百四十三餘十八下差七十二三餘三百五十九限六百五五餘二百十九限六百八十一餘一百二十六九限七百六十六餘一百九十二上差七十五六餘二百七十上差百六十餘十下差八十五餘六十六十限六百七十二餘三百二十限差之法無所取之取之積㑹也三體互追積而逾逺惟體卦五限與用卦四限僅差四年七十二日以十六乘用卦之差而得差積一限之實故嵗實六十四限常退六十三年亦其候也體卦十限較九八二限常差八年一百餘日各以八乘之為六十七年餘之限限中相追其最親者用兼兩卦九八二限耳二限較差不過二十七日以七九六十三及九八七十二乘之不及月行八交之道故體用相乘之數分為體用二限是逺近內外之所取衷也體限積實四千八百四十四餘日百三十一半交二千四百二十二約之為春秋之本用限積實五千四百五十餘日四十四半交二千七百二十五約之為月交之本其不及者以通朞進之是春秋原本朔虛之所從出也用卦亦乘兩限體限積實五千四百四十餘日六十與兼卦體限平交約差十分上下贏不過十一分用限積實六千一百三十二餘日九十一半交三千六十六為約得三百有六再約之為氣閏之本其不及者以通朞進之通朞六千一百九十六半交三千九十八以實贏十六足之三千一百一十四以十約之為三百一十一四分為氣閏之本通實相裨實則三千五十通則三千一百一十約之為詩猶二千四百二十二為春秋之實本二千四百五十七半為春秋之通本也以通本之十七裨實本之二十二而嵗實參分月交氣閏為天地之大用詩用氣閏得用限之半交春秋用月交得兼限之半交各為十約之以察天地之體數聖人所範圍天地差等百王祖仁義而興禮樂皆出于此也易象正卷十一
