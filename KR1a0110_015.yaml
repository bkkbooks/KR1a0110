辰分是以參用六之法也三極逓用以兩用九圖三置三為極即為一變九參三為九九而後兩之即為二變十八三變三十六四變七十二五變一百四十四六變二百八十八七變五百七十六八變一千一百五十二九變二千三百四十變四千六百八十一變九千二百十六十二變一萬八千四百三十二十二變三萬六千八百六十四十四變七萬三千七百二十八十五變十四萬七千四百五十六十六變二十九萬四千九百十二十七變五十八萬九千八百二十四十八變置三而九則猶之參也參而後兩之雖十六變猶十八變也十八變五十八萬九千八百二十四以歳法四千三百六十九分之為一百三十五歳之辰分以月法三百六十四九釐分之為一千六百二十月之辰分是以兩用九之法也以是兩法合於八卦用兩九疇用參兩而至於二十六萬二千一百四十四參而至於五十三萬一千四百四十一則可謂廣大悉備矣圖書之用以縱横九數據三乘兩始於九中於八十一終於七百二十九以㸃當畫一月之日三九二十七始於三究於二十七合為三十故二十七日而交三十日而合一嵗之辰六其七百二十九為四千三百七十四内縮九辰故四百八十六年而合八十一年而小合二百四十三年而半合春秋所以立元也元法俱見春秋表正中今再以圖書十二變源流具後九疇十二變成數圖一置一為極三一變九二變二十七三變八十一四變二百四十三五變七百二十九六變即為歳辰距九之數六乗二千一百八十七七變亦為歳辰倍數六千五百六十一八變一萬九千六百八十三九變五萬九千四十九十變十七萬七千一百四十七十一變去初二為九變即十二律全分五十三萬一千四百四十一十二變十一年半一百二此十二變者即一百二十一年又六月之厯几歳厯絀九以二百四十三年為半合折之為一百二十年半參之為三百六十四年半兩之為四百八十六年春秋以參而用兩所以範圍天地曲成萬物通知晝夜周濟天下神明黙成者也天下象數不三不成圖書據三成兩方圓曲折横縱相加各以三成因而倍之不出五十有五四卦之圖終焉資始稱天資生稱地坤三索成男左數而之天乾三索得女右數而之地彝倫既陳五行式序自先天圖而後此其最著矣中天之道以人次天乾之始姤坤之始復秋分明夷春分於訟師同泰否以辦四立以親先天其義一也隂陽之畫彼此對變一陽在左一隂在右八六相離虎豹之文於是以出單複環旋日月之緯道也日月緯道與時變遷二而其元始以雲漢為首尾箕參之端出入雲漢為至之中璧翼二宿北近中垣為二分之路今以赤道為準日纒箕三度起復初九上下尾五至斗七皆為子宫元枵之次日纒牛二度起噬嗑九三上下斗九至女十皆為亥宫娵訾之次日纒危六度起坎九五上下虚一至室六皆為戌宫降婁之次日纒璧二度起謙初六上下室六至奎七皆為酉宫大梁之次日纒婁六度起旅九三上下奎八至胃七皆為申宫實沈之次日纒昴七度上下胃七至畢九為鶉首之次又參八起始以命夏至而鶉火始交於虎首井廿七起井二以命大暑而鳥帑與鶉首易位至張四度當離六五以為處暑而次於夀星翼十七當履初九以為秋分而次於大火角八度當節六三以為霜降而次於析木房一度當晉六五以為小雪而次於星紀覺次舍分殊而命名互異雖大撓重黎生於今斯不能膠柱而調之也中天圖以河漢為首尾箕參璧翼為四方正次使星宿日纒各以所次命宫不復以舊名旌夏故舉北方之宿則曰房心尾箕斗牛女東方之宿則曰星張翼軫角亢氐南方之宿則曰昴畢觜參井鬼柳西方之宿則曰虚危室璧奎婁胃雖龍虎龜隼各移其方而舍次星辰不乖其質固不得以次舍之實位冒象物之虚名也今但去古人之命號及西域之殊名以丑交亥以寅交戌以卯易酉以辰交申以已交未日纒所在即為本宫天星所中即為繫命寧守爻象之定分不襲黄赤之虚次而仰觀俯察之故亦可得而言矣然則以卦命疇皆左陽而右隂故乾兌離震㢲坎艮坤得依為序今以乾㢲離兌艮坎震坤為次則㢲隂間於乾畫震陽隔於坤宫諸疇所係何以為序曰象自成爻疇自為數各受其所得不相易也必如其象則一一一為乾二一一為㢲一二一為離一一二為兌因而推之一疇之數可備八卦之序不待如先天之數間疇而分象則亦簡易明著在文字之先者也此後天圖文王之意仲尼所定即說卦所謂帝出乎震齊乎㢲相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮者也是圖本地而作與先天中天相賛以成萬物其理道之精微規模之奥渺又非世儒之所易窺故聖作雖懸明述少逮今舉其淺著者河漢首尾垂於斗井為兩濟之端七緯之所出入坤艮兩土終始其際為地道之綱紀凡易所稱西南東北皆以坤艮為義先甲先庚皆以震兌為義故以震始者歸之於坤以兌始者歸之於艮木生火而還生土坤土遂生兌金金生水而水又合土水土合而生木震為青帝之府萬物嘉生兌為文武世室萬物嘉成故震雖稱木而雷火出焉兌雖稱金而水澤鍾焉體木以用火故震能兼離而離不為獨火體金以用水故兌能兼坎而坎不為獨水五行兼備八卦乃行故貎出於水而說於兌言出於火而聲於震眎出於㢲而明於火聽出於乾而辨於水思則无所不之也土行於水火之間折衷於金木故以㳟從明聰合發其睿河漢所直日月五星所為向背也天下兩界發於西兌長河界北江漢界南合而出於震澤之外覆而觀之剛右而柔左逆而向之柔左而剛右是地道所以即序也文武都於豐鎬居乾而莅㢲以乾為首以㢲為足坎兌二水以為左右坤艮二土以為肘腹震離二火以為股脚故周人之樂去商而尚角用乾之全數至已而律極故黄鍾八十有一小吕止於六十戌亥之間日月退舍天道之所從始也故後天圖者道之至精者也窮理格物則必自此始也然則周宅乾㢲而曰南面而聽天下嚮明而治何也曰嚮明者八方之所共治也首乾者山川之義也坎勞乾戰天地亦有不獲已也然則艮成終始而坤蹇兩彖皆不利東北解雖不言東北而猶有不利之意焉何也曰各自其本卦而言之坤艮相射以為喪朋蹇解皆在東北而蹇有艮解无艮也无艮故不言東北然則道不兩行日不重次自帝出而始者則震㢲離坤兌乾坎艮為序自說言而始者則兌乾坎艮震㢲離坤為序今為圖内自帝出終於成言外自說言終於致役彼此分馳令加三乗則以何為本歟曰圖皆三成是兩圖也圖无異次自帝出而始者三成皆始於帝出自說言而始者三成皆始於說言猶貞雜諸圖之各自為行也然則易固如是雜歟曰易三代羣聖各異用也要其本於不貳不越不厭則連山歸藏固有首於坤艮者矣連山歸藏之首坤艮何也曰是地道也有軒轅氏之遺說焉辨物居方制器尚象剛鹵均布以辨其質大赤黒白以察其色大輿小石以胗其脈徑路門闕以制其節或當不當以定其位或出或入以審其穴近不相得以察其本柔不利遠以詳其末始之於六龍御其體終之於尺蠖守其訣連山首艮歸藏首坤後天首震與兌又何疑焉然則易言首震不言首兌何也曰易之數逆也兌者江淮河漢所從出震者江淮河漢所從歸也大澤所歸神明出焉然且聖人不貴之聖人所貴者恐懼修省講德修業以為六十四事之本而已然則艮坤之受四瀆異於兌震連山歸藏不治六十四事而古聖人亦貴之何也曰書不盡言古聖人所不盡言者多矣以周人之貴卜筮也而六十四事不言卜筮一曰治厯明時愼辨物居方而已殷人尚鬼周貴盟誓而亨祀上帝建萬國親諸侯之外无聞焉故出齊見役說戰勞成孔聖以是治後天之體敬農恊建乂明念嚮威箕子以是正洪範之用立義不同其本於齋戒誠敬以開物成務則一也水土平而相恊出得坤者以為坤得艮者以為艮兌者以兌震者以震乾㢲坎離則函夏宅土之所同用也文武周公三聖人者不能保豐鎬之都祖甲太戊盤庚三賢君者不能安五遷之宅則相恊卜兆之義聖人不盡言之明矣然則後天之圖何為而作乎曰亦以明於五德之義間於坤艮帝王所以終始也雜卦次序參差維咸恒上下與貞圖同際亦聖人所作雜卦圖不用三乘即取先天已成之卦因而次之為序不同其有六爻十八變則一也故亦為三成之圖自周孔以前皆用貞雜二圖不用先天非无先天也先天八體八交四立之卦皆有常序可以規摹故古聖為貞雜之文以參三圖之秘所謂雜者雜三才而治之貞者幹三才之正也先天主天中天主人後天主地貞圖彰往雜圖察來其以左右而分類則一也凡雜卦有二十四圖皆貞卦同象以其文繁可例起也復舉其定序定位厯年之運著於篇焉雜卦厯年用歳實每限六十七年百五日凡每限之下皆空一年積六十四限空六十三年即通朞相差去閏之日也積除六十三年當退不及一限復餘四嵗故自幽王初年已未至桓王元年壬戌又三年甲子率差隱元四三年前圖論之詳矣厯前圖起厯皆於兩際以中交測其禍敗雜圖起皆於卦中以兩際裁其餘差雜圖之與貞圖相為救也春秋之元起於坤中其前一限在於姤中檿弧箕服藴其包魚呉興之元起於夬中其前一限在未際中燕特穆尔濡其狐尾故作易者之憂患遠在百世其知敝豫防不為一姓之事自建中靖國以來所謂積除六十三年當退一限復餘四嵗者又積如干數亦須照前雜圖推之為之辭曰大過顚也姤遇也柔遇剛也漸女歸待男行也頤養正也旣濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也夫使爻序不亂經常如故中人起而正其辭則必曰大過顚也頤養正也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也姤遇也柔遇剛也夬決也剛决柔也君子道長小人道憂也中國之與四夷男子之與婦人剛柔貞勝壹至於此乎而聖人直決之曰君子小人故君子小人其辨之不可不審也雜卦之寛於呂武嚴於戎人則猶是春秋之意也春秋嚴楚子而寛姜氏以為婦人也亂於一姓不及於天下新室之交於蠱中元和之交於復中蠱復之間建武興邦永平上下適三十年是雜卦之特義也夬治天下三十四年而以剛決柔剛者自長而不以為罔柔者自逺而不以為憂蓋自春秋而後二千一百二十三年斧鉞之威未有大闡於此者也過此以往二千一百五十三年豔處之倫又將以柔遇天下故剛柔之遒相為消長也肱臂左右以數交讓九六處左七八處右因而乗之左絀右强逓差六十故憂樂與求起止盛衰一彼一此各以反照得其類也二千一百五十三年之上與二千一百八十四年之後災時見伏久速進退各以隂陽相往反也中虚六十三年以五日二十五分去之而消長盈虚與易厯交遇得其道者坐照百世取其憂患而與以安樂不得其道雖當名正辭耳提而面命之猶以為謾也是雜卦之渺義也雜卦之分上下經猶之貞卦也貞卦上經之師天地終於水火下經之師山澤終於兩濟雜卦山雷風澤皆在上經而下經以水火為治其有咸恒分界一也而八體八交在所不用矣凡卦无八體反復則下經不得獨贏上經不得獨縮其无體交而有贏縮者猶二分前後之有進退異度也過頤漸歸兩濟夬姤此四者聖人所以誌天地之罅也以過頤兩體通於乾坤坎離中孚小過而八體之罅見以漸歸兩濟通於否泰隨蠱而八交之罅見以夬姤兩限通於萃升剝復咸恒而八㑹之罅見故雜卦以此四亂者别貞體之序使智者見之知所備豫也頤訟之交在靖康之初年逆而泝之在天監之中年爾朱與胡后比而亂北魏歸妹頤之交在寧宗慶元之元年逆而泝之在宋武帝孝建之元年南北弑君克復同嵗是兩濟者中原之與正朔同治也天地不以戎索而棄中原之治故亦以正朔之治治之歸妹未濟之交在度宗咸淳之元年逆而泝之在晉寜康之丁亥秦主奔亡於五將慕容創業於幽燕未濟夬之交在元文宗至順元年逆而泝之在晉元帝建武之元年劉聰取日於長安而典午嗣徽於建業猶是南北也天地不以中原為雜亦不得不以南服為正故以正治雜使遐荒變其固陋以雜治正使冠裳變其滛奢天地於此亦不得已也夬乾之交在靖難之初年去柔就强移仁而義逆而泝之姤困夬井在當塗之甲戌曹芳已廢馬昭乃擅隂陽之義一正一邪天地之道一南一北觀是五際者而鬼神之治周孔之智百世如覯也定序以順而治之六十四限獨反姤夬萃升之限以變南北定位以逆而置之六十四位獨尊姤夬萃升之位以别治亂升豫萃謙之際秦漢始分副車之椎發於陽武姤困夬井之際魏晉始分立高貴鄉倣於孺子此兩者王霸之大别也以是兩者參於後限井困之於咸恒夬姤之於乾坤帝皇王霸征誅禪受之義槩可知矣故有帝而雜王則有王而雜霸有征誅而雜禪受則有禪受而雜征誅隂陽剛柔之事天地不能自正也必使人正天地則必仁義為事世未有雜仁義而能正天地者也天地之仁義盡於貞雜諸圖而是卷以先天圖為主故復為先天厯年圖繫焉以貞卦歳實測先天之序為先天厯年圖先天主六卦之歳不為厯年而又以厯年測之何也曰易象旣立歳行其間大而千萬小而一歳逺而七十二部近而六十歳率繇是也貞雜卦行序各有通朞歳實之别先天宜用通朞而亦以實測行之取於夬之中限華彝始革夬之終限天地廓清蓋天地所命不可違也然則春秋之元猶在中交歟曰雜卦在於中交謂其雜也舉中以正之先天之圖則於履端也毎卦六十七年百有五日凡三十一限二千八十六年而終於夬之上六江楚所以破誅至正所以謝命也然則是諸圖所同也而雜圖舉中終於建永之革命何也日居乾者正也居夬者雜也夬非聖人之徳也而有聖人之時聖人之正乾徳則是天地之所不違也然則以嵗實積之盡於乾九僅得二千一百五十有三何也盈虚之厯通朞退朔嵗實進氣舉朔予氣則皆益六十有四因而分之各得三十有二是大象之所統歸也然則是通朞也又不舉通朞而舉嵗實何也曰嵗實之與通朞同用也三十一卦而終於夬得二千八十有六則聖人踐乾元之端三十一卦而終於夬得二千一百一十有六則弱主兆无號之候君子於此則必有取之矣氣閏之積中分三十二年或見於卜洛之前或見於奠燕之後八際四分各藏其用也幽平之交正六十年從坤初際交於乾端二千一百五十三載諸圖論之詳矣以復當屯以夬當未濟乾坤以為貞象復夬以為雜卦則先天圖兼舉之先天圖八際蠱升之間周與秦交升間訟之間秦與漢交濟解之間漢與新交小過漸之唐與隋交漸蹇之間李與武交否萃之間唐與宋交坎蒙之間漢與魏交剝坤之間次於夬乾天地大變以三十二卦之間而有此八交者治亂相乗亦已簌矣萃大畜升无妄對化相應徳與位匹以為天地之勝氣存焉而猶有改命之事故自蒼姬以前受命隆長率五六百載明主哲相其所維輓必不在旦夕之内也然則乾坤改命左右二間四限之卦二百六十九年皆有三四大創何也曰是夬姤剝復頤大過之事也然則出彘敗驪皆在剝坤兩限之内而復頤无有焉何也曰復非災限也入頤七年而王子帶以戎攻周天王出居栖遲十五六年其在後世則亦有喪亡之禍矣復之上六反而行之以為初交幽平之間是也剝坤復頤一逐一弑一遷一出雖聖人知其後世必有此禍不能使其後世不逢不若而能使其後世守之如故是則聖人之智也然則剝坤復頤不至改命而夬乾姤大過革命又且大創者何也曰坤不革命而乾革命剛柔之序隂陽之等也姤過之大創則猶未至於易姓也剝坤之禍重於復頤夬乾之威烈於姤過值復而不反者以遷而衰値柔之遇剛者以遷而强在頤而出居禍輕而緩可十四五載在大過而蒙難禍重而速亦六七八年故隂陽之與剛柔剛柔之與仁義不可不備之蚤也備於外者周於内備於婦女子者周於戎狄一備不周則災沴之禍中之矣故先天圖者天下之大備也以天下之大備聖人猶恐其不周而為之貞序雜序以别其禍亂視其災沴汲汲然進百世而治之若恐不及者是聖人之憂患天下後世憂患之所不至也然則憂之如何曰為六十四事以治之而已修德修刑善教善養則皆所以治之也然則乾乾厚載可以救乾坤之亂乎曰何為其不可也幽為煽處竉任姻婭棄嫡立少順為淫樂男女无别䟦河水嬉以是而亡天下乾乾厚載何為不可救乾坤之亂也然則習教繼明可以救坎離之亂節愼頤養亦可以救頤不懼无闕亦可以救大過議獄亦可以救中孚恭儉亦可以救小過乎曰百年之治一日之敗六十事之所圖維非一事之積也且如八交之事彼此相為治也斂徳辟難不可以救否而輔相裁成可以保泰嚮晦宴息不可以救隨而振民育德可以治蠱居賢善俗永終知敝思亂豫防辨物居方此四者則百世之所共救也救世而不反身救身而不反徳則聖人亦无如何也為歳實不追全象復為通朞以明之是為通朞中分二千一百八十五嵗其以兩元分行者隱公己未之元縮行四嵗桓王壬戌之元贏行四嵗縮行四嵗者取於歳實三十一限而至於甲辰之始距戊申清明凡四嵗實贏行四嵗者取於通朞三十一限而至於丁丑之終距壬午靖難凡四通朞故己未壬戌此兩元者聖賢與神明所共理天地也己未之元以紀天下之治亂壬戌之元以紀王者之終始天下治亂與王者終始亦離若璧邸也頤之有王子頽隨之有周赧既濟之有孺子嬰離之有漢獻中孚之有陳後主歸妹之有武曌泰否之有小五代夬之有妥懽特穆尔此八者天地治亂所為虞主也因而衷之无妄之中交在於庚寅明年辛卯祖龍崩自沙丘旣濟之中交在於癸丑是綏和元年王莽為大司馬明年成帝乃崩立太子欣離之中交在建安丁丑獻帝還自洛陽袁術僭號於夀春雖乗輿无故而衰亂極矣中孚之中交在於丁卯其先甲子隋太子廣弑其君堅於大寳殿雖先四嵗則猶之中交也歸妹終交在於丙子其先乙亥武曌殺太子宏又八年高宗乃崩泰否中交在於己酉其先一年劉知遠稱帝遂歾於晉陽後一年郭威弑其主承祐自古帝王蘧廬天下未有如晉陽之速者也夬之中交在於戊戌其先四年帝王之師起潛竊之運衰天奪其運者不奪其主而亦有主運俱奪之晉陽主運俱延之永徽夫其先世之馮藉亦固有遠近也壬戌之元併治主運與甲子相提攝桓襄兩元各引其始再差三嵗以為壬戌甲子之治引而中之三十八年姤之中交在莊王己亥明年為釐王元年大過中交在襄王丁未又明年己酉為頃王元年升之中交在漢初丙申其先年乙未孺子銜璧訟之正交在孝武元年辛丑其先二年己亥孝景乃陟困之中交在本始己酉其先二年丁未是有負扆之事昌邑乃廢未濟之中交先在甲寅孝成乃崩後正交在於庚申哀帝乃崩王莽秉政和帝乙巳在於下元四差之嵗明年丙午為殤帝元年一嵗兩主蒙之丁巳差於己未而應在魏主叡師之中交下元壬寅明年癸卯為康帝建元元年又兩年而再易主咸之中交在於丙辰下元戊午丙辰魏太后弑其主宏丁巳蕭道成弑其主昱自是則天地以華彞共正也小過之初差三年壬寅陳主頊殂明年陳後主立其中交在於丙子明年為隋恭帝義寧元年自是而南北乃定矣漸之中交在於癸未明年為嗣聖元年其先三十四年上元己酉而太宗乃陟明年為永徽元年艮之中交下元己亥明年庚子憲宗暴崩明年為長慶元年謙之中交在於戊申文徳元年僖宗還自長安明年己酉為昭宗龍紀元年否正中交在於癸丑明年甲寅周主威殂晉王榮立自是而南北夷夏又共為敵主萃之中交在於壬戌乾興元年明年太子正立是為仁宗晉之中交在元祐癸酉高后當之以其坤徳亦配厥命明年甲戌為紹聖元年天地之意未嘗不在祐順也道在夷則主夷道在后則主后夫謂其道存焉耳甲辰初差入豫三年而徽欽北狩其中交下元在於辛巳而金主亮受之金主亮之得應於交限為南國之受其册命南國不受其册命則金主亮不得為正金主亮不自為正則天地亦不以正限命之矣觀之癸丑三年乙卯寧宗乃禪比之辛酉三年甲子理宗乃殂是桓王之甲子治其絡始也仲尼以隱公之己未正天下之治亂天地以桓王之甲子正帝王之終始壬戌之元參立其間故上壬戌之三年下壬戌之三年升降參除於六十七八年之中而薄蝕見焉故寢殿之有治事天地之大薄蝕也春秋所書日食三十六弑君亡國亦三十六震之恐懼修省蹇之反身修徳歸妹之永終知敝大過之不懼无悶則亦謂此也然則是二十中交者皆无有篡弑之禍何也曰是天地之正命也其有篡弑則非天地之正命也然則是範於先天參以三元而天地變化鬼神情狀亦以備矣而古之聖人又為貞雜諸圖何也曰是固屢言之矣參伍錯綜擬議變化聖人之所為愼也然則先天之作於何昉乎蓋自圖書而昉也先天圖與洪範同出於圖書而先天圖主象洪範主數學者動卑象數故象數不明天道不著今曰圖書即先天圖世猶疑之又曰先天圖即洪範則茫然莫據矣凡人事天道皆可摩揣摸稜相近惟象數所繫秒忽難移故衆圖之象歸於先天衆數之圖歸於洪範其以彰往察來匡持天下則一也然則先天圖之即洪範何也曰以理言之則本於太極以為皇極以象言之則一五行二五事三八政四五紀五皇極六三徳七稽疑八庶徵九五福六極以數言之則是乾一兌二離三震四㢲五坎六艮七坤八也洪範之數為先天圖之數何也曰易皆用八疇皆用九易之有隂陽猶疇之有竒偶也陽竒而有一三五七九陰偶而有二四六八參兩倚數故疇象通用乾有三竒兌二竒而一偶離中偶而外竒震一竒而二偶以是為序則疇象之數皆可縷數也凡象始於八疇始於九為象者八八六十有四以八乗之為五百一十二又再乘之為四千九十六又以八八乘之為二十六萬二千一百四十四凡象之賾極止於是自是而外无象也為疇者九九八十有一以九乘之為七百二十九又再乘之為六千五百六十一又以九九乘之為五十三萬一千四百四十一凡數之賾極止於是自是而外无數也以五百一十二自相乘而得象極之象以七百二十九自相乘而得數極之數兩者易疇所相為用也倍易之象以追疇之數積差七千一百五十三半差三千五百七十六半日月積差之所從始也然則九疇之數五十三萬一千四百四十一八象倍數五十二萬四千二百八十八以七乘之易得三百六十七萬一十六範得三百七十一萬九千六百四十七日月積差共八日五分六釐六毫三絲何也曰七八九六以之乘限統數也非宻法也以六十八九乘之則天地之密行可見矣然則五行之有餘沴何也曰五行出於圖書皆有中數極備於此則極不備於彼土徳之始二十有五九六七八左右分乘左柔而右强柔强之差二千七百而右贏其百此又贏一百土不稼穡水德之始三十有六左右分乘左柔而右强柔强之差右贏一百四十四此百四十四者水不潤下火德之始四十有九左右分乘左柔而右强柔强之差右贏一百九十六此百九十六者火不炎上木德之始六十有四左右分乘左柔而右强柔强之差二百五十六此二百五十六者木不曲直金德之始八十有一左右分乘左柔而右强柔强之差三百二十四此三百二十四者金不從革五德之所不從謂其近於所尅者也聖人謂道不皆惠必有逆數故為敬農恊又明念嚮威以致其平康正直之用其不惠於九用自罹凶咎以逺於五福近於六極則非天地之正命聖人亦无如之何也然則五行操柄五紀庶徴五福六極皆仰受之而五事之敬八政之農三徳之乂兢兢人事若不克修者何也曰五行之秀叶以為人人於五行非兩物也天地之有人物猶隂陽之有爻象錯綜為文文有當否而吉凶生焉故智者觀於圖書以得五十三萬一千四百四十有一之文觀於易象以得二十六萬二千一百四十有四之實而後五事八政三德庶徴與六十四事者可得而叶也然則用九而去十者何也曰十之與五通為皇極五行五事五紀皆五也而十備焉凡五行之數去十則用九存十則用十一存十而用十一何也土德之終十十為百復加一十得兩河圖為萬物終九十之御二十八十之御三十七十之御四十六十之御五十皆得兩河圖為五百五十各以五十五退之為五德之序金德之終九十復加一九為九十九以五經之為四百九十五木德之終八十復加一八為八十八以五經之為四百四十火德之終七十復加一七為七十七以五經之為三百八十五水德之終六十復加一六為六十六以五經之為三百三十凡五行之成數二千二百其生數八百二十五凡三千三十五為五十五自相乘之數也五乘五十五為二百七十五十乘五十五為五百五十各去其十以分八際為四千三百二十故嚮威之用在於十一存五而去六存十與一則為十一君子之所愼其趨舍也然則八際之象五百一十二以八乘之為四千九十六九疇之數七百二十九以六乘之為四千三百七十四象以十五分而益一數以三分而損一損益不齊而曰同用何也曰其去十而用九一也五百五十去十而乘八以為天地之通朞七百二十九虚一而乘六為日辰之交㑹大象之辰四千三百六十九大數之辰四千三百七十四積虚之數十十上下於嚮威之用則必有所愼取之矣然則君子康色好德敬用五事内決之稽疑外察之庶徴而猶懼有六極之禍何也曰五德之終各有所極得一而處則一斂極之福失一而流則一墜極之凶五十有五之中五行所經兩分二十有七欲擇其中孰舍孰取乎故精者一之所生也微者中之所生也六十四象之候則必於其中交八十一數之候則或於其端末也履端舉中居終三者二十七候之所極研也然則是雒書也而皆舉河圖言之何也曰圖書一也圖書之象積三而成三六二九究於十八去十虚一以行於六十四象之中數而不繫於象猶星辰不繫於天井邑不繫於地雖聖人无所得其趨舍也然則六極五行所生五事所成不繫於數數則通有福極之用而獨去十何也曰陽爻之畫各得一三五七九隂爻之畫各得二四六八十凡隂陽六爻三五相御各一百二十五以一百二十五乘之為一萬五千六百二十五以六十四積之為整整百萬之數六十四卦无復贏縮聖人以河圖為體雒書為用去十而行之則四十六萬八千六百五十九萬之卦即藏於五十三萬一千四百四十一卦之中其得一萬五千六百二十五者首乾一卦耳餘以隂陽自為贏乏故天地之大用非聖人莫取也聖人教人使人知象又知其數既知其數又知其條派所在如司徒蒐狩致衆旝下畫而望之知其物色夜而呼之名號不失也故古之聖人行師動衆治賦計畝施禄建官皆取諸易故以遷國出征不損車徒裒多益寡不爽升合建表於八尺之中而收積於萬里之外則皆方圓倚數之為也或曰六十四卦八八相乘不過尋丈之内中人為之猶且迷其端竟失其前後今曰二十六萬二千一百四十四卦卒然值之皆知其條派時日分刻所在不巳難乎曰乾兌離震㢲坎艮坤則有其次矣以坤加復以乾加姤使坤就坤使數乾就乾則有其方矣九數之間又分隂陽雖有九不離二類學者但明九疇之象居九卦之實粗舉象數因而求之如望瞳睛而知黒白也凡先天方圓圖皆在人耳目之前不須圖畫可知其象所難知者獨方圓相削凡十八變而歸於極耳極以八尺之表立於兩濟之中八尺而準一方凡方九圓而冒於周天之外凡四周一百二十八以五百一十二為方分九方九圓而極於八尺之中先天圓方獨為爻畫次第未及於通變參兩之說也然七百二十九卦一一依此為序不依此為序則圓書兩道九方錯雜炎上潤下之文曲直從革之勢五土稼穡之方原始要終何以裁之故如一一一為乾則一一二為兌乾兌自領九類一二一為離則一二二為震離震自領九類從此九九八十一疇皆乾兌離震為政以至次疇二一一為㢲則二一二為坎㢲坎自領九類二二一為艮則二二二為坤艮坤自領九類從此九九八十一疇皆㢲坎艮坤為政以至次疇乾兌復始而後九疇八卦可以類從也今為九疇八卦相次之圖如左第一疇八十一象圖右為第一疇八十一象初行一一一至一一八皆乾兌為政終之以一一九之乾次行一二一至一二八皆離震為政終之以一二九之離又次行一三一至一三八又乾兌為政終之以一三九之乾又次行一四一至一四八皆離震為政終之以一四九之離繇是推之竒陽耦隂九九成疇自初九疇者猶先天之左次皆乾一兌二離三震四自為行律但去十而存九耳下圖以二為始乃依㢲坎艮坤次焉第二疇八十一象圖右為第二疇八十一象初行二一一至二一八皆㢲坎為政終之以二一九之㢲次行二二一至二二八皆艮坤為政終之以二二九之艮又次行二三一至二三八皆㢲坎為政終之以二三九之㢲又次行二四一至二四八皆艮坤為政終之以二四九之艮竒陽耦隂九九成疇猶先天圖之右次其下一畫隂者也先天左右視下一畫陽者從復隂者從姤從復者為震離兌乾從姤者為㢲坎艮坤觀二圖而其下可推也第三疇八十一象圖右為第三圖八十一象從三起乾以乾兌離震為次亦猶之第一疇也第四疇八十一象圖右為第四圖八十一象從四起㢲以㢲坎艮坤為次亦猶之第二疇也第五疇八十一象圖右第五圖五為綱紀五通戊己剛柔合用則一二兩行為乾兌離震三四兩行得為㢲坎兌坤也自五五五以上四十象得八卦者五以下四十象得八卦者五而五為五中卦八象自為通變故七百二十九卦中卦實兼乾坤施於六乗之中仍得九卦不退九辰也然陽贏隂乏理之常然陽爻自得一三五七九隂爻自得二四六八不足為異從於干支與氣俱化則陽日從戊隂日從己剛柔制合適得其平无贏乏也第六疇八十一象圖右為第六圖八十一象從六起㢲以㢲故艮坤為次亦猶之第四圖也第七疇八十一象圖右第七圖八十一象從七起乾猶第三圖之乾兌離震也第八疇八十一象圖右第八圖八十一象從八起㢲猶第四圖之㢲坎艮坤也第九疇八十一象圖右第九圖八十一象從九起乾復以乾兌離㢲為次猶之初疇也九疇之中竒數常贏多一八十一故諸卦之中乾至一萬五千六百二十五坤獨四千九十六耳乾坤合數一萬七百二十一凡卦所直一陽之卦六爻相乘五千一百二十二陽之卦六爻相乘六千四百三陽三隂所直八千四陽之卦所直一萬五陽之卦一萬二千五百通計六陽之卦一得一萬五千六百二十五五陽之卦六得七萬五千一陽之卦六得三萬七百二十又四陽之卦十五得十五萬又二陽之卦十五得九萬六千又六隂之卦一得四千九十六通為五十三萬一千四百四十一即此七百二十九疇相乘之數也九疇所納在於爻中以為卦數在於圖書以為卦象象數相錯而剛柔變化生焉洪範曰平康正直彊弗友剛克燮友柔克沉潛剛克髙明柔克此四克者五行之所為用也七之克九為彊弗友四之克八為燮友柔克五之克六為沉潛剛克六之克七為高明柔克五行約調平康正直則四克不用四克之用為偏黨而設也无黨无偏而四克雜施則水不潤下火不炎上木不曲直金不從革土不稼穡君子歛福錫極亦曰敘厥彞倫无所汩亂而已恭從明聰睿肅乂哲謀聖君子謹持之勉於无過至於修福得極修極得福君子亦未之敢知也凡乾卦三爻所値有丁卯丁亥不得謂之從革而坤卦三爻所値有乙卯乙亥皆得謂稼穡者彊燮之義也震兼甲乙皆謂曲直乾兼丙申丁酉皆謂從革蠱之貴甲㢲之貴庚澤火之貴巳夫各有所取之也君子之於易非徒曰占其吉凶而已所為道徳歸於和順性命要於窮理反身克治以禮制事者也然則夫子之論鳴鶴斷金藉茅勞謙亢龍户庭負乘估助朋從困據射千屨校何校苞桑鼎足介石初復致一三修十九事无一事及於九疇者何也曰是所謂敬用之務皇建之道也若夫五行八象配於六十四事則夫子言之詳矣曰八象五行則猶未譬也而曰詳言之何也曰上際六坎言水之潤下者也三一初交以為經綸五行之始聖人所貴先雨而後泉卑山而崇天導潤以果行輔潤以育德故木得遂其生土不致其尅是屯蒙之義也雲上於天子娯其親屋漏在下子屈於父是需訟之義也繇是而推蹇不濶下而解潤下困潤而枯井潤而疲渙下而邇於神明節上而窮於制度渙欲以潤七世節恐不足以潤一己旣濟上而思防未濟下而居方故是十六水者聖人所以舉潤也曰十二卦而後舉火何也曰水平而後火麗也至於十二而天道可敘矣類族辨物火之在下者也遏惡揚善火之在上者也火上於雷而刑以興火下於山而獄以止火順其性而德以昭火失其勢而明以晦火從於木而為家人火臨於澤而有同異故澤者水之别也雷者火之别也從金而下革用以治厯從風而上炎用以疑命豐之從噬嗑旅之從賁聖人以仁制德以禮制刑之義也然則漸歸妹何義也曰木託於土而還以制土培塿不生松栢庥隂之原必有比屋是賢德善俗之義也木近於金不利於金少女長子金水雜處是永終知敝之義也然則恆益皆木也恒不易方而益利改遷何也曰益曲而恒直恒體乾而益體坤恒先寅卯而後㢲巳益上㢲已而下寅卯方位旣殊則居遷異用矣然則隨以木從金而曰嚮晦宴息蠱以木落山而曰振民育德何也曰澤金也則猶之水也木託於下非寇非媾静以俟之則亦庶乎不敗也是宴息之義也㢲木也則猶之風也風落於山草木黄熟才德出焉是振育之義也然則天下雷行而茂對時育萬物澤上於地而除戎器戒不虞何也无妄者雷之將奮者也勾萌而值元金災眚之所生也布德施令非王者不足以立憲地上有澤昆蠱之所聚也風舌毁折之所從始也故除戒生焉然則風行天上而懿文德風行水上而享帝立廟何也曰天運之氣為風三光著而雲霾息風行水上為渙源流廣而波瀾遠然則升之不稱享帝而豫之稱配天何也曰升者齊潔之事隂木也豫者帝出之事陽木也然則觀之稱先王臨之不稱先王何也曰兌兼金水而皆託於地本地親下自南面而下皆君子也㢲為風木而已出於地出地親上自設教而上皆聖人也然則易稱先王四地而一天何也曰健者之貴順也是聖人之德也詩曰應侯順德是禮樂之所繇作也然則上經多言王后大人下經一稱先王何也曰上主乾坤而六子為客下主六子而乾坤為賓天人之道君相之義也然則易尚時位而惡窮賤書尚五福而惡六極是上天之事抑君相之事抑五行自値之歟曰天人共治之也天人共治之則五行不專為政且是五行者一爻五象一象五數相乘之義動溢千萬孰擇之歟曰聖人有以見天下之賾而擬諸形容象其物宜有以見天下之賾而觀其㑹通行其典禮六爻之賾二十六萬二千一百四十四數復倍之為五十三萬一千四百四十一以倍相較差七千一百五十三往復相配每象兩數五五餘差足相納也故毎象之頣不過四千九十六坤卦之數亦不過是前後乘除不是加減如乾卦之賾四千九十六而其數至於一萬五千六百二十五以三除四千九十六為一萬二千八十八餘三千三百三十七以六十四除之五十二除而餘九九為五之納十為五之所兼凡二百四十十四除而盡乾之數以是而推則六十四卦所値之數一一可定也至如三陽三隂之卦為數八千以四千九十六倍之餘一百九十二不過本卦三乘之數去其三乗而得本卦雖窮煩極賾不可厭亂矣凡繫辭所稱極賾者五要以數乘象所多不過一倍象兼兩數干支再納一往一反而諸數皆備至於贏納多寡可以五數劑舉也然則太𤣥潛虚張蔡之學與是相近亦為有合歟曰是不知而作也易之外不復作易通變成文極數定象聖人猶恐其未能也太𤣥見其一端潛虚失其過半皇極演疇襲前而陋以為易可再作則七聖相視猶有未盡之業矣數極而後象明象明而後理順理順而後性命之義可得也象義已明而後舉三天雜卦求其厯年次第以觀帝王升降天地治亂之㑹雖戊巳庚甲福禍盈虚置不問可也綜其大要則易象之言二氣藏數於象洪範之言五行藏象於數皆原本圖書與易合體而雒書以配易序尤為親切焉雒畫去十而用九方圓縱横中於十五五通戊巳以五兼十故四正為乾四隅為坤坤之通戊者為坎乾之通已者為離乾坤坎離以正天地是聖人所取以為易之綱紀也據一御兩以為三爻因而重之以為重卦剛柔類辨以配隂陽或合或分錯綜无方因而尋之衷五之文八十有一游五之文七十有二環五自為文者五百七十六以五衷之正距為艮反距為震隅夾為㢲反挾為兌正股為㢲反股為兌間勾為震反勾為艮從戊而圭黍者或㢲或離反戊而圭黍者或離或兌從已而圭黍者或坎或艮反已而圭黍者或震或坎以九方測之各從其類也周禮卜有三兆玉兆原兆瓦兆玉兆如四正十五或周環十五方圭圜璧之文原兆如方田歩弓通五曲直逺近周髀之法瓦兆如一五六六五一一六五五六一之類曲折根連戊巳従變以此三兆密御九疇不用灼龜而龜文燦然故以五行而辨福極以庶徴而證五事以五紀而省三德以稽疑而定八政亦此意也俗法皆云一坎二坤三震四㢲六乾七兌八艮九離中通戊巳其實雒書無有定位九疇不配後天一九二八三七四六不過為中函十五之文一乘再乘三乗尚有許多未定之次惟以八政為體以先天次之食貨祀司空司徒司宼賓師各分部部各八政亦以乾兌艮震㢲坎離坤為序但易於復履端範於姤資始易從中起左右分行範從中起周環左轉耳然則姤之為食復之為司徒何義也曰姤感隂而物成食者物之成者也司徒春官也坤為司空乾為大衆兩者天地之所慎也然則頤噬嗑之不為食坤比豫之不為師何也曰頤噬嗑為食則鼎井為司徒鼎井為司徒則大畜大壯大有必為司空嫌於大畜大有之不為司空則不嫌於大壯之必為師也然則賁豐之為司宼賢於訟解之為司寇歸妹履之為賓賢於漸謙之為賓者歟曰象无典要不膠一說二八四六一九三七其通象互取猶屯蒙師比鼎革同人大有之共為用也然則坤一乾九震八㢲二離三坎七兌四艮六之賢於坎乾兌坤離㢲震艮者歟曰是二天之序也而皆有取焉以分行者主於震㢲以定位者主於坎離約其參差以歸於疇序則乾兌離震㢲坎艮坤之次可屈指而數也然則是九用者之與象數无所專屬歟曰是何所專屬有之言夫天人成象之有三等也休咎之初生本於五行徴於五事發於八政天人初交以其性命殽為事業神鬼不能知龜蓍不能謀此一就也休咎之將成厯於五紀揆於皇極劑於三徳以其事業原本德行與之為蓍龜與之為鬼神此一就也休咎之巳成蓍龜知之不能謀鬼神聽之不能改福者終福禍者終禍性命學問不能増益此一就也故九用之分以三為等至於六而極矣七百二十有九以九乗之為六千五百六十一以六裁之為四千三百七十四去九而用六故德性問學自三德而後聖賢讓權天地操持之矣智者合而為之謀毎一事而皆有是三就有是三就則皆有是九德九就者是聖賢之智也然則是不以八政為序矣曰八政者五行五事三德之疇象也以八政而察五事以五事而稽皇極猶以八象而觀隂陽以隂陽而觀太極也故以五事逹於五行以恭從明聰睿肅乂哲謀聖狂僭豫急蒙共治五事以雨霽蒙驛克稽之鬼神以雨賜煥寒風徴之天地天地鬼神聖賢共此五事也五事共此三德而後以求於八政施於彝倫可得而叙也是箕子之與周公同㫖也易象正卷終上
