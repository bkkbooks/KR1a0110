body:
  text: 易象正卷終上明黄道周撰先天圖原本自然以隂陽分極六倍成卦以定六爻天不能違也以十八變起之成初二兩爻為變卦始是雖六變為初二兩爻然究極十八變亦只成此六爻故此六十四卦為爻象之統體託始要歸皆盡於是學者談之已熟而十八變次第終始纖悉皆於此出學者未能明也今分卦為三乗以六十四相起其初體皆不離是與周易異位而同功也再成之法於先天前圖復上起坤姤上起乾再加六爻為十二變毎卦各得六十四即四千九十六卦也復上起坤三十二周姤上起乾亦三十二周終而復始是為中乗六爻之三四左行自復至乾皆坤首而乾尾所以必坤首乾尾者坤加於復乾加於乾而後左旋之端有一畫之陽至於乾中而陽爻不亂右行自姤至坤皆乾首而坤尾所以必乾首坤尾者乾加於姤坤加於坤而後右旋之端有一畫之陰至於坤末陰爻不亂也三成之法於再乘每卦六十四之上又各加六十四則四千九十六之上通加六十四綂得二十六萬二千一百四十四所謂六十歳厯也以十二開之為七百二十歳厯有此三成成十八變而得二十六萬二千一百四十四其三六爻數陰陽老少各有次第纎忽不亂約而歸之只得六爻三男為七三女為八父為老陽母為老隂父母交動男女不變推之初乘六十四卦此六畫者僅成初二兩爻以為地道次乘六十四卦此六畫者僅成三四兩爻以為人道又三乗六十四卦此六畫者始成五上兩爻以為天道參三才而兩之故六故曰六爻之動三極之道也聖人作易將以順性命之理立隂與陽立剛與柔立仁與義三極旣立而後道德和順道德和順而後理窮性盡理窮性盡而後其命可至也命出於天為隂陽仁義剛柔之本已八於卦則氣質雜焉不謂之命然而情見於爻才見於象才情氣質存於爻象則天命之理亦因之以見故干支積數盡一百二十年取其大約為六十歳每歳四千三百二十六十歳通得二十五萬九千二百无餘與天相追約縮三千七百八十每嵗所縮六十有三凡一月所行縮五辰二分五釐與日分相準以為贏縮又以四十有九歸之爻象故每歳天行不得爻象者十三而强每歳爻象不得干支者四十九而弱合之為空六十有三卦氣納虚之所從始也今以歳辰分為十三際九分强每三百一十二辰而納虚一度每年氣象空納天行者十三辰九分而强以歳辰分為四十九際每八十九辰而納虚一度每歳干支空納氣象者四十九辰而强人生其間自甲子冬至以甲子起辰視其日辰所在去甲子㡬日因而差之自甲午以前謂先甲甲午以後謂後甲庚子以前謂先庚庚子以後為後庚先後納虚各四十有九辰與氣象納虚合為六十有三而四千三百二十干支勻於一朞之内凡行十五歳而厯十六卦三十歳而厯三十二卦四十五歳而厯四十八卦六十歳而週六十四卦以朔御氣以氣御甲干支之與爻象虚實動静舉可知也虚實旣分動静相雜文而不當則吉凶生焉才情氣質值有吉凶而道德義理不與其内故不謂之性命但曰象數而已象數所值極於六十年每一爻象自為往復下二爻為歳中二爻為月上二爻為日辰凡十八畫而成章學者樂其易簡近於人情則先明是圖以參於中後二天至於古今之汚隆帝王之升降則非文孔貞雜二圖不備云六爻十八變倍數圖一變二一當太極不用為數二當兩儀數象始此二變四易所謂四象三變八易所謂八卦小成四變十六五變三十二六變六十四以上為初二兩爻七變百二十八八變二百五十六九變五百十二十變千二十四十一變二千四十八十二變四千九十六以上為三四兩爻數即六十四相乗之十三變八千一百九十二十四變一萬六千三百八十四十五變三萬二千七百六十八十六變六萬五千五百三十六十七變十三萬一千七十二十八變二十六萬二千一百四十四以上為五上二爻凡此十八變所得之爻即六十年經辰之厯雖每歳不及天行十三辰九分六六而日月交餘納虚之數實從此出蓋自先天之圖再加兩倍而積漸自合非有損益其間也即此數而兩之為五十二萬四千二百八十八卽百二十年之厯加七千一百五十三而與數㑹加一千六百七十二而與天㑹參之為律為四百八十五年之日分伍之為厯為二百九十一年之日分差積相追其究一也初二兩爻陽一爻動與隂一爻動皆十二卦隂陽兩爻動者凡四卦因而乗之三四兩爻一陽與一隂動者各七百六十八卦兩爻動者各二百五十六卦又再乗之五上兩爻一陽與一隂動者四萬九千一百五十二兩爻動者一萬六千三百八十四統而計之以一當六十四故六爻皆動者各六十四卦五爻動者各三百八十四卦二爻四爻動者各九百六十卦三爻動者各六百四十卦又以六十四乗之則一爻之動各當四千九十六舉六十四卦之動爻可得二十六萬二千一百四十四之總數也故聖人之舉九六特舉其六爻皆動者而言之以六十四卦為諸萬卦之綱領非謂凡卦六爻皆得九六也約其大數四分之一以為動卦四分之三以為静卦凡動卦六萬五千五百三十六凡静卦十九萬六千六百六十八其六爻皆動者四千九十六卦則每卦用九用六只有六十四卦而已日分不滿之數以為納虚消甲其天行有旁覆干支有流寄而爻象不可増損槩以爻象直之原始反終精游物變蓋寓於此也一歳十四限納虚圖一限三百一十二辰七釐四毫納一二限六百二十四辰一分四釐八毫納一三限九百三十六辰二分二釐二毫納一四限一千二百四十八辰二分九釐六毫納一五限一千五百六十辰三分七釐納一六限一千八百七十二辰四分四釐四毫納一七限二千一百八十四辰五分一釐八毫納一八限二千四百九十六辰五分九釐二毫納一九限二千八百八辰六分