body:
  text: 易象正卷四明黃道周撰臨元亨利貞至于八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也象曰澤上有地臨君子以教思無窮容保民無疆正曰臨浸長之道也以其浸長戒其浸消夫為臨民者致此憚憚也天下之富而不驕滿而不溢者少矣澤上有地可以臨亦可以涸也雨潦時至影淡然天根未見而溝澮先竭自臨至於遁則正八月矣君子多蓄以致需多戒以致豫容保以為量教思以為澤詩曰倬彼雲漢為章於天言教思也豐水東注維禹之績言容保也天道衰而膏澤息用物勤而取精薄詩曰池之竭矣不云自頻泉之竭矣不云自中是君子之所致慨也故臨者教思容保之象也軒檻之致不及萬物湛濊之義被於四國不僣不濫乃懷其澤故其究也為逺小人不惡而嚴初九臨之師臨元亨利貞至于八月有凶師貞丈人吉無咎咸臨貞吉象曰咸臨貞吉志行正也正曰容民畜衆以為教思則猶此志也澤在于地而冇不咸水泉下動水腹將釋丈人貞志而萬物從之古之治地者相其井畝以為兵賦車乘師徒粟米芻藁皆於是具千里出師不費挽載其俊民髦士仡仡勇夫亦於此出池隍藪澤亦於此立是所謂咸臨之道也桓公曰吾欲南伐何主管子曰主魯反其侵地堂潛使海有蔽渠弭有渚環山有牢西伐何主管子曰主衛反其侵地臺姑漆里使海有蔽渠弭有渚環山有牢北伐何主管子曰主燕反其侵地柴夫吠狗使海有蔽渠弭有渚環山有牢夫侵伐者為地也而又反之反而復冇之管子雖未得於古法也然其道不竭澤師行而有制亦可謂咸臨者矣九二臨之復臨元亨利貞至于八月有凶復亨出入無疾朋來無咎反復其道七日來復利有攸往咸臨吉無不利象曰咸臨吉無不利未順命也正曰是亦咸臨何也是皆足以致衆也以陽而馭隂以內而馭外以郤而為進以獨而得耦是亦管氏之制也然而深於隂陽之際矣隂以八退陽以七反故臨進也復反也臨以陽進八月而得遁復以隂郤七日則猶之復也臨如織者前進而漸窮復如耕者後郤而更始夫知其有凶退而復之則亦近於道矣古之君子退處一室而知四方之善敗自無朋而有朋自有疾而無疾教思容保則自此始也教思容保而謂之未順命何也曰臨修刑者也復修德者也古之君子正靣以蒞天下四方不庭則退而修刑畿甸不若則退而修德雖有咎疾畢棄之矣然則八之舉月七之舉日何也隂陽之節也隂節從月陽節從日從日而舉七從月而舉八何也曰日從甲庚月從律呂甲與已化則為六日矣五六而畢日庚甲互始故謂之七日黃鍾之律八十有一三分損一為五十有四以生林鍾黃鍾子也林鍾未也子未之交相去八月臨為大呂律長七十有五餘分強七三分損一為律五十餘分強五以生夷則夷則申也大呂丑也丑之距申相去八月故八月者律呂之所從生七日者甲庚之所從始也然則律皆八月而獨見之臨干皆七日而獨見之復何也是其為象自下而上一陽言日二陽言月則是日月之所從紀也然則詩以一紀日至五而變為月以五紀月至十一而變為日何也曰亦各其義也姤夬剝復則以是分次也然則易之取於律呂干支何也曰律呂干支人道禮樂之所繇興也隂陽立而有男女族姓别而冇夫婦日有五立以為音月有六立以為律君臣父子兄弟朋友仁義忠信之所從察也然則聖人之不談之何也聖人惡夫為易而近於賊者也易以日月而紀天道以剛柔而别人事剛柔不當則吉凶雜生故剛而授之以損柔而授之以益律呂干支聖人所教為損益剛柔之具也莫為之損而待其自消莫為之益而待其自富是則委化之具非聖人所自為道也然則范蠡之言兩節亦近於道歟曰是用柔者也以柔賊剛幸而近於道不幸而近於賊故曰因天之常與之俱行後則用隂先則用陽後無隂蔽先無陽察陽節不盡不死其野盡其陽節盈吾隂節而奪之陽節不盡宜為人主輕而不可取隂節不盡宜為人客柔而不可迫苟用是道也以為否泰消其君以為歸妹傷其夫是聖人之所憂也六三臨之泰臨元亨利貞至于八月有凶泰小往大來吉亨甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也正曰臨而泰已進矣天道之浸也物不驟長桑榖朝拱古人之所惡也臨泰時熙萬物亨豫君子樂用其所長小人樂用其所懷八月不戒而大來是飴故諂言日播於下甘言日飫於上召誥曰王敬作所不可不敬德我不可不監于有夏亦不可不監于有殷又曰殷既墜厥命我周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥聖人之憂時也如此故泰之大畜臨之泰滿概之道聖人所致其鞀鐸也六四臨之歸妹臨元亨利貞至于八月有凶歸妹征凶無攸利至臨無咎象曰至臨無咎位當也正曰兩彖俱凶而得無咎何也曰位也非位也亦各其時也泰之氷判臨之室處曰是可以歸妹矣盛夏陽殫雨澤不降雷動於上而跂息仰聽君臣相求猶娣妹之慕好也詩曰匪飢匪渴德音來括雖無好友式燕且喜是歸妹之已至者也之子于狩言韔其弓之子于釣言綸之繩歸妹之未至者也然而皆至矣精誠所格雷雨從之而况於人乎况於鬼神乎六五臨之節臨元亨利貞至于八月有凶節亨苦節不可貞知臨大君之宜吉象曰大君之宜行中之謂也正曰為象者其得中道乎泰之憂甘節之戒苦是臨長之宜取也物已甘則蠧生之已苦則人不享也說命曰若作酒醴爾惟麴糵若作和羹爾惟鹽梅麴糵鹽梅甘苦之宜也仲虺曰王懋昭大德建中于民以義制事以禮制心兩制者大君之節也以節而憂時則宵旰為勞不節而趨時則康逸為敗也故當教思之時以制數度議德行劑其甘苦以為民極夫非知主而能之乎殷頌曰鞉鼓淵淵嘒嘒管聲既和且平依我磬聲是之謂也上六臨之損臨元亨利貞至于八月有凶損有孚元吉無咎可貞利有攸往曷之用二簋可用享敦臨吉無咎象曰敦臨之吉志在內也正曰臨未可以損也而損之上損其欲惡則下得其樂利上損其疢疾則下得其氣志矣康誥曰若有疾惟民其畢棄咎若保赤子惟民其康乂八月有凶則不可以久也二簋用享則可以久也單靖公享叔向儉而敬燕無私送不過郊語說昊天有成命叔向曰周其興乎昔史佚有言動莫若敬居莫若儉德莫若讓事莫若咨單子之况我禮也皆有焉單若不興子孫必蕃後世不忘夫一卿佐尚爾而况大君乎書曰慎乃儉德惟懷永圖敦臨之謂也觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣象曰風行地上觀先王以省方觀民設教正曰觀酉政也酉老也隂德將老萬物成熟神明進退之義概可見矣君子仰觀俯察近取諸身逺取諸物待時而動善器而藏出不為名處不為身成大事而無功利之心詩曰築城伊淢作豐伊匹非棘其欲遹追來孝文王也顒顒卭卭如圭如璋令問令望周公召公也故觀者省方設教之象也萬物油油孰春孰秋木得以強草得以柔及其究也以非禮弗履初六觀之益觀盥而不薦有孚顒若益利有攸往利涉大川童觀小人無咎君子吝象曰初六童觀小人道也正曰臨而損得其敦吉則觀而益必得其咎吝矣何也臨與也觀求也臨人而與與而損上損其勢則下得其惠觀人而求求而益小人得其惠則君子喪其志矣故求者童蒙之道求而益小人之道也童蒙之觀在於果餌小人之意在於利祿詩曰佌佌彼冇屋簌簌方有穀以觀之時而有往涉之心雖得無咎君子不視以為進退詩曰人涉卭否卬須我友言無咎之辨審也是遷善改過之義也六二觀之渙觀盥而不薦有孚顒若渙亨王假有廟利涉大川窺觀利女貞象曰窺觀女貞亦可醜也正曰七世之廟可以觀德萬夫之長可以觀政觀而渙何醜之乎曰渙而觀則丈夫也觀而渙則女子也王假有廟何窺之乎君子有其名惡不適於用有其法惡不適於事先王設教以率小人不以喻君子夫入廟而睹禮樂以謂是神道者亦管窺之智也故十輝之師執管以測星辰八能之士登臺以書雲物君子或為之大人不為也故觀之渙君子所不貴也頌曰於乎悠哉朕未有艾將豫就之繼猶泮渙是則進於道者矣進於道而後可觀法於天下六三觀之漸觀盥而不薦有孚顒若漸女歸吉利貞觀我生進退象曰觀我生進退未失道也正曰漸進也進則必退女歸之吉視其所生以為進退不失其正故觀而漸君子之道也葵丘之㑹晉獻公行遇宰孔孔曰可無㑹也齊侯好施與力而不務德故輕致諸侯而重遣之譬之如室既鎮甍矣又何加焉晉侯乃還宰孔曰晉侯其不終乎景霍以為城汾河涑澮以為淵而不度彼已釋其修閉以輕於道路是其不終乎夫晉獻亦未為不度也內有銜骨而外無正助乍進乍退猶之逰女也宰孔不訓以道德彊以理義而敗其外懼以長其慆心於顒若女歸之義則又何知所取法乎六四觀之否觀盥而不薦有孚顒若否之匪人不利君子貞大往小來觀國之光利用賔于王象曰觀國之光尚賔也正曰儉德避難而觀國用賔何也曰是非榮祿者也大雅曰殷士膚敏裸將于京厥作祼將常服黼冔周頌曰振鷺于飛于彼西雍我客戾止亦有斯容言夫作賔而觀國者也君子觀國必黜其禮樂以就常服萋苴敦琢示以嚴辨多士曰豫惟四方罔攸賔亦惟多士攸服奔走臣我多遜多方又曰我有周其大介賚爾迪簡在王庭尚爾事有服在大僚夫亦其義也或者在是爻乎謂其柔而得位王臣之正也九五觀之剝觀盥而不薦有孚顒若剝不利有攸往觀我生君子無咎象曰觀我生觀民也正曰不薦不往何觀乎時已剝矣雖有至人不能違時草木反根君子自知求榮而剝則吾志也不求榮而剝則吾義也神明之祐人則亦不在薦也宋之盟子木欲襲晉軍趙文子患之叔向曰忠不可暴信不可犯合諸侯而為不信雖敗我諸侯必叛之我以忠信謀諸侯而不免於死死可以固晉國之盟我何懼焉詩曰我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也其觀之剝之謂乎上九觀之比觀盥而不薦有孚顒若比吉原筮元永貞無咎不寧方來後夫凶觀其生君子無咎象曰觀其生志未平也正曰甚哉無咎之辨不可不審也否之吉在小人而否於君子否而訟者也觀之無咎在小人而吝於君子觀而益者也益則未為不吉也而君子取吝剝與比未為不吝也而君子各以無咎故君子之觀生不可不審也趙文子既冠見欒武子武子進以務實見范文子文子戒以寵驕見韓獻子獻子曰此為成人成人在始與善始與善善進善不善蔑繇至矣始與不善不善進不善善亦蔑繇至矣人之有冠猶宫室之有墻屋也糞除而已又何加馬見知武子武子進以成子之文宣子之忠見三郤郤駒伯曰美哉然而壯不若老者多矣苦成叔子曰年少而執官者衆吾安容子溫季子曰誰之不如可以求之歸告張老張老曰從欒伯之言可以滋范叔之教可以大韓子之戒可以成物知子之道善矣若三卻亡人之言也夫張老則可謂善觀生者矣臨觀二陽之卦也臨為二陽則觀為四隂五未分治從二分界之皆為南政臨自左來次於大呂觀自右往次於仲呂皆呂也然且有疑焉臨之泰至臨也反以憂臨之歸妹甘臨也而反以至觀之漸女貞也而得進退觀之渙觀國也而反得女貞夫作易者其亦有疑慮乎抑鄰比自相取也古之君子觀於數卦之義則亦必有以審慎乎此者矣臨序卦傳曰蠱者事也有事而後可大故受之以臨者大也物大然後可觀故受之以觀傳曰不行之謂臨臨之稱大何也曰蠱而飭之其權在上是乃大矣然則或與或求何也曰與臨物者也求觀我者也自隨蠱而來天下戰爭戶自為政於是大臨喜之之辭也喜而與之不以為惠喜而求之不以為市然則其有凶何也曰凶事者人之固有也貴其長物不失其正呂后之稱制八年而文帝乃立文帝在位二十三年咸至知敦備有之也己卯之詔謂與單于俱棄細過偕之大道所謂甘臨是耶非耶抑所謂遺詔短喪非所謂訓耶抑當丁亥之嵗臨觀半交七國并反朝廷為誅鼂錯謝諸侯尚未可得耶抑廢薄后太子榮寵梁王刺殺袁盎為明主盛德纍耶武帝立未七年輒遣方士求異方彼所謂神道設教者耶抑猶是多欲而義施之耶以文景之積天下殷庶紅朽狼藉武帝用之不二十年水衡告匱司農仰屋故為天子之道可以多與不可以多求蓋自元狩甲子而後天子之求與乃戾矣然則臨觀求與之義亦於是並次乎曰是不然雜卦之義剛柔上下樂憂分行與求次之是在襄王子帶上下與需訟值也而意象所㑹不以為逺故好大而尚觀則求與者必衆矣然則每卦交際隂陽絶續恆有大喪而武帝甲子交於噬嗑以永年特聞何也曰九五之㑹或隆其主丙寅一際惠襄值焉癸酉三際定簡值焉庚辰三際景敬值焉丁亥之㑹真定永歷以為是自坤來則亦五際也乙未之㑹正為五際安王永歷其後壬寅是為六際慎靚嗣顯己酉遷周秦主以新亦七際也丁巳之際惠呂更制至於武帝甲子而九矣五百餘三而逢甲子天道更始於方外服食導引之事又何牽焉噬嗑亨利用獄彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也象曰雷電噬嗑先王以明罰勑法正曰陽圉隂固也險而止於內互也電雷之無聲者也雷發而電見天地之章令也蹇往而解來噬物之情也噬物而不得其情則毒臘屢試明勑交敝矣虞書曰刑期于無刑民協于中呂刑曰非佞折獄惟良折獄罔非在中夫周穆則猶得臯陶之意也以耄期之人閲情多而守典熟矣康叔之少也而武王教之致刑曰人有小罪非眚乃惟終自作不典不可不殺又曰罰蔽殷彛用其義刑義殺夫義之去中則猶有間乎謂是舊染也刷滌之若噬乾物也其咀嚼多矣故噬嗑者飭法之象也法可恃罰不可數雷電之威數見必瀆及其究也以勞民勸相初九噬嗑之晉噬嗑亨利用獄晉康侯用錫馬蕃庶晝日三接屨校滅趾無咎象曰屨校滅趾不行也正曰屨校之於蕃錫逺矣謂是得情之道也古之為刑者屝蒯而民不犯三覆三反以致衆辟虞書曰好生之德洽于民心兹用不犯于有司謂是雷電亦有晝日之道昭德焉耳康誥曰要囚服念五六日至于旬時丕蔽要囚又曰時乃大明服惟民其勑懋和夫折獄者非明德而能之乎噬嗑之晉用是道也小懲大誡則亦謂此也六二噬嗑之睽噬嗑亨利用獄睽小事吉噬膚滅鼻無咎象曰噬膚滅鼻乘剛也正曰噬膚柔也滅鼻剛也噬膚同而滅鼻異以為小事而聖人不敢輕用也呂刑曰墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪閲實則其同異見矣世之用法者謂不閲實也以膚易噬鼻易滅則已矣乾胏以為膚金矢以為鼻則有未易噬滅者也呂刑曰惟貌有稽無簡不聼聽簡以得同異雖大事可也何小吉之云乎六三噬嗑之離噬嗑亨利用獄離利貞亨畜牝牛吉噬臘肉遇毒小吝無咎象曰遇毒位不當也正曰犴狴之用剛而明牝牛之畜明而柔是其冇毒乎曰未有害也君子之於明惡其易動也趾初動而滅之曰吾用閉惡堅固焉耳明而柔柔而裕以噬臘遇毒何傷乎康誥曰用康乃心顧乃德逺乃猷裕乃以民寧用不汝瑕殄又曰劓刵人無或劓刵人噬嗑之離之謂也九四噬嗑之頥噬嗑亨利用獄頥貞吉觀頥自求口實噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也正曰噬嗑之頥非為口實也得金矢非利之也呂刑曰哀敬折獄夫折獄非哀敬而能之乎梗陽人有獄將負納賂於魏獻子閻沒叔寬將入而諫值獻子飯召之使佐食二子比已食三歎獻子曰人惟食忘憂當食而三歎何也二子曰吾小人也貪饋之始至懼其不足故歎中食而自咎也曰豈有主之饋而不足者故又歎既飽願以小人之腹為君子之心屬厭而已故三歎獻子聞之乃辭梗陽人故獻子則可謂不求口實者也鉤金束矢古人嘗用之然而非折獄之所貴也噬乾胏得金矢利艱貞其是之謂乎六五噬嗑之無妄噬嗑亨利用獄無妄元亨利貞其匪正有眚不利有攸往噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也正曰古之贖鍰者則金為上幣千鍰之贖黃金六千是雖非古然必有始之也閲實而得情則正也不得其情則眚也赦為眚設也不為正也然則正得黃金眚不得黃金天下之貨來者皆訖富無慮是厲道也然且中古皆用之曰是無咎也富而易犯貧而寡犯去富而削則庶威自奪矣曰是殺越者以愍自臧如何曰司寇詰奸大憝無赦曰是兩戾也何傷乎寇攘姦宄已蔽大戞有罪非終乃惟眚災夫以威富之人麗於五辟雖懲非死已極於病殺越大憝能自贖者其有幾何故曰貞厲無咎非為府辜者也謂夫無妄而訖於威富者也上九噬嗑正變象之震噬嗑亨利用獄震亨震來虩虩笑言啞啞震驚百里不喪匕鬯何校滅耳凶象曰何校滅耳聰不明也正曰噬嗑之震已聞之矣而謂不聞何也謂是震之云耳小人以小善為無益而不為也以小惡為無傷而不去也故惡積而不可掩罪大而不可解夫君子亦冇值此者乎君子狎亂天不降格以為是虩虩者無益也故禍至而不知避亂至而莫之禦也詩曰匪我言耄爾用憂謔多將熇熇不可救藥然則聖人之重為小人謀何也初六滅趾以誡而致福上六滅耳以積而滅身則是噬嗑上下皆可不占也而猶且占之何也聖人之為此以示世之勑法者也君子之為此則不得已也仁義立於上勸威行於下其君子嗜善也如豢其小人棄惡也如灌桎梏桁楊委土如斷雖有慶譽與天下共取之矣仁義已廢勸懲已敝善否倒置罪惡狼戾弓矢旌於小人棬梮被於君子威暴之尚而彊狠之市則是凶咎與立法者分受也故噬嗑之初九與其上九皆陽也陽剛不中試其雷霆以為明彊而先王之賞罰皆不復可用矣然則夫子不言噬嗑之晉與震之義何也曰夫子之詞則亦有舍彖而象舍象而理者也震雷也火電也雷電始交懲惡於蚤君子以之昭德小人以之悔過康侯之明賞與司敗之致罰則共此道也震積而雷游笑言不施匕鬯坐喪則是以凶命而已矣晉靈公不君厚斂以雕墻從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝見其手趙盾范㑹患之相繼而進三進及霤而後視之曰吾知過矣將改之二子稽首曰人誰無過過而能改善莫大焉然而晉靈卒莫之改也以是不沒於桃園楚子狩於州來次於乾溪謂右尹子革曰昔我先王熊繹與齊晉魯衛竝事康王四國皆有分我獨無有今我使人于周求鼎以為分周其與我乎又曰我皇祖伯父昆吾舊許是宅今鄭人貪賴其田我求田於鄭其與我乎又曰昔諸侯逺我而畏晉今我大城陳蔡不羮諸侯其畏我乎異日又卜曰豫尚得天下不吉投龜詬天曰是區區者而不畀我我必自取之於是羣喪職之徒皆亂殺羣公子王聞羣公子之死也自投車下曰余殺人子多矣能無及此乎夫子所云則必謂是二靈者矣賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政無敢折獄正曰獄無有利用者也而噬嗑以之是無所往也自藏者也賁猶之噬嗑也而謂小利有攸往何也賁動也動而無色則猶之不利攸往者耳明庶政無敢折獄何也獄亦庶政也而敢為大心以大心而乘庶政則殆矣周政之丁寧也五申其說曰庶獄庶慎文王罔敢知于兹夫以文王之聖而不敢與蘇公爭折獄蘇公之知有過於文王者乎文王明於用人而蘇公明於折獄使文王明於折獄則百蘇公無所用之也而且以庶獄庶慎于文王宅俊之心故曰敢折獄明主之大戒也賁而敢折獄焚田之象也焚田以田獸不可得田亦不肥與其不利於人不如妨已其究也以致命遂志初九賁之艮賁亨小利有攸往艮其背不獲其身行其庭不見其人無咎賁其趾舍車而徒象曰舍車而徒義弗乘也正曰賁已艮矣非徒而何君子修行以文其之身修言以文其人道晦與晦道明與明明晦間非道不親故賁趾舍車雖身與人則猶有所不事也夫豈避刑戮而往者乎何其行之狷也斧鉞縲紲生於車服舍車而徒則其去刑獄也逺矣詩曰豈其食魚必河之魴豈其取妻必齊之姜賁之舍車蓋謂是歟舍車不徒賁趾乃滅世乃有身為大夫而陳上卿之車服於庭者六二賁之大畜賁亨小利有攸往大畜利貞不家食吉利涉大川賁其須象曰賁其須與上興也正曰賁而大畜上興與興王人欲求多聞稽古之彥則舍賁須奚往乎兑命曰惟學遜志務時敏厥修乃來君子之從上不為祿也曰與之同體相須而動兑命又曰惟后非賢不乂惟賢非后不食閔馬甫適周聞周之不悅學也曰周其衰乎大人患得而惑苟焉而可必先為是說以播於上而後上從之上以畜德為無益下以干祿為代食則文武之道盡矣詩曰稼穡維寶代食維好稼穡則猶近於本務也不本而食故秕說興而賊民滋起也九三賁之頥賁亨小利有攸往頥貞吉觀頥自求口實賁如濡如永貞吉象曰永貞之吉終莫之陵也正曰頥之賁須大畜之濡如是兩義者相為起乎爻象錯而後彖義晦彖義晦而聖人之意不復可見矣濡頥則猶之干祿者也濡頥之永貞其為聽獄者發乎吕刑曰民之亂罔不中聽獄之兩辭無或私家于獄之兩辭私家于獄之兩辭則是口實自求也故曰上下比罪無僭亂辭勿用不行惟察惟法又曰察辭于差非從惟從若此則庶乎永貞者矣六四賁之離賁亨小利有攸往離利貞亨畜牝牛吉賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也正曰山下有火皤賁白馬疑之則以為寇不疑之則以為媾君子之於庶政致明而已不飾以辭吕刑曰五刑之疑有赦五罰之疑有赦其審克之臯陶曰罪疑惟輕功疑惟重與其殺不辜寧失不經故輕之降差非法也輕而赦猶未逺於古也夫見皤賁以為白馬見白馬以為寇媾疑則衆辭競興明則釋然平也又何疑罪降差之有乎蕩之詩曰不明爾德時無背無側爾德不明以無陪無卿賁之用離致明而已矣六五賁之家人賁亨小利有攸往家人利女貞賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也正曰家人不飾君子之言信於壼閾行信於僮僕故庶令不懸而辭色可廢也公甫文伯之母如季氏康子在其朝與之言弗應從之及寢門弗應而入康子請過敬姜曰子弗聞乎天子諸侯合民事於外朝合神事於內朝自卿而下合官職於外朝合家事於內朝寢門之內婦人庀業上下同之吾又何言焉故賁之家人猶之無色也無色而戔戔何吝之有上九賁之明夷賁亨小利有攸往明夷利艱貞白賁無咎象曰白賁無咎上得志也正曰質者丈所為救也賁則文矣然且無色君子多文非以為辨修言非以傳也曰吾治吾索云耳故言說興而讒頑作記曰榮華之言後有矛君子觀於庶政有明夷之慮焉曰是文勝者寇賊姦宄之所從始也故為乾胏臘肉以治文章亦未為過毖也詩曰皎皎白駒食我場藿縶之維之以永今夕非為文勝而致此懇懇者乎故以繫辭麗于五疵君子之所不聽也噬嗑賁三陽之卦也三陽則皆可以南北而是從北政者從隨蠱也自臨觀而噬賁爻象多疑賁之二三則又互取也謂不可以為典要則慎而勿動焉耳必以是爻次正應而求其說則猶之問景也然則如之何曰致疑者明晳仍舊者無失焉耳矣序卦傳曰可觀而後有所合故受之噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也曰是飭憲之㑹也元朔甲子以後漢始南併尉他西通酒泉武威西南置牂牁五郡東南併餘善北登單于之臺又將東擊衛滿取朝鮮西擊滇置益部選絶域之使丞相青翟趙周公孫賀劉屈氂大司農顔異之流皆坐法死而自張湯杜周而後人習刻深治文法一入告訐無免者江充之禍至使衛后自殺太子野死不敢自白故謂噬乾胏而得金矢噬乾肉而得黃金之難也甲午帝崩昭宣繼立法網未宏博陸釀禍自滅厥宗上不採張敝徐福之言而徒深驂乘芒刺之創四凶既誅霍氏無後蓋趙韓楊亦罹禍辟而恭顯之輩以少習法令動制尚書路溫舒曰秦有十失其一尚存治獄之吏是也蓋寬饒曰方今聖道浸微儒術不行刑餘以為周召法律以為詩書豈獨人事使然亦天道密驅之嗚呼當是時丙魏相繼為相劑以寬和而見知連坐諸法終不可除又况於張杜毛鷙為治者乎噬嗑曰明罰敕法賁曰明庶政無敢折獄且夫聽訟者春秋之所難也事莫大於弒君父與賊殺人者也趙穿弒其君而趙盾受其名楚棄疾弒其君而公子比受其實鄭歸生陳乞則亦非身操刃者也謂其首事者首禍而許世子止以不嘗藥膺辟鄭子駟惡鄭伯髠之無禮也弒之於鄵告諸侯曰癮公穀為之辭曰諸大夫惡其朝晉也故諱弒而書卒朝晉正也正則宜討賊而諱之逸子駟何也密州公虐既立展輿又廢展輿也展輿因國人之亂遂自立則是展輿與乎弒也與乎弒而諱之曰莒人弒其君密州翼東門之事欒書實使程滑弒厲公殯以車一乘而諱之曰晉弒其君州蒲夫使筆鉞而能靈則盾止與鄭駟欒書共相難也聖人道其實賢者識其疑爰書既成中人唯唯而已以是折獄孰敢乎哉是噬嗑與賁之所致慎也剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也象曰山附於地剝上以厚下安宅正曰剝大往之將既者也順而止能得不往乎君子之斂德於其初遁也至於剝而晚矣曰慎其所託不為高危而已矣然則盤庚之數遷也如何曰盤庚之數遷所以厚下也自殷湯以來實五遷都盤庚閔其蕩析恐盡劉不能胥匡以生故一曰安定厥邦再曰永建乃家又曰用永地于新邑夫無盤庚之道而樂為震動則足以遄亡而已然則厚下之義如何曰散其所畜違其所惡養棟於上殖基於下寧人剝我不我剝人而已矣說命曰若跣弗視地厥足用傷百姓者君子之地也故厚下安宅附地之象也附地以居寧惟陶穴剝下之不已隆棟皆决及其究也以施祿及初六剝之頥剝不利有攸往頥貞吉觀頥自求口實剝牀以足蔑貞凶象曰剝牀以足以滅下也正曰剝民以觀頥與剝皮以安足奚擇千古之為民上者無以養民則不自養也託牀於足而又剝焉虞書曰衆非元后何戴后非衆罔與守邦無逸曰民否則厥心違怨厥口詛祝又曰人乃或譸張為幻曰小民怨汝詈汝汝則信之則是自求口實也為上者不能養民而使民觀頥為口實雖明王猶有慙德而况於中主乎况於剝民自養者乎詩曰民之貪亂寧為荼毒又曰盜言孔甘亂是用餤言剝民之餤亂者也六二剝之蒙剝不利有攸往蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告剝牀以辨蔑貞凶象曰剝牀以辨未有與也正曰是亦求民者也求民而瀆瀆則莫之或與莫之或與則傷之者至矣求金求車是春秋之所重譏也天子畿方千里惟正之供各有恆式諸侯不假馬於臣天子不責貢於人大東之詩曰或以其酒不以其漿鞙鞙佩􅽲不以其長蓋言剝也狐裘蒙戎匪車不東叔兮伯兮靡所與同蓋言蒙也剝而蒙則上無以求下無以應剝牀及辨是之謂矣六三剝之艮剝不利有攸往艮其背不獲其身行其庭不見其人無咎剝之無咎象曰剝之無咎失上下也正曰艮之上下未為失也剝而止止於其所何咎之有無逸曰文王不敢盤于遊田以庶邦惟正之供又曰繼自今嗣王則其無淫于逸于遊于田以萬民惟正之供故處剝之時未有無咎也艮之無咎則於是取也薪是穫薪尚可載也哀我疸人亦可息也則是詩之謂也六四剝之變象晉正剝不利有攸往晉康侯用錫馬蕃庶晝日三接剝牀以膚凶象曰剝牀以膚切近災也正曰方剝之時而錫蕃庶何居乎古者嵗有災眚黎民阻饑則君子為之不舉楚鬬且曰古者聚貨不妨民衣食之利聚馬不害民之財國馬足以行軍公馬足以稱賦公貨足以賓獻家貨足以供用不是過也貨馬郵則闕於民民闕則有畔心昔鬭子文三舍令尹無一日之積成王聞其朝夕於是乎每朝設筐糗束脯以益其秩楚子之益令尹異於剝主之益康侯乎或以是示泰則是不勤民而教封靡者也詩曰大命近止無棄爾成是則庶乎逺矣六五剝之觀剝不利有攸往觀盥而不薦有孚顒若貫魚以宫人寵無不利象曰以宫人寵終無尤也正曰道之濟剝者其惟求賢乎求賢而適尊則庶績熙求賢而適親則蠱慝止求賢而布列之則蟊賊不作百果成序詩曰參差荇菜左右采之參差荇菜左右芼之言求賢之殷也洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之言孚賢之誠也夫不爭寵利不亂行列以厚下為心無剝上之禍者其惟賢人乎魚貫有孚則惟是之謂也上九剝之坤剝不利有攸往坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也正曰剝爛也碩果已爛矣時之已過君子不能留也君子失於君順而求之民小人失於民逆而求之君故坤者君子之輿剝者小人之廬也坤以迷而後得剝以爛而後復下以收之西南上以失之東北夫亦其時也邪正雜用而卒以敗正君子之不勝小人亦已久矣而世猶欲以君子調小人小人調君子詩曰式遏寇虐毋俾正敗言夫小人之終不可用君子之終不可不載也復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎象曰雷在地中復先王以至日閉關商旅不行后不省方正曰是所謂至日也而次於南政五序之後何也曰是非一嵗之紀也非一嵗之紀而曰七日何也曰猶之八月也日月紀象星辰紀嵗紀嵗則曰七嵗猶紀日之為七日也嵗候七十二體用交積相乘之爻三萬一千一百有四以七嵗之辰除之餘分俾益五百十一而日分乃盡故七日之積分與七嵗之積辰正相直也然則六日七分之為七日何也體積之數以辰當爻則五嵗七月以爻當日則六十七嵗故象有五日七分卦有六十七日六日七分則未有所取也古之觀象也審立言也簡自泰否而來所紀日月臨復二者而已泰臨先內而剝復先外何也復自剝來者也剝七日而為復故先剝而後復然則大壯見天地之情復見天地之心何也曰心者情之精微者也情動而心靜情兩而心獨書曰惟精惟一蓋言獨也獨矣而又曰人心道心何也道心著於天地至微而難知人心著於人至危而不敢逸故人承天者也危承微者也繇情而觀心繇剝而觀復繇天地而觀人未發之中獨行獨知至精至微故曰中也中非聖人而誰與知之乎故復者閉關之象也閉關反照出入自知象魏布和乃告以時及其究也為施命誥四方初九復之坤復亨出入無疾朋來無疾反復其道七日來復利有攸往坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉不逺復無祇悔無吉象曰不逺之復以修身也正曰復而交於坤氷霜之戒可以弛矣然且凜之若氷霜之始至出入朋來非君子之所敢恃也書曰若有疾惟民其畢棄咎疾咎者君子所不自解免也病加於小愈禍生於寇去故坤而復君子以之致慎復而坤君子以之致順順者天地之序也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也然則克己復禮其亦坤道乎曰是固坤道也洪範曰平康正直彊弗友剛克燮友柔克沈潛剛克高明柔克四克者五行之所為制也平康正直則坤之所自治也知崇禮卑崇以效天卑以法地法地則禮可制效天則樂可作夫子而不為禮樂為禮樂則必顔子是與也然且顔子退然以克復請事故無過不怒之難也雷奮於地日食於天蓋時數而有之也必曰未嘗不知未嘗復行恐顔子自謂未能也然則顔子不得為中行乎曰顔子何不得中行之有易之言中行者四其二則皆遷善改過也益之三四是也三以改過用凶而有孚四以遷善從公而利用聖人皆以中行歸之泰之九二秉其四德以尚中行庶乎與中行為徒而是六四者獨以中行獨復稱故復者自知之道也有善而自知遷不以人遷有不善而自知改不以人改顔子亦庶乎此也然則不逺復之與獨復同道歟曰獨復者不逺復之應也猶包荒之於歸妹也相觀而化此有其盛德而彼有其令名然則子産不得謂之知復乎賂伯石以邑子太叔風之而無悔也作丘賦國人謗之而勿恤也鑄刑書叔向諫之而不止也曰子産亦知者也修身下仁從道子産皆有之也殯伯有為豐卷請田里下仁也不毁鄉校從道也以禮率國自少而長無違者修身也然則子皮子太叔亦得謂之知復乎子皮使尹何為邑子産譬之製錦射獵子皮謝不敏也卒授子産以政子産授政於子太叔譬之火烈水懦子太叔未暇及也卒收之雈苻夫二子者亦可謂之無祇悔矣然則晏子可謂復禮乎其曰君子不犯非禮小人不犯不祥又曰國亂惟禮可以已之曰是季札子之訓也季札謂子産曰子為政慎之以禮不然將敗謂平仲曰國有難子速納邑與政故如季子則可謂中行獨復者矣六二復之臨復亨出入無疾朋來無咎反復其道七日來復利有攸往臨元亨利貞至于八月有凶休復吉象曰休復之吉以下仁也正曰復之臨其長人者乎何以長人曰仁周書曰恭儉惟德無載爾僞作德心逸日休作僞心勞日拙君子之美足以豐人不以腴其身道足以庇主不以固其臣康誥曰怨不在大亦不在小惠不惠懋不懋故順理而力行仁人之事也教思而容保長人之務也作德而彊固君子之行也詩曰溫溫恭人維德之基其維哲人告之話言順德之行雖有凶事不為厲矣六三復之明夷復亨出入無疾朋來無咎反復其道七日來復利有攸往明夷利艱貞頻復厲無咎象曰頻復之厲義無咎也正曰夫頻復者其有所傷乎為信不及義為義不及仁為仁不及禮為禮不及智為智不及愚為愚不及誠頻失而頻復之大人不為小人則不能也火生於本而焚其本根出於土而耗其土敦惠之人寡怨明躁之人多失蔡仲之命曰率目中無作聰明亂舊章詳乃視聽罔以側言改厥度若此則庶乎免矣艱貞無咎養晦之道也六四復之震復亨出入無疾朋來無咎反復其道七日來復利有攸往震亨震來虩虩笑言啞啞震驚百里不喪匕鬯中行獨復象曰中行獨復以從道也正曰有德者固不在位也易之稱中行非位也幽獨戒懼自警而已雷動於地不謀於日誠信發於中百里不失詩曰鼓鐘于宫聲聞于外君牙曰民心罔中惟爾之中故中之稱獨君子之所致謹也夏歌曰一人三失怨豈在明不見是圖君子內省以致其仁君敬以將其義得與不得反求諸已雖無吉無咎不足以稱之亦曰中行獨復而已是君子聖人之所共治也六五復之屯復亨出入無疾朋來無咎反復其道七日來復利有攸往屯元亨利貞勿用有攸往利建侯敦復無悔象曰敦復無悔中以自考也正曰復而屯以為敦復不亦宜乎君子之據德不自以為固也立其大者以先衆治隆本而厚事雖在畎畝亦有經綸罵君陳曰必有忍其乃有濟有容德乃大屯之容忍者多矣秦誓曰邦之杌隉曰繇一人邦之榮懷亦尚一人之慶故秦穆公則可謂敦復者也穆公一鑒於殽師而用蹇叔百里奚終其身夫非反復自考而能敦至如此乎上六復之頥復亨出入無疾朋來無咎反復其道七日來復利有攸往頥貞吉觀頥自求口實迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也正曰甚哉觀心之與觀頥殊軌而同道也觀心者畜德觀頥者畜利畜德不害畜利終敗故復反也頥進也進而不反必易其紀且以長子當師嘗敵而前非所為後也晉作二軍使太子將以伐霍士蒍曰太子君之二也二若體焉上下左右以相心目故能治事以制百物若下攝上與上攝下周旋不變心目違反何事能治故古之為軍也軍有左右闕從補之成而不知是以寡敗若以下二上闕而不變敗弗能補也變非聲章弗能移也聲章過數則有釁釁則敵入敵入而凶救敗不暇誰能退敵故如復之上爻可謂上下相攝聲章過數者矣然則鄭子展所謂楚子貪昧於諸侯者何也曰是漏而不慎貪而不節者也漏不慎貪不節一往不復十年大敗豈為過乎剝復一陽之卦也從於南政猶謙豫之次於泰否也泰臨過矣而猶且晝短百五十六是日道之庳也寒暑時遷蓋有之矣是不從南至而從南至之律乘南至之位何也曰贏縮之端世道隆汚積於六卦劑之而平則平矣自剝復而外至於夬萃隂陽乃悖故觀於剝復夬姤而天地之次可見也序卦傳曰致飾然後亨則盡矣故受之以剝剝者剝也剝窮上反下故受之以復凡卦之貴反復則謂是始也剝而不復則乾坤無所從始剝復而遽與之夬姤則又速化也屯蒙以來十卦矣六百七十八年益以乾際七百四十五年數盈已極不得不剝剝不得不復也宣帝辛未已入於剝明年上崩元帝乃立上懲綜核之弊一於優柔恭顯馮竈龍朋煬之外比許史不二年而殺蕭望之黜劉更生又以楊興諸葛豐之對貶周堪張猛卒令憤死以元帝之於師傳諸賢未嘗不知未嘗不重之也而意分於近習權絀於左右訪雉於隼愈張其趾牢石五鹿復維縶之用賢轉石去佞拔山十六年間遂頽漢業故剝足剝辨則自此始也成帝初年石顯始死罷宦官中書所謂剝之無咎而五侯始封黃霧四塞張禹薛宣之流無所匡弼劉向極言徒資側目而已自是諸王益競丁傅侈靡而莽以飾貌射聲其間成哀三十二年馮藉之業單于稽首四夷咸賓徒為新莽頌其功德趙后董賢所剝幾何平帝六年猶之蔦蘿施於松柏蓋自春秋以來陳恆三晉之事萃於一人而周公魯隱居攝之名亦剝啄盡矣新室戊辰漢脈中絶又戊寅乃復胸奴入寇江淮盜起又數年而宗室起兵光武乃奮然則是剝與復相次為治也剝與復相次為治則其不始於建武而復何也曰剝復共治也剝之數十年復之一日而已然則泰否雜治也剝復亦雜治乎曰剝極而復何雜之有無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉象曰天下雷行物與無妄先王以茂對時育萬物正曰正而誠鬼神之所辟也無妄而動雖有眚吾往之矣武王遘疾周公植璧秉圭請代于三王曰今我即命于元龜爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭夫周公則可謂正也以先王之未有攸歸子孫之未有定地不憚殺身以代其君其於鬼神之故則必有取之也隱公初讓其弟而未有解於兄菟裘不成而鍾巫是營故無周公之正之誠而欲冒眚以往者猶指螮蝀以為日月也詩曰螮蝀在東莫之敢指又曰彼月而食則維其常此日而食于何不臧有眚之謂也正而有眚何畏之乎故天下雷行茂對之象也君子憤盈志不在殺作之奮之以長萬物及其究也為積小高大初九無妄正變象之否旡妄元亨利貞其匪正有眚不利有攸往否之匪人不利君子貞大往小來無妄往吉象曰無妄之往得志也正曰天地之於人一而已正則謂之人匪人則謂之眚無妄則猶之人也猶之天地也無妄而往何不利之有乎天地閉塞賢人隱遁然苟將以精誠率以至正猶格金石而蹈水火也故忠信者行之車也敬恕者御之靷也忠信以為質敬以持之恕以施之夜行林薄鑒其毫髮而况於晝日乎詩曰民莫不逸我獨不敢休天命不徹我不敢俲我友自逸其往而無妄者乎無妄之往雖有不利猶未往也亦曰不失其正而已六二無妄之履無妄元亨利貞其匪正有眚不利有攸往履虎尾不嘻人亨不耕穫不菑畬則利有攸往象曰不耕穫未富也正曰無妄而虎嘻有之乎曰有之鬼侯之趨醢是也無妄而耕菑有之乎曰有之閎散之行賂是也君子先事不冀其得先道不謀其食臨難而無幸免之心使虎兕而可以耕耨不從之矣詩曰狼跋其胡載疐其尾公孫碩膚赤舄几几夫周公豈有履虎之心乎亦何利天下之有故閎散之事周公有所不事也六三無妄之同人無妄元亨利貞其匪正有眚不利有攸往同人于野亨利涉大川利君子貞無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也正曰野則同也邑則不同也同人不冀其利而利歸焉私人不冀其災而災歸之何也于野則無妄于邑則有眚邑者眚所聚也食訟數起市獄數擾則必於邑焉詩曰如匪行邁謀是用不得于道又曰如彼築室于道謀是用不潰于成君子之去妄也舍獨而用衆委心而下人棄其所繫釋其所得亦可以自逺於災眚矣詩曰泮奐爾遊矣優游爾休矣豈弟君子俾爾爾爾性似先公酋矣同人之謂也九四無妄之益無妄元亨利貞其匪正有眚不利有攸往益利有攸往利涉大川可貞無咎象曰可貞無咎固有之也正曰無妄之益可以濟矣而曰可貞無咎蓋其慎也謂災眚之生生於益也物益而溢溢而後淫氣漬之五色之祥與穀明相沴以禜人日而後妖妄生焉凡眚之妄者益之一物則其妄眚滋著矣君子視聲於無聽色於冥損之又損以至於無可益而其真質始見故固有者謂其若無有之也若無有者不以所有益其所無有詩曰假以溢我我其收之溢之則益也收之則無所益也然則是可貞也似猶有不可者焉而後可之可之謂不利往而利往者也猶益之無妄也利往而不利往則謂之依遷國也然則益之遷國謂有涉川焉中行吉公以獲其體無妄之可貞亦可涉川焉而不獲其用何也曰用不若體之著也無妄之往何之矣幸而益下得其兩利免咎而已虢之㑹季武子伐莒楚人將以穆叔為戮樂鮒求貨於穆叔穆叔曰諸侯之㑹衛社稷也我以貨免魯必受師召使者裂裳帛而與之曰帶其褊矣翼之禍邾人訴於晉晉人執昭子范鞅求貨於昭子使請冠焉取其冠法而與之兩冠曰盡矣吏人請其吠犬將去殺而享之故無妄之可貞穆叔與昭子皆用之也謂其不利往而往之貞猶庶乎可也晏子之辭弼殿季文子之減帛粟公孫免餘之辭百邑則是損之可貞非損則不可也故損之大彖與無妄之九四貞則有利君子謂可不謂利也然則天下有不可貞者無有乎曰若節之不可貞是也甚矣易之辨也一貞也而慎用之曰利貞曰小利貞曰利女貞利艱貞利幽人之貞曰利君子貞不利君子貞夫貞非君子不能也而猶有利有不利焉故曰可貞亦聖人之所慎與也然則無妄之益以為可貞是無凶事也益之家人以為女貞是有凶事也而皆曰固有之何也天下之附益於我以為吉凶者皆妄也惡其凶而必擇吉焉求益愈甚其損愈至臧㑹竊臧氏之寶龜以卜信僭也而曰僭吉遂以僭見逐於臧孫及季臧交惡也季孫乃立臧㑹穆叔適齊夢人曰牛以勝厥魘遂寵用牛也卒以餒死夫臧㑹之吉則可謂妄吉也穆子之凶則可謂妄凶也然固有其吉凶者龜牛馮之不知其固有而益以未始有者故臧㑹有其妄吉穆子有其妄凶故有貞之義本於無妄君子之所甚審也九五無妄之噬嗑無妄元亨利貞其匪正有眚不利有攸往噬嗑亨利用獄無妄之疾勿藥有喜象曰旡妄之藥不可試也正曰堯潦湯旱太王之獯鬻文王之昆夷是可以不治乎曰使禹為之皆可以不治也禹順其道以為溝洫以奏干羽猶依五穀進抑搔而郤之疾也古之醫者望氣聽聲吹步而治之至於攻尉針砭而下矣詩曰臨衝間間崇墉言言執訊連連攸馘安安其試而不試也如此然則文王已下乎曰文王值疾之有妄者也禹值疾之無妄者也無妄而又藥之何也曰是不可試而不可廢也號泣于旻天于父母負罪引慝在帝則猶用此也上九無妄之隨無妄元亨利貞其匪正有眚不利有攸往隨元亨利貞無咎無妄行有眚無攸利象曰無妄之行窮之災也正曰無妄自正者也自正而復隨人則非自正者也無妄之否可以止矣而且往吉謂獨往者也無妄之同人或得或災謂衆往者也不衆不獨與眚從出與眚從反非窮而何詩曰爾之安行亦不遑舍爾之亟行遑脂爾車夫以喜譽慍惡隨人而求其無咎者則鮮矣君子秉乾之德反求諸身其用獨者雖否而得吉其用衆者雖同而無災詩曰莫莫葛藟施於條枚豈弟君子求福不回夫不回遹其德以妄隨人則何災眚之有乎大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食養賢也利涉大川應乎天也象曰天在山中大畜君子以多識前言往行以畜其德正曰金心在中氣見於色五性所竅達於面目天在山中夫非聖人則誰與窺之乎記曰天降時雨山川出雲嗜欲將至有開必先古人之言行湮逸者多矣而或識或存千億不忘故知天在山中則可與言道矣君子致靜以守其艮致虛以達其健尚賢而日新挹已而下人詩曰無然畔援無然歆羡誔先登于岸如此則何所不畜之有不大聲以色不長夏以革不識不知順帝之則如此則何所不利之有故大畜之道則惟文王為能之也象曰多識前言往行以畜其德文德既滋武戒隨之及其究也以除戎器戒不虞初九大畜之蠱大畜利貞不家食吉利涉大川蠱元亨利涉大川先甲三日後甲三日有厲利已象曰有厲利已不犯災也正曰畜之為言止也非厲何止物蠱則有災災不可犯古之利涉者蓋有望津涯而屢輟者矣先甲三日歷子而申納火於水之中後甲三日歷午而寅納水於火之中夫是則猶之未利涉也詩曰匏有苦葉濟有深涉深則厲淺則揭蓋言慎也君子多識而無聞心畜德而不求試於人樂則行之憂則違之夫以不家食而蹈危波者衆人之行君子之所大戒也九二大畜之賁大畜利貞不家食吉利涉大川賁亨小利有攸往輿說輹象曰輿說輹中無尤也正曰小畜之說輹以得反目大畜之說輹為中無尤何也小畜之中孚畜其小者以成其信大畜之賁畜其大者以成其文成信近情情猶有過也成文近德德則無過也然既已止矣近情而畜過一反而合近文而畜德一反則不合也故君子之進退可以自考也詩曰坎坎伐輻兮置之河之側兮彼君子兮不素食兮如此而大畜何必不家食之有乎舅犯載璧以辭於河介之推辟祿而入於山蘧瑗卷懷以出關夷齊餓於首陽之下夫苟有尤則必有負其輹而馳者矣九三大畜之損大畜利貞不家食吉利涉大川損有孚元吉無咎可貞利有攸往曷之用二簋可用享良馬逐利艱貞日間輿衛利有攸往象曰利有攸往上合志也正曰大畜矣而二簋是用古之君子蓋率繇此也逐馬常間豢牡不良劉康公聘於魯發幣於大夫季文子孟獻子皆儉叔孫宣子東門子家皆侈歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎聞之寬肅宣惠君也敬恪恭儉臣也敬以承命則不違恪以守業則不懈恭以給事則寬於死儉以足用則逺於憂今季孟儉則足用矣足用則族可以庇叔孫東門皆侈侈則必廣其身人臣而侈國家弗堪登年以載其毒必亡故大畜而艱貞人臣之道也日間輿衛二簋之義也吾見夫食粟千駟而賢者不視者矣吾見夫步作之皂多死者矣六四大畜之大有大畜利貞不家食吉利涉大川大有元亨童牛之牿元吉象曰六四元吉有喜也正曰已大矣而牿之何也瑕璺之生則於亨豫上帝之享則於繭栗也周頌曰維豫小子不聰敬止日就月將學有緝熙于光明牿者所以為敬也敬而後光明生焉人主之患患以小慧錮其大哲立政曰繼自今文子文孫其勿誤於庶獄庶慎惟正是又之又曰繼自今立政其勿以憸人其惟吉士用勱相我國家人主之患患以其聰明試於庶慎不試於大政故大臣繇之壯氣相觸而羣類俱敗也多方曰時惟爾初不克敬于和則無我怨六五大畜之小畜大畜利貞不家食吉利涉大川小畜亨密雲不雨自我西郊豶豕之牙吉象曰六五之吉有慶也正曰大有之牿牛小畜之豶豕何取之乎曰各以止過也君子之學積於下而行審於上其處位滋高則懲心愈庀矣牿牛之庀君子豶豕之庀小人君子亦各有取之也曰視吾所畜焉耳旅獒曰不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽奇獸不育於國不寶逺物則逺人格所寶惟賢則邇人安故說輻間輿君子之所立體也牿牛豶豕君子之所致用也君子庀其心以畜其君畜其君以庀天下詩曰式訛爾心以畜萬邦是之謂也上九大畜之泰大畜利貞不家食吉利涉大川泰小往大來吉亨何天之衢亨象曰何天之衢道大行也正曰小往大來則是大有亨而小畜雨也豶豕盡去而牿牛可祀也且又有進於是者則是邪正定而隂陽序也精氣交而山川雨也詩曰君子如祉亂庶遄已君子如夷惡怒是違君子何天之道以率天下不更其學不違其師言明而衆知行高而人不疑古之人冇行之者伊尹傅說其人是也無妄大畜二隂之卦也從於北政於是冬春徂中矣大畜之泰日月之所出入也無妄之否星辰之所從紀也自屯蒙而來十有二卦南北分治三更其次以二百七十三年大餘二十四積之八百一十九年餘七十二日矣孟以六體卦之數四百九年餘二百一十六為一千二百二十八年餘二百七十八日而四分天地減其十七年而得歲周之實是頤大過坎離之所從始也序卦傳曰復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜又曰大畜時也無妄災也是何義也曰災時義也無妄大畜序也序非義也序義異際以為序則序之已耳新室之戊寅樊崇秦豐兵起又五載舂陵兵起又一載癸未更始稱帝明年乙酉為建武元年是前七載者皆災嵗也王郎盆子則可謂妄者矣劉縯則可謂無妄者矣竇融朱鮪則可謂無妄者矣公孫述劉永隗囂彭寵則可謂妄者矣自乙酉至於丁酉是十三載者則猶災嵗也自高祖乙未入關至建武丁酉二百四十三年又十年西域入侍日逐護邊封泰山襌梁父起明堂作靈臺辟雍煌煌乎大畜之盛也孝明在位十有八年西域入侍胸奴就學幸孔子宅升堂授經前代未之有也章帝在位十有三年外戚雖盛而馬竇列侯時已還國未有橫恣牿牛豶豕是皆有焉元和建初之治上於神爵五鳯非獲天祐而能如此乎前漢之治極於孝宣後漢之治極於孝章極治之數不過二百七十三年而四分三際尚有新室之厄故時之與災聖人不能違也履信思順尚賢則聖人謹從之也嚮使建武無廢彊立陽之事建初無廢慶立肇之釁雖謂何天之衢又何過焉易象正卷四
