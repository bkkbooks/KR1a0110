body:
  text: 易𧰼正卷初下明黄道周輯歴年十二圖序歴年十二圖何謂也言夫大象之歴年者也天道積於上人事漸於下衆積而神漸久而天故百年之歴可以觀智千年之歴可以觀聖也乾坤一歴百三十五年中於天地以為主柄屯䝉而下兩濟而上二千一百二十五年左右南北相間起也定者以定衡者以衡環者以環交者以交體用通實因而乗之四十八圖相追求也酌而舉之曰十有二夫以二千一百二十五年之事足其文獻研其爻象天地之教戒鬼神之情狀可謂備矣故春秋者天地之自修也詩者鬼神之吟詠歌嘯其事也詩與春秋逓為爻象以圖天地而人猶以為不備則是人之智大於天地也夫欲觀於易簡舉其始亂其惟環圖乎平桓之間經綸始興文素之業代為明王周襄而後齊晉乃覇宴樂作謀以匡天下簡景之際容畜親建雖先王者末迨於亂敬元貞定遞及四歴四歴十二王懿柔辨定近於虎尾故歴之與易以四相起夏冬之義於是而至矣泰否而下聖人所不親治也然而聖人皆治之裁成輔相則非貞定威烈之事斂徳辟難亦非韓趙魏田之事也而聖人以此兩事者定進退之大計𩔖族辨物遇惡揚善不謂衰世而廢上柄也安顯而下何觀焉謙輕豫怠其謂靚赧之世乎八百之歴乃於此止嬴氏受之以帝天下裒多益寡殷薦上帝其謂是周秦之際乎此三季八王者聖人之所不與也而猶與之治也以示百世故聖人者愛天下之至也泰否缺四際再交嚮晦復明及於缺際秦室二王以迨漢祖上泝貞定為十二主故四十二主天地所紀治亂也隨蠱泰否三姓之間或滅或興往替而来隆往枯而來榮君子視之以為天地代謝聖人謂是宴息寢興要歸於振民育徳而已漢惠而下暨於文武容保設教庶幾有焉武帝中年迨於昭宣王覇道雜以尚刑法孝元而下至於新室遂為剥復此三際者二百有四年判三十九年繫於前際安宅閉闗聖人所以保治之固也建武而後迨於明章茂對畜徳庶幾有焉和殤安順是則頤養獨立之世也君子修道以治天下大之不能容保設教成臨觀之治次之不能茂對畜徳循无妄大畜之業而課績於寢興攷徳於言語飲食以為是裁成輔相不懼无悶者是聖人之所哀也冲質而下是則坎離之會也坎陷也離麗也陷而有所麗則必有異姓乗之而起矣曹魏之事是也此三際者二百有四年判三十九年繫於後際習坎繼明聖人所通變而起也自是而下則山澤風雷之治矣山澤之有龍蛇風雷之有災𤯝聖人之所畏也曹氏四主與季漢共治季漢不滅司馬不帝虛受鼎立猶未及於經綸也晉太康而後則遯大壯之治也惡惡而克復則足以戒女旤足以戒女旤則足以戒强諸侯足以戒强諸侯則足以戒寇攘夷狄矣三代之旤至於晉而備有焉晉之有遯大壯晉明夷百三十七年備有三代之旤非遯明夷之足以旤晉也明徳不昭而非禮則履之遏也劉宋永初而後至於蕭齊之初政治修明在於北魏而臣弑其君子弑其父南北遁有也修徳宥罪懲窒遷改自齊永明而下隋大業而上聖人无望焉耳无望而猶且治之謂是百世之道不在於數代也故自曹魏而後至於義寧而降四百八年與漢相直七代三十六主缺不之君不在其科簒弑叛逆不可勝數也聖人猶忍以是輟明王之治盖自夬姤萃升困井革鼎終始唐室而後天地之教戒深切明著也夬者亂之始消也姤者女之始壯也缺教也而女主興禁門之蹀血牝主之决事非易之而若易有此教者唐人皆用之萃之不虞升之高大景雲閧元之間是也困用致逺以出於扶風井用勸勞以綏於河北革始於長慶而主无正終鼎盡於大順而祚乃更始唐室四際二百七十三年發於夬姤斂於革鼎天地之正限也天地為限聖人不違聖人立教天地亦不能違之治歴明時正位凝命自堯咨以來亦有豫䇿於唐昭朱温之事乎朱温之得為長子李存朂之不得為長子則亦天也恐懼止思君子於是致深戒焉耳盖自建隆而後則漸交於歸妹矣隨交於蠱秦漢始交漸交於歸妹而宋室始立兩者曰月之大慝也居徳知敝前宋數主亦庶乎有之也窮大而失居親寡而无容真仁神英之間則亦未之及也而元豐倡旤紹聖繼之訟獄繁興豫大自絶建中靖國之間卒與永嘉建興同旤故震艮陽也兩男之闘出於中華一際之間五姓十主㢲兌陰也兩女之闘出於外國中交之際兩丧其雄故衡圖之為坎離兩濟環圜之為震艮㢲兌父母不御而男女絶轡天地之所畏也中孚小過之似坎離臨觀遯大壯之似震艮㢲兌天地猶且畏之猶且畏之則必就聖人而問道享帝立廟議禮制度雖在顛沛不可廢也以為是先王之禮樂存焉可以立教可以立國過此以往則天地之事也以天地之事託於聖人聖人无所辭責則不敢復託於天地是十二圖之事也六十四體卦定序歴年圜圖第一凡數卦皆以圜圖為凖而又分乾坤何也乾坤定位而易行乎其中矣乾南坤北屯從坤而左䝉從乾而右左以藏往右以知來來往藏知其究一也春秋以前嵗序不可復攷存自春秋而後除平末三年始自周桓王元年下建元末至正丁未厯三十一卦二千八十五年餘三百七月二分半盖自桓王以前有平王五十二年幽王十一年併得六十三年尚四年在宣幽之間或東遷之始錯於坤際四年有餘史傳互殊莫之徴也今留坤際以識大端諸悉昭然以俟不惑云凡舉體數皆以常朞為凖如一嵗三百六十通易之數四千三百六十九大餘二十四中分三十二卦得二千一百八十四年餘百九十二日退一卦實歴二千一百十六年餘九十六日其通數也今定依嵗實求之何也以周桓王壬戌起元至洪武丁未恰得二千八十五年三百七日强以三十一卦之嵗實按之無有增損是天地之闔闢爻象之表著也如以二千一百十六年餘九十日求之則上不盡洪武下不逮建文餘革除之前後九年叅幽平之五十九載適存一卦以還坤初更自乾終以交屯始而折木之元始開重華之業肇建亦仰觀之極思自然之締造也凡研幾者途非一端藏知者道或相反二千八十六年之後成敗得失取券難齊然如厲宣而上文武而下約成五卦三百四十年乾坤兩間必有所取之矣然則圜圖之設倚屯而䝉倚既濟而未濟逆數文武皆在㢲兌渙節之際何也曰圜圖與定位圖兩者相為用也乾坤互起則位數逓用故常以定位為體圜倚為用叅於諸圖而義券者衆矣凡觀諸圖皆以圜圖為例其以南北左右不拘本卦逆循而上者即交圖也今不作交圖但以左右兩次附圜圖之内云朱美之曰前卷定序歴年皆以左右分行三十卦得二千四十八年分上下經又以實歴之卦三十一週至甲辰龍興二千八十六年分為兩際今定序定位兩圖皆以圜圖為序始於屯䝉終於兩濟盖以乾始之端代咸恒之位移鑿度之法歸象正之方所以崇徳尊功尚開闢之乾坤等明兩於日月也又六十四體卦定位歴年圖第二是猶之前圖也而次序始於春秋春秋以𨼆公為元不以桓王為元以𨼆公為元則三十一厯而抵於甲辰吳興之嵗以桓王為元則三十一厯而抵於戊申洪武之元先後異紀而帝王殊系故觀於已未壬戌兩紀而造化之奥窔元聖之極研出拔匪夷燦乎著矣定位圖不依圜序則乾屯之右間五卦履否在商周之間約武王至宣幽三百二十餘年加以文王中身可三百六十年當帝位而不疚過此則否之未候矣乾坤之義互起合論其在南維亦猶是也南維之猶是何也南維北𤼵始於坤左之未濟二千八十六年而交於乾初其後五卦當得小畜猶坤右之既濟左旋而交於乾初其後五卦當得天澤也倚衡圜圖互為叅印其加三十四年而交於革除縮三十四年而本於開創是則明周之終始天地之闗鞬焉耳常朞之積平分天地二千一百八十四年餘百九十二日以幽平五十九年加洪建三十四年配於中間二千九十年為二千一百八十三年尚少一年百九十二日天地之大數未可以秒忽量之也其上下進退猶日月之薄蝕時候泛差間有之矣如建文壬午七月十二日壬午不論氣朔以月甲分之正得百九十二日其幽平之間或贏一年義不可知而大數符契不繇𫝊會學者須知聖人錯心精㣲締視數千百年之内較如旦暮治亂盛衰一一繫之爻象非如占卜之家徒察奇耦以臆眉睫而已也二圖皆依四分歴用日法二千五百一卦之嵗六十有七大餘一百四日小餘二分五釐與各疏㣲别葢各疏起分互有縮縮其日餘二千一百三十四者特縮極之候而二千五百者為四分之實祖冲之於四分内外盈縮七十五秒以為斗差其實斗差一百五十六内外盈縮當得七十八内分之縮極於二千四百二十二外分之盈極於二千五百七十八是亦一法也又如此圖不分乾坤上下但如卦序積之則既濟未濟上抵乾坤前後五卦值於豐旅大抵剛柔樂憂與求見雜起止盛衰左右分行則性徴異候得其意者於陰陽嚮背思過半矣其逆數年歴亦與交圖同觀考察盛衰各於當限之中際六十三體卦反對歴年圖第三是常朞之歴也毎運六十八年餘九十六日㫁於周幽王之元年檿弧箕服適入氷霜之際終於建文帝之末造燕飛龍起復升析木之都中間二千一百八十四年餘二百一十六日庚申之距壬午二千一百八十三年又一年厯於乾䇿始入如始之會盖癸未甲申通為開創之年革吳鼎燕適交乾坤之界圜觀對化上下一也易之有對化起於用卦乾用為坤坤用為乾屯用為䝉䝉用為革需為晉訟用為明夷師用為同人比用為大有小畜用為豫履用為謙泰否隨蠱漸歸兩濟體可反對適相與也猶之揲蓍者不數其左而數其右圜卜者不相其面而相其背屯䝉之即為鼎革需訟之即為晉明夷師比之即為同人大有履小畜之即為豫謙位不更易道可反照也下經之交於上經者六卦鼎革晉明夷遯大壯井困夬姤升萃周與漢受之周之得鼎革晉明夷幾殆矣而覇主匡持不失其所漢之得遯大壯井困夬姤升萃幾殆矣而明辟復起不改其物此六卦者鼎革井困皆不得父母而彊臣任事覇主任術功過所凑足以相凖其不得父母而界於易姓者獨隨蠱耳上經之交於下經六卦臨觀觀需訟剥復大畜无妄賁噬嗑䝉屯晉與唐受之晉之得臨觀需訟幾殆矣而江左偏師克攘勍敵唐之得剥復大畜无妄賁噬嗑䝉屯幾殆矣而顛履間關五躓五起此六卦者臨觀需訟剥復大畜旡畜皆獨冇父母而外子身全遷國自建熄曜吹枯足以振緒其入交限而不與體交俱亂者獨漸歸妹耳故天地之治宇宙與聖人之治宇宙均治也中卦分治始於幽王之初年春秋建元始於𨼆公之初載自幽王而計之通朞之運三十有二而吳會樹幟故仲尼所建之嵗實之運三十有一而吳㑹樹幟故仲尼所建與天地所建均治也平王東遷之嵗終於徳祐二千四十四年桓王元春之始終於應昌二千八十六載合四者以觀而天建始亂槩可知矣六十四體卦對積歴年圖第四是亦常朞之積也因其對化左右相起乾坤坎離頤大過中孚小過八命所呼不事反復則屯鼎䝉革需有訟夷離為魂魄合為晝夜一面一背兩絡合體體盖可知矣兩卦分合各三十四年四十八日以常朞之積四運而為一紀二百七十三年餘二十四日餘分之積又十六運而周於爻次凡八運而天地分中壬辰為姑猶出居周室始潰乙丑為吕秦吞併六王乃殱戊戌為建武中身僅此興主庚辰為雒陽餘灰白版始創癸丑為南國無君隋文坐大是前際也丙戌為咸通七年燈熖將熸厥煇燦然已未為金始通和舉宋従之缺繼亂而壬午為日月既出乃迸爝火而燭宵夜是皆作或盛或衰盖自庚辰衰晉𩔖於姑蕕癸丑隨文埒於吕政而建武無似焉是於八運中分則必有取之矣晉元幾近如宋髙則不足録也故易之為道終於既濟兩濟之與鼎革匡持天地明時治歴與思患豫防兩者湯武姬文所共扶天地也古之為卦者以蓍當厯以爻為月以策為日率三百六十䇿而合兩卦兩卦合䇿通三百六十日損其五六以為朔虚益其五三以為氣盈故曰乾策二百一十六坤策一百四十四乾坤兩䇿合得朞日今猶是兩卦也約其百三十六半為六十八大餘九十六日兩卦對分各三十四大餘四十八而章蔀紀元以爻直月之説可以通舉也然為蓍以求卦卦成而蓍不揲為䇿以求爻爻成而䇿無據必如一周之嵗三百六十月兩卦之合不過六十年以六十四乗之三千八百四十年中分一千九百二十亦足以約畧興衰刋除缺𨼆而仲尼知其未盡以日當爻㫁自洪永之端照於桓之始爻本嵗實運應天周元聖所規不可易也然則體卦實數本六十年以辰當卦必以卦當日則七百二十年以爻乗之整得四千三百二十年中分二千一百六十嵗月日辰各可相追而聖人不用之何也曰是其恒數也曰恒數則通朞之積四千三百六十九何也曰是猶有納虚者存焉聖人之於道也存之則彌細細之則彌退也存之而退十四細之而退八十虛挹以讓天地亦得其實數焉止耳實日進則虚嵗退實日減則虚嵗盈四千三百二十之中古人有用之然而聖人不貴也七十二限乗體卦本數定序歴年圖第五卦以六十四為體七十二為用體即數也用即運也以六十四之數行於七十二運之中函嵗實者毎運六十七年餘百四日二分半函通朞者毎運六十八年餘九十六日兩歴相參而分其半其函嵗實者得四千八百四十四年餘二百一日半之得二千四百二十二年百有五分是春秋十倍之所從出也春秋二百四十二較之天行尚絀兩數揆之通朞得四千九百十五年餘七十二日兩函合算九千七百五十九年二百七十三日以半折之四千八百七十九年三百十六日半又半折之二千四百三十九年三百三十八日是天地之全象參兩㣲渺知一知十之所従究也凡圖皆圜倚互起左右三十六其終於兩濟者皆起乾坤故體交之卦不盡束於末限如六十四運之卦胡元運終究於兩濟而乾元乗之以闢天地此其經終也其運厯未究又行四卦二百六十九年浸於常朞之内以與全歴相追雖在七十二運之中常行七十三限而與春秋歴元相合所謂春秋歴元者即以六乗七百二十九為四千三百七十四者也凡體卦嵗實之數四千三百六年餘一百四十五日半再加一運六十七年百四十二分半則四千三百七十四年矣易之體卦妙於七十二運作七十三週履端歸餘以退為進其用卦則整整常朞之内四千三百六十九餘二十四日不可易也兩函之中通朞之比嵗實盈七十年二百三十六日以半折之三十五年一百十八日為體卦經嵗之餘候觀於古今乾坤㤗否隨蠱頥火過坎離六體四交六百八十年間華夷臣主牝牡雌雄不亂天常者百無一二其厯孚過兩濟而晏然清夷者獨盛明而已其法自以體卦為凖終日元於既濟𤼵昭籌於乾端推其餘年以存鑒戒或逆數兩濟之年以迄暨比師之會則一民五君未及腥穢不親不進无用啓彊義有未宣幾難强存尚存餘測稽之後圖云然則諸圖秒忽前後參差不能程一何也曰日分所餘有贏有縮有平有中猶之閏食不膠日月偶舉一端足以相覆即如通朞之乗用卦有四千九百十五年七十二日而但云整四千三百六十九者亦舉前十圖統體而言非為體用相乗而𤼵也七十二限乘體卦本數定位厯年圗第六定序猶之定位也乾坤為首咸恒為足坎離兩濟交於腹中觀於頥大過坎離兩濟小過中孚七卦之間四百七十餘年戎夏雜揉兵革顛沛葢自厲宣幽平未之有也厲幽紊政不過數十年法不當乾坤四卦之限而上下八變各三十六不復可易但以法推之而随蠱剝復㢲兌之義各有所取萃升夬姤天地易際與坎離相射之年皆犬豕乘龍氊裘樹纛極生民之變非獨强臣霸主暗于天命而已體卦圗姤始於武徳九年至於萬嵗通天葢終武瞾之世前後差池數載而已萃升而後安禄滔泚悍鎮豪閻流簸驚摇至於鼎革故天下之亂日常多治日常少聖人有以見其未然常持之不壞及其不得不壊亦如葉葉繫秋久而自落如貞定泰否之間是也震艮坎離㢲兑男女競慝一代之際四五易主譬之家室父母不御而子姓雄長牝牡雌雄久亦且亂故六子之有動不如乾坤之無静也周明相麗御於乾坤之端荀卿所謂兩大相生者也體卦次圖以魏黄初元年入咸則壊愍當遯上下經位亦自炯然然晉當泰始之後唐自貞觀之前三百六十年間南北稱號朝狼暮兕咸遯晉嘉之際未足明其潰决也凡易道乗叠如天之有層布定衡倚圖一南一北聖人櫽而括之曰乾坤屯䝉需訟師比盖已兼南北而為言包陰陽之分次賢者但循而登之語圜則坎離之屬咸恒上下通經語位則咸恒之扺乾坤兩濟通絡二端而已必欲綜其異徽交以宻緯則上下十圖皆可參治要不能舍嵗實通朞之年以增損入運之數使春秋之元無所頂抵洪建之間失其涯際也其有七十二自相乗與六十四七十二互相乗者運限參差毎以體用之序為積可觸𩔖而長矣六十四限行體用兼乘厯年衡圗第七凡體用相乗之數四千六百有八以爻乗之為二萬七千六百四十八以嵗實積之得七十五嵗餘日二百五十六以通朞積之得七十六嵗餘日二百八十八為章閏積蔀之本也是衡圖也不始於春秋己未又不始於桓王壬戌而以甲子為元何也春秋之意亦欲以甲子為元而有𨼆公之元則不得不於𨼆公且以上元甲子四百八十六年推之適當已未之元又不當舍魯史之已未用周史之壬戌也觀於辛酉之年適差一載𫉬麟之書不逮癸亥則天人交際非可意裁其較著也是圖毎限七十五年餘二百六十五日以二十七限稽之實歴二千四十三年餘三百三十七日其前餘幽平至桓甲子六十五年為乾坤前際約差二載界於宣幽寘不算外後餘泰定丁夘至廓清之會四十二年又至革除三十四年則是一限滿二十八交於㤗否矣易之象圖變化屢有遷移而爻畫嵗時確難増損圜圖體卦凡三十一限而交乾坤始於己未者極於癸夘始於壬戌者究於丙午皆去龍飛差五三載以甲子乗之則整整二千八十五年不爽時刻是甲子亦為一元之候也凡元不必逺泝洪荒但取其入厯之首便於推除亦自易簡如是圖以七十五年二百六十五為限凡二十七限始於桓王之甲子究於㤗定帝之丁夘丁夘距戊申四十二年不盈一限届於革除三十四載以春秋除之得洪建之交際是又一騐也但以已未起限則幽王已未尚未免䘮坤際只得六十年是以移閼逄之首㑹抵折木之興年進混一之㑹朝謝稱吳之或躍各有所取不為誕也必欲隆其後際邁於三籌則月卦相乗之數尚贏六百六十四年管蠡圭繩无當於天海耳然則春秋立元可移斿其際者歟曰是猶之測表也得其泛晷則其真晷乃著春秋以前文獻不徴如幽王十一年間既立宜曰又立伯服年候多疑聖人既以己未立元則己未起坤亦是正法既以己未起坤則二十七限之盡二千四十三年三百三十七日當至治壬戌十月元興又弑英宗於南坡之前一嵗也又四十五年而龍三十年而遏宻絫黍不失則前後表晷槩可推矣故以甲子壬戌較春秋之元非非以甲子壬戌移春秋之位也然則桓王甲子可遂移於坤端乎曰是雖典要但以聖人取裁不取人初而取物始未為失也以甲子為坤端則威烈王值隨蠱之中年周室兩分桐封鼎割與體卦之泰合是皆交卦也漢恵吕牝當坎之初會是正體卦也漢安漢獻當萃革之際是易之變象也自萃而下革漸㢲中孚未濟皆亂也凡易之災限二十冇八變𧰼亦與焉乾坤坎離頤大過中孚小過是八反復也隨蠱漸歸妹兩濟否泰是八交卦也萃升夬姤剥復鼎革是八變𧰼也㢲兌震艮是四立卦也四千三百八十年之中未有无故而當此位者也唐元宗之當艮亦以立子與萃相值唐懿宗之當姤下有五主宋理宗之不復則貞於剥者也然則咸恒不為災限歟曰咸恒與乾坤兩濟易位者也然則是三十限也徽欽之值咸恒懐愍之值漸歸天地之大呰也然則咸恒災而損益不災何也曰易有三重徳不勝位位不勝時損益而後姤夬升萃繼之矣故曰損益盛衰之始也章蔀積閏即為下圖七十二限體用兼乗之數以不書歴年别於後篇七十二限行體用兼乗歴年衡圖第八自體卦専乗及體用兼乗之圖皆㫁於平𥘉迄於元末歸餘四限以交圖中其餘兼乗四限者得三百七年又五十七日餘専乗四限者得二百六十九年又五十五日至此乃餘八限倍於前圖八限餘年五百四十一餘八十日推舊史殷歴亦五百四十一年以初殷十三祀及太甲三十二末殷二十二合之為六百八祀然史漢竹書互有異同不足稽也凡圖但觀天道進退交於乾坤兩濟之端八限四交四立四災亦不能盡合大要圖嵗近者多宻逺者多疎而乾坤兩濟常不易漏是圖以七十二限體用合數通朞之歴六千二百二十年餘二百八十八日較嵗實之積尚多八十九年一百七日若退還大小餘之數則猶然嵗實六千一百三十二嵗厯也四分圖象毎際一千五百三十三約畧虞夏亦交於兩濟之中往者无徴視於近代如隋唐之交開皇元年巳酉明年庚戌八未濟限凡三十八年為貞觀元年自三代以還興朝之主未有賢於太宗者也又三十八年乃入中孚中孚之中為武曌大足自媧皇以往經怪之事未有異於武曌者也又前三十八年中於小過梁元帝繹乃立戎服以講佛老賦詠而臨危彊亡國之主未有賢於元帝者也故六十四限之行兼體者兩濟之𥘉在晉恭帝已未元年改姓易物其中三十五年為太子劭弑立自古今逆子未有兇於太子劭者也其先三十八年壬午秦兵南代癸未敗於淝水古今中國之破北既亦未有盛於淝水者也至如坎離之當周赧九鼎遷過頤之值宋徽光於前晉六十四限之中特明數義其餘可得而裁也是圖頤坎當於秦吕離過變其華鼎當李劉之革故升出陳橋之不虞従南數之升當漢順永建而後元黄交戰諸賢與七帝共隤於陰陽鼎自曹魏九錫而來呉蜀峙分典午與當塗共蹶其龍馬且如小過中會正三十八年泰清已已侯景之破都城剥復北政亦三四十年趙魏交爭齊秦之致兩帝此皆灼然易見食於交中非可遷移附會是以兩圖特抉此秘至如周商以前无徴不信存而不論可也六十四限行用卦自乗歴年衡圖第九用卦自乗積實之數八十五年餘五十八日以六十四限行之得五千四百四十年餘六十日與七十二限行體卦自乗之數較之少九年三百四十四日較通朞少八十九年一百五十六日凡體用兼乗之數居於體用自乗之間其嵗厯上下通居其半如六十四限乗七十五六之厯即七十二限乗六十七八之厯此兩部通於前者也如七十二限乗七十五六之歴即六十四限乗八十五六之歴此兩部通於後者也惟六十四限自相乗與七十二限自相乗之歴相距至一千八百餘嵗為遼逺耳是圖積實與七十二限兼乗者差數既殊限分亦異而其起於周中究於元末交燕飛之初年空龍漦之前嵗則一也惟兼乗圖末餘四限三百二嵗有餘是圖末餘六限五百一十一嵗故以五百一十一嵗為爻象之定凖以二千二百一十為全體之中交以宣王甲午嵗除八十五年五十八日入春秋元為剛柔難生之始以元英宗末年癸亥南坡變故至永樂元年金川撥亂為坎離分射之終以較前圖兼乗之限甲子屯元至頤起赧王之戊戌咸起恵帝之癸丑既濟始於末晉巳未明年帝廢為零陵王小過始於齊明甲戌是年廢昭業又廢昭文兌始於陳宣巳丑先一年廢齊主為臨海王故廢立之事未有詳於前圖者也其從需來者中孚之中為晉簡文辛未桓温之廢東海未濟之中為宋武帝甲午義宣之討劭濟繇是而觀前圖之始於屯需周桓甲子不為降矣是圖屯需猶用春秋元而頤當始皇庚寅明年辛夘崩於沙邱離當元英宗末年癸亥是秋南坡戕於中孚坎大過之視兩限猶之頤離也宋明帝辛亥入其中交辛已今年廢東昏明年廢巴陵而蕭齊改號梁敬帝丙子入未濟梁社已遷其中交已酉韓賀諸將遂取江南方是南北分際有魏周令主秦燕亂臣一盛一衰蜩螗羮沸自謂仰應星文俯皈孔厚未暇察其始終剖其中際也是圖厯年已濶則間有包荒然如北際従需來者晉惠帝辛酉始交於漸不十餘年兩主北狩應歸妹之期南際従屯來者唐昭宗丁已始交於鼎不十年朱温稱帝昌取新之會歸妹之中三十年間王蘇再亂慕容石趙盡割中原使五缺餘氛流播五代鼎革之中三十年間厚珂相殄石晉契丹漸申父子使趙宋土地盡入北方此皆古今之巨創通其一緒可别千條者也前圖之貴者在宋徽元年𥘉入大過及中限而播越於明温後圖之貴者在晉懐六年初入小過不二年而淪夷於缺鈐兩朝之怪在二過之中至如吕后之當蠱武曌之當姤黄初之當離後五代之當鼎則六十四體運著之詳矣是圖於漢室五主唐宋八宗盛衰之候多不及治而㢲兌震艮六子方興彊臣宼賊奸挾其上晉自孝武前後張方王敦蘇峻桓元孫恩之流皆陵逼乗與跆藉都邑唐自憲宗前後朱泚李懐光希烈裘甫王仙芝黄巢之流亦皆震驚宫闕騷動天下合於秦皇泰定坎離交併則六子之用是圖又為兼該總以一年之治皆在二至二分四立君子静定以觀陰陽之争推於百世大率猶是或疑其煩碎彼此重沓而總約前後不過體用専乗兼乗六圖而已嵗實通朞所差不過一嵗積之極差不踰本限七八十年上下不為繁也七十二限行體卦自乗歴年衡圖第十是行通朞也以七十二行六十四以六十四行七十二嵗實之積通行四千八百四十四年餘二百五十四日中分兩際各二千四百二十二年餘一百二十七日是春秋所約嵗也通朞之積毎限各行六十八年九十六日積實四千九百十五年七十二日中分二千四百五十七年二百十六日比之嵗實積數差贏三十五年八十匹日二圖相兼而行之也上圖以六十四行七十二據嵗實為數得四千八百四十四餘二百五十四日則其以七十二行六十四者所得嵗實亦若是矣此圖以七十二行六十四據通朞為數得四千九百十五年七十二日則其以六十四行七十二者所得通朞亦若是矣通朞從著嵗實從爻爻著相從各配日月是通朞從幽王已未前年為始者以幽庚申至桓甲子僅六十五年欲通前際耳其實幽王已未至洪武戊申二千一百五十年以三十四年足之而半周易際即不用三十四年但以三十二乗體卦之嵗實與二十八乗用卦之通朞而至於缺元顛隮之期則一也以三十二乗體卦嵗實為二千一百五十三以二十八乗用卦通朞為二千一百五十總之春秋範圍二千四十八内藏四十二為潛確之端外顯三十五為飛亢之極上泝幽平皆可不問也凡圖值數年更革者皆可屈指乗除不必别為辭費而一事更端爻象屢易何也曰是各自為義也通朞之不可為嵗實體經之不可為用緯觀玩既熟則諸圖亦自可廢也然則用圖嵗歴亦可移桓入幽歟曰凡論易歴自以春秋為本論年次自以定序為候𨼆元之外有幽平桓甲猶定位之外有衡倚圜交參之則理核伍之則數通欲膠一端則異説滋競矣即如是圖周敬王之當蠱正值交中周赧秦政之當頤坎再逢反復漢靈晉魏併在歸兌孚濟小過之中有宋興衰只在咸坎頤剥之際是與諸圖不相逺也曰是聞之狎矣然而陳隋之間不值災卦缺元之厯不入凶象何也曰世亂多而治少七十二卦之中其災者三十而已人道得失天道倦懃蹙極則舒遲久而奮何可齊也然則四卦歸餘之説何也曰嵗實之周三十二則厯年二千一百五十三其餘四限二百六十八年餘四百二十日通朞之周三十二則歴年二千一百八十四半其餘四限二百七十三又二十四日此體用兩限在六十四之内也嵗實之合歸餘二千四百二十二餘一百三十二日通朞之合歸餘二千四百五十七餘二百一十六日以是推於七十二運嵗實之周二十八則歴年二千一百一十九其餘四限三百有三年而與體用兩限㑹於六十四運之内各得二千四百二十二年餘日一百三十二而嵗實之周始中此自幽元究於廓清而贏後限者也通朞之周二十八則歴年二千一百五十其餘四限三百有七年而與體用兩限㑹於六十四運之内各得二千四百五十七年餘日二百一十六而通朞之周始中此自幽元究於靖難而贏後限者也故廓清之後限二百六十九年五十五日合於三百二年二百九十四日者拆之為二百八十六年弱靖難之後限二百七十三合於三百七年七十二日者拆之為二百九十强此古今両積之通㑹四卦歸餘之統緒也合前圖相乗相乗之數極深研幾則百世可知思近半矣七十二卦反對體用定閏圖第十一是即六十四限用卦専乗之圖也與七十二限體用兼乗之數不差毫末各得五千五百二十九以古法章蔀分之凡得二十四紀七十二蔀二百元九十一章外餘乾䇿二百一十六㫁章為凡章法十九嵗得七閏月四章七十六嵗為蔀體用兼乗之嵗萬七百七十六即章蔀也外有餘日二百八十八以七十二乗之為二三十六以通朞積之得嵗五十七㫁為三章凡七十二蔀合得二百八十八章以三章足之為二百九十一章雖外餘乾䇿不盡立元而二十四紀七十二蔀之義整於是矣三章積日於毎八紀之下輒益一章於二十四紀之下益三章葢章法自然非有增損也餘乾䇿三十周得十八嵗明年起元凡四十九萬七千六百一十年而章日益盡合於元始古人所用十九嵗為章者以毎日萬分一月三十日吐出四千三百六十九分以十三乗之得五萬六千七百九十七為五日六分七釐九毫七絲一嵗三百六十日尚餘氣分亦長四千三百六十九以十二乗之得五萬二千四百二十八為五日二分四釐二毫八絲合得十日九分二釐二毫五絲毎十九年得二百七日五分三釐七毫五絲分為七閏㣲嬴酌於易差去九為四千三百六十則盈虚兩際又減去二百二十五毎嵗定餘十日九分以二釐二毫五絲為朔氣升降之候積八嵗得八十七日三分七釐二毫為三閏月微縮嬴縮之端積於秒忽在一日之内者可舉而合也然則是通朞之歴也通朞三百六十内外贏縮通得十日九分二釐二毫五絲今不舉實積則此五日二分四釐二毫八絲者安所從取之曰即於嵗實中取之嵗實體用兼乗之數五千四百五十年所贏嵗餘之數與所乏月虚之數合得三萬一千二百三十八日强其取之通朞與還之嵗實一也然則此外餘日何以消之曰消之置分也如兩積餘分其得二百六十日寘於五千五百三十年之内一嵗所消不過四釐六毫强而盡矣故易之所積皆於秒忽也然則三乗之積通朞加數皆於本限轉積轉强何也曰起於餘日體數之差不及一年多者至五十年五十七年故非復限數所能劑也然則六十四限行用卦専乗之數其盈虚章蔀亦與七十二限體用兼乗者同歟曰是所謂同同者也皆為五千五百二十九嵗則章蔀皆齊但其餘日二百十六於乾䇿減十則其消分愈㣲故又以兩限嵗法章蔀附圖於後曰法萬千三百六十九六釐六毫六絲辰法四月法二十九萬五千六百三十一九絲交退三百六十四八釐九毫十二退四千三百六十九六六積實二十九萬五千六百三十一三三交退四千二百六十九六六十三退五萬六千七百九十七月虚五萬六千七百九十七嵗法三百六十萬交進四千三百六十九六六一分三三三十二進五萬二千四百二十八嵗實五萬二千四百二十八合閏十萬九千二百二十七章泛差二百二十七嵗十九章閏七閏積一百九萬二千二百七十十嵗九嵗閏積九十八萬一千一十七七閏二百六萬九千四百三去泛差四分三釐六毫九絲六忽章為蔀紀蔀嵗五十七法四蔀紀嵗二百二十八四章三蔀通用通紀二十四六蔀法九十章法二百八十八外餘一蔀蔀法九十七九十一章法二百章嵗五千五百二十九毎嵗消三釐九毫五忽則與餘二百一十六日約於泛差同沒矣其餘進退畧見前編七十二卦反對積實歴年圖第十二積實之卦以七十二乗七十二得五千一百八十四以六乗之三萬一千下百有四以嵗法積之為八十五年餘六十日八分一釐以七十二乗之為為六千一百三十二年為五精還元之㑹中分實積之嵗三千六十六年以六約之各五百一十有一凡五精極數三千二十有五合之為六千五十又以一嵗裨益嵗餘之弱分凡六千五十一嵗外除八十一是經緯出符之統歸也毎六運八十五年六十日八分强為五百一十一嵗而聖人間出天地易運雖覇王殊造而萬物更睹先後不違精物之合無復餘分如春秋已未至吕秦已丑明年庚寅入限又明年秦皇崩於沙邱壬辰漢祖起於沛上癸已沛公伐秦以桓王壬戌揆之正除五百一十一年是一興會也又一興㑹為典午癸亥五王亂晉張方掠雒陽劉澗奮於北塞稱元熙元年又一興㑹而衰矣蔡州已平河北自歸而聖人不出亦一治也天地精竭而亂繼之矣又一興會故元癸亥人之操刃泰定承祧兩主互狺真人始命天生聖難也凡四興會僅乃一值既值而又遲久之必以平王辛未東遷為始則一興會而靈武正位又一興會而典午自樹又一興會而靈武正位又一興會而徳祐㗸璧天道之畫一覯如玉尺也折而半之敬王乙酉入于城周魯侯甲申次于齊陽漢哀丁巳匏山石立不出四年白雉頌新魏梁戊子南北梵風鄒魯遺風殱然殄矣宋宗巳未實閘文教天聖之元為諸儒先故君師之隆替治亂之倚伏各有其候聖人不能强也聖人能因而扶之取其顛危示以安全如此而已至如懐愍北狩立於夬卦之中徽欽蒙塵交於歸妹之内天水運終在升卦之末年武韋楊漦包未濟之中造雖有聖賢不察其端未能遽起而謀之也然則時政代謝主柎之間可得而齊歟曰猶春秋之於𨼆桓也約四五年間差池一周然而聖人不貴也自東遷以來運革際莊王丙申次於庚子而釐王代之定簡之間年不可稽丙戌之運敬朝始競考王辛亥次於丙辰而威烈王伐之顯王丙子數稍蟬聫赧王壬寅曽不十年而陽人覊居五鼎淪夷此六紀者其代謝皆在十年五年之内者也自西秦而後一運革際動如柎鼓漢文丁夘雖差六年距吕后辛酉亦在五載之内征和壬辰後元之間而武昭嗣起建平丁已先後四五年而成哀逓䘮以啟紫閏章帝戊子先後七年衷於壬午暨於丁未李杜下獄而延熹延駕奪鍳之沴不出一年晉魏之間運當癸酉吳主朝薨魏芳夕廢影響言報不喻其捷此六紀者其代謝皆在五六年或一二年之内者也典午而後戊戌之先石虎建號咸康餘歴亦有五年劉宋癸亥明年甲子即為元嘉天監元年之距戊子不過七載開皇癸丑之距已酉亦復五年而姓物咸更玉步先改上元戊寅先五年甲戌而天后臨軒後五年癸未而天皇殂落代宗甲辰之先一年李輔國亂於宫闈後一年始改元永泰此六紀者其代謝皆在五年之丙或一二年上下者也大原一姓界於兩㑹宣宗巳巳先天三年盖半運而入於朱梁後唐甲午從厚從珂二主分璧而石晉生心漢周㣲矣祥符巳未天書未災而乾興壬戌山陵已就崇寧甲申之嵗即在建中靖國之餘上距紹聖不能五載下距靖康二十五年而懐愍雒陽復見於汴孝宗巳酉明年庚戌即為紹熙恭宗乙亥明年丙子即稱瀛國是皆㣲乎㣲乎不逮白版之尊冇慙南國之號約其代謝此六紀者亦遲取券於四年近克應於二載繇是而推天運少革主柄代謝入歴之限不為逺也其非入限者勤逸之報憂樂之反或十數年或五七年或四三年姬公有言亦聽于兹監而已然則所謂五精極微三千二千有五何也曰以河圖之數乗河圖五十有五乗五十有五即其數也土徳十五其得河圖者八百二十五周人用之金徳九四七百一十五漢人分用之木徳八三六百有五宋人分用之火徳四百九十五唐人分用之水徳三百八十五晉人分用之其分用之何也曰精氣旁行而卦數不改精氣三千二十五卦氣二千一百五十三故以雒書之數逓損河圖金徳去雒書者六六其四十五二百有七十餘金四百四十五散其閏餘漢人用之木徳去雒書者六六其四十五二百七十餘木三百三十五散其閏餘宋人用之火徳去雒書者五五其四十五二百二十五餘火二百七十散其閏餘唐人用之水徳去雒書者五五其四十五二百二十五餘水一百六十散其閏餘晉人用之故五六之間天地之所藏用也蓍法之交雒書進退五六之間則亦猶是矣閏餘所存或多或乏漢人存五之一唐人存四之一宋人存三之一金水火木相涵為用而土徳包之無所進逻是周人之大也故卦氣之與精氣兩者相為包舉也然則七十二用之卦實歴中分三千六十六年五精縮行退於體卦何以齊之曰體卦實歴二千一百八十四年再行土徳八百二十五年而與全歴相㑹宇宙之間四精所藏皆土而已水土相襲氣存其中故六千一百三十二年之中土徳所存三千三百不為夥也然則體用相涵乗積互起可著圖象者當得幾何曰體用相函可為典要不過體卦數圖而已等而差之三乗之積各有三起四以别之為十二圖如原圖四千九十六以爻凖日得六十七八年上下此一起羲文所研精以六十四乗之通朞嵗實各為二等以七十二乗之通朞嵗實亦各為二等乏者四千三百有六贏者四千九百一十五此四圖也又如體用相經四千六百有八以爻凖日得七十五六年上下此一起興革之之大會以六十四乗之通朞嵗實各為二等以七十二乗之通朞嵗實各亦二等近者四千八百四十四逺者五千五百二十九此四圖也又如用自經用五千一百八十四以爻凖日得八十五六年上下此一起往来藏知雑卦所為反應以六十四乗之通朞嵗實各為二等以七十二乗之通朞嵗實亦各二等近者五千四百四十逺者千二百二十年此四圖也差等不同凡十二圖葢易圖各三乗以體經體以用經用以體用互相經各以六十四七十二運之各有嵗實通朞之别則一起四别四三十二其大槩也凡卦自二千一百二十五以外上推往古下測來兹皆以雜卦反應為義乃知百六陽九之為誕文三統大衍之為剽説也易九戹曰初入元百六陽九次三百七十四陰九次四百八十陽九次七百二十隂七次七百二十陽七次六百隂五次六百陽五次四百八十隂三次四百八十陽三凡四千六百一十七嵗與一元終經嵗四千五百六十災嵗五十七其法盖以十九嵗為章以二百四十三乗之除二百四十章得四千五百六十嵗有五萬六千四百月謂之經嵗其餘三章得五十七嵗有七百單五月以八十一分之九八七十二得七百二十九月除二十四月在災限之外内七百五月謂之災月災月即災嵗也此亦春秋之法而分析乖離春秋以上之書不復可徴則不如是六圖之為整暇也三統序曰易三㣲而成著三著而成象十八變而成卦四營成易為七十二參之得乾之䇿以陽九九之為六百四十八兩之得坤之䇿以隂六六之為四百三十二隂陽各卦之細微䇿也八之為八千六百四十而八卦小成引而伸之又八萬六萬九千一百二十倍之為十三萬八千二百四十為大成五星會終觸𩔖而長之以乗章嵗為二百六十二萬六千五百六十而與日月㑹三㑹為七百八十七萬九千六百八十而與三統㑹三統二千三百六十三萬九千四十而復於太極是非不詳悉明著也然易之為道語蓍則太絀語爻則太盈専以七十二乗九六四三求之則曲折細㣲皆不能合雖章月不爽而積久自差春秋距今二千三百六十餘年已渺望難晰又推於上古數萬之前知逺道之㒺居荒因之莫契也大衍序曰天地中積千有二百揲之以四為爻率三百以十位乗之為二章之積三千以五材乗八𧰼為二㣲之積四十兼章㣲之積則氣朔之分母也以三極乗之倍六位除之凡七百六十是為辰法而齊於代軌以十位乗之倍大衍除之凡三百有四是為刻法齊于徳運半氣朔之母千五百二十得天地出符之數因而三之凡四千五百六十當七精還初之會也是説亦本於太初三統無甚刻至者特以生成之數相乗各六百以十五四十互相起耳其論章蔀曰一䇿之分十九而章法生一揲之分七十六而蔀法生一蔀之日二萬七千七百五十七而氣朔定以通數約之凡二十九日餘四百九十九而日月相及此六爻之紀也以卦當嵗以爻當月以䇿當日凡三十二嵗而小終二百八十八而大終又日䇿以紀日象以紀月故乾坤之䇿三百六十為日度之凖乾坤之用四十九象為月弦之簡日之一度不盈全䇿月之一弦不盈全用故䇿餘萬五千九百四十三則十有二中所盈也用差萬七千一百二十四則十有二朔所虚也綜盈虚之數五嵗再閏中節相距皆當三五弦望相距皆當二七升降之應發斂之候皆紀之以䇿而從日者也其法盖以三千四十為日䇿三百有四為䇿分一嵗氣盈五日二分四釐四毫四絲得一萬五千九百四十三一嵗朔虚五日六分三釐三毫三絲得一萬七千一百二十四合得十日八分七釐七毫七絲為閏餘之實所謂半氣朔之分母因而三之出於此也是於蓍法亦畧有叅究然天地生蓍聖人揲之兩篇之䇿萬一千五百二十以爻當月以䇿當日毎爻三十䇿毎月三十日日月之交恒於九百四十分之四百九十九約當二十九日五分三釐三毫三絲則一月之内當吐出四分六釐六毫六絲三百八十四月當吐出一百七十六日半兩周之吐三百五十三日强凡六十三年而吐二十四月於數有過之而於法則未之有過也大約一嵗三百六十五日四分之一合用一萬七百八十七䇿八釐七毫三絲所吐七百三十三於日法兩年之間盈二䇿有半即閏餘十日九分之中㣲縮所積之數也古法以爻當月故數逺而難稽今法以爻當日故近差而易覺繇是以推三千四十三百有四皆不得為日分月分自當以二十九日五分三釐三毫為凖日分自當以二十九䇿五分三釐三毫為實不得牽七精之虛文紊二曜之實緯也學者詳察爻𧰼静觀蓍法通變成文極數定象則酬酢祐神之義可得而言矣然則易之道遂盡於此乎曰何為其盡於此也六十四象者先王君后變化擬議盖數千年未有涯際也至於精義入神黙存成信洗心退藏象先爻始則雖鬼神未之或知焉耳然則易説圖序之雜何也曰易者錯綜極賾之書不可厭亂舉一知十古人所難循隅反三今人未譬如復守其一端膠於曲説猶見太白不知嵗鎮之高察辰星不悟熒或之變愈以撓其仰瞻增其眩暓矣𥘉卷廿四圖均測日月畧參歴數其七政之之行與三經終始備洞璣中不在是編附歴年積限圖體卦四圖體卦自相乗四千九十六六爻二萬四千五百七十六嵗實六十七年餘一百五日通朞六十八年餘九十六日六十四限嵗實積四千三百六十餘日一百九十七通朞積四千三百六十九年餘日二十四七十二限八百四十四年餘日二百三十嵗實四千通朞四千九百一十五年餘日七十二體用互相乗四千六百有八六爻二萬七千六百四十八四日二分五釐嵗實七十五年餘二百五十通朞七十六年餘二百八十八日六十四限嵗實積四千八百四十四餘日一百三十通朞積四千九百一十五餘日七十二七十二限千四百五十嵗實積五餘日四十四通朞積五千五百二十九餘日二百一十六用卦自相乗五千一百八十四六爻三萬一千一百四八日嵗實八十五年餘五十通朞八十六年餘一百四十四日六十四限嵗實積五千四百四十餘日六十百一十六通朞積五千五百二十九餘日二七十二限千一百三十二餘日九十一嵗實積六通朞積六千一百九十六餘日二百八十八一百八以上三差十二圖不盡在圖説中盖自二千十四年藏知有據其餘可以例起也易𧰼正卷初下
