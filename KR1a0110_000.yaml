body:
  text: 易象正易𩔖提要臣等謹案易𧰼正十六卷明黄道周撰道周字㓜元一字螭若漳浦人天啟壬戌進士崇禎中官至少詹事明亡後為唐王聿鍵官至禮部尚書督師出婺源師潰被執不屈死事迹具明史本傳乾隆乙未賜諡忠烈此書孟應春謂崇禎庚辰道周在西庫始創為之成二十四圖逮過北寺毒痛之下指節初續又為六十四𧰼正劉履丁則云三十年前道周即有易本𧰼八卷疇𧰼八卷盖是書之稿本也道周初作三易洞璣以卦圖推休咎而未及於諸爻之變𧰼是編則於每卦六爻皆郎之卦以觀其變盖即左氏内外傳所列古占法也其自叙曰凡易自春秋左國暨兩漢名儒皆就動爻以論之虞王而下始就本卦正應以觀攻取只論隂陽剛柔不分七八九六雖易有剛柔雜居之文而卦無不動玩占之理𧰼正専就動爻以明之此其述作之大㫖前列目次一卷則以漢人分爻直日之法按文王之卦序以推厯代之治亂後二卷則以河圖洛書之數自相乗除為三十五圖其詩斗差圖詩斗差退限圖詩元命圖春秋元命圖則本漢人緯書四始五際之説而别衍之以為推測之術與所著三易洞璣相為表裏雖其以太傳所釋十一爻俱為明之卦而作未免附㑹朱朝瑛亦曰易𧰼正道周之自為易也孔子之所不盡言言之不盡意者也然引伸觸𩔖要亦易之一隅宋儒沈該之易傳都絜之易變体義皆𤼵明之卦與是書體例相似而是書則每爻之下先列本卦之彖辭次列卦之𧰼辭然後列本爻之𧰼辭及夫子之𧰼辭與沈氏都氏之書又各不同存之以為二家之外傳亦無不可也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書易𧰼正目次明黄道周撰卷初上十二圖有序六十四體卦定序圖第一六十四體卦定位圖第二體卦南北分次圖第三體卦上下衡交圖第四體卦左右倚交圖第五體用左右圜交圖第六日閏追𧰼圖第七月閏追數圖第八七十二用卦定序圖第九七十二用卦衡交圖第十七十二用卦倚交圖第十一七十二用卦圜交圖第十二以上十二圖皆明日月盈虛朔望閏餘交食冬夏贏縮之義以爲易之本始卷初下十二圖有序體卦定序歴年圜圖第一體卦定位歴年圜圖第二體卦反對歴年圜圖第三體卦對積歴年圜圖第四七十二限行體卦定序厯年圖第五七十二限行體卦定位厯年圖第六六十四限行體用兼乘厯年衡圖第七七十二限行體用兼乘厯年衡圖第八六十四限行用卦自乘厯年衡圖第九七十二限行體卦自乘厯年衡圖第十積實定閏圖第十一積實歲厯圖第十二以上十二圖皆以天道徵於人事中分乾坤三十二卦自春秋迄今以爲易之實厯正曰凡易本於日月與天地相似其有不凖於天地本於日月者非易也天地之用託於日月日運南北以爲寒暑月行遲疾以爲朔望氣周相纒或盈或虚各以其節積乆而合纖毫秒忽不可廢也世之談易者但略舉隂陽粗明氣象而已其次乃専談理義以爲性命今以厯律爲端日月爲本六十四爲體七十二爲用天道爲經人事爲緯義理性命以爲要歸其自孔門而下諸儒所談一槩寘之不復道也其大要以推明天地本於自然其大者百世可知其小者千歲日至其煩者更僕難數其簡者一言可盡要以不悖於詩春秋而止天下研精之儒必有能明是説者故先爲二十四圖以引其端是爲初卷而後易之象義序次可馴至也卷一乾坤反復凡四卦乾卦第一乾之乾第二坤卦第三坤之坤第四凡卦皆一體兩𧰼反復異名惟乾坤坎離頥大過中孚小過有對化而無反復其實日有晝夜而時通二六八體反復皆十二爻屯䝉以反復而得二名乾坤以反復而得一體其一體者不必二名其反復者不必對化故以八體卦之對化通於五十六卦之反復皆舉兩端以成大例非因綱紀而有異同也故爲乾乾坤坤首立四卦雖以用九用六得對化之名實以一晝一夜通六辰之義晝夜雖有隂陽反復只成一日約之則曰三十六𧰼通之則曰七十二卦或謂父母六子相與錯綜只得六十四何三十六七十二之有曰反復對化錯綜易皆兼用之錯綜之有重乘反復之有不動與對化之有不對化單舉之則難明博觀之則易著也作乾乾坤坤四卦序第一卷二屯卦第五䝉卦第六需卦第七訟卦第八師卦第九比卦第十小畜第十一履卦第十二乾坤萬物之生始極南而乾極北而坤晝夜積象乾坤兩乘自分左右天地升降帝王盛衰皆於是爲限衡交者兩乾盡而交屯蒙兩坤盡而交需訟倚交者屯䝉自左而右需訟自右而左環交者屯䝉需訟皆自左而右春秋當坤之末端斷坤而起屯金元在乾之前端斷未濟而起乾故屯䝉與乾坤代始者也凡卦以爻當日積日成歳其以六十四卦之爻積日者二萬四千五百七十六凡得歳六十八年餘九十六日其以七十二卦之爻積日者三萬一千一百四凡得歲八十六年餘一百四十四日兩法相追凡四其六十八年九十六日得二百七十三年二十四日爲天地之交㑹凡三其八十六年一百四十四日得二百五十九年七十二日距差贏縮十三年三百十二日爲天地交限之差數兩四爲八兩三爲六從於左右與日月相逐四即二也八即四也作屯䝉需訟師比小畜履四卦序第二卷三泰卦第十三否卦第十四同人第十五大有第十六謙卦第十七豫卦第十八隨卦第十九蠱卦第二十自屯䝉環交至小畜履四卦二百七十三年二十四日而五君一民天地始亂泰否受之君臣更端又四卦凡五百四十六年四十八日而交於隨蠱泰否隨蠱日月之正交也日月正交薄蝕所生隂陽雖均而旤亂見焉治効之見者謙豫而已同人大有之與小畜履君臣龎雜其効一也作否泰同人大有謙豫隨蠱序第三卷四臨卦二十一觀卦二十二噬嗑二十三賁卦二十四剝卦二十五復卦二十六无妄二十七大畜二十八自屯䝉環交至无妄大畜十二卦凡八百十九年七十二日而治運乃究臨觀之與謙豫則猶王者之治也謂有天地之正氣存焉過此而衰矣五行之數五十其治河圖全半共八百二十五約共歳實十二卦得八百七年半強而頥大過正交與乾坤同𧰼作臨觀噬嗑賁剝復无妄大畜序第四卷五頥卦二十九頥之頥三十大過三十一大過之大過三十二坎卦三十三坎之坎三十四離卦三十五離之離三十六凡易上下經各三十六卦去乾坤頥大過坎離六反復卦則爲三十三十卦之行二十四十歳又二百九十八日左右分之凡一千二十歳而交於中限與五百一十一歳之交倍追而合者也天地順數易逆數每值交限各以縮厯逆反而歸初七十二卦中分之嵗凡二千四百二十二年餘一百六十三日半又中分之一千二百一十一年餘八十一日七分而四際分限正交互直故春秋者以十乘易之數去兩而用十八詩用易之餘以為積易用詩之積以為餘故知易有七十二卦去用而存及詩得十四春秋得十八之說者而日月運行天下治亂可得而求矣作頥頥大過大過坎坎離離序第五卷六咸第三十七恒第三十八遯第三十九大壯第四十晉第四十一明夷四十二上經以四分部下經以三分部四三八六積歳相追體卦通數每限六十八年九十六日四卦得二百七十三年二十四日用卦通數毎限八十六年一百四十四日三卦得二百五十九年七十二日凡一追限差十三年三百十二日者爲日月之通數其餘積限各不相同而酌於通閏以加减歳實其揆一也追數最親者惟用卦限四體卦限五相距不逺用卦行四限三百四十年二百三十二日體卦行五限三百三十五年三百十五日凡帝王運序絶續之際動差三四年然逺之愈闊不復可惟十三年上下以五積爲六十八七可追體卦六積爲七十七八可追體用兼乘之卦故以十三年二三百日間爲日月之交限猶朔望半交於十三日半之㑹也晉明夷亦爲㑹限作咸恒遯大壯晉明夷序第六卷七家人四十三暌第四十四蹇第四十五解第四十六損第四十七益第四十八易有衡環二交依序而求之則獨圜圖而已環圖自坤屯至咸恒以前十五卦一千十六年百六十日在漢魏交際又六卦而入夬姤終魏晉六朝在六卦之内凡乾坤分位自坤起屯至損二十二卦實行一千五百四十七年餘二百七十八日四分用卦之全厯因而損益之故損益盛衰之始也作家人暌蹇解損益序第七卷八夬第四十九姤第五十萃第五十一升第五十二困第五十三井第五十四凡卦分隂陽以從南北自屯䝉從坤而北需訟從乾而南凡五十二卦一南一北上下分從不失其序故隂爻多者從隂陽爻多者從陽隂陽之中酌從其𧰼惟夬姤萃升上下分居南北殊路是男女隂陽之變限也以衡倚二圖四際分之各得十三卦八百七十四年餘二百八十三日而入夬限夬閽寺也姤婦人也萃盗賦也升權臣也四者天地之常孽而卦運間值或數百年以每卦七年分之則九十一年而入十四卦隂陽之變又虞其已遫也姤夬升萃四者錯居其入變限者不分上下初末婦寺賊臣相倚爲命至困井而凋耗極矣春秋已來故牒可稽上自東漢大閹下自李唐女寵或流沴於六十年之後或著兆於六十年之前雖未入正交體姓如故而隂陽之旤發於災戎毒痛極矣作夬姤萃升困井序第八卷九革五十五鼎五十六震五十七艮五十八漸五十九歸妹六十凡易體卦環圖不分四際自乾坤而交而外六十四卦從乾右旋二十一限至損益凡一千四百一十三年而入夬姤在隂陽變位之候又二百二年又入鼎革又二百二年而入漸歸妹則交卦盡矣漸歸妹兩濟之先應者也下經三卦雖以八十六年餘百四十四之法相追至於卦𧰼積實一依體卦不可改也用卦環圖從屯立春從䝉立秋起於西北與日右旋而春秋追易逆數之法皆起於東北未濟之端左循下行六卦而歸妹九卦而鼎十二卦而姤周秦漢之間槩可識矣中分二千四百二十二年半否履之間彛夏元黄兩乾之端氷霜始戰學者所致思也故易以體卦爲厯用卦爲候八十五嵗相追之法以識交限作革鼎震艮漸歸妹序第九卷十豐第六十一旅第六十二㢲第六十三兌第六十四渙第六十五節第六十六是在下部弱卦也其交於春秋在戰國之間其交於金遼在皇統之際雖不當正變交㑹而強主不立興朝不泰二百二年之間帝王之風教僅存焉耳自乾屯至渙節二千一百八十四年與體卦中分相值而天道且變作豐旅㢲兌渙節序第十卷十一中孚第六十七中孚之中孚第六十八小過第六十九小過之小過第七十既濟第七十一未濟第七十二上經體卦反復有乾坤頥大過坎離六卦反復十二下經惟中孚小過反復四卦而已上經交卦有泰否隨蟲下經交卦有漸歸兩濟反復對化共得十六而乾坤兩濟離爲始亂合爲頂踵與中孚小過首尾連貫不得爲上經體六下經體二也易以用卦凾體卦不自分行其以用卦分行三四相追者每卦之差十七年三百十七日追差之限相距或三年四年上下爲隂陽代謝之端故每限入交屈伸之數皆差池三四年不可齊舉也或疑反復交卦各有異𧰼可以遞加反復體卦只有一𧰼不可遞加者不知一𧰼反復各起東西相距三十六卦猶南極北極之明有兩極子前午後之合得六辰何詎怪乎故語體用相凾之歳則四千八百四十四年餘三百二十七日爲度以歳法爲實語用卦相乘之數則六千一百六十年餘二百八十八日以日法爲通語體卦相乘之數則四千三百六十九年餘二十四日與通法差凖也明乎體用相凾通實互推贏乏相追之故則易可得而言矣作中孚小過兩濟序第十一卷十二用入乾坤乾坤至坎離用𧰼三十二咸恒至兩濟用𧰼三十二凡易以乾坤九六爲例乾用九而交於坤坤用六而交於乾凡六十四卦之用九者皆交於坤其用六者皆交於乾故六十二卦之皆乾坤也易有交動遂生變化非謂九能變八六能變七也六十二卦皆歸乾坤故十八變中小𧰼得乾坤者是爲交動父母動而六子不動如六子交動則皆爲父母矣易以乾坤兩用該六十二卦之用不復爲各用繫於各卦之終所以明一卦之通得六十四卦而乾坤兩用實爲綱紀繫辭曰乾坤毁則无以見易故復爲用次序第十二卷十三對化次序乾坤至坎離對化序三十六咸恒至兩濟對化序三十六對化之與反復互相爲用乾坤舉對化以用爲體屯䝉舉反復以體爲用推而行之兩序互舉屯鼎䝉革各以其𩔖相應為序天地主客八體八交言尋其家或逺或近或取或不取皆求其故而易之微義淵乎至矣故復為對化序第十三卷十四八體八交八體卦入交序六十四八交卦入體序六十四是書所異於諸經者八體八交以為人義十六𧰼互入各得百二十八今特舉其半而其全可𩔖舉也世道盛衰或倚或伏徵應之説三才共治不盡繇卦𧰼而卦𧰼其先著者春秋以後二千三百六十年天道未究其已究者則二千四十八年至元之前舉可知矣藏往知來聖人不欺後此一卦限而天地左契可執相覆也自隱公元年以前六十餘載界於宣幽自元末丁未以後十六載為明甲子裁酌其間為坤中交之候而體交相入舉可知也作八體八交相入序第十四今刪去十二十四二卷卷終上先天圜圖第一圜圖再成第二圜圖三成第三十八變倍數圖第四十四限納虚圖第五四十九限消甲圖第六以參用六圖第七以兩用九圖第八四𧰼限進卦圖第九歳實限吞卦圖第十九疇十二變成數圖第十一中天卦次圖第十二後天卦次圖第十三雜卦次序圖第十四雜卦厯年圖第十五雜卦定序厯年圖第十六雜卦定位厯年圖第十七先天歳實厯年圖第十八先天通朞厯年圖第十九疇𧰼合圖第二十以上皆明三天卦𧰼及雜卦先天歳厯歸於洪範葢大禹箕子之學易之源始也卷終下大𧰼本河圖第一詩斗差圖第二詩斗差退限圖第三春秋元差圖第四春秋積元退限圖第五圖書通限第六月策通蓍厯年圖第七歳策通蓍厯年圖第八蓍法進退盈虛圖第九天方圖第十詩元命圖第十一春秋元命圖第十二七十二限春秋體卦圖第十三七十二限詩用卦圖第十四六十四事圖第十五以上皆明圖書爻𧰼與詩春秋通例歸於六十四事葢周公孔子之學易之要終也以上初卷上下發明圖𧰼十二卷發明彖爻終卷上下發明圖書凡十六卷又凡例一卷凡易之必有圖𧰼數度猶人身之必有腑臟肢體因形測􅍺因􅍺測理不知形色而談天猶未有人身而言至命也十翼主於明理立中為極以隂陽剛柔辨其位序使人體中蹈和究於无過恐占卜推步流為讖緯无復入聖之方然自洪範而後有詩春秋精理奥義與易同體非復世儒夢寐之所嘗到乃知性命文章微顯合化真有可聞不可聞之異學者尚辭流於淺易占者尚𧰼墜於旁谿必舉四尚以歸一誠并舉三經以綜十翼則是編所正粗有發明猶左𫝊之於春秋儀禮之於禮記别自為義不離本經至於解釋之文夐殊訓詁恐觀者難入復舉諸例以發其凡焉易𧰼正目次欽定四庫全書易象正凡例春秋說象凡例十八條凡易自春秋左國暨兩漢名儒皆就動爻以論之卦至虞王而下始就本卦正應以觀攻取只論隂陽剛柔不分七八九六雖易有剛柔雜居之文而卦无不動玩占之理象正專就動爻以明之卦雖一爻動者不過六卦而六爻雜動皆可錯綜今復舉左國玩占之事一十八條皆論之卦以存舊志觀之否莊公二十二年陳公子完奔齊齊人妻之使為工正方完之少也周史有以周易見陳侯者使筮之遇觀之否曰是謂觀國之光利用賔於王此其代陳有國乎不在此其在異國非其身在其子孫光逺而自它有耀者也坤土也㢲風也乾天也風為天於土上山也有山之材而照之以天光庭實旅百奉以玉帛天地之美具矣然猶有觀焉故曰其在後乎風行而著於土故在異國若異國必姜姓也姜太嶽之後也山嶽配天物莫能兩大陳衰此其昌乎此論觀之否以謂極而且泰者也以其動爻勝其之彖以其大徃而占它國屯之比閔公元年晉賜畢萬魏以爲大夫初畢萬筮仕於晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉震爲土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子必復其始此論兩彖而兼取象者也盤桓建國且親諸侯大有之乾成季之將生也桓公使楚丘父卜之曰男也其名爲友在公之右間于兩社為公室輔又筮之遇大有之乾曰同復于父敬如公所此論兩彖特異其繇者也曰父曰公以離歸天歸妹之睽晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦无􅎺也女承筐亦无貺也西隣責言不可償也歸妹之睽猶无相也此論之彖以本象稍變其辭者也曰震曰離以同而異大事不吉故為贏敗姬凡易之占卜多繇也而取易者近是大有之睽僖公二十五年天王出居于汜狐偃言于晉侯曰求諸侯莫如勤王使卜偃卜之遇黄帝戰于阪泉之兆公謝不堪乃筮之遇大有之睽曰公用享于天子戰克而王享吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎此論之象以勤王為小事受享為大吉也豐之離宣公六年鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐之離弗過之矣此非卜筮也謂古之占者皆曰之卦而已畜牝牛則亦可以靜矣師之臨宣公十二年楚克鄭許之平晉荀林父救鄭先縠佐之及河間平荀桓子欲還先縠不可智莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如已也故曰律否臧則律竭也盈而以竭天且不整所以凶也不行之謂臨有帥而不從臨孰甚焉果遇必敗彘子尸之雖免而歸必有大咎此亦非卜筮也而詳於之彖艮之隨襄公九年穆姜入于東宮筮之遇艮之八史曰是謂艮之隨隨其出也穆姜述隨之彖及乾之文言而諱其本象諱之者何惡其辭之著也然而猶述隨之彖辭則是論之彖古之通法也然則曰艮之八何也曰是二八也五爻皆動而二獨不動其辭曰艮其腓不拯其隨則是不動之隨也易有五爻皆動而占其不動者若艮之二八是也不曰二八而曰之八史誤也或曰周易占九六歸藏占七八是非歸藏也而占其八故穆姜之説近古也然而皆繆也是謂艮之坤困之大過襄公二十五年崔武子將娶東郭偃之妹筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困於石據于蒺藜入于其宫不見其妻凶困于石徃不濟也據于蒺藜所恃傷也入于其宫不見其妻凶无所歸也此其較著者也然而君子值之不懼无悶故繫辭所稱疑非聖人之意也夫猶有利徃之義存焉以謂不徃則已耳復之頤襄公二十八年鄭伯使游吉如楚及漢楚人怒而還之歸告子展曰楚子將死矣不修其德政而貪昧于諸侯周易有之在復之頤曰迷復凶欲復其願而棄其本復歸无所是謂迷復能无凶乎楚不十年未能恤諸侯也吾乃休吾民矣休吾民意謂自養者也是舉本象以及之彖也明夷之謙叔孫穆子之生也莊叔筮之遇明夷之謙以示楚丘父曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王以下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日謙當鳥故曰于飛明而未融故曰垂翼日動故曰于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒純離為牛世亂讒勝勝將適離故名為牛是多附㑹之辭大抵明夷為傷謙為有終傷而有終與有終而傷互取之也是亦古之占法也屯之比衛襄公夫人姜无子嬖人婤姶生孟縶而跛旣又生元孔成子筮之遇屯之比以示史朝朝曰元亨又何疑焉其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之故孔成子立靈公是與畢萬同占也皆論本象不寧後失則未之及也取其元永貞者而已坤之比昭公十二年季平子立不禮南蒯南蒯之將叛也枚筮之遇坤之比曰黄裳元吉以示子服惠伯惠伯曰吾嘗學此矣忠信之事則可不然必敗黄中之色也裳下之飾也元善之長也中不中不得其色下不共不得其飾事不善不得其極供養三德非此不堪此論之卦得於原筮也乾之坤昭公二十九年秋龍見於絳郊魏獻子問於蔡墨曰吾聞蟲莫智於龍以其不生得也信乎蔡墨曰人實不知非龍實知古有豢龍氏御龍氏水官棄矣故龍不生得周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍无首吉坤之剝曰龍戰于野若不朝夕見誰能物之此舉之卦而通諸彖者也泰之需哀公九年宋伐鄭晉趙鞅卜救鄭未决陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啟帝乙之元子也宋鄭甥舅也若帝乙歸妹而有吉祿我何吉焉乃止此論本象而通之彖者也之彖何也曰緩也曰待也不進也故以和語解之也乾之否簡王十二年晉孫談之子周事單襄公襄公有疾謂其子頃公曰必善晉周將得晉國昔成公之歸也晉人筮之遇乾之否曰配而不終君三出焉一既往矣晉仍无道而又鮮胄後之不知其次必此此猶之公子完之占也否皆毁近而成逺者也屯豫之坤秦伯召公子重耳於楚楚子厚幣送之於秦公子親筮之得貞屯悔豫皆八是兩筮也先筮為貞後筮為悔兩筮之陽爻皆動隂爻皆不動不動者多陽變而從八八卽坤也古人名坤曰八猶今之言坤八也筮史占之皆云不吉閉而不通爻无為也司空李子曰吉是在周易皆利建侯不有晉國以輔王室安能建侯利建侯得國之務也吉孰大焉又曰震龍也雷也車也坎勞也水也衆也主雷與車而尚水與衆車震武也衆順文也文武具厚之至也又曰主震長也故曰元衆順嘉也故曰亨内有震車故利貞車上水下必霸小事不濟壅也故曰勿用有攸往衆順而威故曰利建侯司空季子之言未及於坤也然而衆順而威先迷後得則皆坤也筮史占之以為爻閉无為則猶之坤也穆姜以艮之坤為艮之隨則猶諱其牝馬不徒以謂不快云耳泰之坤秦伯納公子及河董因迎于河公問焉曰吾其濟乎對曰嵗在大梁將集天行實沈之墟晉人所居今君當之无不濟矣臣嘗筮之得泰之八是謂天地配亨小往大來今及矣何不濟之有是即所謂泰之坤也易喜陽動陽動而從八言八而不言七東北不利而西南之利也夬之革附見自春秋諸史及漢儒而後略明象數者有河東關朗子明魏同州刺史王彦問子明以治亂損益之數子明布蓍得夬之革歎曰從今甲申二十四年戊申旤始宮掖蕃臣柄政參伐之墟有真人出焉二雄舉而中原分彦曰請究其説朗曰乾坤之策不過三百八十四終則有始天之道也自魏黄初以降天下无主黄初元年庚子至今二百八十四載更八十二年丙午三百六十六矣當有逹者生焉更十八年而王者始合子明之論未為闊也然隂陽之位南北分屬至於夬姤萃升上下交變隋唐之間夬革始交可不煩布蓍知其隆替子明特假蓍為説適與爻象相合此亦論之卦頉通大義不復舉其辭者也以上一十九條皆舉之卦或玩其辭或占其象或因其數雖未明兩彖合闡以釋本爻之説而皆未嘗徑遺之卦單證六爻也世儒但見繫辭不言之卦直舉象義遂以為聖人不談變象但即辭明意而已不知聖人擬議變化存乎德行修辭立誠歸於易簡繫辭皆説之卦而不著之卦之蹟理象渾涵非儒者所窺今舉文言而外繫辭一十九條皆指所之以闡微義因而求之四千九十六卦二萬四千五百七十六爻皆可義起也繫辭說象凡例十九條中孚之益易曰鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎此言中孚之益者也益以見善則遷有過則改言行者君子之風雷也風雷之動小者百里大者千里君子言行動於天地垂於百世可不慎乎同人之離同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭此言夫同人之離者也同則物不能離之矣離之而同其道益光同之而離不失其時苟明在其中天下信之出處語黙雖有不同百世而下猶可以相諒也大過之夬藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣此言夫大過之夬者也夬而慎之蓋猶有孚號告邑之心焉夫是為書契之始也乎以糾以繩何言之微也謙之坤勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也是謙之坤也先迷後得非以為利也乾之夬亢龍有悔子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也是乾之夬也祿則不施德則居於已行有夬夬之事動有夬夬之言是君子之所畏也節之坎不出戸庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失君幾事不密則害成是以君子慎密而不出也坎曰惟心孚行有尚以心為行以節言語謹出入又何不密之有解之恒子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也以小人而乘君子之器則盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫甚哉聖人之嚴也以為解之不可恒也恒雷恒風則萬物毁敗故赦過宥罪君子所不樂數試也以為解而可恒試則貪暴者多上慢其下下翫其上盜心乃生故作易者知盜是聖人之致也大有之大壯易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利此言大有之大壯也大有元亨大壯利貞元亨順也利貞信也合之為乾性情旣正貴德而尚賢故有順信之功无用壯之失是以自天祐之吉无不利言大有大壯之合於乾者也象曰非禮弗履履信思順非賢者而能之乎又曰神農氏歾黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則乆是以自天祐之吉无不利此言大有大壯之可通於變者也咸之蹇易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也此言咸之蹇者也凡人多難則多思蹇之屈信通於龍蠖往來憧憧皆為明從故其卦爻五言往來舉反連碩歸於反身修德而已聖人不舉蹇卦而但悉言往來之義使人感歸於无感思歸於无思反身體虛以受天下是仲尼周公所為窮神知化崇德致用之㫖也困之大過易曰困於石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危旣辱且危死期且至妻其可得見耶此言困之大過者也當困雖而困當失據而失據聖人亦不之非也各非其所則不懼无悶聖人亦哀之矣是困而大過者也解之未濟公用射隼於高墉之上𫉬之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有𫉬語成器而動者也弓矢動靜明晦之義也以射隼者解狐則可謂慎於辨物者矣利與不利疑信之間而已噬嗑之晉子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此言噬嗑之晉者也刑者徳之末也德明則刑息小人用其畏君子用其明明之與畏皆本也君子有不用法而得用法之意者晝日三接是也晝日三接則亦莫蔽之矣噬嗑之震子曰善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶此言噬嗑之震者也晉則用其明震則用其威舎明而用威君子之不𫉬已也然而君子又以恐懼修省則君子之所自治也否之晉子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑此言否而晉者也晉昭明德以休其否危亡旤亂之形不蔽於上豐亨豫大之言不蔽於下則可謂大人之智矣鼎之蠱子曰德薄而位尊智小而謀大力少而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也言鼎之蠱者也人求舊器不求舊君子之所慎也夫亦德知力三足而已矣缺一不可豫之解子曰知幾其神乎君子上交不謟下交不瀆其知幾乎日幾者動之微吉凶之先見者也君子見幾而作不俟終易曰介于石不終日貞吉介如石焉寧用終日斷可識矣此言豫之解者也豫之貴蚤解之貴夙也聖人所貴先覺也不然則已緩故又曰君子知微知彰知柔知剛萬夫之望夫亦於上下之交不謟不瀆則可謂夙知夙成者矣復之坤子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉此言夫復之坤者也萬物之所還元也知微知彰知柔知剛則顔氏子亦有焉損之大畜天地絪緼萬物化醇男女媾精萬物化生易曰三人行則損一人一人行則得其友言致一也此言夫損之大畜者也三隂則損兩隂則畜致一以畜兩是萬物所從出也益之屯子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶此言夫益之屯者也益者損己以益人屯者求人以益身故益有不可聚屯有不可益君子見善而遷聞過而改然亦不以危懼而輕與民危懼而輕與民則險難雜生傷之者至矣故君子所終始慎其言行也以上十九條皆舉繫辭推合之卦或指卦德或兼彖義以明精義黙成之指世儒但見聖人言意真質不滯所之遂迸棄典要以左氏為穿鑿不知聖人觀象立辭因動觀象不動則象无可占不占則辭无繇立今合兩彖以論一爻雖有雜占不離兩象復舉乾坤十二爻而外彖象明白最可據者一十九條皆指所之以發其蒙焉本卦說象明義凡例十九條屯之節屯元亨利貞勿用有攸往利建侯節亨苦節不可貞其辭曰屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字此即勿用攸往利建侯苦節不可貞之意也屯邅守正待時而動動而中節經綸乃見一是數度德行之所從出也此條彖象明白第訟之困訟有孚窒惕中吉終凶利見大人不利渉大川困亨貞大人吉无咎有言不信其辭曰或錫之鞶帶終朝三褫之錫鞶帶者見大人之象終朝三褫者有言不信之象也君子當訟不訟内反諸己信則行之疑則違之是大人之義也此條彖象明白第二師之臨師貞丈人吉无咎臨元亨利貞至于八月有凶其辭曰師出以律否臧凶師出以律者丈人之義否臧凶者八月有凶之義也舉日則極於七舉月則極於八七者陽之始八者隂之終也律治七而去八故七八之㑹否臧分界陽節盡而隂節進丈人之所慎也此條彖象明白第三小畜之大畜小畜亨密雲不雨自我西郊大畜利貞不家食吉利渉大川其辭曰有孚攣如富以其隣有孚攣如密雲不雨之義富以其隣不家食之義也小畜而之大畜自西郊而渉大川文王之所用也周公以文考之雙辭發仰思之獨智福者以為福孝者以為孝皆於兩畜取義焉此條彖象明白第四泰之明夷泰小往大來吉亨明夷利艱貞其辭曰包荒用馮河不遐遺朋亡得尚于中行此四誡者皆艱貞之義也易之具此四誡者寡矣處泰而有明夷之心猶否而有苞桑之繫也此條彖象明白第五同人之革同人于野亨利渉大川利君子貞革已日乃孚元亨利貞悔亡其辭曰同人于郊无悔自野而郊已日之義悔亡无悔之義也同人而去故雖未得志善用柔者矣以柔去剛何悔之有是猶未至於革命也文王之事也此條彖象明白第六隨之屯隨元亨利貞无咎屯元亨利貞勿用有攸往利建侯其辭曰隨有𫉬貞凶有孚在道以明何咎交而難生不謂貞凶乎再備四德不謂之明道乎勿用利建侯何咎之有隨之再備四德者三焉六三之革係於丈夫上六无妄係於西山屯未有所係也係於道不係於功則猶之无係也偕時焉耳偕時而行喪其所𫉬不謂失保其所𫉬不謂得晦息以待明是經綸之始也此條彖象明白第七賁之艮賁亨不利有攸往艮其背不𫉬其身行其庭不見其人无咎其辭曰賁其趾舍車而徒不𫉬其身不見其人非舍車而何乎賁走也艮止也賁小利往文明以止則猶之不往也小象得賁而不利往者多矣益之以艮則是弗乗也君子之進以禮而止以義斷若折獄若賁之艮是也此條彖象明白第八遯之姤遯亨小利貞姤女壯勿用取女其辭曰執之用黄牛之革莫之勝説甚矣君子之毅也女壯勿用必遯遯而執之執若黄牛之革是不已固乎曰是君子之貞也當遯之時雖强以利禄唱予要女而有不取也夫其所執甚平而立意甚嚴曰吾逺之若鬼神焉耳此條彖象明白第九大壯之歸妹大壯利貞歸妹征凶无攸利其辭曰小人用壯君子用罔貞厲羝羊觸藩羸其角小人之壯與君子之罔而皆不知敝者乎物數之有終敝一也而君子不失其正貞而有厲亦貞而已易之取義十九取象十一大壯之體羊也歸妹之用羊也彊陽必敗君子去其彊陽者而已壯罔之无攸利已知之矣君子又何占焉此條彖象明白第十家人之漸家人利女貞漸女歸吉利貞其辭曰閑有家悔亡是則質言之而已女貞而歸歸而利貞非閑家悔亡而何乎故不可貞者幹母之義非取女之義不利君子者斂德辟難之義非居德善俗之義也此條彖象明白第十一蹇之井蹇利西南不利東北利見大人貞吉井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶其辭曰王臣蹇蹇匪躬之故是兩卦者皆德也君子修德不及於命上君下民而非以為身也遇險而不止利人而毁已君子將為瓶乎亦為井而已瓶可羸也井不可羸也時位可羸德不可羸君子之視德與躬將爲二物乎為二事乎舍躬而事王不計得䘮天下改命是大人者猶无改於其德故相得其効而民得其養是蹇之井之義也此條彖象明白第十二損之中孚損有孚元吉无咎可貞利有攸往曷之用二簋可用享中孚豚魚吉利渉大川利貞其辭曰或益之十朋之龜弗克違元吉豚魚之與元龜同信也益之中孚以豚魚益其元龜夫有以益之乎无以益之乎益則用永貞損則不用永貞上帝之祐損有甚於祐益者乎神明之於豚魚豚魚之於元龜各本其无所益者而益之二簋之於十朋同致也此條彖象明白第十三萃之否萃亨王假有廟利見大人亨利貞用大牲吉利有攸往否之匪人不利君子貞大往小來其辭曰齎咨涕洟无咎是宜見大人也而見匪人世道將微狐烏成羣齎咨涕洟其心孔悲夫固有諒其精誠者矣利往不往又何咎之有夫當艱虞之時而君子辟難可乎曰免咎而已何不可之有此條彖象明白第十四革之同人革已日乃孚元亨利貞悔亡同人于野亨利渉大川利君子貞其辭曰君子豹變小人革靣征凶居貞吉利渉矣而曰征凶何也曰利君子貞則猶有未渉者也是其君子小人雜也雜而同同而革則猶有異義也故不如擇正而居之是𩔖族辨物之義也不如折獄致刑之著矣此條彖象明白第十五豐之明夷豐亨王假之勿憂宜日中明夷利艱貞其辭曰豐其蔀日中見斗遇其夷主吉夷主言常主也然而遇之則亦明主也明主難遇而常主難避遇之於所不避與避之於所不遇則固有暗而不傷者矣日中見斗何憂乎夫易之為辭則固有偶襲者若益之上六非為恒也而曰恒心小過之六五非為小畜也而曰密雲固偶有襲之而夷主之與配主則必有取之也无它取之日月也日月者德刑之主也此條彖象明白第十六巽之蠱㢲小亨利有攸往利見大人蠱元亨利渉大川先甲三日後甲三日其辭曰貞吉悔亡无不利无初有終先庚三日後庚三日蠱之用六甲巽之蠱用六庚是非偶襲也金木之府仁義之用則於是取焉申命振育非是庚甲曷取乎聖人之治辭若治星辰也其有明著而互出則其次舍在焉耳天下之言爻畫正應相𩔖者此其選矣此條彖象明白第十七中孚之節中孚豚魚吉利渉大川利貞節亨苦節不可貞其辭曰翰音登于天貞凶貞矣而又不可貞豚魚之在淵可貞者也翰音之在天不可貞者也獄多疑也而執之情多緩也而急之以為誠信而旤著於天下故翰音之信不如豚魚之信也文不如質聲不如實苦緩不如苦急是其節也此條彖象明白第十八旣濟之明夷旣濟亨小利貞初吉終亂明夷利艱貞其辭曰東隣之殺牛不如西隣之禴祭實受其福是正謂明夷者也明夷者文王之事也東隣終亂而西隣初吉周公之師文王特取兩彖之辭彼此相加近而六十四中而四千九十六賾而二十六萬二千一百四十四理義晳然必不敢悖文王之説以自為説至於辭有顯晦義難遽合亦當涵泳繹思必不可謂彖自彖爻自爻彖自為體爻自為用一彖之體不通於各爻之辭兩彖之辭不通於衆爻之象也此條彖象與諸條相較尤爲明白第十九以上一十九條皆舉彖象通義最易曉者略引其端雖三百八十四爻其以兩彖㑹通闡幽顯微其義一也世儒驟讀爻辭時與大彖不能遽合輒疑其説以為爻彖分行文周異㫖故復舉爻彖正變或吉而之凶或凶而之吉㣲有異同尚煩擬議者其繇吉而凶二十四條繇凶而吉一十二條凡三十六條略開其意以釋衆滯焉小象疑誤殊多以非周文原㫖不復正也本卦說象疑義凡例三十六條屯之益屯元亨利貞勿用有攸往利建侯益利有攸往利涉大川其辭曰乘馬班如泣血漣如彖有三利而爻稱泣血何也曰彖者材也材者德也之者時也序者位也德有不勝時時有不勝位屯之時不可以益而益之上之位不可以用而用之與之乗馬䇿以必往而猶有埤益之心焉猶雲雷而加之風也雖不泣血得乎是亦經綸之窮矣窮而不凶固有之也是條彖象亦旡疑滯第一師之升師貞丈人吉无咎升元亨用見大人勿恤南征吉其辭曰師或輿尸凶南征吉而或輿尸凶何也曰當其時矣而不當其位故或之或者有凶凶不在於丈人也而丈人分其恤則謂之凶也是條彖象亦无疑滯第二比之觀比吉原筮元永貞无咎不寧方來後夫凶觀盥而不薦有孚顒若其辭曰比之无首凶有孚顒若而曰无首何也曰是後夫也而又不薦殉名而䘮實飾貌而无中以不寧之時而鬼神其道猶之匪人之比也是才德不備時位皆去者也是條彖象亦无疑滯第三泰之大畜泰小往大來吉亨大畜利貞不家食吉利渉大川其辭曰城復于隍勿用師自邑告命貞吝何也曰泰極則惡大是未至於凶也然吝矣以才德自命安而忘危存而忘亡治而忘亂雖有學識猶之多藏也故復隍之義不如苞桑是條彖象亦无疑滯第四觀之渙觀盥而不薦有孚顒若渙亨王假有廟利渉大川利貞其辭曰闚觀利女貞何也曰不薦而假廟是非丈夫也君子之觀於有廟猶觀於象魏也其假廟猶假於鬱鬯也而女貞是取以女貞之靜守渉川之智吉凶未變也尚可以薦何醜之有乎是條彖象亦无疑滯第五噬嗑之晉噬嗑亨利用獄晉康侯用錫馬蕃庻晝日三接其辭曰屨校滅趾无咎蕃錫之義非謂屨校也而屨校之何也曰明飭者取於自昭則亦可以懲惡矣无咎之辭又何怪焉司寇蘇公固以是受賞也是條彖象亦无疑滯第六噬嗑之震噬嗑亨利用獄震亨震來虩虩笑言啞啞震驚百里不䘮匕鬯其辭曰何校滅耳凶匕鬯不失而曰何枝滅耳何也曰是二者繫辭嘗誦之矣君子之為刑法將以自治也昭德之不足而至於恐懼修省則後矣後而猶可以不失已失而後聞之則无及也故爻繫之辭俱嚴也必如文王之意則謂烈日震雷非以殺物也昭誠而已是條彖象亦无疑滯第七剝之晉剝不利有攸往晉康侯用錫馬蕃庶晝日三接其辭曰剝牀以膚凶何也下不厚生而上有腆仕明德不昭而寵賂下流剝者日䘮錫者日放所以敗也是條彖象亦无疑滯第八復之頤復亨出入无疾朋來无咎反復其道七日來復利有攸往頤貞吉觀頤自求口實其辭曰迷復凶有災𤯝用行師終有大敗以其國君凶至于十年不克征自易之言凶未有如此者也自求口實亦取吝而已七日不復其災十年奚取之乎曰復不終日者也七日不復雖十年亦不復之矣觀頤之信不近於義食言不肥是君子之所恥也小事猶𤯝用師則災師者讒口之門也是條彖象亦无疑滯第九習坎之渙習坎有孚維心亨行有尚渙亨王假有廟利涉大川利貞其辭曰係用徽纆寘于叢棘三嵗不得凶王假利涉而又有叢棘之凶何也曰坎險也渙散也德險而才散不及其時不得其位以宗廟之器投艱危之域猶以爼豆為矛㦸也故彖有散辭卦无散位時位者君子之所貴也是條彖象亦无疑滯第十頤之益頤貞吉觀頤自求口實益利有攸往利涉大川其辭曰拂經居貞吉不可涉大川既曰利渉又曰不可渉何也頤主而益客也頤不可益而益之是以旤益也猶屯之益是也屯无位而頤有位有位而動以貪自食冐險而求益天下之不可益者口實而已故貞者主也不貞者客也渉大川者客也不渉大川者主也主居而客行者也主不從客是條彖象亦无疑滯笫十一恒之解恒亨无咎利貞利有攸往解利西南无所往有攸往夙吉其辭曰不恒其德或承之羞貞吝旣曰夙吉又曰貞吝何也曰是不恒也旣利貞矣而又曰利往既曰无所往矣又曰有攸往則是不恒也不恒而解解而緩緩而无位事之所以敗也是條彖象亦无疑滯笫十二恒之升恒亨无咎利貞利有攸往升元亨用見大人勿恤南征吉其辭曰田无禽何也南征之行非為禽也升之大人則尚其德田之有禽尚其功貴德而尚功名位動於中憂恤從之矣无禽之田則猶未變恒也不入於凶不罹於咎何恤之有是條彖象亦无疑滯第十三恒之大壯恒亨无咎利貞利有攸往大壯利貞其辭曰浚恒貞凶无攸利既利攸往矣又兩利貞而曰貞凶无攸利何也此言夫過恒者也木門之信是也恒以爲德大壯以為才鬼神忌之何利之有故吉凶之相反未有如恒者也不貞之恒不可為也過貞之恒不可為也將進而求其恒性不求其恒情則亦猶之平人而已是條彖象亦无疑滯第十四恒之鼎恒亨无咎利貞利有攸往鼎元吉亨其辭曰振恒凶既曰无咎利往元亨而又曰振恒凶何也恒靜者也鼎動者也恒從舊也鼎從新也恒之有大壯有解有升有鼎皆動也動而棄其故雖有美材猶之无材也然二動而得小過五動而得大過猶且不至於凶者何也曰恒雖得過猶且過于恒也恒人之過也不失其位以恒人之位當君子之材彼有其福而此有其旤故才之不及位者十有八九矣是條彖象亦无疑滯第十五解之恒解利西南无所往其來復吉有攸往夙吉恒亨无咎利貞利有攸往其辭曰負且乘致寇至貞吝何也曰是亦猶恒之解也解緩也恒乆也緩而乆以為天下无患且負且乗苟恣其慾寢處而已於是盜賊起而攘之自以為无過也而為寇攘所斥笑則是貞吝之謂也是條彖象亦无疑滯第十六益之屯益利有攸往利渉大川屯元亨利貞勿用有攸往利建侯其辭曰莫益之或擊之立心勿恒凶是三利也而曰勿恒凶何也利渉利往利建則可以益之矣又曰勿往則是莫益之也莫益之則必或擊之謂其多利心焉身不安心不易交不定而常有利趨則怨惡交至矣其所繇敗非獨位也是條彖象亦无疑滯第十七姤之㢲姤女壯勿用取女㢲小亨利有攸往利見大人其辭曰包无魚起凶利往利見而曰无魚起凶何也女壯之女非以利見也魚不在包隂而治陽无魚之包虚而少鮮則猶之虚辭相誣也乆而衆棄之矣是命令之以隂市者也見其小不見其大㢲於耳不㢲於心是條彖象亦无疑滯第十八井之需井改邑不改井无䘮无得往來井井汔至亦未繘井羸其瓶凶需有孚光亨貞吉利渉大川其辭曰井泥不食舊井无禽井泥无光也舊井无渉也而見於需何也是井為主者也井進而民食之不進而民不食井而仰於雲雨則猶之棄井也是條彖象亦无疑滯第十九豐之旅豐亨王假之勿憂宜日中離利貞亨畜牝牛吉其辭曰豐其屋蔀其家闚其戸閴其无人三嵗不覿凶日中矣而又離明乃曰豐屋蔀家闚戸閴如何也豐盛之時上自謂明而後不明者中之是猶之祧廟也鬼神之庭无人焉則是自為明之過也夫亦謂不得其位乎曰是非不得其位也其位愈髙則暗愈甚與之為純牝則可矣是條彖象亦无疑滯第二十旅之晉旅小亨旅貞吉晉康侯用錫馬蕃庻晝日三接其辭曰旅焚其次䘮其僮僕貞厲錫馬蕃庶矣而曰䘮其僮僕何也曰旅非康侯也无位而為位樂華而䘮實凡用之得晉鮮有吉者也否之苞桑未濟之曳輪以位卣將亦庶乎可耳故中者位之實也用明而失中寡處希榮君子之所惡也是條彖象亦无疑滯第二十一節之屯節亨苦節不可貞屯元亨利貞勿用有攸往利建侯其辭曰不出門庭凶何也曰其才絀於德德絀於力知其勿往而不知其利建者以為操尚是固而經綸是去矣是條彖象亦无疑滯第二十二小過之豐小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉豐亨王假之勿憂宜日中其辭曰飛鳥以凶是凶之小過者也飛鳥已過而日中自在旤患之來君子亦无可如何也聽其已過而守其常不過者則亦免於大過矣飛鳥之凶又何憂乎是條彖象亦无疑滯第二十三小過之豫小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉豫利建侯行師其辭曰弗過防之從或戕之凶何也謂夫大事之舉而小事之去下體之距而上體之慕也以小過之才而建侯行師過之則不可過防之則不及防或從戕之又何怪乎是條彖象亦无疑滯第二十四以上二十四條合彖皆吉而爻象反凶以是推之繇正而變其辭義差殊者可以理解也又自變而正十二條附後需之旣濟需有孚光亨貞吉利渉大川旣濟亨小利貞初吉終亂其辭曰需于沙小有言終吉終亂而曰終吉何也言故夫需乆而後濟者也乆而能濟雖小有言何亂之有是貞吉善思患者也豫防思患可以不亂是條彖象亦无疑滯第一蒙之剝蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告剝利貞不利有攸往其辭曰包蒙吉納婦吉子克家何也蒙未可以往也包而居之納婦克家則可以安宅安宅則可以育德矣是條彖象亦无疑滯第二臨之歸妹臨元亨利貞至子八月有凶歸妹征凶无攸利其辭曰至臨无咎旣兩凶矣又得无咎何也是象所謂位當者也易亦各欲其當而已歸妹之當則猶悦而順順而動者也然則兩彖之義為時位奪也曰時位者亦兩彖之義也兩彖包時位時位不包兩彖歸妹之至臨猶父母之送其子也當位為至不行為臨故去其兩凶以得无咎且謂是未至於八月也是條彖象亦无疑滯第三觀之否觀盥而不薦有孚顒若否之匪人不利君子貞大往小來其辭曰觀國之光利用賔于王以否之時不薦不利而曰觀國利賔何也否陽往者也觀之否陽來者也不利君子貞貴通也古之人嘗用之矣不在於異國則在於異世否之觀則亦猶此也謂有占逺之耀焉是條彖象亦无疑滯第四无妄之否无妄元亨利貞其匪正有𤯝不利有攸往否之匪人不利君子貞大往小來其辭曰无妄往吉旣曰有𤯝匪人又徃得吉何也无妄而得否則已否矣斂德避艱難亦不就之謂其无所繫也致誠而行在禍福之外故曰知否者多喜知泰者多敗是條彖象亦尤凝滯第五家人之旣濟家人利女貞旣濟亨小利貞初吉終亂其辭曰有孚威如終吉終亂而得終吉吾得之需與家人矣鄉飲酒大昏二禮者人道所為綱紀也需有位家人无位有位而用中无位而用威夫亦各思其終而已終亂而得終吉非是兩彖无取也是條彖象亦无疑滯第六蹇之旣濟蹇利西南不利東北利見大人貞吉旣濟亨小利貞初吉終亂其辭曰往蹇來譽旣濟之終亂繫于動爻而皆得吉非其思防而能之乎需動在中家人與蹇猶之上初也故才生於智智生於思天下未有不思而濟者也是條彖象亦无疑滯第七解之未濟解利西南无所往其來復吉有攸往夙吉未濟亨小狐汔濟濡其尾无攸利其辭曰公用射隼於高墉之上𫉬之无不利是見之繫辭矣繫辭之言藏器謂未濟也藏器待時審括而動去其濡尾而𫉬於高墉使狐失其智而隼失其力夫非其辨之者蚤乎當濟而後解之則可謂不夙矣是條彖象亦无疑滯第八升之井升元亨用見大人勿恤南征吉井改邑不改井无䘮无得往來井井汔至亦未繘井羸其瓶凶其辭曰貞吉升階何也井德之地也有其德以乘其位繘井羸瓶大人不恤也恤瓶而逺井則是小人之事也風發於地而水上於木而勾萌畢達以澤百物君子於是勞勸之耳是條彖象亦无疑滯第九革之旣濟革已日乃孚元亨利貞悔亡旣濟亨小利貞初吉終亂其辭曰悔亡有孚改命吉既濟之終亂也動而得吉者四矣其凶者獨屯之三耳謂屯在險中未可遽濟需訟蹇革家人則无不濟也故終亂之誡君子圖之鮮也是條彖象亦无疑滯第十㢲之姤㢲小亨利有攸往利見大人姤女壯勿用取女其辭曰悔亡田𫉬三品是皆為申命施誥之事也然而姤之㢲无魚而凶㢲之姤有𫉬而吉何也姤則女主之政也㢲則君子之命也姤之懌辭不如㢲之多誠是有惠主而用其隂德者也是條彖象亦无疑滯第十一節之臨節亨苦節不可貞臨元亨利貞至于八月有凶其辭曰甘節吉往有尚八月有凶而曰往有尚何也知其凶而節之循其陽節不盡其隂節見其隂節而理其陽節故八月陽盡君子致靜以養隂二月隂盡君子致和以養陽和與靜者隂陽之中也中以為節有節而甘苦化焉節之九五是也易以剛柔論位二五論中守中而當位雖極千變不在旤福之内是數度德行君子所制議也是條彖象亦无疑滯第十二以上十二條之卦合象有凶而爻象反吉以是推之繇變而正其辭義差殊者亦可以理解也易曰吉凶見乎辭繫辭以盡變不達其象不通乎辭不達其辭不通乎意使書不盡言言不盡意則易之藴皆不可得而見矣故象者无辭之言辭者有意之象也學者不解爻辭但取兩象合觀則辭意千出有非言語文字之所能盡者如其精藴則在乎度數存乎德行雖懸象靜觀别其功凶詳其咎譽終日省中未足以周天地之變隂陽之序也世儒牽於舊間守其故説其稍慧巧者又以易多變象不為典要劈切支離務以竒𤨏自眩而姬文周孔三聖相傳之意蕩然盡矣今存左國及繫辭三十八條以指所之再舉爻象正變異同五十五條以通其説内觀之否屯之比豐之離師之臨困之大過復之頤解之恒解之未濟噬嗑之震之晉益之屯諸卦層見互發其義一也凡是數條為之卦玩占之凡例至於範圍天地曲成萬物古今隆替帝王成敗則備於圖象存於序次通於鬼神凖於日月不在辭義之内云易象正凡例欽定四庫全書易𧰼正序述孟長民應春曰崇正庚辰八月夫子在西庫始作此書初成二十四圖又逮過北寺毒痛之下指節初續又爲六十四𧰼正崑山朱生永明冒難入北寺親爲夫子櫛沐鈔得是書然尚䦚略有十之六七耳壬午放歸在靖海寺見成四本應春欲鈔夫子猶以爲苟簡不樂傳播楊太史廷麟時亦在靖海寺苦欲録本夫子在病中恐不復完黽勉畀之故崑山清江各有初本夫子每談及輙以爲嘆有示璞見癡之恨及應春侍夫子至九江西林寺夫子病瘧初瘳亟覔筆楮曰及吾在不定此本後世誰復能定之者料理三十日將有次第而應春以家報趣歸夫子獨在蕭寺無復酬對之煩此書始克就緒方應春在西林時或人揖問曰黄學士所著書浩繁是何事應春曰不過是千嵗坐致之理聞之夫子大以爲不是一日或人來又如前問應春曰却是百世可知之理聞之夫子夫子亦大以爲不是應春茫然過問夫子夫子曰何不道可一言而盡也别後十餘日應春至留都乃聞夫子賜環之命遣僕報夫子歸夫子猶以是書未完留連江渚既𤼵疏謝病乃扁舟過錢塘聞是本已就寄陳太史彦升處彦升有僕在靖海敦守是書夫子業已許之則是書以彦升本爲正也陳彦升之遴曰先生壬午五月過臨安將適江楚時諸門人皆送至京口惟孟長民從至九江之遴知先生雅喜獨坐又方理易𧰼正不欲與衆周旋僅遣一蒼頭事先生懇得𧰼正完本與朱美之朝夕討論及在留都過楚蒼頭僅持美之尊人墓誌銘及之遴詩序耳之遴方與美之約侍先生還留都而環報適至艤舟至京口又不知先生所在但聞先生已還閩中衆無知者盖先生澹泊自將操小舠入蘆葦中携僕被穿闗雖津吏不知也至繡水聞先生在正弔錢去非私喜不自禁乃從懇得𧰼正完本曰吾書已稍完無所恨但恨不見錢去非使人有祝予之歎盖先是五月去非同諸門人送先生至京口登北固賦詩者也𧰼正完本屬當公諸後世然聞有手書原本在楊前輩處故從長民得識始未云朱美之朝瑛曰瑛先歲見三易洞璣玩之未有所得既在旌徳邑小事稀山水清穆乃稍探討别爲三易與洞璣參契壬午夏月先生來大滌山中瑛出三易請正先生以爲不繆因相與極論三四書夜雖無足𤼵之能頗盡一隅之致矣及見𧰼正初本意欲借歸而先生堅以爲未定既十月先生以完本寄彦升又屬彦升若傳播必與朱美之參定不知何以佐高深者然自仲尼殁後微言既絶性道難聞欲起回賜以還檀木捧拳塊而附岱華誠還顧瞠然未知其可也劉漁仲履丁曰人言在先生西庫始作𧰼正此殊不然三十年前丁侍先生在浦東草廬於時有易本𧰼八卷疇𧰼八卷疇𧰼在吳亮恭侍御處本𧰼在張雨玉兄弟處念之已三十餘年當時亦三屬草本也但今𧰼正與舊𧰼正文義俱别耳方開府仁植與先生同在西庫每過先生論諸𧰼義先生方就草作二十圖錦衣着筐籃來請先生方畫一圖未完徐曰吾作一圖完就逮耳諸役不可輙扶先生去諸圖𧰼飜簸床下役去仁植始掇拾藏之今相較亦盡不似惟前日月出入四五圖相恍惚耳憶丁三十前年嘗過先生先生問三天圖可曽看不丁曰此有何難曉先生曰正謂易曉故難曉耳今書絶不道三天圖惟末卷稍稍及之又先生家屏風上刻天方圖爲四周天方百二十九度刓圓削方凡十八變而歸於極每謂門人曰天地鬼神奥堂精室盡在於此今書中亦無此圖然則書所不言者尚多矣榕壇諸友百二十人無一人談易𧰼者間有問及先生輙引高允之言曰天下妙理自多何必問此何羲兆瑞圖曰師過講堂無一刻清暇終日酬對飛楮揮毫亦無一刻冗雜瑞圖間言古人左方右圓口答手批何嘗得此精儁師愀然曰若使濓溪伊川豈復露此伎倆一曰扶笻過尋歸雲洞笻折墜屨罣於榛莾歸遂不能騁歩如前亟欲西過江楚瑞圖請前後所著書統留山中師云文宇之業總不足存天假數年得就前業則易𧰼正詩序正春秋表正此三正者當留山中以扄寳藏耳又云易𧰼正完當携至山中簪筆披衣呈章北斗之下也今𧰼正完寄陳彦升處何繇至山睹此虹玊先生云吾嚮與何羲兆約𧰼正完時入山呈斗然如此重事當自家筆蹟一字不苟今舊蹟已離所存改本中有雜墨豈可告之神明且俟刻完整整齊齊開茲懸霤耳凡先生著作出自手書皆銀鈎銕畫如鏤木板惟綃素贈答始有行草入眸自辨也易𧰼正序述
