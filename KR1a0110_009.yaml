body:
  text: 易象正卷七明黃道周撰家人利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人君子以言有物而行有恆正曰木來從火順以與內內明而外巽言不過物行不過恆家道之成則必繇此也夫家道成虧其悉在婦人乎乾治外而同於野巽向內而宿於家故革不相得不相得則變也家人相得相得則順也故曰家人利女貞而治家之道備矣詩曰無非無儀惟酒食是議無父母貽罹故言有物行有恆風火之象也君子仁覆不私其家以顧復心施於天下及其究也以雷雨作解初九家人之漸家人利女貞漸女歸吉利貞間有家悔亡象曰間有家志未變也正曰間有家則自女歸而始矣必敬必戒古人之命也魯公問於仲尼曰冕而親迎不已重乎仲尼曰夫婦之義以承宗祀以續祖妣何謂其重也莊公娶於齊丹桓宫之楹而刻其桷匠慶非之哀薑且至公命大夫宗婦覿皆用幣宗展辭焉夫匠慶與宗展則猶知所間家也春秋之於夫人出入必謹書焉桓莊之世夫人如齊與歸自齊是不一見也而魯之卿士宗祝無有執其説者曹劌之論觀社則猶未及此也夫姬任薑姒波瀾所漸亦遂難反也乎齊詩十有一篇南山敝笱載驅猗嗟則皆魯風也以魯風而著於齊明乎女歸之漸於齊也曹劌曰齊棄太公之法而觀民於社非故業也齊社而魯往觀之非先王之訓夫舍先王之訓與公侯之業而欲以間其家不已難乎六二家人之小畜家人利女貞小畜亨密雲不雨自我西郊無攸遂在中饋貞吉象曰六二之吉順以巽也正曰中饋有事不雨而小畜夫其有蘋蘩之薦乎古者公侯夫人與於賔祭詩曰君婦莫莫為豆孔庶為賔為客又曰諸宰君婦廢徹不遲故舍中饋無復遂事也周之衰也用舍豫奪皆謀於婦人十月之詩曰皇父卿士番維司徒家伯冢宰仲允膳夫棸子內史蹶維趣馬楀維師氏艷妻煽方處是則卿士而下皆煽之方艷者也故風自火出饋者以饋煽者以煽君子之所致謹也瞻仰之詩曰亂匪降自天生自婦人匪教匪誨時維婦寺又曰如賈三倍君子是識婦無公事休其蠶織故蠶織之與中饋適相佐也為君子而不通於詩之義者必有女禍蓋謂是歟九三家人之益家人利女貞益利有攸往利涉大川家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也正曰春秋滅國三十有六其起於嘻吝蓋十有四五矣公父文伯朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其母曰魯其亡乎以子備官而未之聞耶古者天子諸侯大夫士庶皆朝夕庀其職業而後即安王后親織玄紞公侯夫人加之以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有辟古之制也今我寡也爾在下位朝夕處事猶恐忘先人之業况不有惰心其何以避辟故如公父文伯之母則可謂失家節者矣六四家人之同人家人利女貞同人于野亨利涉大川利君子貞富家大吉象曰富家大吉順在位也正曰小畜者中饋之事同人者蠶織之事也古者天子耕於藉田王后蠶於公宫是家人之同人也宣王不藉千畝虢文公諫曰不可民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦厖純固於是乎成故先期而戒事及期而陳禮太史贊王王耕一墢班三之庶人終于千畝及稷遍戒百姓命旅曰徇農師一之農正再之后稷三之司空四之司徒五之太保六之太師七之太史八之宗伯九之王則大徇是同人之道也詩曰侯主侯伯侯亞侯旅侯疆侯以有嗿其饁思媚其婦有依其士其是富家之謂也即以富天下何不可之有九五家人之賁家人利女貞賁亨小利有攸往王假有家勿恤吉象曰王假有家交相愛也正曰家人之賁賁不飾也君子居處假於妻子則假於鬼神假於父母昆弟則假於王者師相矣質而不吝素而不僿雖無玄黃之觀又何恤焉洪範曰臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒故家人之賁王者之所愛也內人無儀外人無容而後其志通焉長幼有序男女有别而後其教行焉詩曰相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思言王者之假家與鬼神之格人其致一也可觀易而得其象矣上九家人之既濟家人利女貞既濟亨小利貞初吉終亂有孚威如終吉象曰威如之吉反身之謂也正曰家人之既濟是不可以已乎曰何可以已也患生於所忽禍起於所䁥君子之敬其妻子婢僕皆如其始至焉故濟家之道雖十世猶若有未濟也敬薑室文伯饗其宗老而為賦緑衣之三章文伯卒戒其羣妾從禮而靜故既濟之終亂家人之大誡也家人女貞則無有不貞者矣夏書曰威克厥愛允濟愛克厥威允罔功夫治家人而有師政乎亦曰反身而已反身而威百度以生詩曰我其夙夜畏天之威于時保之反身之謂也反身終吉何亂之有戒其終亂而得終吉非思患豫防何以得此乎睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象曰上火下澤睽君子以同而異正曰同而異睽度之義也水火相互以辨內治癸在於內丁在於外同異相濟以和庶事洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶夫以天子之明下謀於庶人以庶人之智上參於龜筮五味相濟必有得其大和者矣而且曰睽小事吉故異同之間鬼神之所以致聽也同異致聽譬於火澤星辰水鑑雖逺未失及其究也略於爭辨曰反身修德初九睽之未濟睽小事吉未濟亨小狐汔濟濡其尾無攸利悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也正曰睽之未濟則猶未有喪也鹽梅醯醬於人何忌存之則為理執之則為藝理藝相競愛惡乃興故朝有變色之言則室有操戈之釁矣夫以異同為愛惡變色而求者猶建斾而逐亡馬也君子不辟惡人不尋危言戒其不濟而存其所以濟者異同在於先符契執於後雖有惡人莫之或仇也詩曰君子實維秉心無競蓋謂此歟九二暌之噬嗑睽小事吉噬嗑亨利用獄遇主于巷無咎象曰遇主于巷未失道也正曰道至於噬嗑而慎矣慎其小事以至於大事異同好惡無有分畛小人愛其明君子諒其誠故于門于庭于野則猶有所避之也遇主于巷則無所避之也亦各致其情實焉已矣或曰君子之有詭遇也伊尹負爼膠鬲載盟寧戚飯牛百里粥羊夫君子亦何詭遇之有乎金縢納誥通於風雷羑里行權迪於彛教君子亦何詭遇之有乎詩曰奕奕寢廟君子作之秩秩大猷聖人莫之異同相遇亦斷於誠敬焉止矣六三睽之大有睽小事吉大有元亨見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也正曰睽而大有是猶未得合也噬嗑則得合大有則不得合何也曰睽外也大有衆也睽而用衆則猶未可用也甲胄明於逺口舌動於內書曰惟口起羞惟甲胄起戎夫必以揚善遏惡順天休命則是大有者終取之矣詩曰民今方殆視天夢夢既克有定靡人弗勝故始異而終同先違而後合人事也則亦天道也曳掣之凶雖古人或離之君子則亦何憂乎九四睽之損睽小事吉損有孚元吉無咎可貞利有攸往曷之用二簋可用享睽孤遇元夫交孚厲無咎象曰交孚無咎志行也正曰獨往之論不可持也孤行之事不可為也有信於一人則衆或從之非理之附權亦其道宜然也以睽而用損用者不巨孚者甚宏忿欲既除渺論獨存夫世而無元夫則已矣世而有元夫則必以是為未孤也詩曰嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲其道在季札之於晏嬰晏嬰之於叔向叔向之於子産子産之於韓起也六五睽之履睽小事吉履虎尾不嘻人亨悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也正曰五之與二則亦互相取也五若遇主二若噬膚剛柔之制則亦互為用也睽而履虎下有危言上有危權噬膚之慶何為乎夫必有所遇之矣君子持論不已忤時持氣不已忤物持身不已忤衆不幸而遇猛鷙則猶免於搏噬也幸而值明主則厥宗之契也委蛇隨人以異為同則君子不能也詩曰我言維服勿以為笑先民有言詢于芻蕘聖人之採芻蕘亦自昔而然矣厥宗噬膚又何咎乎上九睽之歸妹睽小事吉歸妹征凶無攸利睽孤見豖負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亡也正曰上九則猶有應也而謂之弧何也應不當位者也應不當位羣疑橫生異同之來鬼豕商羊曳輿掣牛何足以方之乎故歸妹者女怨之宗也睽者嫉妬之事也君子以異同之身立嫉妬之路其得免於天劓者幾何以為事窮而理合孚久而疑亡張弧説弧往或遇雨焉耳詩曰憂心悄悄愠于羣小覯閔既多受侮不少亦謂是歸妹也以媾疑寇苟信其為媾以劑衆口以襄國是則亦何異同之有乎詩曰江有汜之子歸不我以不我以其後也悔是睽之歸妹之謂也家人睽二隂之卦也從於北政自咸恆至晉夷為差則北政又為始矣家人睽之有兩濟損益漸歸是北政之令也從此而下皆南北參倚為令焉之序卦傳曰夷者傷也傷於外者必反其家故受以家人家道窮必乖故受之以睽何言之厲也曰是猶在中孚之交也劉裕歾受命才三年癸亥為景平元年義符踐祚不克負荷義真北歸無改其德徐羡之傅亮謝晦等遂行廢立并殺義真及義隆踐祚乃殺徐傅討謝晦於江陵是時北魏亦有令主河南相持不失尺寸而再有劉斌范曄之事撲滅清晏幾三十年猶且坦懷含哺以餌梟獍使指墜玉几軀橫齋閣家人之傷何以過焉武陵王既起討劭殺濟義宣臧質亦旋踵誅夷孝建大明之間差為無事子業昏淫囚執諸父湘東朝升晉安夕殪子勛既除之後乃大殺宗室武帝二十八子當年俱盡及於同産兄弟亦用殄絶嗚呼人皆能裁弟不能裁子而亦有劭濟之變興於元嘉皆為江東之亂在諸王不在外國而亦有零陵赤紙發於從容是則乖傷之事不盡家人之咎也蒼梧既弒汝隂復徙蕭道成無桓溫之略劉裕之勳徒以王敬則禇彥回刀筆陸梁坐姦天位方是時魏太武興於中原綱紀法度頗有華風南侵不遂荼毒青徐歸而聽讒殺子斃於宗閹是在壬辰皆在家人之中交逆劭奮刃之先一嵗也其後孝文之立已十二載太后馮氏猶利稱制手毒其子以擁幼孤家道之窮於兹而極夫南北分應易象乎曰猶是天下也山河兩戒蒼生繫命為之主者星物應之天地閉否豈辨種姓乎然則元嘉之誅徐傅黜義康不殺子劭義乎曰義也傅亮謝晦置君如碁已取佐命於晉室之裔又欲成博陸之業誰當安之義康不出劉斌王履之徒終為亂階至若巫蠱事發武帝終念戾據之事踟躇屏人不為不密而潘妃一言墮及四體故威如之吉聖人之所深戒也蹇利西南不利東北利見大人彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉象曰山上有水蹇君子以反身修德正曰蹇者睽之用卦也睽而之蹇分政南北女睽於內男蹇於外蓋自下經而淳氣且散矣又何其多故也蹇者東北之卦也睽者西南之卦也合蹇而睽亦未為吉也大人齊其德不齊其遇夷險利鈍何擇焉反身修德曰不失吾正云耳故蹇之為道六爻皆吉也智皆長於患難德皆敗於安樂無皇曰令日耽樂乃非民攸訓非天攸若時人丕則有愆是周公之訓也故蹇者君子所不避也蹇之與睽其象相繼舍人求己雖不忤衆及其究也亦有異同初六蹇之變正象既濟蹇利西南不利東北利見大人貞吉既濟亨小利貞初吉終亂往蹇來譽象曰往蹇來譽宜待也正曰方蹇而遂濟恐猶有蹇者也蹇往不可忘譽來不可邀且衆蹇之來未有不生於譽者也咎譽互根譽可以來則蹇亦可以來矣君子之思防不為其來蹇為其來譽也詩曰樂只君子保艾爾後又曰公尸燕飲無有後艱古人之善持後也如此故待者所以持蹇亦所以持譽也涉者之回顧其義亦猶此也六二蹇之井蹇利西南不利東北利見大人貞吉井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也正曰吉凶之故王臣所不恤也君子反躬懋德於身以勞勸天下一夫不獲則曰豫辜蹇而改邑未為得也蹇而羸瓶亦未為喪也勞其身以事其君其君諒之則行潦泂酌餴濯而不辭其君不諒之則夷竈堙井谷汲而自老夫亦吾義也故為厚祿以養身餘祿以養人則君子不為也詩曰坎坎伐輻兮置之河之側兮河水清且直猗夫王臣之心則已告之河水矣九三蹇之比蹇利西南不利東北利見大人貞吉比吉原筮元永貞無咎不寧方來後夫凶往蹇來反象曰往蹇來反內喜之也正曰蹇不可以獨往也往而用獨則多窮反而思來則多順矣故水之下於山不若其比於地也王臣之原筮何為乎夫有知止之明者則亦無所待筮矣踰險而傾流以謂顛沛及之平地瀉水亦無所不得其湮鬱也故不寧之來後夫之凶君子有所不患也得其永貞者以抵於無咎而已矣喜平而惡陂與喜陂而惡平是何當於大人乎然且從衆而就平詩曰原隰既平泉流既清召伯有成王心則寧克順克比以靜觀其後是亦君子之所貴也九四蹇之咸蹇利西南不利東北利見大人貞吉咸亨利貞取女吉往蹇來連象曰往蹇來連當位實也正曰蹇修德也咸致虛也往蹇而知反反而修德修德而致虛則與之者至矣水滙於山而澤鍾焉山以連而得其力水以平而得其德故蹇之惡險也匪躬而獨往亦非其性也詩曰凡百君子各敬爾身不愧于人不畏于天君子之受教戒於人與受教戒於天一也夫無已往之行有來連之實雖不得譽於外亦寡怨於內矣小明之詩曰靖共爾位好是正直神之聽之介爾景福夫是則猶朋友之力也九五蹇之謙蹇利西南不利東北利見大人貞吉謙亨君子有終大蹇朋來象曰大蹇朋來以中節也正曰蹇則朋盡矣大蹇而朋來雖致虛克順未足以及此也致恭以存位以功而下人勞不言瘁役不言勤以西南之德而成東北之業非君子而孰與於此乎故謙者九德之選也井之匪躬於是相應謙君而井臣君得其柄臣得其地以濟禍難若炎岐雷跗之為醫藥也公子重耳十九年於外不得一士而秦翟齊楚聞聲相附雖二臣之力而謙柄所造亦已多矣然則蹇備柄地而不列於九二何也曰是未出險也憂患不除何益於慧王臣之相濟亦以教謙云耳書曰木從繩則正后從諫則聖是謙與井之自相與也以謂之大朋亦宜上六蹇之漸蹇利西南不利東北利見大人貞吉漸女歸吉利貞往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也正曰甚矣蹇之喜退也蹇而有名利之心則足以喪其身而危其家蹇而有委蛇之志則足以隕其名而墜其情漸而女歸何傷乎故遁之稱肥蹇之稱碩古人所致澤於性命也君子用世不及虞夏致身不及臯伊則亦已矣而依違淟涊以殉乎人是大人所不取也然則大人固無功乎曰何為其無功也世未喪道道未喪家女歸待時與時偕行連反之往來蹇碩如環夫必以險難為不可往者則亦過於用智矣故曰來反者智士之務碩來者仁人之義也以仁人而朋王臣蹇難以夷禍亂以平遁之稱肥何足以稱之詩曰狼跋其胡載疐其尾公孫碩膚赤舄几几言夫往蹇而來碩者也是大人之事也解利西南無所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉象曰雷雨作解君子以赦過宥罪正曰蹇而受之解則可以往矣而曰無所往何也謂其方解者也物方孚而息之病方復而綏之雷雨方作羣首屏聽夙往夙復則猶之安處也夫君子之有安處何也君子者不與聖人爭能不與鬼神爭功天地方動雷雨為政君子則猶之百果草木也以大德讓之天地以至仁讓之聖人詩曰羔羊之皮素絲五緎委蛇委蛇自公退食庶可免於罪過矣君子必自仁也而後以仁於人故赦過宥罪雷雨之象也雷雨自天不可妄邀苟非其時赦宥不行及其究也以言有物而行有恆初六解之歸妹解利西南無所往其來復吉有攸往夙吉歸妹征凶無攸利無咎象曰剛柔之際義無咎也正曰蹇之歸妹嫌其有咎也故謂之無咎氷泮而雷作則亦歸妹之時也及時而歸則猶之夙往夙復也險動而説蓋猶有西南之心焉萬物之終敝於其未解也解而緩緩而歸男過女慝可以不作詩曰我徂東山滔滔不歸我來自東零雨其濛是周公之事也倉庚于飛熠耀其羽之子于歸皇駁其馬是將率之事也以是而解解而歸妹何咎之有乎無咎八十此其選矣故但曰無咎以解夫咎歸妹者也九二解之豫解利西南無所往其來復吉有攸往夙吉豫利建侯行師田獲三狐得黃矢貞吉象曰九二貞吉得中道也正曰解而豫天地見德萬物以説獲狐得矢行師之利也故解則未為緩也豫則未為怠也去其苛疑以得其中正如是而已君陳曰豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中有弗若于汝政弗化于汝訓辟以止辟乃辟故獲狐者勿宥之道黃矢者止辟之路也蔡仲之命曰率自中無作聰明亂舊章詳乃視聽罔以側言改厥度夫是則可謂得其黃矢者矣六三解之變象恆正解利西南無所往其來復吉有攸往夙吉恆亨無咎利貞利有攸往負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也正曰夫易之貴位也三不得位恆以剛處之而羞解以柔處之而吝則是剛柔兩無所處也夫恆之得羞者謂其解恆者也恆德不守動而之險夫婦之道變於內解之得吝者謂其恆解者也解德不成勳而若故刑德之義變於內故外無變象內有變德小人之所伺而寇攘所從至也故解者甲拆之會也甲拆之會而有恆風草木披靡百果剝落雨澤之利委於溝壑君子不得其志小人不得其欲其免於暴伐者幾何詩曰而秉義類強禦多懟流言以對寇攘式內是夫子所謂盜招者也子曰作易者其知盜乎負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也夫子之意其謂季孫乎季桓子不能制其家臣而外侈功於諸侯一與家臣盟衢于稷門再於周社盟一詛於國門再詛於五父之而今嵗侵鄭明年侵齊今嵗圍鄆明年侵衛於是陽虎以五族之徒發難于蒲圃既敗脫甲如公宫取寶玉大弓春秋書之曰盜則負乘之事季桓子受之也然則負乘之當於恆者何也曰亦其象也解水也舟也雷也車也舟車負載緩而慢藏巽以乘水險動於下以于其上自以為一家而盜生其中屯之上六則亦猶是也然則是貞也而曰吝何也貞吝異實而醜咎同名何取之乎曰夫其德與位俱散也然則恆之解德與位猶未散也而亦曰貞吝不占何也曰恆者婦人之志解者耄期之事也彼此互取而載於凶介則聖人有憂之矣然則處於凶吝而貞志無咎者其臧哀伯與季文子乎桓公二年取郜大鼎於宋納于太廟臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉莒太子僕弒紀公以其寶來奔宣公使人以書命季文子曰夫莒太子不憚以吾故殺其君而納其寶將與之邑今日必授季文子曰人既不愛其親又何愛於君使司寇出諸竟曰為我流之於夷今日必達故周內史之歎臧孫猶太史克之贊文子也言夫見利而能斷斷而能克者也洪範之志咎徴也曰蒙恆風若解之恆與恆之解則猶之恆風也故恆寡吉辭焉謂其近於婦人也寶賄之好而負載之尚盤庚曰朕不肩好貨敢恭生生鞠人謀人之保居敘欽是則進於夙吉之道甲折萬物之義者矣九四解之師解利西南無所往其來復吉有攸往夙吉師貞丈人吉無咎解而拇朋至斯孚象曰解而拇未當位也正曰解而用衆用衆而得丈人則將舍其弟子舍弟子而得丈人是解之得朋也君子為仁不以市恩為德不比於私眤行於西南而解於東北天下之大順也大禹之格苗晉文公之伐原皆解而後成師盤庚曰朕不肩好貨敢恭生生鞠人謀人之保居敘欽是乃為解拇而孚朋者矣解拇而孚朋天下之大順也六五解之困解利西南無所往其來復吉有攸往夙吉困亨貞大人吉無咎有言不信君子維有解吉有孚于小人象曰君子有解小人退也正曰解之困困於解者也雖困於解然且衆志繫焉天下歸焉故以眚赦為無益鉗結為有用者鬼神之大惡百姓所不附也康誥曰非汝封刑人殺人無或刑人殺人又曰非汝封劓刵人無或劓刵人故刑戮者君子小人所共為治也君子以刑戮獸治小人小人亦以刑戮治君子則是交亂矣諺曰惡網羅民憎其上故網罟始制而飛濳交喪矣然則虞典五刑康誥七殺不為迪吉歟曰虞典世輕康誥世重亦其彛正也君子不撓法以從欲於上不違道以干譽於百姓雷雨數行膏澤不分解而既困亦猶之不解也君子成信於天下則亦得其意焉已矣上六解之變正象未濟解利西南無所往其來復吉有攸往夙吉未濟亨小狐汔濟濡其尾無攸利公用射隼于髙墉之上獲之無不利象曰公用射隼以解悖也正曰是春令也鷹化為鳩則隼可射矣射隼髙墉非在下位而能之也古之為刑者期於無刑虞書曰好生之德治于民心兹用不犯于有司故以人用法惟人是視是則人也以禽用法惟禽是視是則禽也故世之為悖者皆禽也治天下而使猛鷙之人據於髙位則解澤之涸久矣解之未濟則猶可以解也在位羣疑率於大戛三狐既獲則髙隼可射也夫以解為必不可濟以隼為必不可射猶以霜霰尚於雷雨鳴鳥絀於狐烏也詩曰鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人夫以君子而媚庶人亦為瘝君造譽者乎故解之未濟君子所致決於猶豫也猶豫者小狐之事也觀於此義則易之所以垂戒者深矣弓然則夫子所云成器而動何也子曰隼者禽也矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也是則夫子不謂解之未濟也曰不謂其未濟則藏器待時何為者乎小人而在下位去之易小人而在上位去之難射狐於三驅之下無所疑也射隼於髙墉之上則有所疑也亦曰待其可濟則濟矣晉人之去欒盈宋人之去魚石皆彌年而發禍待濟而終濟其惟公子友與鄭子産乎公子友之事君也誼於公不私其親莊公之疾也問後於季友季友曰臣以死奉般又問於叔牙叔牙曰慶父材慶父非正也季友遂以君命鴆叔牙慶父賊般季友立閔公慶父又弒閔公季友以僖公入自邾求慶父於莒使公子魚從而哭之慶父乃殪季友之藏器亦未為密也待時亦未為審也而不括有獲動得解悖亦無所不濟者矣子産之治國也直而惠敏而多知公孫楚之與公孫黑鬭也子南下而子晳長矣子晳惡未可制乃執子南而數之曰國有大節五而汝皆干之不畏君之威不聽政不尊貴不事長不養親君曰余不忍殺宥女于逺乃放遊楚於吳及公孫黑之將作亂疾作未果子産將鄙乘遽而至使吏數之曰爾有亂心國不女堪専伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也不速死司寇將至乃尸諸衢加木焉子産不逐遊楚則子晳必亂且使諸大夫殺子晳則無以靖鄭國也皆數而速正之故子産之解悖則猶之季友也而子産為審矣然則解之未濟曰無攸利而上六曰無不利何也曰去其小狐而射於髙墉則無不利也夫使季友子産猶有狐疑之心則方覆宗不暇何解悖之有乎蹇解者二陽之卦也從於南政與家人睽正相反也相反而互起是皆有咸恆兩濟焉故為下經之綱紀繼以損益而三代盛衰備見於是也然則對化之卦相比而起間得幾卦歟曰惟是兩卦也渙節之與豐旅則猶巽兑之夾輔也然則是亦有異義乎曰家道之難也咸恆兩濟相為倚伏用體之交限家睽蹇解正於是起也於是起者何也曰體用之相差以咸當坎以遁當離晉當兩濟家人當小過蹇當中孚此定位之卦衷於南北者也以頥當頥以大過當坎以坎當咸以離當遁以咸當晉以遁當家人以晉當蹇以家人當損此定序之卦鱗次而集者也故家睽蹇解洽比之因起也易之聨卦惟是兩者故不得不尋其始以要其終也者序卦傳曰睽者乖也乖必有難故受之以蹇蹇難也物不可以終難故受之以解解者緩也為序卦者亦知其有憂患乎庚午永明之八年於是入蹇時則蕭鸞用事矣猶是家人也不五載一弒昭業再弒昭文儒生縳袴廢天子遂為常事於是治道綱紀在魏魏興伐罪之師而僅付之水濵無何齊魏兩主俱捐軒駕而蕭衍髙歡咸奮爪翮恣其飛騰矣蕭衍發難在十年之內既廢寶卷復廢寶融隆昌之報宜在雍州髙歡發難在四十年之後破爾朱立清河才長於石勒事正於劉曜而竟留一侯景以報夀陽方蹇解之中交在魏庚子元義殺清河幽胡后於北宫先一年羽林戕張彜而髙歡蓄士馬後數年梁取夀陽又兩年而胡后弒主爾朱榮舉兵晉陽沈妖牝誅徐鄭魏主攸方誅朱榮而朱兆亦復弒攸髙歡起乘其敝與宇文泰抗立東西兵革之事無日無之八十老公偷五十年之治而卒以貪納叛人餓委沙丘簡文既廢侯景自立繹察共附魏齊方智淵明不能自存徒為陳霸先厲其嚆矢耳乙亥丙子梁祚遂絶元魏亦熸蹇解乖睽相為終始也而元魏以家難獨著天道北行從其盛者而一蹇一解自分南北北無反躬修德之期南多赦過宥罪之日可歎也夫損有孚元吉無咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行象曰山下有澤損君子以懲忿窒欲正曰古之為學者損益其大端矣損人以與天損已以與禮無所益而益之故損者下學之最要也君子和説以制行至止以飭躬不動於氣不牽於物水澤淡於下源泉定於上故山澤之通氣男女之效悅君子以是致學也和而止淡而定則忿欲之懲窒已過半矣然且君子致其日損謂是源流之不可遽靜也柔以持之虛以觀之終老其身無所盈益而已矣詩曰無然畔援無然歆羡不大聲以色不長夏以革是文王之學也書曰文王卑服即康功田功二簋用享其謂此乎故山下有澤懲忿窒欲之象也水澤所鍾隄防不虧先之甚難獲之甚易不自謂多致虛之功及其究也以虛受人初九損之蒙損有孚元吉無咎可貞利有攸往曷之用二簋可用享蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞已事遄往無咎酌損之象曰已事遄往尚合志也正曰損之蒙損亦未可瀆也致誠而已誠則虛虛則和能和而敬何憂乎忿欲何虞乎不告故已事遄往所以致敬也酌損之所以導和也天下之善損者其惟蓍龜乎其設象也虛其立辭也簡其取旨也要忿欲存於中則精靈不交故損之蒙亦致其和敬而已和敬以為學有不瀆學和敬以為問有不瀆問詩曰我日斯邁而月斯征遄往之事也各敬爾儀天命不又酌損之事也損之童蒙雖學問猶謹用之而况於忿欲乎九二損之頥損有孚元吉無咎可貞利有攸往曷之用二簋可用享頥貞吉觀頥自求口實利貞征凶弗損益之象曰九二利貞中以為志也正曰損之頥亦各以為養也得其所養雖損弗損失其所養雖益弗益故以言語飲食為足以害人而損之與以言語飲食為足以利人而益之是皆未得其正也然其道要於節慎則益之不若損者多矣故二簋者貞吉之實也損其二簋則已損益其二簋則已益過往而凶養正而吉詩曰委蛇委蛇自公退食退食自公委蛇委蛇弗損益之謂也六三損之大畜損有孚元吉無咎可貞利有攸往曷之用二簋可用享大畜利貞不家食吉利涉大川三人行則損一人一人行則得其友象曰一人行三則疑也正曰夫觀損之大畜而知學之大也大畜多者也損不貴多者也擇三而從一去疑而從誠古人之言行則必有以貫之也故多言不如多行多行不如一行以損而為大畜以二簋而不家食約博之路古人則必有取之矣子曰天地絪緼萬物化醇男女搆精萬物化生一則精精則神神則化精一之端萬化以出雖定大疑濟大險則亦繇此也何獨行道之自為師友者乎詩曰鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮若此則可謂善學者矣三人而得師其亦謂此也夫六四損之睽損有孚元吉無咎可貞利有攸往曷之用二簋可用享睽小事吉損其疾使遄有喜無咎象曰損其疾亦可喜也正曰天下無復大事也忿疾當身毫末皆大忿疾去身天下皆小欲忿相尋疾疢乃來異同其間血氣不災故睽猶未蠲忿也以損命之小損而大益以視天下之疢疾則悉繇此矣洪範曰強弗友剛克燮友柔克沈潛剛克髙明柔克燮友沈潛損其欲髙明強弗損其忿損之又損疾喜乃反書曰若有疾惟民其畢棄咎夫能損疾以濟小事睽之大事亦鮮不濟矣遄喜無咎則亦指此而為言也六五損之中孚損有孚元吉無咎可貞利有攸往曷之用二簋可用享中孚豚魚吉利涉大川利貞或益之十朋之龜弗克違元吉象曰六五元吉自上祐也正曰損之中孚明水繭栗以告上帝上帝之將享不擇博而嗜也曰吾得其精意焉耳故損無所益損而信則益也君子齋戒洗心神明其德下無朋從之助上無卿尹之援用其二簋而十朋弗違是非至誠而能之乎詩曰泂酌彼行潦挹彼注兹可以翟罍豈弟君子民之攸歸豈弟之道不自滿假不自滿假而後衆歸之永言配命成王之孚則亦謂此也上九損之臨損有孚元吉無咎可貞利有攸往曷之用二簋可用享臨元亨利貞至于八月有凶弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也正曰損已而臨民損君而惠臣損家而益國夫有耕穫之心而能之乎教思容保則君子之志也肥身肥家則非君子之事也故八月者收穫之月也災畬未穫可以就實矣君子秉其乾德而退若山澤居不問貨藏家不言有無鼓萬物而與之同憂先萬物而與之避凶視天下無可益我者則亦窅然若喪其天下矣雲漢之詩曰耗斁下土寧丁我躬雲漢之凶八月也君子以是損惠不以是損志圭璧既卒二簋是獻天下翕然信其不吝故得臣無家天下之所繇治也周公曰我受命無疆惟休亦大惟艱夫非周公誰用其不富之志乎益利有攸往利涉大川彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行象曰風雷益君子以見善則遷有過則改正曰學之有損益其相起也損盡而師天益動而師人師天者退師人者進故損無學而益有學損無問而益有問也風雷相勵鼓舞以時正者得其志應者得其氣氣志既從朋來乃同故忘食忘憂不厭不倦仲尼之學也君子不以人為無善已為無過故約已而師人居上而下下仲虺曰能自得師者王謂人莫已若者亡好問則裕自用則小湯與仲尼皆用之也故遷善改過風雷之象也風雷迅烈次於乾乾約於天心何改何遷性命之源不廢學問學問不廢乃得其貫及其究也以立不易方初九益之觀益利有攸往利涉大川觀盥而不薦有孚顒若利用為大作元吉無咎象曰元吉無咎下不厚事也正曰益益下者也觀未有以與之也曰致其意云爾世未有不隆其事而隆其意者也夫將隆其事以實其意則可以大作矣君子有郊祀之意而後可以致賓享有禘嘗之意而後可以致禴祠詩曰顒顒卬卬如圭如璋令聞令望夫非大作而何以副聞望乎故修意修言修文修名修德修行皆不可以已也而君子本之禮樂曰使下各厚事則六府之利已溥矣君子之益下非有以與之也曰使天下信之謂非徒取之天下者則是君子之與天下也詩曰如取如攜攜無曰益牖民孔易是益之觀之謂也六二益之中孚益利有攸往利涉大川中孚豚魚吉利涉大川利貞或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也正曰是猶之觀也亦貴其誠信而已龜蓍之益人亦非有益於人也誠然而求之誠然而告之其益之則皆吾正也其順之則皆吾信也豚魚且然而况於神明乎詩曰徒御不驚大庖不盈君子之庖御非有以益人也取其惟正則羣下皆益矣車攻之亂曰之子于征有聞無聲允矣君子展也大成天下之信君子與君子之取信於天下決不在多博也或得之聲聞或不得之聲聞要本於精意可以享帝則可以格於賔尸可以格於賔尸則可以格於黎庶矣六三益之家人益利有攸往利涉大川家人利女貞益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也正曰六德之有女貞五禮之有凶事善詛者不以咒善禱者或以祝謂是出於天性而因為之節文值其所損聖賢不能增值其所與天子不能奪故孝子貞婦恭兄弟弟至性所命或以為偏至一往者而聖人則以是為中行中行者中理而行之無所復損則皆可益矣故益之家人真切之至也桐宫之命東山之避或以是諱談而聖人履之若家人之嗃嗃有恆有物適相告焉爾故或益之或自外來者而益之用凶事不自外來者也父父子子兄兄弟弟夫夫婦婦聖人樂為之而有不能嚴父恭子友兄順弟義夫貞婦聖人能為之而有不樂一以是為無所損益者正行而不疑故金縢之義聖人不以為誕也六四益之無妄益利有攸往利涉大川無妄元亨利貞其匪正有眚不利有攸往中行告公從利用為依遷國象曰告公從以益志也正曰家人居者也居而女貞不避凶事無妄行者也行而有眚避凶事也故君子之為道不一律也要於中行而已矣烈風震雷不數見於家和風巽雨不數見於國可以居則居之可以行則行之以為正而利往以為眚而不利往度其正而匪眚則決其不利往而利往者盤庚洛誥皆用之矣盤庚曰各匪敢違卜用宏兹賁洛誥曰汝受命篤弼丕視功載丕宏之事鬼神與謀聖人非樂為嘗試也本之至誠䇿其永藏天地震動而咫尺是循聖人則亦不為之矣故中行告公無妄之道也利依遷國涉川之事也然則古之遷國皆冒大險亦皆告圭歟亦猶造次而遷之耶曰相其隂陽觀其流泉公劉之智也爰始爰謀爰契我龜太王之治也匪棘其欲聿追來孝文王之仁也貽厥孫謀以燕翼子武王之誼也易之大事有六建侯禦寇用刑行師遷國肆覲而取女不與焉故遷國者聖人之大毖也見善而遷見過而改雖卜宅建兆亦有所不誰得已也六三之凶事益之而有所不避夫非遷改從乎然則六四中行謂當位而行之六三柔凶而亦曰中行何也曰家人無妄皆貴其誠也誠則孚孚則從從則雖遷不失其中故依遷者亦古人所謂凶事也凶事致誠故告之而不違遷之而不疑然則春秋遷國有九聖人皆無一取焉何也曰是不獲已也迫於強鄰而依遷以自存聖人亦垂憫焉則何中行之有故無公劉古公之智文王武王之仁而欲依盤庚洛誥之事者亦寶龜所不告聖人所不憫也九五益之頥益利有攸往利涉大川頥貞吉觀頥自求口實有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也正曰益下以養民損上以養聖賢觀其所養而風雷之意可見矣故風申命者也雷為政者也申命居尊而雷應之動而受益發於心德夫以益下為事養賢為務何往而不得孚吉乎故惠者順也損上益下天下之大順也詩曰媚兹一人應侯順德是益之頥之謂也勿問元吉則亦當位之謂也故位者聖人之所貴也上九益之屯益利有攸往利涉大川屯元亨利貞勿用有攸往利建侯莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也正曰是猶有未利涉者乎建侯繫其中而進退不果屯為主人而家人為客雲雷交動險生於外是則禍患隨之矣故曰利涉則涉矣而曰勿涉曰利往則往矣而曰勿往夫以往涉之利為不如建侯之利也則是求益而不已者也屯難之所起也楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王遂討焉薳子馮繼為令尹有寵於薳子者八人又無祿而多馬申叔豫三避之於朝薳子從而請過叔豫曰子南自縊而觀起車裂夫子未之知乎於是子馮退八人者而王乃安之慶氏之亡與晏子弼殿其鄙六十弗受子尾曰子固不欲富乎晏子曰慶氏之邑足欲故亡吾邑不足欲也益以弼殿乃足欲足欲亡無日矣韓宣子求環於鄭商子産弗與子太叔子羽為請之子産曰僑聞君子非無賄之難而無令名之患為國非不能事大字小之難而無禮以定位之患大國之人令於小國而皆獲其求何以給之一共一否為罪滋大故如申叔豫晏子子産可謂恆心莫益者矣然則利涉而不涉利往而不往亦有頥用居貞渙思匪夷者矣而益獨以屯而得擊何也曰益極之必損損極之必益亦猶之否泰也富天下而不益退無家而弗損以為是恆心者非聖人而能之乎故觀損之上九而後知益之將退也非所以為進也子然則夫子所謂三修者何也曰夫子其謂郤獻乎范武子將老召文子曰燮乎吾聞之喜怒以類者鮮矣易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以已亂也弗已者必益之郤子或者欲已亂於齊乎不然吾懼其益之也武子請老以位益郤獻子獻子以是擊齊亦以是自擊也子曰君子安其身而後動易其心而後語定其交而後求危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶其郤獻子之謂乎損益三隂之卦也山澤為令風雷佐之故從於北政自否泰咸恆損益剛柔相應至於兩濟為乾坤之終始而泰否損益三分其間為距乾坤咸恆三百三十六嵗而自為一際自乾坤至於損益千二百一十嵗而入於夬姤南北反正剛柔易位故曰盛衰之始則始於此也序卦傳曰解者緩也緩必有所損故受之以損損而不已必益故受之以益是何義也曰亦其義也是其意不為義起也永定元年陳霸先自立弒其主方智宇文覺亦弒其主欽自為天王曽不數月宇文護亦弒覺南北之智孰為俱謀夫猶是損之初嵗也不則蹇之中交也於時周齊兩大陳介江南蓋自梁察淵明之時則固齊魏之屬國也陳主藉席故事黃鉞即真不三年而殂蓋自永明建元隆昌三篡立主未有過三年者安成北還伯宗坐廢叔寶嗣之與敗為餌天塹之險墜於婆娑韓賀一鼓辱井梯繩可歎也於時髙緯昏虐周雍亦殂中原禮樂蕩然將盡而戰爭天厭欲還一家楊堅以元舅之藝手攜幼主得其寶圭上無劉宋中外撻伐之勳次無蕭齊骲箭引滿之迫下無蕭梁戮兄遣客之危次無陳武討景乘亂之業雖髙洋宇文泰之取兩魏未有如此之委蛇頌容者也泮自開皇已酉以前叔寶至德戊申以後損益中交後際歸唐前際歸晉晉承八體卦分裂之餘領於咸恆以居遁夷下經之有天地雖逢衰亂不失正統則是遁大壯晉明夷之以也家睽蹇解損益則六子爭治矣夬姤萃升隂陽易位而天地不改唐室乃受之故漢之有魏運之終也唐之有隋運之始也每限中分交之天地故一卦之限各三十三年而新陳相次觀於中交乾坤定位成列而運限所值思過半矣盛衰之始夫蓋謂此也然則唐得為盛朝乎曰唐固盛朝也自魏晉以來三百八十四年至大業之初臣弒天子者二十子弒其父妻弒其夫者再胡羌小國不在此數而唐室僅一見安得不為盛朝乎易象正卷七
