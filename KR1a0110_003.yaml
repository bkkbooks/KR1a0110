body:
  text: 易象正卷一明黄道周撰乾元亨利貞彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庻物萬國咸寧象曰天行健君子以自强不息正曰乾盛陽也盛陽之䇿三十有六六爻之積二百一十有六長夏之軌也古之為易者宅於土中視極南北以測日道之遠近兩極相距約百八十益以北極出地之數三十有六為二百十六天子所南向而正方外也兩極之間九十餘一各𠂻二十四為南北陸日月出入四十九道分於天中聖人所手揲以得經緯也凡日之行三百有六十餘分贏縮不及大衍視於氣朔以為閏端一舍之度槩贏三十故長夏日行出寅入戌中歴七舍得二百一十六晝長二百一十六則夜短百四十四晝夜之道乾坤之義也君子觀於兩極以得乾之徑觀於兩陸以得乾之周觀於揲蓍以得日月之行觀於晷影以得寒暑之度洗心而處正容而告非仁无行非義无為如是則可以言健矣履盛而不媮處滿而知懼教而知絀學而知不足過而能改不足而能勉早服莫宿可以言自彊矣故日法天者也君子法日者也寢興明發體道不息變化萬物而還守其極凡乾之變六十有四又復重之十有八變為卦二十六萬二千一百四十有四凡得乾者四千九十六諸卦之變皆得四千九十六故曰動不可亂賾不可厭以時乗之則萬物各正古之為彖者選理而約言兩彖相取以為本象單舉一變以繫一爻通取諸彖以該衆變故彖簡而義可通象備而辭不費三聖人之辭彌漫天地皆可按象而求循實而指也是正象之所繇始也文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞文言又曰乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也初九是為乾之姤命以乾彖合姤彖而爻辭乾元亨利貞姤女壯勿用取女潛龍勿用象曰潛龍勿用陽在下也正曰乾初得九而取諸姤何也曰姤者乾之始交於坤者也乾初得九過揲三十六則乾初動動而交於姤以乾之體合姤之辭兩義兼取為之象曰潛龍勿用乾之言潛龍勿用猶姤之言勿用取女也然則潛龍之於取女何交乎曰陽極矣而動者猶穉隂生矣而交者始壯龍德方潛女謁初事始用不慎則終體從之故初者終之氐也下者上之本也正其本而萬物理謹獨慎微君子之始事也詩曰潛雖伏矣亦孔之灼書曰毋若火始熖熖厥攸灼叙弗其絶故乾元用九潛龍所不敢試也文言曰初九潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也又曰君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也正曰聖人之解潛龍不取諸女壯何也亦各其道也或德或材或用或體三極之原聖人特取其至者以為隱遯之亦有龍德也是君子之本事也不可以為典要惟變所適變而之姤聖人則亦以姤御之矣隱德遯世以避隂旤行之不遠藏之於早確乎其不可拔則猶是勿用之志也商書曰王嗣厥德㒺不在初立愛惟親立敬惟長始于家邦終于四海夫立於未見行於未成者其為潛德亦豈有異㫖乎故君子之於初九廣致之也幽獨之事側陋之志本底之業是皆有龍德焉要以出於恪慎底於誠敬不為世易不為名動不為是勸不為毁阻確乎其不可拔守其勿用以為利貞則其義一也九二是為乾之同人命以乾彖合同人彖而爻辭乾元亨利貞同人于野亨利渉大川利君子貞見龍在田利見大人象曰見龍在田德施普也正曰乾足以斷矣不以獨而傲衆不以智而絶物不以當位而自賢雖曰利貞則猶之亨也君子渉川不居其功目心而游與衆共懷出潛而田莫之或傷夫非大人而能之乎書曰出入自爾師虞庻言同則繹詩曰渒彼涇舟烝徒檝之言同人也乾之同人雖在田野猶足以被天下德之至也文言曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也又曰君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君德也正曰聖人之解見龍亦不取諸同人何也曰善世不伐德博而化非同人而何乎庸言庸行天下之共秉也君子舍是則无以學无以問无以居无以行故君子之渉川有以異於人也其以信謹而渉川先以異於人也詩曰雨我公田遂及我私彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利是大人之宏也雖以君天下亦不過如此也九三是為乾之履命以乾彖合履彖而爻辭乾元亨利貞履虎尾不咥人亨君子終日乾乾夕惕若厲无咎象曰終日乾乾反復道也正曰君子自彊如天與日相環復也龍雖體陽而有動息隂陽合徳則无動息无動息則无日夕惕若之厲君子所致其健也故君子乘龍者也乘龍之與履虎異致而同戒書曰無安厥位惟危又曰凜乎若朽索之御六馬詩曰惴惴小心如臨于谷君子之惕厲如此也雖不自謂龍德而龍德交備焉故君子者六龍之御也文言曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣又曰九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣正曰君子之不言龍何也曰不睹不聞龍所至也戒慎恐懼非龍所至也君子洗心退藏不敢自謂神明其德然則君子過龍者歟不及龍者歟曰君于之不敢自謂龍猶龍之不敢自謂君子也然則龍无惕者歟曰上不在天下不在田不潛不躍則禍患隨之何為其无惕也然則聖人亦不取諸履虎何也曰重剛不中因時而惕雖危无咎非履虎而何乎君子之蹈髙位猶之虎尾也委蛇屈伸君子間嘗言之然且不敢用用其終至者曰忠信誠敬而已矣然則君子亦猶人之心歟曰人心之與道心皆天也天以健行日夕不遑君子自彊惕厲乾乾惟其微極是以危至故危者微之所以審幾也微者危之所以存義也君子之德業非危則无所繇著也以德乘時以時乘位君子樂之然而不可必致則亦彊勉无咎而已矣委蛇屈伸間嘗言之然且君子有所不用也九四是為乾之小畜命以乾彖合小畜彖而爻辭乾元亨利貞小畜亨密雲不雨自我西郊或躍在淵无咎象曰或躍在淵進无咎也正曰或躍進也小畜止也畜則可以止矣而若或躍之躍則可以進矣而若或畜之猶密雲之可以雨而且不雨密雲西郊其當殷周之事耶皇矣之詩曰維此四國爰究爰度泰誓曰同力度德同德度義聖人之慎動也如此故進而功被於天下退而德滋於七世以是自試何咎之有然則是龍也而不言龍何也曰猶之密雲也而未雨則不可言雨也文言曰九四或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進德修業欲及時也故无咎又曰九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎正曰躍龍之為小畜何也曰未當位也未當位則為小畜當位則為大有進德修業小畜所為懿文徳也然則為邪離羣何為乎疑之也曰德之不及時時之不及位天人之所以互勝也上下進退不隱不見則時位之人必有以命之矣故畜者疑之所從生也疑必有咎而曰疑故无咎何也密雲不雨畜之而密密之而久則必且雨矣然則當時當位或惕或疑皆人也而曰中不在人何也曰无有時位而謂之人不亦難乎九五是為乾之大有命以乾彖合大有彖而爻辭乾元亨利貞大有元亨飛龍在天利見大人象曰飛龍在天大人造也正曰乾而大有是長夏之德也天下大治則禮樂懋著刑戮偃息矣天造大人大人造命故為元以長物為亨以合禮百禮備至以順天休命以揚善不事車服以遏惡不事斧鉞頌曰綏萬邦屢豐年書有曰暨鳥獸魚鱉咸若故君子之利貞於是亦有所不事也然則飛龍之道亦固有息乎曰日月週天天週日月星辰迴環則皆飛龍也何息之有書曰毋怠毋荒四夷來王乾之大有之謂也文言曰九五飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其𩔖也又曰夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎正曰聖人之言從𩔖何也五德之帝佐亦各以其𩔖取也各以𩔖取則五德分序而曰合德合明合序合吉凶何也曰猶是天地也日月也四時鬼神也併而言之則猶是天人也其本于學問忠信誠敬聽於庸言考於庸行則古今一也古之聖人去知而考德本之於元而要之以貞曰苟足以長人利物則足為智矣故以利而和義以信而和智行之以仁居之以寛是大人所合德於天地也然則大有之不言利貞其亦謂此歟曰利貞則乾體而有之也乾致其體而大有致其用仁者見之謂仁知者見之謂知要於五德四時則莫此為備矣書曰慎徽五典五典克從納于百揆百揆時叙其易所謂大人者乎上九是為乾之夬命以乾彖合夬彖而爻辭乾元亨利貞夬揚于王庭孚號有厲告自邑不利即戎利有攸往亢龍有悔象曰亢龍有悔盈不可久也正曰夫保其盛陽者其惟致柔乎感之於未而動致其决物極且反則隂勢必奪揚庭孚號其有悔心乎古之去小人者使小人自遠若蛇虺之避都市也以極重之勢行其柯斧而揚聲號衆如有敵國之心非亢龍而為之乎故告邑之貞所以去厲也即戎之不利而利攸往所以馴致也天道運行一盈一絀威不可殫武不可極大禹之征有苗也其終曰班師振旅誕敷文德文王之討密人也其詩曰依其在京侵自阮疆若此則庻乎无悔者矣文言曰上九亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也又曰亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎正曰揚庭孚號則未為亢也聖人之言亢龍亦未取之揚庭何也曰皆取之矣古之髙貴者度德與位時勢已極則舉賢以自讓也故進而有退存而有亡得而有喪正鵠不失俊民來輔夫處髙貴之位持滿抱盈夬夬而行號衆以自助動衆以自功謂是進可不退有可不亡得可不喪者則衆之所共棄也君子而有龍德必悔之於蚤悔則不吝不吝則无咎故悔亦非龍德不能也詩曰比于文王其德靡悔既受帝祉施于孫子故如文王則可以靡悔者矣用九六爻皆動是為乾之坤以乾彖合坤彖而為義乾元亨利貞坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉見羣龍无首吉象曰用九天德不可為首也正曰史墨之説聖人亦有取之歟曰殷道之坤乾則取諸此也取諸此而獨言用九何也曰靜則為體動則為用體乾而用坤六爻皆九則純乎用也然則聖人何不直謂乾之坤也曰乾首也乾有六龍六龍皆動而乾不為政則是无首也无首則牝馬也然且稱羣龍何也曰繇是而之焉六十四卦至四千九十六卦皆龍也龍隱其首以御羣龍至於坤而極矣自姤同人履小畜大有夬而推之二變始遯三變始否四變始觀五變始剝皆龍也龍異用而殊名其要於過揲四千之數三十有六道則一也然則委蛇變化聖人亦不得已而為之歟曰體剛而用柔秉義而用仁服龍而乘馬馭牡而利牝是亦聖人之權也聖人不以權而亂經不以變而亂常四千九十六卦之中十八變六爻皆九者一值之耳然則太王之避居文王之服事可謂无首之龍歟曰是亦間值之也間值之則可見雜值之則不可見夫有文王之德以行文王之事雖乾坤互用未為不契也詩曰予懷明德不大聲以色不長夏以革不識不知順帝之則是乾而坤者也臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂是則非乾而坤者也故羣龍无首非聖人不能見亦非聖人不能用也文言曰潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也又曰潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則正曰聖人之贊用九則猶謂之乾元也謂之乾元則不得謂之坤元也而謂之乾之坤何也曰六十四卦之九則皆自乾來者也故謂之乾元乾元而不自為元則坤將受之乾以用九而之坤坤以用六而之乾乾坤成列而易立其中无乾坤則无復易也故乾之必易而坤坤之必易而乾乾坤之始義也乾之不遽易而坤坤之不遽易而乾乾坤之立體也故易始于乾交於姤終於剝剝而後坤受之始於坤交於復終於夬夬而後乾受之終始乾坤相為反復歴律以出禮樂以作六爻變化而天神以降地祗以出亦其義也然則坤者乾之變律歟曰吕者律之合體也乾坤合而後律吕備律吕備而後變化出曰是言夫乾而合坤者也非言夫乾動而變者也乾動而變用有七爻變有七律不亦可歟曰律五而變二可損益者也爻象本六不可損益者也一卦之變六十有四自姤而坤各舉其一以為變例非謂七卦可以盡爻之變也然則易之九六變而七八不變何也曰家正主於父母氣化主於天地天地父母不為政則六子不得為政也七八所值六子之象九六所值父母之象也然則陽變而遂為隂隂變而遂為陽歟曰隂陽之體何可變也陽九而動隂六而交九動而取於坤六動而取於乾乾坤夫婦相為取也然則六爻皆九猶然乾也不謂乾之乾而謂乾之坤何也曰易之為道靜以為體動以為用靜體則反復動用則對化反復之與對化皆易也无對化則乾不為坤无反復則屯不為蒙對化之易始於乾坤則例可通於乾坤故對化之與反復其例得相起也聖人之意以六十四卦皆為乾坤陽爻一百九十二皆出於乾隂爻一百九十二皆出於坤雖八卦之體以相錯而成而兩元之用以揲蓍乃者故於兩元六爻之外别繫兩象使人悟九六二用即謂之卦諸爻盡變極於乾坤故未舉其反復之體先顯其對化之用或曰是不過贊之耳曰是象也何贊之云有動則有象有象則有占潛見惕躍飛亢无首皆象也則皆占也如謂贊者亦何吉凶之有乎如以羣龍通諸卦則吉凶悔吝雜見平分不專曰見羣龍无首吉也故論九之為用則通於諸卦論乾皆用九則專指之坤凡爻俱變與俱不變者其卦各一一爻變與五爻變者其卦各六二爻變與四爻變者卦各十五三爻變者二十故乾之體一其用六十有四因而乘之四千九十有六又復乘之二十六萬二千一百四十有四皆龍也羣龍雜見而乾不為首夫有入於羣龍而見龍之首者則亦足與於天德也矣乾之乾反復六爻不動辭即以本彖為之彖乾元亨利貞象曰天行健君子以自彊不息正曰乾之乾何也天行之健晝夜各六永促雖殊其為十二辰則一也故六爻者晝夜之半也乾出寅而八戌與入戌而出寅則猶之十二爻也一卦反復為十二爻當天之辰一日之辰當嵗之月故日十二辰嵗十二月推邇及遐其究一也然則一日之邇三百六十乾坤對化䇿與度比如使乾坤各為晝夜則乾䇿往還四百三十二坤䇿往還二百八十八贏乏縣殊何以裁之曰蓍者所以得卦策者所以命爻爻象已定不命蓍䇿乾之䇿二百一十六反而復之則猶之乾也坤之䇿一百四十四反而復之則猶之坤也卦有反復而象不更䇿且為隂陽以别寒暑為辰爻以别晝夜陽贏而暑陽乏而寒漏有促永辰无損益又何疑焉然則是主晝以該夜主日以該月得象者遺數得爻者忘䇿也曰䇿極於三百六十數察於分毫秒忽數之非䇿猶日之非月也如使乾坤合䇿自為晝夜則屯蒙合䇿三百三十六需訟合䇿等於閏朞師比合䇿三百一十二畜履合䇿至於四百有八又孰取而裁之故曰天之道積也積其不齊者久而後齊之䇿之數三百六十贏其五日四分有一以為氣贏縮其五日四分有二以為朔虚然且太絀不及於歴故需訟之為一閏小畜履之為再閏聖人間取之而未敢用也用其積數之至者耳且是乾乾者體七之䇿未至於用九也體七之䇿三百三十六日月用之以為交限之始積陽之數一百二十五相乘之數一萬五千六百二十五反復重之三萬一千二百五十總其積卦四千九十六故乾乾之有反復猶屯蒙之有反復必取䇿而齊之則乾之必合於坤猶屯之必合於鼎蒙之必合於革也然則以乾復乾其占何歟曰乾乾者君子所自予也禮樂之本於性情君子所自治也君子不以多難而輟其志不以久近而改其事詩曰日就月將學有緝熙於光明書曰兢兢業業一日二日萬幾其乾乾之謂歟乾乾自强萬物始終是无智名亦无勇功其究也以厚德載物正曰乾之乾謂其左右行者也左右行則猶之乾也彖卦不别則爻象无異雖有六十四變其為兩彖互取一也而必為之六爻何以正之曰取其體者則有八體取其交者則有八交取其一爻變與五爻變者是皆六卦也正乾之有姤同人履小畜大有夬猶反乾之有復師謙豫比剝也五變與一變是皆六卦可為起例故正乾用其一變反乾用其五變者以為六十四變之發端然則是不疑於五爻皆變則占其一爻不變者歟曰用者動也動者之也一爻不變又何之焉夫亦用其動者指其所之而已乾之復九二九三九四九五上九初七五爻皆動以乾彖合復彖為義乾元亨利貞復亨出入无疾朋來无咎反復其道七日來復利有攸往正曰乾之復健而自反者也君子之於道德為主則不為客於學問猶譏察而不征也蚤往蚤復克其非禮反於元始是不可謂智者乎智以知天之心猶平旦而星躔復著也書曰爽惟天其罰殛我我其不怨詩曰庻幾夙夜以永終譽是猶父母交動而長子在内也龍雷雜乗不失其𩔖雖有抗攘其法不敗守國者貴乾之師初九九三九四九五上九二七五爻皆動以乾彖合師彖為義乾元亨利貞師貞丈人吉无咎正曰乾之師自彊而容畜仁矣哉水者金之子也天廓而地液之浸為膏澤不出四游百穀以成書曰水火金木土穀惟修正德利用厚生惟和九功惟叙九叙惟歌自彊而容畜則是可歌也詩曰自今以始嵗其有君子有穀貽孫子是不可以起侵伐動敵國而徒衆之事未之免也夫猶司空氏之事乎乾之謙初九九二九四九五上九三七五爻皆動以乾彖合謙彖為義乾元亨利貞謙亨君子有終正曰乾乾君子謙亦君子也君子致謙非為守位而裒益稱平之何也曰戒懼者君子所為學也抑而自反君子所為治也夫有險阻之心焉書曰汝猷黜乃心無傲從康詩曰予又集于蓼君子之值此蓋不得巳也踐土之盟天王下勞晉侯河陽之狩晉侯上召天子春秋特隱其文曰朝于王所狩于河陽非文公之謙而春秋特為之謙之也曰天王已謙焉耳敬王之居于狄泉入于成周則猶之謙也野井之唁齊侯致服器焉三致而三辭齊侯强之昭公嗷然而哭諸大夫皆哭以人為藩以襞為席以羣為几以遇禮相見是則不可謂謙也謙之為道見盈而思虧見流而思變見福而思害見健而思不健者也以謙而保終則亦庻乎其可耳仲虺之誥曰慎厥終惟其始其是之謂夫乾之豫初九九二九三九五上九四七五爻皆動以乾彖合豫彖為義乾元亨利貞豫利建侯行師正曰乾之豫是則可以動也无父母而外長子則仆也有父母而上長子則竪也車駕於道衆將輔之以征不庭以討不服詩曰乃立冢土戎醜攸行書曰用命賞于祖不用命戮于社君子之强立而順動若此也蕭魚之㑹晉舍鄭囚禮而歸之鄭人賂晉以師悝師觸師蠲及其兵車佐以鎛磬歌鐘二肆女樂二八晉侯以其半賜魏綘魏綘曰臣願君安其樂而思其終也夫樂以安德義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來遠人書曰居安思危思則有備有備无患敢以此規夫以悼公之能八年三駕九合諸侯受舎鄭之樂而君臣相戒以為不敢樂也是可謂乾之豫者矣豫而知戒豫而不怠是則猶有乾德者也乾之比初九九二九三九四上九五七五爻皆動以乾彖合比彖為義乾元亨利貞比吉原筮元永貞无咎不寧方來後夫凶正曰乾之比衆位皆動而君極如故以為正則有君以為應則有親不寧後凶未之避也守其正固者而天下信志書曰百姓王人㒺不秉德明恤詩曰敷時繹思我徂維求定殷人五遷而還於亳都周人四遷而大於郟鄏夫非有原筮之德而保其不敗者乎夫有原筮之德以奮跡外服克光前物雖間關倚伏未為失也楚子謂子玉曰晉公子廣而儉文而有禮其從者肅而寛忠而能力唐叔之後其後衰者將繇晉公子乎天之所興孰能廢之如晉公子則可與原筮者矣乾之剝初九九二九三九四九五上七六爻皆變以乾彖合剝彖為義乾元亨利貞剝不利有攸往正曰乾之剝以健用物載髙而厚下是非凶卦也守其四德不為功利以耀於上夫誰凌轢之乎衆輿轔轔不危其身鬼神之行不蹈廟社以行師伐國則不可以治其私邑綏馭臣庻猶未失其威福也書曰髙明柔克彊弗友剛克剛在於内為坤以柔之陽德遂成為艮以終之盛於西北者儷於西南盛於西南者究於東北是則不為凶卦也利貞而已頌曰天作髙山太王荒之又曰彼砠矣岐有夷之行夫以乾之剝為亢龍者則亦不適於龍之義矣然則是六爻者之為何龍也曰潛見惕躍飛亢則猶之六龍也為六龍而不用其潛見惕躍飛亢者則又非是六龍也然則是六龍而獨疑於謙惕者何也謙惕則猶之不在天田也不在天田而有其謙惕非旱潦之災則豢御之憂然則不疑於剝龍者何也謙勞而剝逸謙煩而剝簡世固有舍其尊柄引於太上者矣太上之於遐引有間乎无間也然則四德之中比得其元謙得其亨豫得其利師得其貞剝皆无得獨得不利焉而曰非凶卦何也曰是亦君子之所自考也剝人而彊已君子不為也剝已而彊人君子猶或有為者夫亦保其終德不摇其末則聖人有取焉詩曰天生蒸民其命靡諶靡不有初鮮克有終則聖人所致誡於剝龍者矣坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合无疆含宏光大品物咸亨牝馬地𩔖行地无疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與𩔖行東北喪朋乃終有慶安貞之吉應地无疆象曰地勢坤君子以厚德載物正曰地之稱勢崇卑定也圖象之義乾南而坤北崇卑之勢乾上而坤下北極出地三十六度則南極入地三十六度中分日道一百八十裁其距中三十有六下去地平僅百四十有四是坤之所命䇿也坤隱其勢以上與乾物馮於地而不知其載於天但謂地之深厚若是也地發於西南而亘於東北東北為戊西南為已己柔而戊剛剛不得朋而柔得朋故己者文治之所貴也君子致身以事君易心以處友敬而不違勞而無怨執之而不鳴易之而无競亦可謂厚矣難則先之樂則後之急病而讓夷絶交而无惡聲亦可謂載物矣故朋者君子之所慎也君子擇交以淑其身敬友以淑其人西南得朋乃與𩔖行言夫坤之所以成己者也東北喪朋乃終有慶言夫艮之所以成物者也成已以成物非夫敦厚至誠而能之乎至誠敦厚終始萬物其究也以自强不息文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行正曰坤至柔而動也剛是不為坤之交於乾者歟曰未言乎交於乾者也後得主則先有未為主者歟曰婦之從夫母之從子其先皆未為主也其先皆未為主則用六皆動何也曰是已為母也方其為諸女也亦何主動之有乎然則六索三男之皆稱乾六索三女之皆稱坤何也曰是隂陽之府也天地之所授也男女交而後五倫立五倫立而後變化出變化出而後慶殃生慶殃生而後亂賊見亂賊見而後天地之權不得不託於聖人是詩書春秋所繼易而作也初六是為坤之復命以坤彖合復彖而爻辭坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉復亨出入无疾朋來无咎反復其道七日來復利有攸往履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也正曰坤初得六而取諸復何也曰復者坤之交於乾者也坤交於乾之初陽氣甚柔而隂氣始凝霜積而冰堅萬物之所復也萬物復命憂危慮深七日來復言夫辨之貴早也書曰怨豈在明不見是圖微霜下而堅冰結君子即不及挽亦必思所以持之詩曰一之日于貉取彼狐貍為公子裘二之日其同載纘武功言私其豵獻豜于公古人之備氷霜如此其至也其君臣親則上下協上下協則和氣至和氣至而氷霜不害矣然則是非黄鍾之律歟曰是黄鍾之律也九數之極八十有一三分損一以生林鍾在於是爻也然則是林鍾也林鍾之律五十有四而曰黄鍾何也曰以其體序所居則是林鍾也以其月分始交於乾則本於黄鍾謂一陽從生焉故謂之黄鍾曰然則是復臨泰壯夬乾之所為序非夫復師謙豫比剝之所為序也曰律之從吕吕之従律交相取也乾之初九娶於林鍾以謂之姤坤之初六嫁於黄鍾以謂之復語其本家則乾律而坤吕語其歸娶則乾吕而坤律也然則陽生於子而極於巳隂生於午而極於亥今以黄鍾從乾而始於子林鍾從坤而始於未何也曰陽順而隂逆爻以六正律以八間然則六辰逆行寅不娶巳辰不娶卯不曰丑亥酉而曰丑卯巳何也曰七律所間離於八位則遠於兩家然則爻象之與律吕同道歟曰夫婦父子兄弟君臣朋友雖暨於鳥獸被於草木應物而有之也然則林鍾之義於氷霜无取何也曰陽極則隂生隂生則陽死雖在六月而凜氷霜豈為過乎文言曰積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所繇來者漸矣繇辨之不早辨也易曰履霜堅冰至蓋言順也正曰甚矣聖言之危也善者人之性也善而得慶天之命也彿性則逆命乾坤中分為月有六陽動於子子月而言潛龍隂動於午午月而言冰霜聖人不患其言之太早而患其言之太晚也是聖人之仁也六二是為坤之師命以坤彖合師彖而爻辭坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉師貞丈人吉无咎直方大不習无不利象曰六二之動直以方也不習无不利地道光也正曰善未有不習而成者也不習而成性也水行於地舍險而就易舎阻而就順羣趨衆奔一似有知覺者然而其性也非習也君子體善而動仁不近名義不近利柔不為怯勇不為武非其所試任而不辭若水之行於地也詩曰沔彼流水朝宗於海何直如之淊淊江漢南國之紀何方如之川澤訏訏魴鱮甫甫何大如之得其道而可以容民畜衆雖與之丈人弗疑矣文言曰君子敬以直内義以方外敬義立而德不孤直方大不習无不利則不疑其所行也正曰待亨而動則體敬者鮮矣擇利而行則秉義者怠矣故敬義者元亨利貞之本也敬義立則德不孤德不孤雖喪朋何憂焉六三是為坤之謙命以坤彖合謙彖而爻辭坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉謙亨君子有終含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也正曰謙之含章君子之正也正而文未著於天下道未洽於四國故可之可者所以為牝也謙而從王君子之誼也君子正誼而不為功從事而不為利舍功與利則事可不從功可不試也故或之或者所以為柄也或而可之故曰无成亨而能貞故曰有終觀於謙之有終而兩彖之義大較著矣虞書曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功其坤而謙之謂乎文言曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也正曰甚矣聖人之慎也美曰雖有不自為美也成曰弗敢无所從敢也蓋謙之至也然則不言子道何也曰子則亦臣也書曰負罪引慝祗載見瞽瞍夔䕫齋慄而見夫為子而敢者乎六四是為坤之豫命以坤彖合豫彖而爻辭坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉豫利建侯行師括囊无咎无譽象曰括囊无咎慎不害也正曰利建侯行師而曰括囊何也曰建侯行師括囊之大者也伐國之謀不及於左右建子之謀不及於婦人豫者謀之至早也至早而審不為利勸不為功躁不為喜泄不為怒發詩曰君子無易由言耳屬于垣書曰其惟不言言乃雍括囊之謂也然則是非獨臣道也而謂之臣道何也曰不密失身在於臣子其最著者也文言曰天地變化草木蕃天地閉賢人隱易曰括囊无咎无譽蓋言謹也正曰是无取於豫也豫以建侯行師而曰隱閉謹括何也曰是聖人之智也天地之㑹二千四十八而入於乾坤近而求之二百五十六亦入於乾坤入於乾坤而天地始閉閉而後開至於中爻而禍患乃備故非聖人不見之蚤也見之者蚤而後圖之者豫圖之者豫而後禍患不侵德業懋著也故藏身不密而有咎有譽中人之道建侯行師則必以為不可也六五是為坤之比命以坤彖合比彖而爻辭坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉比原筮元永貞无咎不寧方來後夫凶黄裳元吉象曰黄裳元吉文在中也正曰是亦坤元也天地之始動而坎為初政屯蒙需訟師比皆坎也坎當坤中取乾之九以居於五故坤之盛德未有盛於比者也比建萬國以親諸侯為臣而順其君為后夫人而順其夫先迷後得即有不寧何凶之有詩曰百辟卿士媚于天子言臣之比其君也南有樛木葛藟纍之言后夫人之比其夫也書曰惟尹躬暨湯咸有一德克享天心其坤之比之謂乎文言曰君子黄中通理正位居體美在其中而暢於四支發於事業美之至也正曰坤有先迷比有後凶兩彖之間未為吉也而黄裳事業以為極軌何也曰是至美之源也坤交於乾得乾之心以媚一人而應天下虞虢姜任亦同此志也而小人得之以竊國柄以移君心以自蹈於不順故元吉之卦君子用之而吉小人用之而凶南蒯之禍春秋之所戒也上六是為坤之剝命以坤彖合剝彖而爻辭坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉剝不利有攸往龍戰于野其血𤣥黄象曰龍戰于野其道窮也正曰龍戰而窮非剝而何乎坤之上六馬交於龍龍交而戰富而不可貧貴而不可賤髙而不可卑上而不可下則不肖之心生於其間危慄之禍從而應之矣故剝之下西南也其上東北也東北之交不利攸往往之而窮以為是時㑹使然可乎哉書曰有其善喪厥善矜其能喪厥功是坤之剝之謂也謂其交於亢者也文言曰隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其𩔖也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄正曰剝而見血何疑之乎易之稱血則必其隂凝者也君子修人以侔於天體道以侔於神侔天與神絶類而行夫未至於神明雖飛潛見躍猶之乎龍也而况其亢戰者乎用六六爻皆動是為坤之乾以坤彖合乾彖為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉乾元亨利貞利永貞象曰用六永貞以大終也正曰坤言安貞而六爻皆用則是未安也貞德之在人猶貞婦之治内居之而不安行之而不永則無為貴貞矣然是坤乾之交也坤以全體盡交於乾為臣與妻盡委其身亦未為不貞也然則夫子之不贊用六何也曰是亦特卦也六爻過揲皆二十有四一卦之䇿百四十四間值之矣天道極南貞而復始龍戰之後復疑於龍雖有其用君子亦不敢用也然則乾以用九而先命坤坤以用六而先命乾乾坤對化為諸卦之綱領屯蒙以下宜皆對化而又單舉反復何也曰使屯蒙以下九六皆用則皆對化也九六未用而先舉反復則六辰之義通於晝夜乾乾坤坤不得不自為反復也故自用六而外又以坤之坤繼焉反復六爻不動辭即以本彖為之彖坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉象曰地勢坤君子以厚德載物正曰是猶夫乾之乾也過揲之數六爻皆七得䇿一百六十八因而復之三百三十六日月於此十有二交以一日之辰麗之出辰入申亦猶之十二辰也辰爻之分不以策數而為羸縮要於反復以為五十六卦之綱領故屯蒙二陽取之於乾屯得於正乾自下而上蒙得於反乾自上而下需訟二隂取之於坤需得於正坤自下而上訟得於反坤自上而下師比一陽取之於乾小畜履一隂取之於坤其上下往復亦猶之屯蒙需訟也泰否平分對化往復皆得乾坤之丰故三陽三隂對化往復共為上下如使乾坤之卦有對化而无反復則五十六卦之反復亦无所從出矣故乾坤之有反復以為坎離頥大過中孚小過反復之本而兩濟之有對化即為泰否隨蠱漸歸妹對化之終是以易舉用九用六以明乾坤之有對化諸卦九六兼用則為對化七八互體則為反復其總於三十六而分於七十二動靜顯藏其究一也坤之姤六二六三六四六五上六初八五又皆動以坤彖合姤彖為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉姤女壯勿用取女正曰是坤之姤也利牝馬矣又勿用取女无它貞而巳魯桓公十八年公㑹齊侯于濼與夫人姜氏如齊夏四月丙子公薨于齊明年莊公立不書即位三月夫人孫于齊謂外讎之未討也以國為戚而俛首於其母又明年夫人姜氏㑹齊侯于禚又享齊侯于祝丘又㑹于防于穀是雄狐敝笱之所繇作也莊公親見其母拉隕其父而又納幣于齊如齊觀社丹楹刻桷内覿用幣以長齊女之志釀慶父之慾微髙傒季友則幾喪其國故女壯之與冰堅君子所同戒也敬羸之亂哀姜大歸公子遂殺惡及視及公子赤也播於道路又急於齊婚外倚髙固賊在而不敢討身屈而不敢愾蓋自餘丘之㑹郪丘之盟而慶父襄仲已操刃於子般子赤之項而莊宣未之知也詩曰蒹葭蒼蒼白露為霜書曰母俾易種于兹新邑禍種之萌不見芽蘖冲冲鑿氷蓋自白露而已定之豈待隆冬乎然則是占也宜在坤之復而在坤之姤何也曰古之卜者探陽則視其隂探隂則視其陽復之於姤亦時相取也然則是為五爻皆動而占不動者歟抑夏商所用七八不用九六者歟曰猶是五爻皆動之占也然則世固有占之得姤而吉得復而凶者矣曰君子所據則固其理也理不以偶獲而敗貞勝坤之同人初六六三六四六五上六八二五爻皆動以坤彖合同人為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉同人于野亨利渉大川利君子貞正曰坤之同人其不動者二則是内為主也内為主而不動則是衆不外也衆不外者端冕搢笏以聽衣裳之㑹葵丘首止其大者也春秋稱同盟者一十有六尊周之㑹二屏楚之㑹十四夫固有私忌而擇便者矣猶未失於利渉也公羊子曰知者慮之義者行之仁者守之夫安至於此乎亦得君子之意而已穀梁子曰信其信仁其仁於是而後授之諸侯也雖且召欲又有仁義信智之意焉襄公十八年宋衞鄭曹莒邾滕薛杞小邾同圜齊圍國四十四未有書同者也於是獨同之夫不謂中行偃之意乎亦猶溴梁之言也而以戈殺犬斬槆為琴天下快志焉故同人之利未有不從欲而動者也從欲而動不失其正則君子有取焉耳坤之履初六六二六四六五上六八三五爻皆動以坤卦合履彖為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉履虎尾不咥人亨正曰坤之履順以衆動而猶有履虎之虞夫其成之沙隨昭之平丘乎成公十六年齊衛宋邾㑹晉於沙隨於是公有僑如之譖待於壞隤外迫盟主内畏穆姜以是後期見斥於晉侯昭公十三年平丘之㑹晉將尋盟齊人不可叔向曰諸侯有間矣不可不威治兵建斾以邾莒之譖將遂伐魯魯人有辭叔向曰寡君有革車四千乘雖以无道行之可畏况以道瘠牛僨豕其畏不死公不敢盟晉人遂執惠伯是師之履也以禮而見絀雖不與盟不以為辱記曰禮義不諐何䘏於人言其沙隨與平丘之㑹與坤之小畜初六六二六三六五上六八四五爻皆動以坤彖合小畜為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉小畜亨密雲不雨自我西郊正曰坤之小畜則愈於坤之履也當位者也當位而不動猶之當位而動也當位而不變賢於不當位而不變也是其行人子羽與趙武之謂乎虢之㑹楚公于圉聘於鄭且娶於公孫段氏既聘將以衆逆鄭人患焉使子羽辭之子圎不可子羽曰小國无罪恃實其罪將恃大國之安靖己而包藏禍心以圖之小國失恃而懲諸侯壅塞是懼不然敢愛豐氏之祧楚知其有備乃請垂櫜而入既㑹於虢祁午謂趙文子曰令尹之不信諸侯之所聞也以子木之信猶詐晉而駕焉楚重得志晉之恥也子相晉國以為盟主有令名矣終之以恥不可不戒文子曰武受賜矣宋之盟子木有禍人之心武有仁人之心是楚所駕於晉也今武猶是心也楚又行僭武將循而行之譬如農夫是穮是蓘雖有饑饉必有豐年吾聞之能信不為人下吾未能也詩云不僭不賊鮮不為則於是楚卒无以加於晉也楚之垂櫜无加於鄭讀舊載書无加於晉非晉鄭之有文德則晉鄭之歛畜有以試於雲雨也周書曰率惟敉功不敢替厥義徳其猶有西郊之意乎坤之大有初九九二九三九四上九八五五爻皆動以坤彖合大有為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉大有元亨正曰坤之大有有疑之乎曰是盈卦也故疑之主柔也而舉國皆動金火相爍若富若溢不有兵革之事則有恒暘之沴是君子之所慎守也在桓之三年與宣之十六年也桓宣享國十有八年簒弑之禍讁見於天大水蝝饑相頻仍也而桓書有年宣書大有年則是兩有之外其為无年者多矣為其災也而祥之是大有之不如小畜也詩曰誠不以富亦祗以異又曰維昔之富不如時維今之疚不如兹坤之夬初六六二六三六四六五上八五爻皆動以坤卦合夬彖為義坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉夬揚于王庭孚號有厲告自邑不利即戎利有攸往正曰坤之夬下動而上持為末不力失時而居外是臣道之窮也不治王庭而又俾之即戎詩曰王事一埤遺我家人交徧摧我臯落之役里克謂晉侯曰帥師專謀非太子之事也稟令則不威專命則不孝君失其官而將不威將安用之於是行也十有二月公衣之偏衣佩之金玦狐突嘆曰時事之徴也衣身之章也佩衷之旗也今命以時卒閟其事也衣之尨服遠其躬也珮以金玦棄其衷也尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎諸子欲行羊舌大夫欲死之狐突曰不可孝而靖民子其圖之與其危身以速罪不如待之夫狐突其知易乎是龍戰之㑹也迷而无得梁餘養先舟木之勸逃也則猶謂利有攸往也是重耳夷吾之事非申生之事也以上乾坤反對四卦以嵗實積之二百六十九年餘五十一日七分半以通朞積之二百七十三年餘二十四日是體卦本數折而分之嵗實一百三十四年二百八日小餘五分二釐五毫通朞一百三十六年餘一百九十二日是為内差二年一十六日半以用卦積實三卦追之二百五十五年餘一百八十二日四分三釐以用卦通朞三卦追之二百五十九年餘七十二日各差十四年强半差七年有餘故四三八六之數不可相追惟以體卦五積通朞三百四十一年餘一百二十日追用卦四積嵗實三百四十年餘二百四十三日二分四釐全差不過二百四十三日半差不過百二十餘日可用相追故四五八十相差為限自乾屯需師交至小畜則體用半交自小畜泰同人謙交至隨蠱則體用全交矣圜圖皆以乾坤分次故以乾起屯猶以坤之終未濟也或謂仁者不辭費巳繫之乾坤矣而又以乾坤繫之卦體反復其辭必襲不已費乎曰猶是彖也復而申之何費之有然則易之本彖六爻之外繫以兩用明乎其為對化也則何不以乾之坤坤之乾分證而直起之歟曰是則其次之必曰屯之鼎蒙之革也易之次位不曰屯之鼎蒙之革則其首位不曰乾之坤坤之乾也夫猶是反復也而對化寓焉猶是對化也而反復以為質然則是七十二卦皆體卦也而謂之用卦何也曰體猶質也用猶運也運衷於六十四而極於七十二故準於六十四而以七十二齊之是七十二之所為用也然則乾坤二端不復對化兩䇿之合乾晷四百三十二坤晷二百八十八兩至懸殊不通晝夜如何曰是固已道之易之晝夜分者獨十五卦耳五四隂陽兩䇿之合各不相直也泰否隨蠱漸歸兩濟是其交主也且是已成之卦論爻而不論蓍也定位則論蓍定序則論卦卦非蓍也南北隂陽之街道也蓍非卦也歩卦者也易以六十四卦三乘之數二十六萬二千一百四十四為六十嵗之辰法嵗縮十四而弱以七十二卦三乘之數三十七萬三千二百四十八為八十五嵗之辰分嵗贏八分而强是皆主卦不主蓍也卦以包爻爻以包䇿以六起之則皆爻以三十乘之則皆䇿以倍爻則皆時也然且聖人主日春秋所紀皆日也易以六十四卦再乘之數四千九十六以爻乘之二萬四千五百七十六為五年七月之辰分而贏以十二起之為六十七年百五日之日分而縮以七十二卦再乘之數五千一百八十四以爻乘之三萬一千一百有四為七年兩月之辰分而絀以十二起之為八十五年六十日之日分而贏兩者相追以紀嵗㑹皆主日而不主月必以三十起之則皆䇿也皆月也體卦三乘七百八十六萬四千三百二十䇿用卦三乘一千一百一十九萬七千四百四十䇿以十二約之以六歸之體卦之爻一百五十七萬二千八百六十四月用卦之爻二百二十三萬九千四百八十八月皆在十數萬年之外蔀法章月不能悉齊聖人亦畧取其意以為是體卦十三萬一千七十二嵗用卦十八萬六千六百二十四嵗之月歴云耳消息盈虚則固有所不及用也聖人者以四千三百六十九年之事裁於二百四十二年之中消息五十四十有九而握其關楗者也然則先世之不以爻當日何也曰是皆以爻當日眩於閏朞二十有四而不得其要歸者也然則正乾坤之爻舉其一爻變者反乾坤之爻舉其五爻變者是皆六卦也易之為變各六十有四體用之外二四變者各十五三爻變者各二十此五十卦者當於何取之曰易之取意不盡其象也曰用則不言體曰九六則不言七八舉一爻則不復舉五爻舉五爻則不復舉諸爻繫辭曰引而伸之觸類而長之必以一卦舉四千九十六卦則是乃費矣必以六十四卦兩彖相乘則是无所不給也然則乾坤言用其下之不言用何也曰言用九則六十三卦皆此用九言用六則六十三卦皆此用六也屯之用九而為坤用六而為乾猶蒙之用六而為乾用九而為坤也然則鼎革豫謙否泰履小畜蠱隨井困升萃解蹇睽家人大畜无妄賁噬嗑蒙屯歸妹漸之先後相反何也曰反應之義上下分命亦各得其正而已古今之成敗不可勝齊也一錯其類而巧歴窮算要於上下相交則呼正應反固其所也又何怪焉然則七十二卦相乘之數將從其對化者歟從其反復者歟曰反復體也對化用也體以涵用故以乾坤之體涵乾坤之用以屯蒙之體涵鼎革之用需訟之體涵晉明夷之用因而循之乾乾之體涵坤坤之用坎坎離離則亦猶是也然則何不舉八體之卦而先豫交之乾坤坤乾頥大過大過頥坎離離坎中孚小過小過中孚八體既交而後五十六卦反復循行使前无重卦之疑後无再重之失於兩用叶諧而雙行互應之為无憾乎曰是何失之有反復則皆反復對化則皆對化猶之八交泰否否泰隨蠱蠱隨漸歸未既其反復對化固自在也何必盡為對化而无反復者乎曰然則聖人之光以兩用何也曰兩用之義示以反復對化之可互起也然則聖人之用九六而不用七八何也曰三十有六天地之規二十有四鬼神之矩也參兩倚數徑三圍一是詩春秋之所從始也二十有八三十有二為參之而起用兩之而存體是卦數之所從立聖人置之以觀其靜非動者也然則詩春秋之數果何所從起歟曰起於乾坤象數之端逆行而起之乾坤之末端為象逆行一十有三九分三釐三毫之積凡三百一十一嵗而周一朞之辰分與易相㑹外益天行一百五十六為易陽節取以命詩又乾坤之末端為數逆行有九凡四百八十六嵗而周一朞之辰分易行每半中分天地聖人半取之為易隂軌以命春秋詩取象也春秋取數象數理義性命非聖人則莫之包舉也然則天行斗差一百五十六微合之為三百十一日餘氣差二千四百二太約之為二百四十二强聖人不於是取之歟曰象數定也定不可移理則无所不之也然則出於易者是皆象也雖數亦象也象是生理數是生義義理盡而性命出今自九六而外用數如何曰數不生於蓍而寄於萬物萬物著象者也陽爻著象其數一三五七九五象皆陽也隂爻著象其數二四六八四者皆隂也三陽之爻以五象各自相經得百二十五再乘三陽之爻得萬五千六百二十五故乾卦得數萬五千六百二十五三隂之爻以四象各自相經得六十四再乘三隂之爻得四千九十六故坤卦得數四千九十六推之六十四卦内外相乘六陽之卦得數萬有五千六百二十五六隂之卦得數四千九十六一陽五隂之卦五千一百二十一隂五陽之卦萬二千五百二陽四隂之卦六千四百二隂四陽之卦得數一萬三陽三隂之卦各得八千繇是而推數生有滋滋則不可復數凡乾坤統數以七百二十九各自相經得五十三萬一千六百二十一兩之而得六十嵗之盈歴參之而得六十嵗之全律歴律之本備於易端毎爻之象皆備萬物故謂上下二篇萬有一千五百二十與云三百六十備乾坤之䇿者猶一隅之舉未暨於半反也然則元㑹運世各以十二三十互相起也於乾坤之歴亦相近歟曰是影似言之非實積也象數經緯贏乏修短各以餘分起積為序如以三十十二互相紀也則嵗月日辰不出周甲二十五萬九千二百而宇宙之數齊矣然則乾坤週甲亦用六十何也曰三乘之數十八變之積贏縮之分交食之差以四卦之盈益六十卦之虛天地定之不能違也然則又用七十二卦者何也曰是日餘天差朔虚氣盈之所從出也凡嵗日行三百六十五日餘分一萬以四分之則已疎以五分之則已促疇人星官增損取應積嵗靡效以定序乘之五千一百八十四六爻之積三萬一千一百四以嵗辰揆之毎嵗四千三百八十二六分而絀毎卦七嵗餘辰四百二十六十積而近一嵗加以二嵗之贏裨七嵗之乏凡得五百一十一嵗而贏乏歸除定一嵗之辰四千三百八十二五分七釐則一嵗餘分於二千五百之中去其三百六十以為日行强弱之泛差再加一百五十六以為天行常餘之數其日行贏者至二千五百外又加一百五十六日行縮者至二千一百四十外又加百五十六其平行二千三百二十加天差百五十六至二千四百七十六而止是餘分二十四之所從出也日分與天分遞為贏縮贏日泛差有至二千四百二十二而止者内外斗差平分七十八則日縮之端至二千一百有二極矣日分定而後氣朔定氣朔定而後交食先後可得而齊是七十卦與體卦相較而定非獨為分候配日之故也學者明象則可以該數明理則可以該象間有未達不可以驟破也然則兩象相取足以盡變之義兩彖相取遂足以盡辭之義歟曰何為不足以盡辭之義也六十四彖之辭重之為四千九十六四千九十六之辭重之為二十六萬二千一百四十四三乘之文未為繁複也且是三百八十四象者協於諸卦猶羣龍永貞之自為綱紀也故曰繫辭焉以盡其言變而通之以盡利鼔之舞之以盡神又曰鼔天下之動者存乎辭化而裁之存乎變推而行之存乎通夫有周公之智化裁通變雖為二十六萬二千一百四十四辭可也然且不假則是六十四彖三百八十四象者以言乎天地之間則備矣故曰智者觀其彖辭思過半矣然則兩彖相麗有彖吉而象凶有彖凶而象吉何以處之曰是必在三上之爻也三上處危德不勝位以六居上則危者三分之二以九居上則危者三分之一以六居三其危者三分之二以九居三其危者三分之一易曰二與四同功而異位二多譽四多懼三與五同功而異位三多凶五多功夫以剛柔當否體其貴賤别其遠近則吉凶之故亦居可知矣然則二氣相侵五德相勝易論隂陽而不論五行何歟曰彖則隂陽也象則五行也五行變動或主或客内外上下自為主客愛惡相攻情偽相感遠近相取謹視父母以命其主然則易之論卦合視兩彖以正厥象又若是雜歟曰視彖辨象正辭之義觀位辨物坃占之道也易不以樂玩之辭廢居安之序易象正卷一
