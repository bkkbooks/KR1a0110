body:
  text: 易象正卷十明黃道周撰豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎象曰雷電皆至豐君子以折獄致刑正曰雷電晦冥非天之意也盛陽噴薄則山川從之故盛明之時多疑情盛文之時多疑辭刑獄繁興則日昃且至矣康誥曰時乃大明服惟民其敕懋和若有疾惟民其畢棄咎故豐中多故王者之所憂也王者在上能明其耳目詳其視聼舉要以立體清問以去奸舊章是從碩言是行雖有危疑勿憂之矣吕刑曰非天不中惟人在命王者造命者也王者日中以照天下即偃禾拔木猶之清旦也而况於庶獄庶慎者乎故雷電皆至折獄致刑之象也君子折獄等於享祀享祀致誠折獄得情其究也以享帝立廟初九豐之小過豐亨王假之勿憂宜日中小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也正曰豐而小過雷電之用已過矣配主則雷電之時也以雷電之時用其明威至於旬日毋乃瀆乎易之貴用未有過旬者甲旬也已六日庚七日也丁辛癸三日也春秋之書雨雪震電非其配主亦有過於三日者矣非其配主過三日而已災遇其配主雖旬日而旡咎書曰要囚服念五六日至于旬時丕蔽要囚君子之罹憂不求速解其遇合不求速至亦各其候也且也緩愈於驟故豐之小過勿憂之矣六二豐之大壯豐亨王假之勿憂宜日中大壯利貞豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也正曰履盛滿者不已難乎豐之大壯盛極矣聖人謂是豐蔀也豐蔀者蔽府也夫其君有逸志臣有厲心而年穀豐熟鮮可五稔日中見斗何往乎煬竈之言興而雷電之用至矣然是盛時也陽德未衰羣隂不凝冰霜雨雪則猶未至也夫其廟社有靈鐘簴多福則左右蒙蔀或撤而去之矣詩曰君子如届俾民心闋君子如夷惡怒是違届至也夷平也君子之心至和且平雖有疑言不害聰聼有孚發若是利貞者之所尚往也九三豐之震豐亨王假之勿憂宜日中震亨震來虩虩笑言啞啞震驚百里不喪匕鬯豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也正曰見沫之蔀甚於見斗者矣豐沛折肱而曰無咎何也謂匕鬯之未喪也夫猶雷電之時也寇賊姦宄何代無之耳目未墜心膂未失即股肱損折猶之震驚云耳毋亦威辟之是用辨言之是騁傷其良臣以引瘝於身是則可悔也然且不言悔何也是亦方中之日也逸豫則多禍震戒則多福康誥曰民情大可見小人難保往盡乃心無康好逸豫乃其乂民震驚折肱夫亦有荓蜂之心也乎九四豐之明夷豐亨王假之勿憂宜日中明夷利艱貞豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也正曰九四夷主也夷主何也傷我者也傷我而曰吉何也月之食日則未有所損也經緯相值而輝儀掩焉去數千里望之安知其非晉也且是日中也窗牖四達昧而見斗亦不移時則已矣疑言危行何傷乎然則配主何也曰日月之合也一旬之日而各有所合之合之不必咎傷之不必凶憂盛者不危危明者不窮夫亦各當其時也各當其時何也本仁者與仁本義者與義三鍾皆仁也三吕皆義也六正皆主也雷電之於日主各當其仁義焉耳為人臣而為威福以儀其君猶星辰之為奸賊也詩曰彼月而食則維其常此日而食于何不臧然則夷配之皆何主與曰日中為主雷電皆客當其時則皆為主不當其時則皆為客六五豐之革豐亨王假之勿憂宜日中革已日乃孚元亨利貞悔亡來章有慶譽吉象曰六五之吉有慶也正曰豐而革則革矣革之用已日也先王之所服念也雷電皆至而豐金火相守而柔君子在上去其豐蔀屏奢塞汰慎擇左右以新天下之耳目周頌曰無封靡于爾邦維王其崇之小雅曰裳裳者華藝其黃矣我覯之子維其有章矣維其有章矣是以有慶矣天下之道未有不柔而能文者也狐掖去腥御於王公豨豕之毫以糞溪田豐革能柔天下求之故燕譽笑語則必繇此也是亦天子所命公侯之義也上六豐之變象離正豐亨王假之勿憂宜日中離利貞亨畜牝牛吉豐其屋蔀其家窺其戶闃其無人三嵗不覿凶象曰豐其屋天際翔也窺其戶闃其無人自藏也正曰豐之離則離為政矣離而有不明之傷何也君子惡夫豐之用明者也旒纊垂凝而日月通焉清晝焚燎而鬼神宵行故豐屋蔀家三嵗不覿非夫位之纍人而德之纍位也君子處於髙嚴則卑其視聼九閽之門虎豹是叢故責明聼於豐蔀之人猶晞衣於雷電之下也詩曰蕩蕩上帝下民之辟疾威上帝其命多辟蕩蕩則已平疾威則已髙夫上帝也而猶惡其處髙焉又况其下此者乎旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉象曰山上有火旅君子以明慎用刑而不留獄正曰甚矣君子之逺庶獄也君子之逺庶獄何也正明目而視之不可察也近則烈烈焉若不可别故火之在山下與在山上非夜莫辨也齊書日若因夜虛靜聽則皇故旅之視夜有皇於視晝者矣旅而復重言之何也君子無位幸而托於道路爰暨小人知其艱難蓋自垂翼獲心而外多有困於旅次者矣詩曰伊可畏也亦可懷也則湯文周孔皆是也然則不留獄何象也曰火上則不下矣焚山之義殊於焚田去則不留溪壑界之其究也以辨上下定民志初六旅之離旅小亨旅貞吉離利貞亨畜牝牛吉旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也正曰甚矣聖人之智也旅之用順猶困之用晦也旅而用明則災隨之矣詩曰君子于役茍無飢渴又曰不忮不求何用不臧忮求之生生於用明火動於中而飢渴隨之暴客厲師必有窺其行藏者矣君子至慎以為體至卑以為用寬以居之仁以是行之雖雜於廬旅之中人必以是為橋大人疑也以浩浩是以睂夀詩曰雄雉于飛泄泄其羽雄雉已明矣而又泄泄然翺翔八步之內矰繳之來自取之矣故雄雉之明不如牝牛之順也六二旅之鼎旅小亨旅貞吉鼎元吉亨旅即次懷其資得童僕貞象曰得童僕貞終無尤也正曰旅之鼎鼎有足也不能自舉饘於是粥於是資斧之貴而童僕之與古之視天下者亦猶之旅舍也尚德以為寶親賢以為輔番番良士以為資斧仡仡勇夫以為童僕故以祀上帝以養聖賢以享貴敬老居則安焉行則遷焉置之周行而天下莫之敢問也正月之詩曰無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曽是不意夫是則可謂貞吉無尢者矣九三旅之變象晉正旅小亨旅貞吉晉康侯用錫馬蕃庶晝日三接旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也正曰旅之晉吉行也而得厲何也旅則未有處也與之車而道不如行與之童僕而門人不親非無康侯猶未解於旅人也故旅而用明君子之所畏也然則公子重耳過宋饋馬二十乘過楚庭實旅百受之而不為厲何也公子則非旅人也唐叔武之昭也周祚在武晉必有後同出九人惟重耳在三賢佐之非侯而何然則旅之晉孰當之乎曰其公子針乎為亡公子而從車百輛以適外國其何能復故以旅人而受賔禮亦載贄者之所不事也九四旅之艮旅小亨旅貞吉艮其背不獲其身行其庭不見其人無咎旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也正曰旅之艮何位之有夫猶之寓臣也以言則已僣以諌則已過不獲其身近于惰不見其人近於傲僣過傲惰君子雖不思之不敢出也然則重耳之去齊其適謂是歟曰是亦非旅之義也其謂書社七百里季孟間待者歟吾道之窮也天下無主而託於旅人詩曰匪兕匪虎率彼曠野雖有資斧又何快焉六五旅之遁旅小亨旅貞吉遁亨小利貞射雉一矢亡終以譽命象曰終以譽命上逮也正曰旅之不樂用明而曰射雉譽命何也射雉者丈夫之事亡矢者大人之費也君子用晦不失其智守義不失其變失之物而反於身失之前而得于後失之瑣瑣存其棣棣何喪之有然則是誰當之乎曰其當公劉古公之事歟二公舍其故土依其遷國外有干戈弓矢之勞內有疆理宣畝之役而素之若積行之無事夫非聖人而能如此乎抑當王季文王之時歟滯於羇庫困於羑里而皆免於刑戮以為王師故旅之六五匪夷之道君子所不易處也上九旅之小過旅小亨旅貞吉小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也正曰是當汜與翟泉之事歟曰是則大事也非小過也天子出居諸侯避其宗廟不謂之旅然則是當死鳥乾侯之事歟鸛鵒之所為歌也曰是則喪牛也喪牛之過在於君焚巢之過在於臣然則孰當之歟曰其在公之止於楚而復如楚入於越而復壻于越也諸侯有其宗廟有其典章以數百里之國禮樂所萃先王先公馮靈其間而日挾其嬰瓖以望人之塵垢詩曰昔先王受命有如召公日闢國百里今也日蹙國百里於乎哀哉維今之人不尚有舊夫以五百里之國而夷於旅人者魯哀公是也豐旅三陽之卦也從於南政豐旅之與噬嗑賁皆天地所治奸慝也噬嗑賁在於北政則豐旅在於南政矣豐旅之有小過遁大壯晉明夷震艮革鼎亦各從其類也噬嗑賁之在北政則離頥旡妄大畜三者其主也主類羸乏則南北分居序卦傳曰得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅是則通於道者矣在夫宋之盛際也仁宗六年戊辰入於豐限又五年癸酉上始親政追尊宸妃李氏是年遂廢郭后又三年吕夷簡韓縝又為朋黨之說榜四賢於朝堂又明年元昊稱帝於夏州又明年劉平石元孫戰歾於延安又明年任福敗於好水川於時天子聖明羣臣任事而一方有故竭天下創之如恐不支是亦豐亨之憂也故景祐康定之時取諸日中豐蔀勿憂而夏竦不除黨禍再發見斗之疑仁宗有焉豐旅之中交立宗實為皇子甲辰治平元年是為英宗不四載神宗立熙寧元年戊申明年己酉王安石參知政事立新法百姓怨苦皇太后爭之不可得以流民圗罷安石不兩月復起平章置邏卒監謗遂割蔚朔七百里之地以與契丹以鬻祠廟失上意乃去於是蔡確漸用事諸賢放廢而獨與李憲李舜舉一二內臣商略邉事幸諸內侍無漢唐之奸諸君子亦維持不敗而章蔡又夤緣取徑矣哲宗丙寅元祐元年諸賢復用章蔡罷黜七八年間想望大平而老成漸凋太后晏御吕范調停不效楊畏首唱紹述而吕惠卿章惇復出矣林希首詆宣仁而章惇蔡卞遂欲誣陷國母唱古今希有之禍蓋自漢唐內寺未之有也庚辰上崩乃復廢后孟氏寬諸賢之禁貶出惇卞而曽布夤緣復起蔡京建中崇寧不三年間熙豐青苗變為花石元祐有再廢之母后殿門有重立之黨碑而宋室之禍極於是矣嗚呼漢秦而上暨於夏殷亡國之主皆身為昏虐若五胡亂主自取傾覆宜也有宋神哲皆有意圖治而賢奸不明主柄下竊匹夫環召即有倒江河回日月之心至於宣仁追討元祐再廢亦異事矣豐大勿憂又焉可恃乎㢲小亨利有攸往利見大人彖曰重㢲以申命剛㢲乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人象曰隨風㢲君子以申命行事正曰習坎隨風君子皆以命教何也水之與風皆漸而善入也㢲之善入可以語化矣而曰小亨何也大君之命皆有風霆焉㢲特申言之耳故為震則虞其已剛為㢲則虞其已柔也詩曰不競不絿不剛不柔敷政優優百祿是遒大人者中正以為道而順㢲以為動不干民譽不違民好書曰爾惟風下民惟草違上所命從厥攸好故通於民志可以知㢲之道矣㢲而多懼不如㢲而多慮其究也以恐懼修省初六㢲之小畜㢲小亨利有攸往利見大人小畜亨密雲不雨自我西郊進退利武人之貞象曰進退志疑也利武人之貞志治也正曰㢲之進退不果不可不治也㢲矣而又畜之密雲不雨文無以斷柔無以制蓋自是養亂矣然則文王志疑尚父志治乎曰有二服事何疑之有然則慙德志疑仲虺志治乎曰口實立防何疑之有然則利武又之貞何也曰天地之金氣也以落其枝蔓去其鞶帨則長髙可繼蠱氣不作故武人者重㢲之工繩也然則履之惡武人何也曰履者小畜之反也履有金氣焉而武人感之以刑變禮故履虎嘻凶君子之所惡也九二㢲之漸㢲小亨利有攸往利見大人漸女歸吉利貞㢲在牀下用史巫紛若吉無咎象曰紛若之吉得中也正曰㢲而用漸古之人有用之者乎閎散顛括皆用之矣若是則權也權而謂之中何也非權則固元中也權而史巫紛若何也神明之道聖人有不獲已也異姓之歡萬物以通及物多儀其享乃成詩曰之子于歸皇駁其馬親結其褵九十其儀是女歸之義也夫以大人而用女歸之義非神明其德而能之乎以居賢德善俗未為不可也九三㢲之渙㢲小亨利有攸往利見大人渙亨王假有廟利涉大川利貞頻㢲吝象曰頻㢲之吝志窮也正曰㢲而渙何謂頻㢲乎渙亦以申命也一命而數申之三而瀆五而玩非上所好瀆命不從故渙非所以救散也當㢲之時而欲以享帝立廟亦失其義也然則古公之作廟立門立冢土非歟曰古公非㢲之時也古公以其剛德啓土興邦昆夷兑道故不言而民從不徠而民集然則盤庚之再遷三誥非歟曰盤庚亦猶之剛德也永建厥家以綏乃祖乃父然則誰當之歟曰周以叔帶子頽之難告於諸侯諸侯又以之號告於天下則泛與翟泉之役皆是也是則九三也而謂非剛德何也曰德散者不足以凝位位散者不足以凝德六四㢲之姤㢲小亨利有攸往利見大人姤女壯勿用取女悔亡田獲三品象曰田獲三品有功也正曰德不若位位不若時有之乎曰有之㢲之姤是也姤則未為德也然而有遇焉遇者時也處於四而用柔者位也時與位值半德而倍功田獲三品豈為幸乎然則誰當之歟曰聖明之下其當之者多矣寧戚賓胥無卻榖先且居之流皆是也詩曰采菽采菽筐之筥之觱沸檻泉言采其芹謂夫遇而有獲者也君子之所樂采也九五㢲之蠱㢲小亨利有攸往利見大人蠱元亨利涉大川先甲三日後甲三日貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也正曰㢲而蠱與蠱而㢲何别乎蠱而㢲孝也父蠱而子幹㢲以善入去蠱而無害孝子之事也㢲而蠱忠也時平而思危衆順而慮陂重㢲之令而壞木之慮忠臣之道也然則蠱言六甲而㢲之蠱言六庚何也六甲仁也物將壞而幹之以仁猶厦將顛而幹之以木取材於木至六甲而盡矣木已壞而治之以金六庚義也救仁用義仁之於㢲同幹義之於㢲不同幹也治其已壞以成其不壞者取材於金至六庚而盡矣故六甲之有孝子先天之事仁人任之六庚之有忠臣後天之事義士任之仁人所任至於中田號泣而已矣義士所任蓋破斧缺斨剖肝瀝血而猶未已也故鍾者六甲之所取𠂻也吕者六庚之所繇舉也三鍾之無六甲三吕之無六庚是仁人孝子所號籲於天地也主甲者賓己主庚者賓乙賓主合而君臣父子夫婦兄弟各有所措故隂陽賓主交相為取鍾吕之取於乙己猶其取於丁癸也然則易言庚甲不言丁癸何也曰以其義則亦兼取之矣然則鍾吕之合言六間不言六正何也曰六甲六庚則皆正也黃鍾之為主蕤賓之為賓主鍾者賓義主吕者賓仁主仁者取於智主義者取於禮三鍾之取於三主猶三吕之取於三賓也故六甲六庚全易之大義也水火動而繼之以木木動而嗣之以金六府之要歸也故觀於甲之治蠱庚之治㢲而爻象互取之義亦燦然備矣上九㢲之井㢲小亨利有攸往利見大人井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶㢲在牀下喪其資斧貞凶象曰㢲在牀下上窮也喪其資斧正乎凶也正曰㢲之井已下也夫猶之漸也㢲在牀下而或以吉或以凶何也漸得位而井不得位也漸求於人以安其身井危其身以救於人夫危其身以救人雖行權亦可以已也然則仁者養人身重於人歟曰身不重於人則何所貴養人者也然則羸瓶喪斧未為大喪也無大喪而獲仁之名仁者不為歟曰仁者實也何名之有然則牀下之㢲不為全身者歟曰養人而無救於人然且不為也無救於人而猥全其身誰為之乎詩曰既明且哲以保其身夙夜匪懈以事一人是則古人之所貴者也兌亨利貞彖曰兑說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉象曰麗澤兑君子以朋友講習正曰治天下者其惟師道乎乾坤六子物彚所統則皆師道也師道何也乾之惕厲也三男從之震以修省坎以德教艮以止思坤之厚載也三女從之㢲以申命離以繼照兑以講習此八者皆學也世未有不學而可治天下也陽德之惕厲而歸於止思隂德之柔明而歸於講習體是八者以求治道而後五十六事者可以遞起也夫以兩女相麗而婦功成焉德容出焉又况於經德討論者乎詩曰嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲兩澤之利貞古人亦藉以相警也故兑者麗澤之象也麗澤羣居退而獨思動以慮之靜而多致其究也以思不出其位初九兑之困兑亨利貞困亨貞大人吉無咎有言不信和兌吉象曰和兌之吉行未疑也正曰兑而困困而不失其和未信之言存之以貞有疑之行質於大人柔顔以稽之遜志以求之寬綽乃心以須其通詩曰視爾友君子輯柔爾顔不遐有愆故學而不知困則不可以語學矣困而不能和則不可以語行矣學而知困困而能和說命曰孫志務時敏厥修乃來是之謂也九二兌之隨兌亨利貞隨元亨利貞無咎孚兌吉悔亡象曰孚兌之吉信志也正曰隨亦兑之正乎謂其信志而隨之同方不疑同道相求千里相應不為悖也然而麗澤講習與嚮晦宴息亦為同道歟曰君子晝以勞之夜以休之明而問道夜而思過兑則日入矣日入而雷息雖以休宴未為過也是則兑有十五德而宴息與之何也履禮也臨教也夬諫也萃戒也歸順也節制也損治也孚信也睽辨也困致也咸通也革變也大過任也隨無是十四德者而猶與麗澤信志宴息而無悔夫非有乾之四德而能如是乎六三兑之夬兌亨利貞夬揚于王庭孚號有厲告自邑不利即戎利有攸往來兌凶象曰來兌之凶位不當也正曰來兑何也兑之為言不可揚之言也揚庭以為悅其兑不塞則過言乃來矣故夬之為言决也兑不可决也兑而决之以說人則厲己以說己則厲人以說下則厲於工以說上則厲於下故兑不可决也以其不可决而塞之躁以動則兩澤俱竭矣詩曰無易繇言無曰茍矣莫捫朕舌言不可逝矣無言不讐無德不報惠于朋友庶民小子古人之相與講習白圭獻規則亦謂此也九四兑之節兌亨利貞節亨苦節不可貞商兌未寧介疾有喜象曰九四之喜有慶也正曰兑說人者也節不說人者也節之為言非不說人亦不自說也商兑未寧則其兑可塞矣故兑有數義焉兑之有毁折附决比於剛有巫妾口舌比於柔剛柔雜糅非君子不能為謀也詩曰君子如怒亂庶遄阻君子如祉亂庶遄已夫君子之喜怒不度於道而但曰喜之欲使亂已怒之欲使亂阻則是喜怒為來兑之路也君子取其剛氣以治其口舌猶為之商度使萬物受節焉耳故節之介疾萬物之所說也詩曰無縱詭隨以謹繾綣式遏冦虐無俾正反則可謂堅介疾惡者矣九五兑之歸妹兌亨利貞歸妹征凶無攸利孚于剝有厲象曰孚于剝位正當也正曰歸妹剝兑者也剝兑以為歸妹猶剝履以為睽也剝履以為睽非夬也而夬之剝兑以為歸妹非剝也而剝之亦猶其類也然則兑可為歸妹是妾可為嫡也而猶曰正當何也曰兑亦非妾也歸妹則其剝也君子而愛說己之言則盈庭皆婢婦人矣夫以商兑之人為剝兑之務不賈媚於宵人必遷怒於君子詩曰君子信盜亂是用暴盜言孔甘亂是用餤孚剝有厲又何怪乎上六兑之履兌亨利貞履虎尾不嘻人亨引兌象曰上六引兌未光也正曰兑而義以言說人不逺於禮以言說人則是多僞也不逺於禮則是未及禍也夫以言說人人以言報以禮說人人以禮報而曰引兑何也曰是未及於壯履也曰免於噬嗑而已齊桓公既定民之居遂欲從事於諸侯管仲日未可鄰國未親也公曰為之如何管子曰正其封疆無受其資重為之皮幣以驟眺四鄰為游士七八十人奉以車馬衣裘多其資幣使周四方以號召天下之望為玩好粥之四方以監其所好擇其黷亂而先征之於是帥服三十一國故桓公可謂能勞其民矣未使民忘勞也能死其民矣未使民忘死也君子之說人若兑之司秋也使物成實各得所欲而已為游士玩好以驟俯於天下以觀其俯仰而時其喜怒則是引兑之餌也君子不為也㢲兑者六子之終也下經六子以為綱紀震艮㢲兑各立中際震艮二陽在於南政則㢲兑二隂在於北政矣㢲兑之有困井夬姤渙節漸歸妹亦各以其類也而渙節夬姤又提其介以相禪於下故自㢲兑而渙節疑取之矣疑取之則古人不以為終亂何也曰是四立之限也猶之震艮陽為彊禦隂為夷狄夷狄則遂改命乎曰頥不改命離則近於改命矣用卦之離晉人逢之體卦之㢲宋人逢之與其㢲離不如震艮之為中夏也序封傳曰旅而無所容故受之以㢲㢲者入也入而後說之故受之以兑兑者說也是何義也雜卦傳曰兑見而㢲伏也凡易之卦一見一伏屯亦見也䝉亦伏也故豐見而旅伏旅無所容則雖㢲亦窮矣聖人之言也以彖天地之言則初未有彖也猶日月之交限值焉耳紹聖之二年乙亥是入於㢲明年廢孟后流竄諸夏追奪元祐諸宰執官元符元年章蔡請追廢宣仁明年立劉賢妃又明年哲宗崩徽宗立韓忠彥為政追復廢后及削奪諸臣明年罷韓忠彥復籍諸黨人立碑端禮門明年復命州縣立黨人碑又四年以彗出毁黨碑出蔡京又明年復相蔡京又四年辛卯童貫以遼人馬植來議伐遼又四年以童貫領六路邊事於是金人已取遼黃龍府矣而上方居林靈素之齊宫重元戊戌復遣馬政如海約攻遼又三年金人來議攻遼嵗幣夫豈所謂惡重㢲而喜田獲者乎何用壯之驟也不攻遼歲幣與遼得鄰好攻遼嵗幣與金失輔車經營三年而言者只一宋昭可歎也乙已之嵗㢲兑中交金始滅遼封童貫為廣陽郡王宦者封王童貫與張輔國兩人而已金將入太原童貫逃歸郭藥師叛降燕燕山州郡皆陷上乃傳位太子决意東奔丙午金師圍都城輸金幣割三鎮金師陽去而內戒弛嚴罷西南勤王之師冬十一月金師再至都城遂陷上至金營議割兩河冀黏沒喝以修楚莊釋鄭之事而金人已悉劉曜取晉之實方劉曜時五胡併起勢不南轅金人既無內顧之虞又用破遼之鋭安能置宋以自朝食然猶立張邦昌劉豫用契丹之舊以紆緩中原及至踵事增華生巧出熟則五胡契丹之智俱為敝屣矣當烏珠乘飛舸追高宗出明州時豈亦謂天限南北虜騎不能陵波哉李綱守兩河之策不用而軍潰太原种師道擊惰歸之計不酬而隆德始陷宗澤張所傅亮之儔廢而中原解體雖竄吳李於遐方追章蔡之故爵弛黨禁修廢官亦何益於殿最乎金師既陷天長上奔臨安汪黃始求自免汪黃之於苗劉同亂耳隆祐之變朱勝非權請太后垂簾三甲三庚庶亦有焉過此則皆牀下之事也建炎不誅汪黃似亦以建肥遁之策李綱終不見録似亦謂守攖城之謀然如建炎牀下遘凶資斧不治泊泛明州中心猶漾豈能據襄郢之都疏蜀漢之路以求武人收其初終乎張浚敗績於秦州秦檜縱還於漣水雖有韓嶽劉吳無所命之以游酢胡安國之賢而狥貌噉名為秦檜所賣可歎也趙鼎襲冦凖之智勸上親征雖未破敵亦且吐氣既而和議終成諸將班師又割唐鄧商秦之地以求梓宫韋后及鄭邢二后之喪說者引漢高杯羹之言遵竊負欣然之說以為此舉未過然有句踐之志則可無句踐之志則懦也且父兄臣子何所異視而通問不求卒殯異域牀下史巫難為言矣乙亥㢲兑終交秦檜封王死不越日又七年辛巳金人大舉入寇陳康伯遵趙鼎之策再勸親征金主亮弒於瓜州金主雍立孝宗亦以癸未受禪天下聿新不以此時探求遺賢奬拔來彥如虞允文辛次膺之倫犄角先後而使屢敗之張浚驅李邵二將潰於苻離為湯思退史浩所笑豈不傷㦲無所容而後入入而後說之是之謂也渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也象曰風行水上渙先王以享于帝立廟正曰渙者丈事所繇興也風行於水其源大者其瀾逺其流近者其瀾淺書曰七世之廟可以觀德萬夫之長可以觀政詩曰鬷格無言時靡有爭風行水上其聲容靜而感被逺不行而至不疾而速是君子之所樂與也故君子觀愛於廟觀敬於廟觀人心之聚散隂陽之交㑹鬼神之趨舍則必於廟也夫精誠之相遇以為禮樂交動甚微而文義備至非聖人其孰與知之乎故渙者享帝立廟之象也入廟知敬臨刑知哀精誠所通若尊若親其究也以折獄致刑初六渙之中孚渙亨王假有廟利涉大川利貞中孚豚魚吉利涉大川利貞用拯馬壯吉象曰初六之吉順也正曰渙誠也中孚信也誠以信所為順也風水相遇敏於奔馬舟楫之用而波濤之試夫茍誠信不載於中則其任力薄而委物也甚易矣故水動於下木乘於上七世之澤百世所託詩曰淠彼涇舟蒸徒楫之周王于邁六師及之蒸徒之楫同舟之信也六師之邁合體之義也夏書曰豫臨兆民凜乎若朽索之馭六馬夫以朽索馭六馬其不敗覆者少矣君子施敬於民施忠於民因民之力集民之事選賢而用之以時飭其政令夫八虞二虢之戴文王亦豈僅六師之力乎九二渙之觀渙亨王假有廟利涉大川利貞觀盥而不薦有孚顒若渙奔其機悔亡象曰渙奔其機得願也正曰馬非舟也而壯於舟機非車也而奔於車精誠所動而衆力附之涉川觀廟則同用此義也君子之濟民不一道用民不一術而要於擇賢善任棄柔而取剛舍敗而趨良其致一也夫杋無千里之御百里之轡而要於馳騁康道舉重速至亦豈散才而能之乎君陳曰簡厥修亦簡其或不修進厥良以率其或不良一修良者用則百修良者至一修良者黜則百修良者欲退矣不薦而孚以假有廟則亦猶此也六三渙之㢲渙亨王假有廟利涉大川利貞㢲小亨利有攸往利見大人渙其躬無悔象曰渙其躬志在外也正曰水之與木同體也水與木不同體則愛惡生而攻取見矣風亦與木同體何也曰木者水之魄風者木之魂也然則㢲木也而即為風坎水也而不得為木何也曰魂魄之交或離或合木生於水而載於水長於風而揚於風魄有形而魂無形無形者易合有形者易離故渙之為㢲水之為風猶魄之為魂而魂之合體也木載於水而行以風天子載於百姓而行以良臣夫良臣之載於天子亦猶天子之載於百姓也一以為魄一以為魂無他一身而已說命曰惟天聰明惟聖時憲惟臣欽若惟民從又夫猶之一身也水渙而風行焉風渙而木行焉渙躬旡悔是之謂也六四渙之訟渙亨王假有廟利涉大川利貞訟有孚窒惕中吉終凶利見大人不利涉大川渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也正曰夫作事而能謀謀而能積積而能散非有濟險之才而能之乎渙者精神之治也君子將動謀及乃身謀及卜筮謀及卿士謀及國人故有謀而集之有集而散之稽於聖賢質於鬼神散其有思慮而得其不思慮者詩曰考卜維王宅是鎬京維龜正之武王成之成之者王也正之者匪王也龜正而王成之則皆匪夷也故曰有涯之智不足謀也有形之積不足營也詩曰謀夫孔多是用不集發言盈庭誰敢執其咎渙羣有丘或以大散或以大聚或以衆濟或不以衆濟履險出夷夫非神明而能之乎然則是利涉也而曰不利涉利涉不涉而曰匪夷所思何也曰是勳勞勝氣之所不動也鄢陵之戰晋師濟河聞楚師至范文子欲反曰我僞逃楚可以紆憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣諸帥不可文子曰惟聖人能內外無患自非聖人外寧必有內憂盍姑釋楚以為外懼乎文子之思則所謂匪夷也利涉而不涉則文子有焉然則訟之渙不利涉者也而曰利涉不利涉而涉又曰渝安貞吉何也曰是嚚訟競說之所繇止也鄭人游於鄉校以議執政然明欲毁之子産曰何為夫人朝夕議政善否善則行之否則改之是吾師也防怨猶川大決所犯傷人必多不如小決使道子産之小決則所謂渝之安貞也不利涉而涉則子産有焉然則頥之益利涉大川而曰不可涉大川何也曰涉大川者利也不可涉大川者義也衛獻公之再入也寧喜專政公孫免餘請殺之公曰吾與之盟矣公孫免餘私殺之又失石惡公子鱄曰逐我者出納我者死君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公勤止之及盟於河託於木門不鄉衛國而坐遂終身不仕公孫免餘之殺寧喜以為利涉也而子鮮不可故免餘之為利不如子鮮之為義也然而子鮮則猶之涉險也均之失賊而又懟其國人故公子鮮之狷不如公子札之正也然則蘧瑗之匪夷不過於子札歟曰蘧瑗之不涉不可涉而不涉者也子札之不涉利涉而不涉者也然則不利涉而涉者之獨子産乎曰其人在晏子之立於崔氏之門與端委於虎門之外也詩曰招招舟子人涉卬否范文子是也就其深矣方之舟之子産晏子是也江之永矣不可泳思漢之廣矣不可方思公子札子鮮是也九五渙之䝉渙亨王假有廟利涉大川利貞蒙亨匪我求童䝉童䝉求我初筮告再三瀆瀆則不告利貞渙汙其大號渙王居無咎象曰王居無咎正位也正曰渙則無所求也䝉則有所求也渙而被之䝉而止之水行於風而止於山瀆則不告則猶之無所求也故憧憧爾思發言盈庭則猶之衆人也渙汙大號大人之事也夫當修文之時禮樂繁興聞睹不給而能散其居積以渙號於天下非有道而能如此乎故為聖賢而有其學問為大人而有其智慮為天子而有其居積庸衆人之事非君子之所樂與也詩曰彼有不獲稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利優之游之使自得之則是渙而蒙之謂也上九渙之坎渙亨王假有廟利涉大川利貞習坎有孚維心亨行有尚渙其血去逖出無咎象曰渙其血逺害也正曰渙之坎上動而勞霖雨已盈舟楫將窮然未無臭也君子觀動而知險觀險而知濟逖出逺害雖有見血亦何咎乎然則見血何也動而勞君子之所憂也君子以民載身以水載舟其道之則吾衛也其不道之則吾血也然則小畜之乾亦稱血去何也小畜之血疑也疑慮勿存密爾乃行渙坎之血何也勞民勿窮精心乃通然則是不為㢲動歟曰㢲動而乾君子之所樂也㢲動而坎不得其位憂不在民必在於君君子逖出免咎而已武王曰南望三塗北望五嶽毋逺天室周公曰遏佚前人光在家弗知夫猶是濟渙之時也而寧有逖出之心乎夫亦其位與時而已矣節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民象曰澤上有水節君子以制數度議德行正曰夫變易之道至於節而止矣節不可易者也渙而受之以節若水之量於澤也風行於水而天下稱文水量於澤而天下歸質焉渙之必歸於節猶文之必歸於質也天道之有度數地道之有藪澤人道之有德行禮樂由此起文章由此作政事由此飭故不知澤上有水之義者則不知汚隆升降源流盛衰之故以滿則溢以困則涸溢而無當於文困而無當於質是君子所不取也然則不可貞之㫖獨為困發歟曰為困發也而履謙損益可貞之義亦於此見焉故不在九德而備九德之義者節是也天下之可節者莫若刑其究也以明慎用刑而不留獄初九節之坎節亨苦節不可貞習坎有孚維心亨行有尚不出戶庭無咎象曰不出戶庭知通塞也正曰守節而遇坎已知之矣坎者節之所宜有也坎之在節猶在戶庭之內也閨閻不去翣而行朝守不歷位而言君子有位則守官無位則守道陋巷啜蔬援琴而歌之詩曰縞衣茹藘聊可與娛不出户庭何咎之有九二節之變象屯正節亨苦節不可貞屯元亨利貞勿用有攸往利建侯不出門庭凶象曰不出門庭凶失時極也正曰節之屯是苦節也屯難始生內變將作梁翟之間猶可以免共世子曰仁不惡君知不重困勇不逃死吾伏以俟命然則世子之出新城未足為節乎曰是在門庭之內也曰然則越境乃免遂足為智乎曰古者紳辨相見而執羔雉夫有所取之也公子大夫自相寓越以免罪辟非古之義也然則出於門庭聖人有取者何也曰其公子札乎公子札從父之命則惡其亂序從國之請則惡其亂政禍作而不避則不達於命故聘於魯歷於齊晉禍平而後反宗祐有主則是吾君也故為公子不失臣節獲節之心于出門庭者其惟公子札乎六三節之需節亨苦節不可貞需有孚光亨貞吉利涉大川不節若則嗟若無咎象曰不節之嗟又誰咎也正曰需樂也節憂也樂非以節憂而曰不節若則嗟若何也數度德行君子所自制議也君子貧不言苦恭不言勞遲不言久久不言滯獨行不言清衆行不言馴故樂非以節憂憂亦非以節樂也然得其節則苦而反甘不得其節則樂而反嗟以節節樂何咎之有韓宣子憂貧叔向賀之憂之未為免嗟賀之未為得節也然而可以免矣故曰無咎六四節之兑節亨苦節不可貞兌亨利貞安節亨象曰安節之亨承上道也正曰節而說承上而安柔以履髙聞諫不拒守禮而和故臣有麗澤之益而君無迫上之禍也趙文子為室斫其椽而礱之張老夕焉不謁而歸文子就請之張老對曰天子之室斫其椽而磐之加密石焉諸侯礱之大夫斫之士首之備其物義也從其等禮也文子歸遽令勿礱匠人請皆斫之文子曰止為後世見之其斫者仁人之為也其礱者不仁者之為也夫趙文子則庶乎安節矣嚮微張老則不節之嗟文子受之故張老可謂知節而麗澤者矣九五節之正象臨變節亨苦節不可貞臨元亨利貞至于八月有凶甘節吉往有尚象曰甘節之吉居位中也正曰知凶而不避可謂甘節矣節之有凶夫人而知之甘吉有尚夫人未之知也故節備四德者兩焉屯臨是也屯之六二以為苦節臨之六三以為甘臨二者爻彖所取𠂻也節取臨之說以居其位去屯之苦以劑其德故節者甘苦之所繇調也君子仁不廢義智不害信富辰之沒于翟先軫之隕于箕或得以死韓獻子之違兵叔孫穆子之養棟或得以生故生不擇甘死不蹈苦亦曰當位而已當位者君子之所貴也上六節之中孚節亨苦節不可貞中孚豚魚吉利涉大川利貞苦節貞凶悔亡象曰苦節貞凶其道窮也正曰節而中孚謂之苦節何曰君子之為節也不求信于人求信乎己不求信己求信乎理夫信理則可以無悔矣伯夷叔齊泰伯仲雍公子臧公子肹皆是也夫是六公子者信乎理則亦信乎人己矣然且謂大人者不求信人不求信己何也曰道可以該節節不可以該道六公子者已進乎道也抱石隕淵辟兄灌園則是豚魚之信君子有所不為也變易之卦至渙節將盡矣渙節三陽則亦南政也初終之究至於中孚故復授之以中孚自咸恆而來於是五際一千二百七十七嵗與體卦積差二百五十二而復及於差始凡三體三用分星該日之數至於五際而約略更端故舉咸恆以至渙節而乘除之候槩可見也序卦傳曰兑者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節孝宗隆興二年甲申方唱復讐之說冀望和議不成而楚州一敗暮氣遂生魏杞得正敵國而還舉朝亦輟陵寢之請悠忽嵗月朋黨之訶發於上道學之禁申於下陳賈林栗踵楊畏李定之故習以排擊正人主張邪說幸而戎狄不侵縉紳偷日三十年間苟立南國渙節中交光宗嬰疾不過重華宫甲寅夀皇崩上不執表以孝宗之孝執衰三年不能得其子一日之養禮樂崩壞於是盡矣留正行遁汝愚投艱道揚之日差有可觀而韓托胄又執國命罷朱熹逐汝愚胡紘王沈又申僞學奸黨之禁及托胄意衰稍弛學禁而伐金敗盟之禍又作矣北伐喪師乃以托胄師旦首畀金人亦古今之所經創嗚呼邉圉有事則戎狄肆其豺狼戎狄無事則奸回肆其蝥賊壞屋飄搖其風無方韓托胄死史彌逺又出史彌逺死賈似道又出金人朝亡而元師夕出金元循已勝之轍而趙宋膠屢覆之舟夫非其取之太易則其守之良難積功薄於前則敗闕重於後也乎故曰渙散也離也節止也隂陽發疹見於中交寧宗丁巳距甲申渙限三十四年胡紘上書言僞學猖獗圖為不軌令於試期自取家狀其先元年乙卯以汝愚之黨斥徐誼楊簡流太學生楊宏中等六人皆為漢唐亡國之舊方而當國者餌之如飴詩曰民之貪亂寧為荼毒是之謂也易象正卷十
