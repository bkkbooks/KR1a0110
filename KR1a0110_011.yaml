body:
  text: 易象正卷九明黃道周撰革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉象曰澤中有火革君子以治厯明時正曰革以治厯明時何也曰水火者天地之大用也日月星辰統於水火水火相淡天地之所取鑑也其用已日何也易之尚柔也甲巳乃合其用十五宵旦之中星四十五日而更次可别矣然則睽不同行而革不相得何也曰睽行而革居也是小星所歎實命也天道之奧存於治厯人事之奧在於居室然則湯武革命何也曰是天人之總也水火變動而王者更政曰更政之與革命則必有别矣兩濟未終澤火相湛而遽曰革命何也王者無百世之運千年之厯道衰而遷時過而化雖王者不能自挽焉自咸恆以來三際八百一十九嵗雖有永厯則亦已革矣書曰天之厯數在汝躬允執厥中夫聖人則亦稽之厯數也曰是為凖乎夏四殷六而各有損益繼周而往則不可知也曰觀其盛衰損益則備可知矣然則敬致平秩之非為農務乎曰是為農務也為農務而及於革政革命何也曰君子之學也有取之天道者有取之人事者夫以禪代征誅為異於東作西成之事者君子之治非大聖人之治也大聖人之治其視革政革命猶黍稌之播於原隰刈穫之或銍或鎛也乾坤之治二百七十三年而交於泰否又三十九年而中交當事凡三百一十一年不有大夫竊政則有强諸侯方命天子以之失其大柄泰否之治二百七十三年而盡於隨蠱退三十三年二百四十而初交當事凡二百四十二年不有暴主勃興則必有寇攘為政天子以之改玊改姓隨蠱之治二百有四年而交於剝復又三十九年而中交當事凡二百四十三年而戚畹為政不有女主稱制則必有外戚奸命剝復之治交於頥大過百三十六年而閹宦用事又六十八年而盜賊四起强臣從之以為縱橫復從是始咸恆而下凡五六際三百八十四年交中交終每三十三四年而內外寇攘亂子賊臣以亂為餌故生於其時有伊吕之任湯武之義起而撥亂反正雖天地不以為不順堯舜不以為不韙也故時者天地聖人之所共游也八體八交八際八中四災四立聖人不能避之聖人所恃者兩克以劑剛柔九德以齊隂陽先而合符後而不違若是而已然則澤中有火之果何義也曰言夫金之從革者也五運之革金為其始四九三百六十年九六七八互相為合各百三十五九乘十五亦百三十五參而舉之四百有五火灼其中二十有七潤下炎上曲直稼穡進退損益各以從革為師始也君子惡夫主亂而以緯為經不惡夫主治而以經為緯然則是可為德行乎曰明治順應焉在而非德行也堯舜湯武則猶是五德之主也故澤中有火治厯明時之象也觀星於水明而後蒙觀天於史蒙而徐理及其究也為果行育德初九革之咸革已日乃孚元亨利貞悔亡咸亨利貞取女吉鞏用黃牛之革象曰鞏用黃牛不可以有為也正曰革之咸利貞而虛則是不可以有為也方革之初時物未動天道向晦日在星紀家人為政不及於國故剛而柔用之葆義以仁絀勇以智堅靸之效而顛撲之試是文王之始事也然則相土公劉之皆有事何也曰是未進於革也荒度遷國受命於君而成之於家亦猶之取女焉耳故取女之吉革者之所未試也是亦天地之下際也六二革之夬革已日乃孚元亨利貞悔亡夬揚于王庭孚號有厲告自邑不利即戎利有攸往已日乃革之征吉無咎象曰已日革之行有嘉也正曰夬則且革矣不利即戎而曰征吉何也曰是已日也六二之動明直而應柔而光以用天下不失臣節弓矢斧鉞猶是王庭之事也詩曰築城伊洫作豐伊匹非棘其欲遹追來孝文王之告邑也無陟我陵我陵我阿無飲我泉我泉我池文王之攸往也文王無革命之事而有受命之功無觀兵之心而有即戎之事然且往而獲吉動必無咎夫非聖人而能之乎九三革之隨革已日乃孚元亨利貞悔亡隨元亨利貞無咎征凶貞厲革言三就有孚象曰革言三就又何之矣正曰革之隨時可以革矣是皆有乾德也然且不時不革故革道之難成也金在於上火在於下用力不倍體質不變革之隨火而益以木則其藝必革矣故革之與鼎相倚為用困之與井相緣為體二者家人之所成務也王者致祀朝夕嶽瀆自卿大夫而下及於井竈各省其象以致養萬物隨而變化鼓舞不倦夫無三就之言而希一革之效猶以灼火而灸巨鑊其無當也審矣詩曰瑟彼柞棫民所燎矣言夫革而將就者也樵彼桑薪卬烘于煁言夫革而未就者也革之去故難言矣哉九四革之變正象既濟革已日乃孚元亨利貞悔亡既濟亨小利貞初吉終亂悔亡有孚改命吉象曰改命之吉信志也正曰改命言夫從革者也金從於澤革而既濟則猶之澤也然而已革矣故謂之改命言革而既濟者也夫既濟則猶未當位也而謂之改命何也曰以言其道則天人皆應矣然則文考之受命亦遂改玉乎曰是猶之改命也三誓之稱文考則猶未王也未王而稱曽孫告於名山大川何也曰是武成之詞也柴望而大告以命庶邦冢君以暨百工故曰惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家文王之未改命亦猶太王王季之未改命也而猶皆王之故曰以言其道則天人皆應矣然則楚之改命也孰亂之曰楚則自亂非夫周亂之也然且以為亂命故改命者聖人之所慎也九五革之豐革已日乃孚元亨利貞悔亡豐亨王假之勿憂宜日中大人虎變未占有孚象曰大人虎變其文炳也正曰夫以文德而成武功非大人而能之乎龍見之大人於是則未有優劣也夫是則剛日也而曰未占何也曰陽德之用而隂德之制三甲三庚則俱自此始也豐亨之憂勿問之矣然則文王之於崇密大禹之於有苖亦無所優劣乎曰三旬之格因壘之降亦何所優劣之有然則湯武之於黃虞其猶之乾革歟乾革之有德威天地之大用也大火之為明堂降婁之為世室天地皆用之然而天地卒不以是易次上六革之同人革已日乃孚元亨利貞悔亡同人于野亨利涉大川利君子貞君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也正曰易之為道五行各兩震離皆火也乾兑皆金也革之九三以震火而革兑金三就乃孚革之上六以離火而革乾金革面而已故甚哉革道之難也以鳴條之勳而退有慙德以妹土之監而屢迪不靖多士曰爾尚寧幹止爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬然則周公其猶之豹變歟曰多士則猶之商金也然則保衡之於周公亦有優劣歟曰夏德世衰也殷德世盛也受罪浮桀武德先湯由是而推伊周之交槩可知矣鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨象曰木上有火鼎君子以正位凝命正曰東南者火木之交也鬼神之正向在於東南人生之資用木處其七木巽於水以出水謂之井木巽於火以納火謂之鼎井鼎兩者以前民用然而井不如鼎之貴也鼎巽而耳目聰明用専而位尊家人竈也鼎之託於家人猶子之託於妾也甚矣易之細也震亦稱木而雷火宅焉屯與噬嗑聖人用之以平獄市不用之以理家政故聖人之治家國則必自鼎始矣下巽而上明剛柔交而通變熟而薦新則必由此也詩曰維筐及筥維錡及釜內子之治也自堂徂基自羊徂牛天子之治也故正位凝命取象於鼎鼎者貴足而尊耳貴體而尊用鬼神所依接於乾坤其究也以經綸初六鼎之大有鼎元吉亨大有元亨鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也正曰是兩元亨也道未有貴於此者也以其在下而謂之趾謂之妾然而位命係焉賤為貴基下為髙柄世未有生而貴者也顛趾以去故得子以取新揚休凝命則必始於此矣夫休命之事而可使妾子與之乎曰其象也言夫棄賤而取貴者也舍其舊飪而薦其新烹則聖賢樂從然則母以子貴道歟曰道也有元子則趾不顛無元子則趾顛顛趾而得元子亦天所上祐也九二鼎之旅鼎元吉亨旅小亨旅貞吉鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也正曰鼎而旅則亦不處矣耳足以聽足足以遷而守其故處不逺不舉則是怨主也申生之將伐翟士蒍謂申生曰太子不得立矣克與不克無所避臯與其不入不如逃之為吳太伯不亦可乎夫申生則無所逃疾也及重耳出亡至於柏谷卜適齊楚狐偃曰無卜焉齊楚逺而望奢道逺難通望奢難及不如翟也夫翟近晉而不通愚陋而多怨可以竄惡可以共憂今若休憂於翟以觀諸侯其無不成乃遂之翟也明年夷吾亦欲奔翟冀芮曰不可後出同走不免於罪且夫偕出偕入難聚居異情惡不如走梁梁近於秦秦吾親也驪姬懼秦必將求子故重耳之奔翟夷吾之奔梁則皆慎所之也然而夷吾不如重耳之實也夷吾愛國重耳仁親愛國者圖聚仁親者永年故曰夷吾不如重耳之實也九三鼎之未濟鼎元吉亨未濟亨小狐汔濟濡其尾無攸利鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也正曰鼎之未濟尚可以濟也公子重耳在翟十二年矣乃適齊楚乞食於五鹿困於衛辱於曹危於鄭去於齊楚乃始入秦秦者晉之雉膏也重耳不先主秦秦之不先置重耳鼎耳之革塞也重耳之終主秦秦之終置重耳方雨之虧悔也齊桓將沒秦穆乃霸九年之勳晉文嗣興是皆天也惠懷之不終誰實尸之國人之誦曰威兮懷兮各聚所有以待所歸兮猗兮違兮心之哀兮嵗之二七其靡有微兮若翟公子吾是之依兮鎮撫國家為王妃兮故小狐濡尾惠懷之事雨虧終吉重耳之道也九四鼎之蠱鼎元吉亨蠱元亨利涉大川先甲三日後甲三日鼎折足覆公餗其形渥凶象曰覆公餗信如何也正曰鼎之蠱鼎新而蠱壞也物有取新而得壞者無有乎先甲之辛後甲之丁亦古人之所兼取也遲任有言曰人惟求舊器非求舊惟新世亦有樂用新器而敗者矣詩曰不愆不忘率由舊章無怨無惡率繇羣匹以新人而操新法以新法而恣新人先後失宜涉險而圖之其不覆餗者幾乎故覆餗有凶非獨鼎足之咎而主鼎足者之咎也詩曰雖無老成人尚有典刑夫以覆餗而咎鼎足不如以典刑而幹物蠱之當也故觀於蠱裕鼎折之間而先王所以用人行政之道可以得其大凡矣九五鼎之姤鼎元吉亨姤女壯勿用取女鼎黃耳金鉉利貞象曰鼎黃耳中以為實也正曰鼎之姤鼎有所遇實動於中而行有所之夫非以養聖賢則在郊祀之前矣夫世之為亨飪來者不皆聖賢也以利祿養人則利祿之士從之君子之為鼎鉉精質以堅以舉百物不失其任以變百物不失其節故為上則耳不革為下則足不折上不驕而下不諂則亦此道也詩曰無然畔援無然歆羡誕先登于岸夫以鼎之時而有歆羡畔援之心其去折足幾何故黃耳金鉉鼎所致其貞令也上九鼎之恆鼎元吉亨恆亨無咎利貞利有攸往鼎玉鉉大吉無不利象曰玊鉉在上剛柔節也正曰金鉉鼎之所為質也玉鉉鼎之所為文也天道之革一文一質質濟以文虎豹金玉遞為令也故鼎而有所遇則必金鉉矣金鉉屢遷不失其居鼎而存其恆則必玉鉉矣玉鉉成之不失其常故繭栗之用玉鉉之貴牲醴之設黃耳之致天地之於聖賢交相致也故曰質極而文文極反質乃天地聖賢所共為令也詩曰追琢其章金玊其相勉勉我王綱紀四方淇澳之詩曰如金如錫如圭如璧夫非有質有文之主而能如此之交備也乎互革鼎二隂之卦也繫於北政自夬始萃升南北反故為困井以調之調之而後鼎革乃著矣自屯蒙至鼎革二十四卦而後對化相遇然則亦有不假二十四限而遇者乎無之需訟之於晉明夷已逺矣十六限而已交故鼎革之厯君子之所不治也其不治何也湯武值之而得湯武莽操治之而得莽操裕溫治之而得裕溫則是君子可以不治也夫不曰厯數執中舜禹常治之乎舜禹之事三千年不得一遇也君子謹其近者以毖其逺者然則治厯明時何也曰行藏隱現之所從禀也堯舜不可遇湯武不可事樂而行之憂而違之幸而當其中際持危扶傾則賢者之務也不幸而值其末際雲泉巖石足以自老麟鳯之趾胡為乎來哉然則大際之濶或至數百年近者六七十載人生上夀不過百嵗安取而量之曰皆於其中際也而見夫一丈之木不足以植八尺之表者乎物者序卦傳曰井道不可以不革故受之以革革莫若鼎故受之以鼎敬宗二年丙午冬十二月宦官劉克明等弒上於內堂立絳王悟宦官王守澄又討克明殺悟立江王涵明年丁未則革之初限也文宗初立內憤宦官與宋申錫謀清禁闥謀泄而申錫坐誅諸閹愈肆李訓鄭注起於布衣佞守澄以誅陳宏志又附仇士良以誅王守澄甘露之變使三相駢首南衙屏息以聽北司劉從諫再疏天子賴以自彊龍紀大順之禍備兆於此矣文宗既崩成美坐廢武宗以英毅之姿乘權三載未敢去仇士良然用李德裕討昭德鎮撫河北不用監軍差有可觀者宣宗初立克復河湟大中之治以明察稱而郤裴休之論不立東宫使王宗實抵巇再行擁立懿宗優柔荒晏委政路巖醉心梵文十四年中無一善狀自武宗以來二三十年藩鎮降心宦官蠖屈令有賢明之主考慎其相復貞觀之治唐祚可延也數窮理極鼎波將沸乾符之元年王仙芝亂於長垣明年田令孜為中尉明年黃巢亂於曹州又明年大同軍亂於沙陀劉巨容欲留賊為資髙千里以風痺㢮力遂使巢犯長安上走興元李克用起於沙陀朱全忠出於降寇均之臣虜而克用有破巢之勳全忠開援弓之釁朝廷不為别白强任調停而田令孜又以鹽鐵私檳重榮使朱玫李昌符共攻河中於是烽烟四合芝荻共焚矣僖宗再至興元朱玫遂立襄煴微克用移檄討玫則天子不還長安昭宗之立李克用未封而朱全忠為東平王張濬孔緯以吮墨書生欲與克用交捽於戎馬之下使五節度縱橫不可復制揚田諸閹雖殄而李茂貞毒焰甚於王行瑜韓建劉季述殺十六宅王天子遂不敢問劉季述誅而韓全誨起敝狐一皮百犬共嘷可歎也李茂貞朱全忠既蕩洗羣閹遂自相併全忠坐大克用獨在晉陽無匡復之䇿但云朝廷不欲克用入都亦豈有召陵之意城濮之業乎唐取天下於隋所克敵最多及其末造狗鼠之匹盡為羣雄裴監劫父之謀初起宫掖而閹宦縱橫亦極前代故觀唐室陵遲之故自袁董而下傕泛而上無毒不茹猶且遷延二十餘年無五代兩晉之事或云是沙陀之威不知為文皇之烈也鼎革之際危矣哉然則鼎革中交在宣懿之際無甚凶醜者何也曰宣宗臨崩以夔王滋屬王歸長恐中尉王宗實異論出為淮南監軍及王宗實入辭見上已崩遂殺歸長及夔王迎鄆王灌立之以義則正以辭則順立嫡奉長出一中尉之手舉朝無敢問者蓋唐室厯朝立愛立少之疹於是始創而中尉為之見標天道昭然安可誣也震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也象曰洊雷震君子以恐懼修省正曰主器者莫若長子聖人所救顚趾也夫有家國者其多憂患乎桑土之不時風雨之不宜則君子是求而君子者又有愛惡攻取以集於多凶多懼之地故虩虩震驚君子猶之飲食也召誥曰王敬作所不可不敬德我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有厯年我不敢知曰不其延惟不敬厥德乃旱墜厥命我不敢知曰有殷受天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命夫以夏殷厯祀而皆曰早墜不延以周召之智而皆曰不敢知古人之恐懼修省有如此者故震者恐懼修省之象也恐懼修省莫如止思其究也以思不出其位焉初九震之豫震亨震來虩虩笑言啞啞震驚百里不喪匕鬯豫利建侯行師震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也正曰小心翼翼夙戒之治也震來虩虩臨事之致也泰誓曰罔或無畏寧執非敵是震豫之事也然則文王之赫怒非歟曰戒懼以作其智赫怒以作其勇怒非天道則不敢用也然則武王猶之人事歟曰上帝臨女無二爾心則猶之天道也君子居常不失戰栗臨事不失整暇宴至如齊豫來如敵先震而後笑毋亦有衆人之心乎曰聖人亦猶之衆人之心也六二震之歸妹震亨震來虩虩笑言啞啞震驚百里不喪匕鬯歸妹征凶無攸利震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也正曰震厲而尚可避乎震厲而尚可避非寇則媾而已躋于九陵明也勿逐七日恕也明以恕君子所以化彊禦君子幸而不當明夷與困之事一朝之懼七日之患勿逐之矣大君之厲報以身小人之厲報以貝鬭媾之凶勿往焉耳諺曰佐饔者嘗佐鬭者傷九陵七日未為遠也知敝永終又安有億貝之心乎六三震之豐震亨震來虩虩笑言啞啞震驚百里不喪匕鬯豐亨王假之勿憂宜日中震蘇蘇震行無眚象曰震蘇蘇位不當也正曰震之豐勿憂之矣震之厲行非以為眚也有道刑戮不及君子清明震厲不及善人震之蘇蘇萬物之所繇生也夫使天地以雷霆為眚於天下則萬物之殄絶久矣故刑戮者天地之正令也以正令則民皆敬以眚令則民皆疑以天地之尊鬼神為政雷霆不時則天地自為不祥之令而况於王者乎况於聖人乎周書曰受王嘉師監于茲祥刑是震而豐之道也九四震之復震亨震來虩虩笑言啞啞震驚百里不喪匕鬯復亨出入無疾朋來無咎反復其道七日來復利有攸往震遂泥象曰震遂泥未光也正曰震而復則遂已復矣正而震則是可震也震而眚則是不可復也不可復而震之則不如其復之也九四之泥何居乎上有柔主下有彊相威戮屢試霖雨不作震而遂泥不失為智也然則君子之修省亦可中止乎曰君子之修省若將終身也天地震怒不能終日夫使聖人在上風雨以時百物啓蟄雖無疾雷震電猶未謂之底滯也故震遂泥道猶未光君子無譏焉耳六五震之隨震亨震來虩虩笑言啞啞震驚百里不喪匕鬯隨元亨利貞無咎震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也正曰以震懼之時而向晦宴息其可乎曰奚不可之有多動者所為多喪無事者所為有事也雷動而澤行上柔而物悅與物同憂與時俱休其說在市南宜僚之答白公晏子之答崔杼也詩曰無將大車維塵雍兮無思百憂祇自重兮夫震厲者億度智慮之所從出也然或以億度而得之億度而失之故億度者古人所不貴也然則歸妹有喪而隨無喪何也曰五崇而二卑也崇少喪而卑多喪崇有事而卑無事崇往而卑來夫亦各隨其時而已上六震之噬嗑震亨震來虩虩笑言啞啞震驚百里不喪匕鬯噬嗑亨利用獄震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也正曰于其鄰何也非正位也婚媾有言何也連也夫噬嗑之震身在于法雖戒而無及震之噬嗑戒修於鄰雖懼而不害懷刑君子則亦有衰世之慮也夫衰世之刑離於正位者則亦鮮矣詩曰有兔爰爰雉離于羅雷霆之下無有聰聽震電之旁無有正視責校耳以聰聽繩震目以正視夫為耳目者不亦難乎詩曰謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊其震上六之謂乎艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也象曰兼山艮君子以思不出其位正曰震之有億艮之有思夫非猶有其身乎有其身則見其人見其人而後敵應隨之動靜行止是非得喪相觸互起而其正位不復可辨矣故身之正位在於心此億得億喪不快危熏者皆心也言心而身之正位見焉心之正位不在於身此億得億喪不快危熏者皆非心也言身而心之正位不可得而見焉不可得而見則思思而后知思出於無思復還於無思趾腓限夤身輔動而億之皆身靜而思之亦皆心也靜而億之皆我動而思之亦皆人也夫知思之出於無思復還於無思者吾與之言思之位矣詩曰於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信亦曰不出位而已不出位則得心所為正位者矣故艮者思不出位之象也思不出位莫如修省其究也以恐懼修省初六艮之賁艮其背不獲其身行其庭不見其人無咎賁亨小利有攸往艮其趾無咎利永貞象曰艮其趾未失正也正曰賁動者也艮之賁可以制動矣而猶恐其終動也謂其以行為事也艮其趾不行矣不行而能不見其人乎曰未之知也世之見人者非趾也世固有不行其庭常見其人者矣然則永貞如何曰守正而已矣易之於趾也於是五申之矣噬嗑賁咸大壯夬皆是也夫以趾命趾不如以趾命身之為止也詩曰折栁樊圃狂夫瞿瞿又曰無已太康職思其居夫猶是以趾命趾者乎六二艮之蠱艮其背不獲其身行其庭不見其人無咎蠱元亨利涉大川先甲三日後甲三日艮其腓不拯其隨其心不快象曰不拯其隨未退聽也正曰物未有止而不壞者止而蠱兩甲申令庶可以免矣然且為之不快故乾乾者君子飭躬之事止止者君子明心之務也腓止而隨動腓不制隨心不制腓動止相貿而後蠱生焉先甲以辛之後甲以丁之則亦庶可以止矣詩曰民莫不逸我獨不敢休天命不徹我不敢效我友自逸無逸之與知止同義也是聖人之有事與無事者同智也必以無事為止則是以流水戶樞神明於天地也是兩甲所不取也九三艮之剝艮其背不獲其身行其庭不見其人無咎剝不利有攸往艮其限列其夤厲薰心象曰艮其限危薰心也正曰屈伸者天地之奧府也限夤之間屈伸所生形以之動神以之靜體以之勤心以之佚艮限列夤則是為厲也然則是貴動也動而曰艮列何也曰是動而剝者也剝而後不動者生焉上下之間或失之柔而矯之以剛矯以剛而不可復柔則腑臟之鬱臭達於心繫故以彊介任事責其卿大夫而勢極不反者亦猶之艮列也詩曰寬兮綽兮猗重較兮善戲謔兮不為虐兮言夫善動而得屈伸之故者也六四艮之旅艮其背不獲其身行其庭不見其人無咎旅小亨旅貞吉艮其身無咎象曰艮其身止諸躬也正曰旅不處者也不處而謂之止何也心託於身猶旅之載道也存則居焉過則去焉與其止於樂餌不若止於不樂餌者也艮之旅夫以為是形氣動者皆旅也天下之稱主人者惟心而已心被於天下則天下皆主也游於天下則天下皆旅也七尺之骸萬里之舍神明所經客於晝夜詩曰蜉蝣掘閲麻衣如雪心之憂矣於我歸說言夫旅而不知其主也旅而知其主則止可以行行可以止故知行之非旅止之非主者吾與之言行止矣六五艮之漸艮其背不獲其身行其庭不見其人無咎漸女歸吉利貞艮其輔言有序悔亡象曰艮其輔以中正也正曰漸物之序也水以漸行山以漸升鴻以漸飛女以漸歸君子之為行也先此而後彼其為言也先人而後已故知君子之為言者可以遺身而行人矣古之君子登於介丘必祀其輔或於亭云或於梁甫故體峻者不營宅髙者不勞詩曰訏謨定命逺猶辰告夫有訏謨而無定命有逺猶而無辰告亦猶介丘之不可登登之不可止也記曰天降時雨山川出雲言者思之雲也雲象於山言象於思知思之所從出則知思之所從歸知思之所從歸則知言與不言所為位者矣上九艮之謙艮其背不獲其身行其庭不見其人無咎謙亨君子有終敦艮吉象曰敦艮之吉以厚終也正曰天下之言艮背者其惟謙乎俯而僂僂而走以是觀背何身之有以是行庭何人之有故北堂無身不為幽也前庭無人不為闃也謙謙而行得所究也故謙者敦艮之道也天下之言厚終者則必惟謙也堂深而後神棲焉庭寂而後精交焉詩曰噲噲其正噦噦其冥君子攸寧故艮而謙禮樂之所從出也禮樂有萬艮謙為上故知艮之謙者雖祀上帝亨岐山而登明堂固必繇此無疑也震艮二陽之卦也繫於南政二陽競長而豪臣立主是猶在中國也而手足交亂上下反易是寧愈於頥頥乎曰猶之頥頥也而頥共一姓上下反復不離其宗又有地道載持其間妖孽之興至婦寺極矣震艮則兩體競治也以用卦乘之猶在萃升之限則震艮操柄萃升用事矣自咸恆來者五卦值於鼎革鼎革㑹於震艮而天下易命固其所也序卦傳曰主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也是謂立嫡之義乎曰亦言乎主器者耳長少何常一反一復惟天所置是天地之所以亂也乾寧之甲寅昭宗誅楊復恭藉韓建李茂貞之力明年王行瑜韓建李茂貞犯闕殺韋昭度李溪於是李克用入討三鎮上自石門復還長安封李克用為晉王是則李克用震者也克用震則全忠艮全忠得為艮乎曰克用動而全忠止之則艮也是時克用屯渭北李茂貞韓建事朝廷陽恭朝廷慮以克用討茂貞則克用愈熾謂停息兵克用還晉陽而茂貞犯闕上如華州再還長安而有少陽院之事崔𦙍為相外倚全忠內倚茂貞盡誅諸宦官為先朝報仇亦無益於事既而身沒國喪徒啓白馬之禍繇是而觀即前留晉陽鎮壓朱李事成功定稽首以讓沙陀未有頓挫生靈至於此極也甲子全忠既殺崔𦙍丁卯遂稱帝明年克用卒全忠即畏克用亦不過嵗朔之間耳又五年而全忠亦有子禍與祿山思明爭烈又十二年存朂始稱帝於魏州當吳蜀勸進之時存朂謂諸將曰先王語余昔天子幸石門吾發兵討賊威振天下當時若抰天子據關中自作丸錫禪文誰能禦我但吾家世忠孝立功帝室誓死不為耳他日當以復唐社稷為心慎勿效此曹所為言猶在耳何可忘也夫忠孝之種寧獨邁於戎狄乎同光元年莊宗遂滅梁明年又以宦官為諸司使監軍既又以伶人為刺史卒以三矢殉於樂器之焰故天下神器非一將之任也嗣源繼起稍變舊習自云某本胡人因亂見推願天蚤生聖人為生民主明宗八年閔帝初立從珂又起馮道以八年宰相望塵勸進曽不數年又為石晉平章石晉以桑維翰之策實獻十六州復以景延廣之謀虛讋十萬劒坐使亡國收其餘辱劉知逺稱帝晉陽不改天福之號未一年遂歾又未三年而郭威弒隱帝即位於澶州劉崇亦援契丹即位於晉陽俱不三年而歾柴世宗又立六年粗成綱紀而天既厭亂震艮載終陳橋之變光於澶州宋以木德乘火而起矣計五代之間八姓十二主近者二三年逺者六七載自亂離以來未有如此之速也考其間克用存朂義自屬唐石劉後唐之將也朱溫唐室之賊也郭周繼之直開宋先猶諸節度蟬聨自帝無當於運㑹也然則是猶屬唐乎曰魏晉之間自為一限後漢之不得屬魏猶後唐之初不屬梁也必以中土之攘奪為上天之眷顧則長安洛陽遂為正朔之㑹少昊不必起於曲阜顓頊不必都於髙陽矣然則是用卦兩位之果何屬乎曰是萃升革鼎之交也萃升易位革鼎易政兩際合畀而震艮值之以各自為長子一反一復雖十二主八姓豈為過乎然則上際也艮震與姤夬交天地亦易位六子亦互爭正值於革鼎而猶有㑹昌大中咸通之治何也曰火德二十有七其運未終而輝氣從之自僖宗元年乾符甲午又二十七年庚申而劉季述幽上於少陽以視太宗元年丁亥二百七十三年其所繇來蓋亦逺矣漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也象曰山上有木漸君子以居賢德善俗正曰漸序也序貴序齒序賢皆序也彊者在上柔者在下綴綴然自為先後也是聖人所以教弟也木託於山漸長以髙止而巽上下皆順聖人以此教弟而長幼不爭上下無怨故隨蠱漸歸妹四者易之大際也隨以教弟蠱以教孝漸以教順歸妹以教慎四者仁讓所繇興也三序之中序賢為上以為序賢易爭故又教弟以致其順詩曰民之無良相怨一方受爵不讓至于已斯亡夫知漸之義者則庶乎可以善俗矣故山上有木君子以居賢德善俗交讓之鄰梟鴟不賓嘉木所都尚虞斧斤其究也以永終知敝初六漸之家人漸女歸吉利貞家人利女貞鴻漸于干小子厲有言無咎象曰小子之厲義無咎也正曰是猶之家人也長長幼幼而家人之道備矣事親從兄蓋自小子而始也嗃嗃之厲則小子先受之書曰王嗣厥德罔不在初立愛惟親立敬惟長婉娩聽訓則不獨為女貞而設也記曰雞初鳴擳縰笄總佩容臭以適父母舅姑之所立無跛視無窺聽無倚笑不至矧怒不至詈無私怨無私蓄無私施與負劍辟咡以從先生問几杖枕席何嚮何趾唯諾而進缺伸而退小杖而受大杖而走者是小子之厲也厲雖有言何咎之有故知漸之小子者可以漸於大人矣六二漸之巽漸女歸吉利貞巽小亨利有攸往利見大人鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也正曰漸而巽以序以順是可以從君矣單襄公曰人性陵上不可蓋也求蓋人其抑下滋甚郤至在七人之下而欲上之是求蓋七人也其有七怨怨在小醜猶不可堪况在侈卿乎故君子始進患不能漸始進而漸患不能巽也趙衰三讓卒不失位范燮三掩以得親詬詩曰羔羊之縫素絲五總委蛇委蛇退食自公是漸而巽之謂也漸而巽以化天下可也又何不可從政之有此易之微義也九三漸之觀漸女歸吉利貞觀盥而不薦有孚顒若鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也正曰九三未失位也漸之觀未失德也德位未失而匹耦見凶何也應敵而時失也漸可以歸矣觀而不歸强敵在外而悉索從之進者愈逺去者愈久功利動于中而家道睽於外是于役陽陽之所繇作也故漸陸之鴻必離其羣樂進之夫其家不蕃觀進而知退觀往而知復則庶乎其可以相保矣詩曰未見君子憂心惙惙亦既見止亦既覯止我心則悅是之謂也六四漸之遁漸女歸吉利貞遁亨小利貞鴻漸于木或得其桷無咎象曰或得其桷順以巽也正曰木不得所遁桷猶得所遁也君子相時而動擇地而蹈時地相違抱關擊柝亦庶乎可也詩曰十畝之間兮桑者間間兮行與子還兮天下無政君子有命鞅掌之勤亦不足敬也以謂茍得其所棲而可矣然終不如游於藪澤而託於洲渚之正也九五漸之艮漸女歸吉利貞艮其背不獲其身行其庭不見其人無咎鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也正曰陵不若澤之樂也然而魚網兔罝亦可以相謝矣君子無所勝於人而人樂於勝君子故有逺人之志者無近人之禍有勝敵之心者終有受敵之恥矣宋公子臧及吳公子札衛公子鮮此三公子者行有優劣而要於逺禍去恥終莫之勝則一也君子不為功勸不為名誘不為威怵不為害疚安其心而止其居饑渴不阻三黜不恥夫以為蘧瑗栁下惠氏之行也雖有在磐之食不謀之矣詩曰髙山仰止景行行止是鴻漸之陵是也上九漸之蹇漸女歸吉利貞蹇利西南不利東北利見大人貞吉鴻漸于逵其羽可用為儀吉象曰其羽可用為儀吉不可亂也正曰鴻漸之儀安可亂乎君子進不失其序退不失其願在上位不侈在下位不怨以在陵則已逺以在桷則已玩雲逵羽儀翺翔休明何不可之有或曰是蹇也動而難生雲冥之野人思其羽故謂出不如處也夫古之仁人亦有殺身以儀世去質以尊文者矣以為漸近於名則真質不存也故見險而知避髙飛而逺去古之大人皆用之是二彖之所貴貞也詩曰鶴鳴于九臯聲聞于天魚在于渚或潛在淵羽儀之光何侈之有歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也象曰澤上有雷歸妹君子以永終知敝正曰歸妹大義也然則征凶無利何也曰妹多媵也媵不得為正也隨之與歸妹隂陽之雜也隨男而歸女也隂陽之雜何也曰澤水也而命之金雷火也而命之木水在於內而木從之疑於火木在於外而水從之疑於金內外疑情寇媾疑形永終知敝則必繇此也然則隨之不疑何也曰丈夫小子隨亦或疑之也隨於澤則失於木隨於火則失於水隨亦或疑之也然而臣道也非媵也曰君子而亦有媵者乎曰君子而隨人則媵也歸妹者隨人而貴者也詩曰緑兮絲兮女所治兮我思古人俾無訧兮古人則庶乎知敝者也然則澤上有雷歸妹何義也曰雷動於澤魚龍從之或得以孕或以失肓君子見氣而徴質見質而徴本其究也以居賢德善俗初九歸妹之解歸妹征凶無攸利解利西南無所往其來復吉有攸往夙吉歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也正曰歸妹而解則往矣為往者何復乎夙往夙復非歸妹之義也或為娣則可矣始仕無位或進或退潔身而下不疑引過而上不罪是伊尹膠鬲氏之行也詩曰言告師氏言告言歸薄汚我私薄浣我衣是以后妃引娣之義也九二歸妹之震歸妹征凶無攸利震亨震來虩虩笑言啞啞震驚百里不喪匕鬯眇能視利幽人之貞象曰利幽人之貞未變常也正曰初二皆下也跛眇之視履皆未為正也而獨且有利焉何也是歸妹之常也古者取女同姓媵之以廣嗣續以全婚媾詩曰諸娣從之祁祁如雲夫是則曰幽人何也曰幽人者君子之所共志也君子不見色於人不見聲於人人知之不揚不知之不懟故窈窕者鐘鼓之所為樂也衛將軍文子三仕矣而猶為下卿展季公族也老於卑位是能無震虩之言乎曰吾不失所為幽人者而已詩曰仲氏任只其心塞淵終溫且惠淑慎其身是幽人之行也六三歸妹之大壯歸妹征凶無攸利大壯利貞歸妹以須反歸以娣象曰歸妹以須未當也正曰婦無少壯臣無崇卑曰貞而已矣貞者大人之事諒者匹婦之誼也歸而逺時則以須歸而當時則以娣四十而服官七十而懸車夫有終年之仕無一日之祿者矣非禮不履則士君子之所自處也詩曰髧彼兩髦實維我儀之死矢靡它是衛共姜宋伯姬之行也九四歸妹之臨歸妹征凶無攸利臨元亨利貞至于八月有凶歸妹愆期遲歸有時象曰愆期之志有待而行也正曰君子之仕為義而已仕而必黃虞歸而必京師則三代無浚明之士姜子多不嫁之女也詩曰摽有梅傾筐暨之求我庶士逮其謂之夫以學為不足不敢言仕者漆雕開公明宣氏之行也以仕為無益不復言學者申徒狄介之推氏之行也歸妹之臨以待仕何期乎諺曰俟河之清人夀幾何詩曰俟我于巷兮悔豫不送兮是猶擇吉而蹈者也則亦未至於怨悔也六五歸妹之兑歸妹征凶無攸利兌亨利貞帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也正曰歸妹而兑君悅其臣臣亦悅其君夫天下之君自謂不如臣者鮮矣成湯之稱阿衡曰聿求元聖武王之頌吕望曰維師尚父桓管之交兼取之矣然而管仲之娣亦未有良於管仲者故楚令尹之賢樊姬之所竊笑也詩曰嘒彼小星三五在東未望之月也嘒彼小星維參與昴將望之月也夫以彌望之光失嘒彼之輝日夕而昃其與幾何歸妹之兌麗澤而悅則必有得於此者矣上六歸妹之睽歸妹征凶無攸利睽小事吉女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也正曰歸妹而睽歸妹之敝則必極於此矣睽者家人之反也異同生而志不相得不相得而牙猾相為孽也故兑者羊也震者筐也彼此虛疑則是不祥也金之疑火火之疑水著於士女則乖於家著於君臣則乖於國秦誓曰仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之故永終者家國之大繫也諞言無物飾行無恆家國之大不利也夫家國之大不利則將在媢嫉矣秦誓曰邦之杌􅑾曰繇一人邦之榮懷亦尚一人之慶長國家者而觀於歸妹則亦知所戒矣夫凡易之下際至夬姤而易次夬姤而下復為四六故更一際而始革鼎革鼎帝王之要㑹也革鼎之於夬姤猶夬姤之於剝復也革鼎二隂從於北政寅戌初候火德之所從歸也鬼神出入於是司令贏厯之往反於是中次故革鼎之㑹王者之所慎辨也乾坤司上六子司下坎離者乾坤之寄宅也震艮者乾坤之終始也故鼎革之後受於震艮震艮二陽從於南政辰申中候水德之所從盈焉者也動漸歸妹之在下經猶隨蠱之在上經也反易變各還其卦從於北政為寅戌中候火德之所從究也日月薄蝕於是更端故革鼎震艮漸歸妹為下經之要㑹人道乘除繇於中舍故觀於圜圖而後知隂陽家室為天道之腑臟泰否兩濟於是經緯一南一北二六為際盛衰之所從而紀焉者也也序卦傳曰物不可以終止故受之以漸漸者進進必有所歸故受之以歸妹於是則宋祖受命矣是交卦也而興主值之何也曰猶之泰否隨蠱也隂陽交暢天地之所立主也六子之交暢獨隨蠱漸歸妹耳然則謂之災卦何也曰剛柔交而難生屯蒙則猶之未交也艮巽震兑於是乃交損益為六朝之終咸恆為魏晉之始則亦猶此也然有反覆而無對化反復對化俱則治亂之終始備矣故趙宋之於元代於魏晉六朝同治也建隆元年庚申其明年入漸用卦之交在革自咸恆來者損益之際也開寶興國之治粗有可觀諸王不蚤自克以及於死非復爻象之所能治中交辛卯以李繼遷觀察銀夏卒為酉土大艱甲午李順陷成都以宦者王繼恩為招討猶有五代之風焉於是趙保吉冦靈州保吉即繼遷也真宗五年保吉陷靈州明年陷西涼子德明以契丹立稱西平王甲辰景德元年契丹大舉入冦上渡河次澶淵契丹受盟而退真宗既恥城下之盟遂侈東封之䇿天書屢見社首乃登崔立孫奭之疏既用見疏王旦冦凖之賢猶依以自固開元天寶之故智唱于大中祥符之間危哉其自誣也劉德妃既正中宫浸于外事乾興遺詔遂以軍國聽其處分幾立劉氏七廟嚮非大臣秉政豶牿於蚤歸妹征凶豈可量哉然則諸圖之無取於歸妹者何也定位歸漸在梁唐之際而宋興在損益之端七十二限皆在井鼎之交而漸歸殿後衡圖用限皆在咸恆損益升鼎之際而漸歸多在漢獻唐懿之間唐懿宗曰朕安敢望堯舜望周赧漢獻耳周赧漢獻制於强諸侯朕乃制於家奴故漸歸妹者易所離為入亂也而初宋值之何也曰世之為治者幾何禍重於前則勢平於後機張於左則害㢮於右觀於乾坤六子三限六際魏晉六朝之所始終而後宋之受命為隨蠱同交與秦漢比義曉然見也易象正卷九
