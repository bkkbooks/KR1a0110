body:
  text: 易象正卷八明黃道周撰夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也象曰澤上於天夬君子以施祿及下居德則忌正曰夬姑洗之卦也萬物齊潔蕩滌去穢其律六十有四神明之所取斷也是而猶有忌焉何也即戎之德難乎為上也説而和用以能通健而決不用以柔遠揚庭告邑則猶自為治也或曰施祿居德之適相戾何也曰君子自治不以治人厲已不以厲人爵祿之在王庭豫之不敢恩奪之不敢怨去小人而有怒氣畀君子而有德色是皆君子之所甚忌也君子居仁而不居惠居義而不居利居於無所利而不居於為仁義者詩曰為謀為毖亂况斯削告爾憂恤誨爾序爵天位天祿係於王庭王者以公於天下君子以奉於王者致謙以居之致恪以受之又何孚號之有乎書曰居寵思危罔不惟畏則可去其夬夬者矣故夬者施祿及天下之象也施祿者不自德厚下者不自宅及其究也為厚下安宅初九夬之大過夬揚于王庭孚號有厲告自邑不利即戎利有攸往大過棟橈利有攸往亨壯于前趾往不勝為咎象曰不勝而往咎也正曰勝而往亦豈無咎乎大壯之趾則猶有孚夬之前趾則遂得咎何也大壯而恆則猶未為過也夬而大過則是為過也夫以五陽決一隂而猶有不勝何也曰棟之撓也其壯不任事機未決而漏言先泄宵人自防其柄倒持往而不勝又何怪乎曰是兩利往也利往以求制勝何壯之有曰是無位也而動已蚤君子制事而下人是謀鮮有不覆者矣詩曰厭浥行露豈不夙夜畏行多露壯趾而夙夜何貴之有九二夬之革夬揚于王庭孚號有厲告自邑不利即戎利有攸往革已日乃孚元亨利貞悔亡惕號莫夜有戎勿恤象曰有戎勿恤得中道也正曰革則有位矣有位而用柔孚惕厲號天下信之然且似有憂恤者何也熠耀行宵蜉蝣出隂朝寧之有小人猶邊庭之有夷狄不保其無但曰夜行而已君子之治小人不能使小人絶類能使小人信志莫夜之惕號非曰怨憎亦以自警也詩曰告爾憂恤誨爾序爵誰能執熱逝不以濯爵位者朝廷之扞掫也爵位晝明扞掫夜勤雖有伏戎勿憂之矣故曰氷炭互勝者朝廷之大戒也以知其消長節其蚤莫則可免於厲矣九三夬之兑夬揚于王庭孚號有厲告自邑不利即戎利有攸往兌亨利貞壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也正曰健而説然猶之健也世未有不獨行而能健者也獨行壯頄其勢必爭麗澤而往衆志乃合故獨行者君子之志麗澤者君子之務也君子合衆以成務致獨以審幾夬夬而行雖未得志天下猶且信之詩曰肆不殄厥愠亦不隕厥問太王是也夫無獨行之志而欲成麗澤之務道謀牽於下黨議發於上雖曰無愠與壯頄者同敗也詩曰如匪行邁謀是用不得子道九四夬之需夬揚于王庭孚號有厲告自邑不利即戎利有攸往需有孚光亨貞吉利涉大川臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也正曰夬決也需不進也夫以夬決之時進需時之䇿誰信之乎君子因時相物而動退而謀其身進而謀其人無膚之臀不可行也牽羊之䇿不可前也於是而道決進之䇿則亦且疑之矣君子之居德也為兌而説為需而待説而獨行待而能斷故以謀則寡失以動則無悔若濡有愠聞言不信則猶未失斷也周公出師於畢龜焦而棄龜陳師於牧雨至而決戰周公之獨行也文王伐密而密下伐崇而崇降然且七年大勳未集是文王之次且也文王次且不以為怯周公獨行不以為壯夫亦曰時而已詩曰孔惠孔時維其盡之子子孫孫勿替引之文王周公之謂也九五夬之大壯夬揚于王庭孚號有厲告自邑不利即戎利有攸往大壯利貞莧陸夬夬中行無咎象曰中行無咎中未光也正曰夬之大壯動而震姑洗之律被於太簇陽蔬怒生不必汙隂夬夬之陽得其所求於斯時也贊陽出滯考神納賓因其大采以修日德則猶之中行也故莧陸采而蔬圃治蔬圃治而嘉穀秀詩曰荼蓼朽止黍稷茂止言治小人者也中原有菽庶民采之言治君子者也莧陸之賤不逮小人其貴不逮君子庸猥之材與時俱榮夬夬而用之夬夬而去之明昭之賜則必有與者矣夫以盛明之時無登庸之業博碩之薦而試禴於莧陸者亦各其宜有道所不訾也故曰中行無咎雖云大壯則猶之中行也以大壯為中行則是聖人舍其韋佩也上六夬之乾夬揚于王庭孚號有厲告自邑不利即戎利有攸往乾元亨利貞無號終有凶象曰無號之凶終不可長也正曰夬而乾何凶乎易之觀夬與其觀剝也猶之臨遁各警其所終故天道之長消聖賢所大毖也君子以是而夬小人小人亦以是而夬君子矣故快心之事君子之所流涕也無號終凶鬼神之於小人何謀乎曰王庭孚號亦欲不信於天下云耳君子不以消長聽之天道不以進退委之國柄乾乾夕惕以圖其後詩曰藐藐昊天無不克鞏無忝皇祖式救爾後是乾元之所思永也故孚號者君子之不獲己也姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉象曰天下有風姤后以施命誥四方正曰是㽔賓之卦也㽔賔之律五十餘六不可以損矣不可以損而益之益之彌壯故易所不敢取也然則樂有正間姑洗㽔賓猶之陽律也而為女壯何也曰從律則謂之陽律從卦則謂之隂令矣君子肅於隂令以察夏至謹其起居無有不恪節嗜欲尚淡泊屏息斂身以待隂陽之自定於是而有佚志怠色則其蕃育不備賦命苟薄神人所酬獻不從焉詩曰神之格思不可度思矧可射思君子治其房闥以棲神明早服夜息如御賓客故姤之女壯君子有所不取也不取女壯而施命誥四方者何也言室滿室言堂滿堂天下如家安知四方及其究也以閉關獨復初六姤之乾姤女壯勿用取女乾元亨利貞繫于金柅貞吉有攸往見凶羸豕孚蹢獨象曰繫于金柅柔道牽也正曰金柅乾也羸豕姤也繫于乾則姤不為政孚于姤則乾不為政矣楚司馬子期欲以妾為內子問左史倚相曰吾有妾而願欲笄之其可乎對曰昔先大夫子囊違王之命諡子夕嗜芰子木有羊饋而無芰薦君子曰違而道穀陽豎愛子反之勞而獻飲焉以斃於鄢羊尹申亥從靈王之欲以隕於乾溪君子曰從而逆君子周旋惟道之從子木能違若敖之欲而吾子欲薦芰以干之其可乎故曰金柅之繫違而道羸豕之孚從而逆貞吉不往則近于道者乎九二姤之遁姤女壯勿用取女遁亨小利貞包有魚無咎不利賔象曰包有魚義不及賔也正曰包有魚女子之祭也女子尸祭不及賔客爵辨在門不顧內厨記曰彼婦之口可以出走見女壯而思遁者夫亦有伊微之心乎詩曰哲夫成城哲婦傾城哲婦則猶之包魚也九三姤之訟姤女壯勿用取女訟有孚窒惕中吉終凶利見大人不利涉大川臀無膚其行次且厲無大咎象曰其行次且行未牽也正曰女壯而知訟則亦知厲矣詩曰誰生厲階至今為梗言夫婦舌之階厲也君子於訟以作事謀始於歸妹以永終知敝而姤之訟兼之故次且之行未為蹢躅也君子省於內德足以制義省於外德足以制慝嬿婉之交何國蔑有包魚以訟其中羸豕以訟其初凶厲以訟其終則亦可以免咎矣周室之興也皆以薑任其替也皆以驪隗夫豈薑任之女蒙驪隗之女壯乎不有女壯何以敵國未之思也夫何遠之有九四姤之變象巽正姤女壯勿用取女巽小亨利有攸往利見大人包無魚起凶象曰無魚之凶遠民也正曰女壯而乾孫重巽申命婦人為令故包之有魚則猶內政也包之無魚則是外政也艷妻煽於內卿士應於外從我公事而舍其蠶織天下禍敗則從此始矣詩曰敝笱在梁其魚唯唯齊子歸止其從如水故姤而行巽君子之所惡也春秋書公及夫人如齊與夫人歸自齊孫于齊是春秋之嚴也春秋之不獲己也亦猶之申命施誥使天下取則焉耳九五姤之鼎姤女壯勿用取女鼎元吉亨以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也正曰瓜易敗也杞不易敗也姤賤而鼎貴也以其子貴其母以其陽德養其隂節以其不易敗養其易敗者故坤之含章載謙以從其君姤之含章載鼎以從其夫臣道以得妻道不失詩曰南有樛木葛藟縈之樂只君子福履成之故以樛木而縈葛藟含章之義也君子猶或知之以福履而成君子有隕之道也君子則不之知也君子體道以養萬物使其陽節不既隂節不亢以御臣妾騶從各得其所詩曰瑟彼柞棫民所燎矣豈弟君子神所勞矣是姤之鼎之謂也上九姤之大過姤女壯勿用取女大過棟橈利有攸往亨姤其角吝無咎象曰姤其角上窮吝也正曰姤之大過過在勿取女者也鹿之感陽麋之感隂時至而角解角解而不交君子遇窮而顛顛而不復遇吝則吝矣失亦其時也何咎之有故大過之滅頂與姤之姤角其義不相逺也時過而遇凶與時遇而過吝知命者不失其命知性者不失其性周公之誅管蔡不以為罪夷齊之違明時不以為鄙詩曰天實為之謂之何哉故大過之姤與姤之大過其要無咎一也其皆有獨立不懼遁世無悶之心乎不然何其詞之危而平顯而明也也夬姤二隂之卦也是宜在北政而繫於南政何三才之等六尺四寸自四尺二寸而入於下際餘二尺二寸以交於頂踝故自乾坤至於剝復二十二卦人身之上際剝復至於損益腑臟之海滙也夬姤而下股膝屈向交於北政故夬姤萃升南北反易三才之等九道之緯於是可别矣故易者天人之大辨也天地之有夬姤皇王升降男女遷化世運不齊皆繇此出以夬姤而别下際以剝復而别中身兩濟乾坤頂踝始終規而圜之一南一北日月出入鬼神所行十有三萬一千六百餘里經緯隂陽上下終始蓋亦猶是矣故剝復夬姤聖人所以命鬼神而别天地也易之為道不亦精乎也序卦傳曰益而不已必夬故受之以夬夬者決決必有所遇故受之以姤姤者遇也雜卦傳曰姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也是皆為長夏之會也唐武德甲申始入夬限是嵗六月慶州楊文幹受甲於建成欲圖秦王玄武門之禍則搆於此也又明年丙戌秦王殺建文元吉乃即帝位上皇讓居北宫故為王季與泰伯子臧之難也以魏徴輔建成以王圭教魏王泰而皆有市心豈時會使然抑人謀之絀乎太宗既納馬周之言置酒未央奉觴上夀頡利起舞馮智戴詠詩真古今一時也而內不能監玄武之事使青雀投懷承乾賈禍猶外侈靈州之伐遠勤安市之師故為帝王而欲絶欲以談仁義非堯禹不能矣甲寅之距甲申正三十年夬姤中交而才人武氏始為昭儀考武氏入宫在貞觀丁酉十二年十月時方十四距永徽甲寅又十八年姤女已壯而施誥四方夫古人亦已及此乎疑似之形殺李君羡故讖緯之書君子之所絶口也雉奴柔懦恐不克終文皇之言不為不智而天鼓其波水沴屢作在廷諸臣無一人議其始者及雌形既變禍漦已翻乃叩頭泣血以明不可使李績義府敬宗三人者推刃諸李幾滅唐宗豈不哀乎丙辰顯慶而後尚三十餘年包魚躅豕併發其毒鴆廢三子殺十二王朝士破滅者幾數千家雖以狄仁傑婁師德之流亦含詬忍恥待盡而已談者以春秋薑氏不去夫人謂臣無挾君以子去母之理正當委曲以奉雄狐栖遲而觀敝笱嗚呼過矣夫使文薑覆魯之宗敬嬴絶文之祀即三家諸子亦有起而殉之者必以季孫行父公子遂為百世之模亦不達於類矣夫亦束於權勢偷日視隂旡繇從聖賢問其沐浴也萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣象曰澤上於地萃君子以除戎器戒不虞正曰澤上有地其象修文地上有澤其象修武何也澤上有地則澤在地中百流歸之人臨其上以為教思容保文德出焉盛明之時也地上有澤則澤冒於地百流泛濫人萃其間以為戎器不虞武事出焉憂危之時也憂危之時而為假廟用牲何也是猶之明盛也大衆所聚不得禮樂必有戈矛故羽籥干戚兩者相為救也詩曰瞻彼洛矣維水泱泱君子至止鞞琫有珌是猶之盛明也而韎韐鞸琫及於君子故俎豆軍旅兩者亦相為用也及其究也為多識前言往行以大畜德初六萃之隨萃亨王假有廟利見大人亨利貞用大牲吉利有攸往隨元亨利貞無咎有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也正曰萃而隨雖不為亂其道足以亂矣是非有終孚也號笑焉耳君子獨往不隨丈夫獨行不隨小子萃而隨人何為者乎故號者喪志之事往者正行之道也春秋之會盟何嵗蔑有其孚而尋之皆不終也其號而隨之皆亂也魯僖公不服於齊與衛莒盟於洮又盟於向齊人來伐臧文仲病焉欲以辭告問於展禽展禽以膏沐犒師齊侯問曰魯國恐乎對曰小人恐矣君子則否齊曰何恃曰恃二先君之職業昔成王命我文公及齊太公曰爾股肱周室以夾輔先王賜女土地質以犧牲世世子孫無相害也恃此不恐齊魯乃平夫僖公則可謂亂隨也文仲則可為號萃也展喜則可謂勿恤而往也夫無獨往之志而以亂隨人者是大衆所為握笑也六二萃之困萃亨王假有廟利見大人亨利貞用大牲吉利有攸往困亨貞大人吉無咎有言不信引吉無咎孚乃利用禴象曰引吉無咎中未變也正曰萃而困衆志乃固薄物以祭猶可以福故衆困引吉難以為信也而大人終信之者憂患同恤衆人之道急病讓夷君子之務也魯飢文仲請糴於齊從者曰君不命吾子吾子請之其為選事乎文仲曰居官者當事不避難在位者恤民之患是以國家無違今我不如齊非急病也在上不恤下居官而惰非事君也乃以鬯圭及玉磬如齊告糴魯人賴之稱之曰智故引吉之義未為選事也衆志所在吾因而從之雖困不殆禴祭之與大牲亦異物而同用也若臧文仲者利用禴矣六三萃之咸萃亨王假有廟利見大人亨利貞用大牲吉利有攸往咸亨利貞取女吉萃如嗟如無攸利往無咎小吝象曰往無咎上巽也正曰無咎而又何吝乎謂其與衆同義也衆呼而衆應合志於隂無復正助或告之禍難則相視興歎以是為吉凶同患者是龜蓍所不與也故大牲禴祭大人之所貴也號呼咨嗟則小人之事也大師將動禍難且作智不足以慮逺義不足以用衆而泛泛焉與衆人同志者若溴梁虎牢翟泉之會皆是也雖云無咎吝必從之詩曰許人尤之衆釋且狂其萃之咸之謂乎九四萃之此萃亨王假有廟利見大人亨利貞用大牲吉利有攸往比吉原筮元永貞無咎不寧方來後夫凶大吉無咎象曰大吉無咎位不當也正曰萃之必有比勢也比猶有不寧之虞焉比於上而得其信比於下而得其順則是大吉也情偽相攻好惡相畸琴瑟之専一水水之相濟則未之聽食也夫當衆萃之時大臣比附以行威福下有得衆之疑上有震主之嫌天子孤立羣下不親則亂矣萃而比則猶之從王也從王而吉何咎之有吉日之詩曰獸之所同麀鹿麌麌漆沮之從天子之所車攻之詩曰決拾既佽弓矢既調射夫既同助我舉柴夫是則萃之比者也後夫之凶其轅濤塗之謂乎抑鄭伯首止之謂乎九五萃之豫萃亨王假有廟利見大人亨利貞用大牲吉利有攸往豫利建侯行師萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也正曰萃有位何謂也天子無故以王人會於諸侯諸侯有事會盟而不朝於天子故春秋無義戰則亦無義會也北杏陽穀之會皆是也葵丘之賜胙陽樊之請隧或貞或悔則亦其志也然且天下不信之者古者天子受命日覲四嶽羣牧班瑞于羣后五載一巡狩羣后四朝諸侯比年小聘三年大聘五年朝于天子乃自相朝也天子有事於羣后命侯伯致討錫以弓矢事成而獻於天子侯伯專征不得自相命也故萃者天子之事豫者侯伯之道也天子有命建侯行師以討不庭而征不服則無所事萃諸侯伯而謀之諸侯伯自相萃而謀行師則無所事請命於天子故萃之豫非所彰信於天下也大德而永貞猶可以伯否則以強臣盟會自教其下也故比之原筮豫之元永貞萃之四五皆用之是天子諸侯之互相取也救許城邢立衛猶庶及此也上六萃之否萃亨王假有廟利見大人亨利貞用大牲吉利有攸往否之匪人不利君子貞大往小來齎咨涕洟無咎象曰齎咨涕洟未安上也正曰萃咸之嗟如尚有小吝萃否之涕洟以為無咎何也夫亦其時也知人之難古帝靳之災眚之著不虞間發萃而得否上下動色大衆齎嗟神將與謀故萃而謀泰飲食宴樂則是不可為也萃而謀否齎咨涕洟則是可為也抑戒之詩曰肆皇天弗尚如彼流泉無淪胥以亡夙興夜寐灑掃廷內維民之章修爾車馬弓矢戎兵用戒戎作用逖蠻方故如衛武公則可謂知萃之否者矣沙隨平丘之會則亦不足以諱也升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也象曰地中生木升君子以順德積小以髙大正曰升猶似有恤者何也根伏於地隂掩於上二陽并進利在不蔽故似有恤也君子患德之不積不患不在髙位樹藝拱把不見其益有時而長故考德論業稽古達務君子所為髙大也説命曰念終始典于學厥德修罔覺伊訓曰立愛惟親立敬惟長始于家邦終于四海夫以家邦之親長為四海之敬愛非積學而能之乎君陳曰爾克敬典在德時乃罔不變允升于大猷其諸升之謂歟夫以繼長為志以下位為恥真小人之事也故升者順德用積不見其益惟夭惟喬日月邁征及其究也以茂對時育萬物初六升之泰升元亨利見大人勿恤南征吉泰小往大來吉亨允升大吉象曰允升大吉上合志也正曰升而泰允升大吉勿問之矣泰之麗於乾坤未有不利者也而升與大畜其著者矣甘臨之有憂何也憂夫已大者也天地之否泰託於人不託於時君子彚征小人屏迹則是道泰也甘言日諂長民日驕則是道憂也升之初六隂動而從陽嘉言罔攸伏野無遺賢是當元愷之時也至於八士而僅乃再值夫逢是時而後言升不亦已難乎九二升之謙升元亨利見大人勿恤南征吉謙亨君子有終孚乃利用禴無咎象曰九二之孚有喜也正曰升而謙位髙而下人善世而不伐益流福好之所歸也詩曰雖無旨酒雖無嘉殽雖無德與女晏嬰季孫行父趙衰范燮皆用之矣故禴者神明之所繇通也孚而用禴衆志以格神道以得三讓而升堂百拜而受享夫豈為福日免咎而已故致讓存位非德之至者也孚禴則庶乎可也九三升之師升元亨利見大人勿恤南征吉師貞丈人吉無咎升虛邑象曰升虛邑無所疑也正曰升而得師衆志以歸為禮則有節為度則有制崇髙以為志容蓄以為量是亦大人之道也故虛者邑之聚丘也升虛而望羣動瞭然以觀衆則得其辨以用衆則得其利伊尹之升陑衛侯之望楚則亦丈人之義也君子不恥下位而恥其德之不足以辨物不樂髙位而樂其道之足以濟衆升而師則亦庶乎當位矣當位而升何疑之有六四升之恆升元亨利見大人勿恤南征吉恆亨無咎利貞利有攸往王用亨于岐山吉無咎象曰王用亨于岐山順事也正曰升而恆未失常也君于順德纍世不失頌曰天作高山太王荒之彼作矣文王康之荒則用升也康則用恆也以十五王之德服事五十年亦可謂恆矣岐山之亨未為不順也君子守其順德以俟天命拘繫之窮不以為戚弓矢之錫不以為寵詩曰厥德不回以受方國又曰豈弟君子求福不回夫以文王之德而一曰不回再曰不回則用亨西山而僅得無咎何為過乎故以庸人之德而翹非常之福亦鬼神之所惡也六五升之正象井變升元亨利見大人勿恤南征吉井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶貞吉升階象曰貞吉升階大得志也正曰升之井猶似有恤也而大得志何也曰泉動於下而澤升於上瓶繘雖羸而井德不改故井德者百世之務羸瓶者一朝之患也若子患受德之無地不患受福之有失汲井以為養升階以教讓故小人樂其利君子樂其志詩曰泂酌彼行潦挹彼注兹可以濯溉行潦且然而况於井德乎故勞民勸相有位者之敬事也上六升之蠱升元亨利見大人勿恤南征吉蠱元亨利涉大川先甲三日後甲三日冥升利于不息之貞象曰冥升在上消不富也正曰物消於晝而長於夜日夜相息而後不息者見焉草木冥升則各有極也聖人以其不息綿其相息者以其有極而引於無極亦曰幹蠱貞甲而已先甲後甲晝夜所以不息也詩曰天生蒸民其命匪諶靡不有初鮮克有終抑戒之詩曰民之靡盈誰夙知而莫成故蠱之利冥升之利貞性命之義也體升以幹蠱體貞以幹冥積德之致也夫不有道德而談性命於消息之故不已迂濶也乎萃升二陽之卦也是宜在南政而繫於北政南北别繫是則視於夬姤矣故南政二十有四夬姤北來而居其際北政二十有四萃升南來而居其際夬姤萃升天地之大别也人身體竪竪而别之三際不等天地體圜分其重卦三際各二十四故夬姤萃升别其離次而日月出入隂陽之道概可識矣體竪頂踝交於咸恆體圜腑臟結於兩濟圜倚異用而經緯如一兩極之間為天地心日月距極各六十七每卦嵗厯亦於此出故曰升降遷化命厯之義亦分著于此也序卦傳曰物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升是何謂也曰亦各其遇而已是猶未出姤也長夀延載之間嵗在癸已是安金藏剖心之嵗也又五載戊戌廬陵王始還東都辛丑還東宫乙已正月乃誅易之昌宗冬十一月武瞾乃卒以一鷕雉濁亂朝廷者五十年狄婁姚魏皆為宰相俯仰其間及武瞾暮年思子發夢乃徐出數言續安蘇之後可恥也魏元忠手戕敬業流涕凶門釀韋氏之亂揚三思之灰而猶數騰輔頰以居懋名亦可哀也觀於景龍景雲之事戎器不虞信難除矣相王不監玄武門之玩蚤授玄宗使太平亂行致有登樓之變玄宗又不監後漢之禍輕用內侍使力士擅權遂開觀軍容之漸自元年癸丑至丁丑二十四年諸賢謝事李林甫牛仙客為政遂廢太子瑛鄂王瑶光王琚以寵惠妃又五年甲申以安祿山節度范陽明年是誦新臺之詩又七八年林甫乃死國忠用事又四年乙未悉以蕃將代漢將而祿山遂反論者以祿山之反國忠趣之國忠不趣山寧不反不除不戒戒禦乃大且以謂男戎之禍細於女戎之禍也乎丙申祿山僭號陷長妄天子促駕於扶風太子即位於靈武自鄭泛翟泉之後無有也天子至鳯翔乃遣使祀張九齡劉生曰樊豐敗而後祀楊震宦者敗而後祭陳竇遼水敗而後祀魏徴祿山反而後祭九齡思之晚矣然亦未為晚也幸而鬼神害淫祿山思明數年之間俱有子禍上皇還蜀居興慶宫御樓瞻眺李輔國因之遂鼓唇舌執轡西宫憂生倉卒蓋自玄武門承天樓興慶宫之事三變矣然且不至於篡弒夫謂夬姤萃升亦獲乾坤之用乎乾坤之擁女禍其敗如此也乾主而坤臣乾外而坤內互相取也困亨貞大人吉無咎有言不信彖曰困剛掩也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也象曰澤無水困君子以致命遂志正曰澤無水何也水滙於澤則謂之澤澤決於水則不謂之水也澤決而水道赴壑之智勇於蹈險君子以謂之致命小人以謂之尚口故言不見信君子之所謂困也君子畜德於中不言於外淺深莫測清濁莫分無所利於人而天下信之畜義於中揚聲於外獨行不疑獨言不違無所利於身而天下疑之故天下之得其理義者鮮也詩曰王事敦我政事一埤遺我我入自外室人交遍摧我夫是則可謂困矣羔裘如濡洵直且侯彼其之子舍命不渝夫是則可謂不失其所矣困而不失其所雖有危言何畏之乎然則致命遂志何取之漏澤也曰盛水則無澤盛澤則無水遂命則不見志遂志則不見命殺身成仁或為之殺人媚人則不為矣其究也為明庶政無敢折獄初六困之兑困亨貞大人吉無咎有言不信兌亨利貞臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也正曰險而説則是説險也困初而剛動不信而言則衆以為樂禍矣世有樂禍之言無有乎源不可恃流不可迅上兑不塞下兑立決故當初用之時雖有麗澤君子猶以為不可也何也講習之言亦大人所不事也世而猶信麗澤之言則君子之免於困也久矣詩曰或以其酒不以其漿鞙鞙佩璲不以其長故臀木入谷君子有所未免也九二困之萃困亨貞大人吉無咎有言不信萃亨王假有廟利見大人亨利貞用大牲吉利有攸往困于酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也正曰困于酒食用衆之義也朱紱方來假廟之致也利用亨祀大人之貞也征凶無咎不言之信也夫有方來之福而有征凶之禍何為者乎困而得衆為上之所惡也上之惡下専其名下之違上方其情朱紱方來則未可知也臀木入谷則未可避也以不信之言往嘗於上則上以為動衆造譽瘝君者矣詩曰亦有和羮既戒既平鬷假無言時靡有爭用此道也鬼神聽之矣六三困之大過困亨貞大人吉無咎有言不信大過棟橈利有攸往亨困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也正曰困而棟橈棟橈而往何之乎君子當困有所不避也非所困而困則有所不為也困之大過已過矣而猶且往則是樂禍也古有樂禍而往者無有乎九侯之事是也君子正命以致其命正志以遂其志匪正之眚則猶之無妄委身以俟之然且君子無所懼悶也九四困之坎困亨貞大人吉無咎有言不信習坎有孚維心亨行有尚來徐徐困于金車吝有終象曰來徐徐志在下也正曰金車徐徐坎未滿也吝有終心行尚也天下之可信者其維心乎習坎之言心易之所貴也君子當厄不求速去待命不求速至盈科而得其漸滿節而得其候雖有違言久而必從東山之詩曰我徂東山滔滔不歸我來自東零雨其濛如東山則可謂困於金車者矣九五困之解困亨貞大人吉無咎有言不信解利西南無所往其來復吉有攸往夙吉劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也正曰是困之解萬物甲拆罪過之所繇免也罪過之生始於爵祿赤紱之與劓刖互相掣也赤紱不去劓刖不説夫欲不去其赤紱而説其劓刖此豈一日之誠而能之乎故澤水之決竭而困雷雨之合集而解史巫以通之神明以將之以為是得於祭祀者而聖人猶以是中直之為夫神明則中直之凖也詩曰嗟爾君子無恆安息靖共爾位好是正直神之聽之介爾景福是小明詩人所求説於祭祀也上六困之訟困亨貞大人吉無咎有言不信訟有孚窒惕中吉終凶利見大人不利涉大川困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也正曰困而訟則何當之有乎夫訟者所以為悔也世未有困而不訟訟而不悔者也葛藟臲卼皆生於訟訟窒惕中則臲卼可安葛藟可去矣然則困可以不訟乎曰已困矣又何訟乎使訟而見信則不如不訟之信也申世子曰敬賢於請詩曰往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣是猶未能至於無訟也井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也象曰木上有水井君子以勞民勸相正曰觀於井而知養民之勤也井之閲瓶多矣然而繘者不疑羸者無怨謂瓶可改而井不可改也君子為憲布於象魏時事或違而更令易人不為怪者亦主於誘掖勸助而已矣故謹於用人慎於用法君子之志也用人而不終用法而變更君子之不獲己也君子之敬慎不敬慎於瓶而敬慎於繘之者故觀於繘井羸瓶而後知懼也伊誥曰終始慎厥與惟明明后夫以勞民勸相而不慎於使令奔走之臣於以嗟嘆豈有極乎詩曰微子之故使我不能餐兮言夫勞勸之不至者也故井者勸勞之象也井不廢㸑情不廢法其究也為明罰敕法初六井之變象需正井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶需有孚光亨貞吉利涉大川井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也正曰夫裕於人者不仰於天足於已者不待於物水木之用而雲雷之需以待其時其與幾何故瓶者井之禽也泥下時舍不甃不泄則州里棄之矣雖有羸瓶不復集之君子養人時修其憲強則抑之弱則幹之臯陶曰念哉率作興事慎乃憲欽哉屢省乃成欽哉不食無禽則是棄井也以養民之時而待棄井之功不如號籲以仰之雲雨矣詩曰池之竭矣不云自頻泉之竭矣不云自中言夫成憲之不省者也九二井之蹇井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶蹇利西南不利東北利見大人貞吉井谷射鮒甕敝漏象曰井谷射鮒無與也正曰谷射甕敝非蹇而何故井者所以修政也蹇者所以修德也以德修政故養者得其地難者得所濟蹇而方難則必有旁漏四射不任其事者矣上不修德下不任事故多勞而鮮功屢勸而罔濟詩曰天之方難無然憲憲天之方蹶無然泄泄憲憲泄泄猶谷之射鮒而甕之敝漏也九三非之坎井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶習坎有孚維心亨行有尚井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也正曰井有坎萬物之所就養也養賢及民惟心而已詩曰心乎愛矣遐不謂矣中心藏之何日忘之君子以養賢為心使教事有習德行有常則明昭之賜與天下共受之矣泄者井也汲者繘也繘腐井深谷射甕敝雖有行人泂酌莫從故上不求賢下不貢士王者所致辟也天下之不祥則莫大於蔽賢者矣舜舉十六族而升於大位季孫行父逐一莒僕而五世食福焉王明並受何疑之乎周政曰舉能其官惟爾之能稱匪其人惟爾不任是可以教汲者矣六四井之大過井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶大過棟橈利有攸往亨井甃無咎象曰井甃無咎修井也正曰井而大過有過於羸瓶者矣羸瓶射鮒井敝必修故疆界之辨溝洫之設明王之所致力也君子之於養人有過其事倍其力而猶為之者若井谷而甃之是也古者徹田徹田而後井之井久必敝敝必復修之修之不復而後以為阡陌魚胠以為阡陌魚胠而後量之均之藝必不復故先王之法一敝不修必以所養人者害人是則非井之過而修井者之過也故廢官舊職先王之所審舉也以為天廢而去之必有人禍書曰股肱惰哉萬事墮哉言非改井之過而不修井之過也九五井之升井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶升元亨用見大人勿恤南征吉井冽寒泉食象曰寒泉之食中正也正曰井而升賢人得時汔繘有功夫當氷堅之候澗谷沍隂水泉不鳴而井獨以是薦其寒泉使喪者有所得惻者可以食夫非汔繘之能而誰乎齊得夷吾於叔牙秦得繇余於蹇叔楚得叔敖於子文皆非井之能而繘之能也伊訓曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人夫後人之思俊彥有若先王之勤者乎故曰勞於求賢而逸于致治是先王所為勞勸也上六井之巽井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶巽小亨利有攸往利見大人井收勿幕有孚元吉象曰元吉在上大成也正曰井道之成則莫如巽矣井之羸瓶則不巽之故也下民之情難於慮始而可與樂成井方泄而幕之過者心惻已汲而普之行者共孚故人主得一善人行一善事未嘗不與衆共其明福也伊尹曰非天私我有商惟天祐于一德非商求于下民惟民歸于一德詩曰民之秉彛好是懿德故從民所好天下亦好之從民所惡天下亦惡之三詩所稱豈弟樂只無不從民者則井而巽之謂也困與井三陽之卦也從於南政蓋自夬姤萃升離次而外復依其常所以别經緯之素也又自咸恆損益而來於是三舍隂陽相從各以其倫困井之義為物已極而後天地變化帝王鼎革又從此始矣則易之變化無窮而非推衍之儒所能窺也者序卦傳曰升而不已必困故受之以困困乎上必反下故受之以井是何義也曰是亦近於道者也易之為君子慮也憂以深其於隂陽常嗟其往復若物不可以久居其所益而不已必決是也唐室之盛至開元極矣其為禍亦備古所希有肅宗庚子上皇既入西內壬寅遂崩肅宗亦崩李輔國遂弒張后及越王係代宗即位輔國已死然亦稱中書令博陸王自童貫以前僅有之也代宗初年聽僕固懷恩之䇿以河北諸州付薛嵩田承嗣李懷仙三賊帥而河北遂以不復自是節使留後紛紛相授矣癸卯初年吐蕃入寇即用播遷元振夕放朝恩晨舉以為李郭之才不及魚程者而又使元載剛掩其後含容八年乃克一決終代宗十四載之內無聞焉德宗庚申六月遂築奉天城以建元之嵗為尾遁之謀諸節度漸尋干戈不三年朱滔田悅王武俊李納皆自稱王朱泚迫長安李希烈僭號李懷光叛去天子自奉天再奔梁州艱難崎嶇而猶不知盧杞之姦盧杞死而裴延齡用白志貞竄而竇文場霍鳴仙用瓊林大盈散而進奉宫市開賴李晟馬燧之力以克還都邑於李泌陸贄之言未有所省改也困曰有言不信以徽纆為朱紱蒺藜為金車雖興元詔書亦何以信於天下順宗嬰疾無足紀者憲宗之朝有李絳裴垍李藩諸賢皆識大體通時務裴度繼之廓清淮蔡於是李師道奉表納質王承宗復獻二州曽不一年驕侈生心皇甫鎛程異以市井俗吏躐居中書裴度屢疏而上指為朋黨唐之朋黨皆自憲宗右鎛異始也而論者以為始於牛李對䇿過矣憲宗既崩方鎮又亂藩鎮之禍蓋自代宗初年終於憲宗末載而稍一蘇裴度疏云淮西蕩定河北底寧承宗斂手削地韓宏輿疾討賊豈朝廷之力能制其命哉直以處置得宜能服其心耳危哉是言也徽裴公必以是謾上居功者矣大人維心有言不信裴度亦有焉庚午辛未李懷光反上奔梁州是困井之中交也以用序溯之在漸歸之候故睽家歸漸夬姤萃升與唐室相終始也然則謂井困者何也是體卦圜序也下經之辨四著乾坤晉得遁夷首之以咸唐得姤萃究之以困至於鼎革又自一限而唐祚訖終然則憲宗之暴崩無治之者乎曰當時不治之則後世亦無得而治之也易象正卷八
