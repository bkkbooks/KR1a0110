body:
  text: 易象正卷二明黄道周撰屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧象曰雲雷屯君子以經綸正曰易有乾坤而屯繼之何也雷雨天地之始事也長子在内而上當尊位雖在草昧天地之所貴也然則交而難生何也乾之二陽始交於坤滿盈將奮動未出險鎮慎以居之勤危以将之古之作者則必研幾於此也然則是乾之具體也而謂之屯何也氷霜之後戰血已盡龍伏雲興萬物逡逡然將春矣故謂之屯然則易不用夏正乎曰易猶春秋之義也貞下起元王者行事以法天地以令萬物故屯交於坤日南至而春之至於一日五月之義則未之有改也然則其不用復何也曰易非歴也歴者一嵗之令易者百世之義也一嵗之令象其序百世之義象其意然則言屯之可以不言春也曰百世也而有一嵗之意焉南至而復三陽而泰屯則未有亂之也司空季子曰震龍也雷也車也坎勞也水也衆也主雷與車而尚水與衆車震武也衆順文也文武具厚之至也又曰主震長也故曰元衆順嘉也故曰亨内有震車故利貞車上水下必霸小事不濟壅也故曰勿用有攸往衆順而威故曰利建侯古之命屯者如此故屯者經綸之象也屯為經綸雲雷晦冥雨澤未施天地不光及其究也以正位凝命凡屯變象六十四其乘之四千九十六其得數也貞震八十悔坎八十相乘之數六千四百其爻自三乘者二萬四千五百七十六是謂二陽之卦從坤而交日道畸南謂之南正初九是為屯之比屯元亨利貞勿用有攸往利建侯比吉原筮元永貞无咎不寧方來後夫凶盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也正曰屯之比動而順天下附之君子之動恐其不順順又恐其不慎也其才足以御諸侯而心猶悚然恐不足建一邦盤桓不寧天猶有草昧之思乎周誥曰天閟毖我成功所予不敢不極卒寧王圖事故自謂不寧則寧者至自謂寧則不寧者至矣盤庚曰恪謹天命兹猶不常寧不常厥邑詩曰遹求厥寧遹觀厥成其惟周文王乎六二是為屯之節屯元亨利貞勿用有攸往利建侯節亨苦節不可貞屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也正曰貞而節之以屯履苦雖聖人猶難之矣天道虧十貞子苦老晉重耳行於五鹿丏而得塊子犯曰不出十二年其有此土乎齊姜曰畏威如疾民之上也從懷如流民之下也見懷思威民之中也夫以苦節為難貞則必有從懷之心從之以甘節為易持則不十年而流矣君子不以患難易素不以㓂媾改志負其經綸而不速於自試者屯節之行也故屯而節象之至著也六三是為屯之既濟屯元亨利貞勿用有攸往利建侯既濟亨小利貞初吉終亂即鹿无虞惟入于林中君子幾不如舎往吝象曰即鹿无虞以從禽也君子舍之往吝窮也正曰時猶屯也而自為既濟既濟則往矣屯有攸往君子之所戒也且是六三也隂動乘陽以界於險則未有不敗者也襄公如楚及於方城聞季孫宿之取卞也將以楚入魯榮成伯曰不可夫内不令於國而外恃諸侯以是求入庸有濟乎故屯而動動而入於險君子之大愸也書曰若虞機張往省括於度則釋无虞入林不獨失鹿且逢不若故曰人即獸獸亦即人審機君子則必辨於此矣六四是為屯之隨屯元亨利貞勿用有攸往利建侯隨元亨利貞无咎乘馬班如求婚媾往吉无不利象曰求而往明也正曰屯之隨非隨人也時也水動而為澤雲兩已降兩姓將合龍馬賁於下婚媾成於上詩曰摽有梅傾筐暨之求我庻士迨其謂之古之明王未有不求賢而能經綸者也若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨是髙宗之明也予曰有疏附予曰有先後予曰有奔走予曰有禦侮是文王之明也故如髙宗文王則可謂經綸隨時往无不利者矣九五是為屯之復屯元亨利貞勿往有攸往利建侯復亨出入无疾朋來无咎反復其道七日來復利有攸往屯其膏小貞吉大貞凶象曰屯其膏施未光也正曰屯雲雷之候也復氷霜之候也雲雷而氷霜之此其道不可大時不可久也易之大者曰元曰運其小者曰嵗曰日陳腐不散施祿不下政令不行恩澤不究至於七日而極矣體用之積八十四月以為七嵗日辰之㑹八十四舍以為七日榮衛所通腠理所周大而小之不可失也故貞者冬也冬窮也小貞可為大貞不可為也詩曰子有衣裳弗曳弗婁子有車馬弗馳弗驅言夫厚澤而有閉關之意者也上六是為屯之益正孌象屯元亨利貞勿用有攸往利建侯益利有攸往利渉大川乘馬班如泣血漣如象曰泣血漣如何可長也正曰勿往之時恃其兩利以為出險則益之害矣君子艱虞終不忘戒益則長裕自謂无患而後患生焉五猶吾馬也而三非吾耦鄭公子忽辭婚於齊而因以失國辭婚匹夫之諒也失國亡人之行也乘馬而无媾泣漣而已詩曰既不我嘉不能旋反視爾不臧我思不遠秦穆公曰我心之憂日月逾邁若弗云來惟古之謀人則曰未就予忌惟今之謀人姑將以為親屯之泣血其多有悔心乎以是而求賢推陳發滯以益天下則猶可以濟也蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也象曰山下出泉蒙君子以果行育德正曰蒙則秋也屯而後蒙長子即序而中子次之天地立君而後立師君以立制師以立教古之聖人蓋童蒙自求也衞武公九十矣猶儆於衆曰爾毋以老耄舍我故其詩曰嗚呼小子未知臧否匪手携之言示之事匪面命之言提其耳故秋者天地所以告斷也山下出泉道之以宜而後周流焉草木之荒穢鍬鉏是加而後山政修焉多方曰爾乃自作不典圖忱于正我惟時其斆告之我惟時其戰要囚之聖人之治人則亦如此也故蒙者果行育德之象也蒙以教徳山泉以流濫觴之初安知方舟及其究也以體膺歴數初六是為蒙之損蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞損有孚元吉无咎可貞利有攸往曷之用二簋可用享發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也正曰刑人桎梏損蒙者也水蒙而釐之則遒也木蒙而剔之則材也鳥獸之希革也更毨刑鼎刑書則皆於其叔世也君子之治庻民與導童蒙亦各使其自得而已甫刑曰非佞折獄惟良折獄則亦謂此也故求果育於懲窒之前者婦寺之愛與析楚之威其何可恃乎九二是為蒙之剝變正象蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞剝不利有攸往包蒙吉納婦吉子克家象曰子克家剛柔接也正曰蒙之剝又何往乎險動於内而止之於外外誘絶則内慝不作故包蒙者所以厚下納婦者所以安宅也坎交於坤順而不秕童昏頑淫不在左右以是克家則兩吉從之顧命曰思夫人自亂于威儀母以釗冐貢于非幾狐突曰國君好艾大夫殆好内適子殆社稷危知蒙之可以剝也而剝之故雖剝不殆思齊之詩之謂也六三是為蒙之蠱蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蠱元亨利渉大川先甲三日後甲三日勿用取女見金夫不有躬无攸利象曰勿用取女行不順也正曰蒙之蠱則猶可納婦也而與姤同戒何也當位而剝則穀也不當位而蠱則伏也醫和謂趙文子曰物莫伏於蠱莫嘉於穀穀興蠱代而章明者也故食穀者晝選男德以象旦眀宵靜女德以伏蠱慝言穀與蠱之共為飛伏也蒙為穉子以用壯女女德不靖騰於金夫何利之有伊訓曰惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士故如伊尹則可與正蒙者矣六四是為蒙之未濟蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞未濟亨小狐汔濟濡其尾无攸利困蒙吝象曰困蒙之吝獨遠實也正曰蒙穉也未濟男之窮也聲色之濡人幾老矣而猶且不免子南巫臣襄老皆是也古之正蒙者十嵗而閑内外晝為别其椸盤夜為定其户楗是則未為困也小狐汔濟而又濡尾則困矣詩曰濟盈不濡軌雉鳴求其牡言其困吝者也書曰尚頼匡救之德圖惟厥終言其終濟者也六五是為蒙之渙蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞渙亨王假有廟利渉大川利貞童蒙吉象曰童蒙之吉順以巽也正曰六五之渙得巽矣蒙之吉者其惟巽乎古之君子觀治於上下求而不瀆不令而告上不極情下不費辭記曰宗廟未施敬於民而民敬之順而後誠誠而後敬敬而後先於卜筮正於鬼神大雅曰民之質矣日用飲食羣黎百姓徧為爾德其不瀆下也如此不愆不忘率繇舊章無怨無惡率繇羣匹其不瀆上也如此如是則可謂之童蒙也矣上九是為蒙之師蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞師貞丈人吉无咎擊蒙不利為冦利禦冦象曰利用禦冦上下順也正曰蒙聽於君師師聽於丈人何异乎果育之與容畜道相濟也艮交於坤下與衆應雲蒸於山泉動於地非順而何君陳曰爾無忿疾于頑無求備于一夫天下之易忿疾者惟頑耳宣王欲得國子以導諸侯問於樊仲樊仲曰其魯侯稱乎肅明神而敬耉老賦事行刑必於遺訓不干所問不犯所咨王曰若此則可訓治百姓矣乃命孝公於夷宫夫孝公則所謂蒙師者也鬻拳則可謂為冦者矣屯蒙二陽之卦也始交於坤從於南政不紀七而紀八南正之命也倚而旋之屯為坤之左間則蒙為乾之左間寒暑之極相為起矣故屯蒙者春秋之始也屯之上六以益而得凶蒙之九二以剝而得吉兩彖之詞无所取之何也曰或於其義或於其象或於其位交訊之也屯之節女貞不字蒙之蠱勿用取女觀於兩義而羣象釋然得其南指矣乾坤兩始皆有用爻至屯蒙而不用何也曰屯宜用九用九則先坤蒙宜用六用六則先乾九六兼用則又辭費也故簡之簡六子之權以統於乾坤言後之為六子者皆乾坤是準也乾坤之變各六十有四九六分道六子則兩者兼取也兼取而兩用之則必立屯蒙而次革鼎立屯蒙而次革鼎則後之人又必以是一反一對者為序也故顯其反者而藏其對者乾坤之從屯蒙顯反而藏對猶父母之從子立子而隱婦也然則父母從子子婦從長恒咸損益子婦之有長少也以貴以寵乾坤之不從恒咸而從屯蒙何也曰咸恒之首下篇已命之矣屯以長子治内次子治外位序秩然不可替也故取其嬗乾坤者以次乾坤後世而有不知屯蒙之義則子帶子朝之患難乎免矣周惠王寵惠后將廢太子鄭而立王子帶齊桓公於是為首止之㑹及襄王立子帶搆於狄鄭是以有氾之旤櫟之旤則亦猶是也惠王之未立莊王實嬖子頽及王立而失五大夫五大夫因子頽以亂惠王出居於櫟夫豈伊遠兩世之間父子相見也惠襄姚隗乾坤之治施於屯蒙離若蟬翼狄泉之難則景王辯之不早也景王喪太子欲立子朝未果而崩猛丏俱長單劉立猛踰年而卒子朝始亂諸大夫立丏是為敬王尹氏立朝敬王居於狄泉周室遂分屯蒙之不次旤亂之所繇長也豈獨不義以義而不以序則亦不治是在魯隱公之於桓公宋穆公之於殤公也魯惠公元妃卒繼室以聲子生隱公其媵仲子生桓公隱公兄也以仲子寵欲讓於桓公九年在國猶稱攝焉公子翬請殺桓公以求太宰公曰為其少也吾將授之矣使營菟裘吾將老焉子翬懼反譛於桓公遂賊弑隱公於寪舎魯之弑君則隱公自為之也宋宣公生繆公和與殤公與夷謂繆公曰以吾愛與夷則亦若女以為宗廟社稷主則與夷不若女盍終為君矣宣公卒繆公立逐其二子莊公馮與左師勃而召與夷與夷曰先君所納國于君者謂君可為宗廟社稷主也今君逐君之二子而將致國乎與夷非先君意也且使子可逐則先君逐臣矣繆公曰先君之不爾逐可知矣吾立乎此攝也卒致國于與夷與夷立而欲討公子馮十一年華督弑殤公而召莊公馮於鄭宋之亂者十數年則宣公自為之也晉潘父之弑昭侯而納桓叔衞州吁之握兵柄而弑桓公夫猶是屯蒙也剛柔交而難生不果不育以為亂賊故屯蒙之嗣乾坤章者也屯蒙之合鼎革微者也微微章章君子之所深謹也然則序卦之言受盈何也曰受國與天下可不謂之受盈乎序卦傳曰有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙是則猶詮次之辭也聖人之意不可見而序可見後人不知其意而亂其序則先後中天之序一一可代也故為不可亂之序以寄其不可闡之意使後之學者有得焉則旦暮而遇之也然則自屯蒙而下亦皆有義取之乎曰焉在其旡義取之也序卦之泛寄則亦有取之矣然則屯蒙之始於桓隱之端其天俲人劵可歴指也過此以往亦皆可歴指之歟曰天人之不齊如星與月因卦論象猶詩之有六義安可同也偶有所正則正之然則櫟氾鍾巫與夷馮勃潘父州吁亦皆屯蒙之初年也共叔之後鄭突鄭忽一出一入衞宣之後惠公黔牟或亡或放皆在屯蒙六十八年之内聖人獨无所取之乎曰聖人亦人也不以天道責劵於數百年之後亦曰夫婦父子兄弟相繼為治云耳需有孚光亨貞吉利渉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也象曰雲上於天需君子以飲食宴樂正曰雲上於天盛陽所蒸是皆在北陸矣百物仰首以跂膏雨君子為飲食以下逮於民為宴樂以上逮於神精魄旁敷禮樂鬱興是非有所待而為之也楚茨之詩曰苾芬孝祀神嗜飲食卜爾百福如幾如式言需之上逮於神也爾殽既將莫怨具慶既醉既飽小大稽首言需之下逮於民也需險而不陷其有禮樂存者乎故需者宴樂之象也需為宴樂雨澤旁施非為惠懷百禮是來及其究也以自昭明德初九需之井需有孚光亨貞吉利渉大川井改邑不改井无喪旡得往來井井汔至亦未繘井羸其瓶凶需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也正曰夫為飲食而犯難也易矣需以健而食於天卝以順而食於地耕田鑿井沐以膏雨殽烝羅遝不在所賔則是猶未失常也詩曰不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮言夫需不改井者也老馬反為駒不顧其後如食宜饇如酌孔取言夫需而贏瓶者也周誥曰爾尚克羞饋祀爾乃自介用逸若是則可謂用恒者矣九二需之既濟需有孚光亨貞吉利渉大川既濟亨小利貞初吉終亂需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也正曰需之既濟利渉終亂而謂之終吉何也既濟而不防患則亂也防患而既濟則吉也庖厨鼎釜水火交摶訟雖未興有其端矣然其待之已豫應之不卒公父文伯之母曰祭養尸饗養上賔何異物之有而使夫人怒也是謂需而有言者也隨㑹聘于周疑王室之有折爼也王使原伯告之以禮士季歸而為執秩之書是為小言而終吉者也非是則亂故吉與亂相為濟也九三需之節需有孚光亨貞吉利渉大川節亨苦節不可貞需于泥致冦至象曰需于泥災在外也自我致冦敬慎不敗也正曰沙衍也泥爛也需而節亦有爛者乎羊羮弗斟宋師以奔庖有腐肉則死士不附桓子之施於國也鍾出而釜收之晏子之祀其先也豚肩不掩雖然晏子不失為敬慎也書曰典祀毋豐于昵詩曰民之失德乾餱以愆夫是二者誰為致冦者乎六四需之夬需有孚光亨貞吉利渉大川夬揚于王庭孚號有厲告自邑不利即戎利有攸往需于血出自穴象曰需于血順以聽也正曰雲雨者天地之膏血也需未出也夬則决矣君子綏祿於上而施祿於下孚號揚庭蓋未有宴樂之心焉趙無䘏使其臣伐翟而勝將食尋飯有恐色或問之無䘏曰德不純而福至謂之幸非德不當雝雝不當幸吾是以懼夫簡子則未順聽也雖即戎而有告邑之心焉詩曰雖無德與女式歌且舞九五需之泰需有孚光亨貞吉利渉大川泰小往大來吉亨需于酒食貞吉象曰酒食貞吉以中正也正曰求治者其猶之烹飪乎庖人佐之饔人嘗之日夕辨庀而後以祭於先燧御於君子猶恐不以為芬㫖也故又為鐘鼓以樂之琴瑟以友之拜跽以將之詠吹以送之玉帛以侑之夫有悁忿鄙僿繫於中則為君舉者少矣天下之待治於君子者則亦猶此也書曰有正有事無彛酒越庻國飲惟祀德將無醉伐木之雅曰迨我暇矣飲此湑矣夫治天下而亦有暇乎祗招之詩曰祈招之愔愔思我王度式如玉式如金形民之力而無醉飽之心夫是則可進於酒食者矣上六需之小畜需有孚光亨貞吉利渉大川小畜亨密雲不雨自我西郊入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也正曰坎穴也夬則出之畜則入之雲上於天密而不雨文德就矣而豐功未著猶有酒食而不敢以享也不敢以享則不敢以燕庸蜀羗髳微盧彭濮人則猶之不速也夏書曰予臨兆民凛乎若朽索之馭六馬為人上者奈何不敬詩曰肆戎疾不殄烈假不暇不聞亦式不諫亦入是敬不速客之謂也是非文王而誰乎訟有孚窒惕中吉終凶利見大人不利渉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利渉大川入于淵也象曰天與水違行訟君子以作事謀始正曰飲食作而爭訟興訟之興其於結繩之前乎天與水違墮也從淵視天疑也疑而訟訟而墜則無為貴知矣觀水而惕窒未為過慮也易之渉大川者七需同人蠱大畜益渙中孚七者皆德也頥之復未濟之鼎則猶不足語此也需塞而樂同人安而辨蠱治而知戒大畜寛而通益擾而温渙明而緩中孚信而不億此七德者訟皆無有而以之終事難矣哉十月之詩曰下民之孽匪降自天噂沓背憎職競繇人盤庚曰王播告之修不匿厥指王用丕欽罔有逸言民用丕變夫修其指言以喻於天下非明德之大人孰與於此故訟者作事謀始之象也山川无雲昊天曷功沈玉祈年孰雨公田及其究也以用晦而明初六訟之履訟有孚窒惕中吉終凶利見大人不利渉大川履虎尾不咥人亨不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也正曰履虎尾何可永也惕以窒雖言小也見訟而若躡虎是豈有虎旤者乎小雅曰不敢暴虎不敢馮河人知其一莫知其它鳩飛之詩曰惴惴小心如臨于谷戰戰兢兢如履薄氷魯叔孫穆子昭子皆用之矣有是人也可以無訟九二訟之否訟有孚窒惕中吉終凶利見大人不利渉大川否之匪人不利君子貞大往小來不克訟歸而逋其邑人三百户无𤯝象曰不克訟歸逋竄也自下訟上患至掇也正曰九二之訟亢也上有威主下有彊臣兵在其頸而言者不知足以否矣記曰諫有五吾取諷焉以姬公之聖也命詩鴟鴞竄于東山而古人猶謂之曰誚故訟者聖人所不用也訟用否德不榮以祿歸而自守如椒塗之好閉虞芮駢伯皆用之矣夫以為匪人也孰知其猶之大人也六三訟之姤訟有孚窒惕中吉終凶利見大人不利渉大川姤女壯勿用取女食舊德貞厲終吉或從王事无成象曰食舊德從上吉也正曰訟隂務也天下之多訟者則惟婦人耳詩曰匪教匪誨時惟婦寺訟而女壯何用之乎周鄭之交惡也鄭屢訟王又執王使王怒將以翟伐鄭既伐鄭乃立翟后富辰曰周室之東晉鄭是依子頽之難鄭實定之夫禮新不間舊仁不違親以翟女間姜任非禮且棄舊也既而王黜翟后翟人入周王出居于氾食舊德貞厲襄王無有焉從王事无成則富辰之謂矣是皆不得吉而謂從上吉何也上者舊德之謂也舊德不食從王无成故象不如彖之稱也九四訟之渙訟有孚窒惕中吉終凶利見大人不利渉大川渙亨王假有廟利渉大川利貞不克訟復即命渝安貞吉象曰復即命渝安貞不失也正曰訟而渙則可以利渉矣然且利貞則是不克也訟者津市之道非所以假廟也商頌曰鬷格無言時靡有爭言爭色變言之始於上也周書曰自一話一言我則永惟成德之彦以乂我受民元喧之訟晉人將戮衞侯王曰不可為政不逆上下無怨為臣戮君將安用刑於是乃復衞侯魯獻十㲄焉以衞侯歸夫是之謂渝而安渝而安則是未失正也未失正則吉也九五訟之未濟訟有孚窒惕中吉終凶利見大人不利渉大川未濟亨小狐汔濟濡其尾无攸利訟元吉象曰訟元吉以中正也正曰訟之未濟則猶可以不訟也可以不訟而謂之訟元吉何也自訟者也君子見過而内省聞慝若訐殷書曰汝分猷念以相從各設中于乃心詩曰靖共爾位正直是與神之聽之式榖以女故人質成者也鬼神聽訟者也神宅乃心闢門設中衞雅曰相在爾室尚不愧于屋漏無曰不顯莫予云覯故如衞武之自訟則庻乎汔濟終利者矣上九訟之困訟有孚窒惕中吉終凶利見大人不利渉大川困亨貞丈人吉无咎有言不信或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也正曰訟而困則亦無為貴訟矣有言不信亦無為貴言矣惠王之入錫鄭厲公以鞶帶是無為貴錫也厲公之受賜不拜而出是無為貴禠也晉將與秦論成叔向召行人子員子朱三爭之撫劍相就叔向拂衣師曠歎曰公室卑矣其臣不心競而力競夫三禠自恥則猶有訟心焉然而已卑矣不如未濟之貴也詩曰民之無良相怨一方受爵不讓至于已斯亡需訟二隂之卦也始交扵乾從於北政以八紀隂則亦以七紀陽矣左旋相次則隂陽間序需之既濟終亂而終吉訟之未濟濡尾而元吉兩濟不害則亦各於其位也泰之酒食小畜之不速履之不永困之三禠觀於四義則又燦然者也屯蒙之後而有需訟何義也曰不得其所為義則以序卦之義序之蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟夫是其兵革之所從始乎王者既熄霸主且出端冕搢笏束牲載書則不可得而見也首止洮葵丘鹹牡丘之事聞之則猶可以飲食也韓之戰秦獲晉侯是可以飲食乎宴樂之召釁何日蔑有宋立齊侯自為雄長而召楚與盟以見執于鹿上盂之執薄之釋天下之大訟也敗泓圍緡无譏焉耳夫以天王之難下告諸侯凶服降禮四年之内天下諸侯無有至者不進不親又何加焉城濮之勝楚踐土之定王世髙其功而猶或誅其心令狐河曲之役晉秦醉飽則猶未有勝負也五霸既衰大夫制命扈及衡雍趙盾始專取濟西之田以立宣公取宋人之賂以止諸侯於是十餘年齊魯晉楚宋陳鄭莒人弑其君黒壤之見止則不足為魯恥也猶之飲酒者起而勃稽焉詩曰載號載呶亂我籩豆旅舞僛僛是曰既醉不知其郵故聖人之於春秋无甚深責之辭也自僖公五年至成公癸酉六十八年自晉里克楚商臣齊商人魯公子遂鄭歸生陳夏徴舒及魯文姜之外聖人亦无所深惡也其深靳之辭曰鄭伯逃歸不盟又曰鄭伯乞盟曰用致夫人曰邾人執鄫子用之曰㑹于盂執宋公以伐宋曰公子遂如楚乞師曰公子買戍衞不卒戍刺之四卜郊不從乃免牲猶三望又曰改卜牛牛死乃不郊是斷斷者數事耳故聖人於世无所深責也特謂是霸主降於戎狄諸侯降於大夫禮樂不興干戈日起周之子孫漸失其序卒以討陳伐鄭之事歸於荆楚謂是文人弟子之所亂次也則是需訟之所附麗也然且不可以為本事師貞丈人吉无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆正曰訟而後師興焉衆順而致一則可以動矣不致一不可以正衆正衆而致一居重而馭輕當位而尚謀是之謂丈人也泰誓曰天祐下民作之君作之師惟其克相上帝采薇之詩曰君子所依小人所腓言正衆也出車之詩曰自天子所謂我來矣言居重也采芑之詩曰方尗元老克壯其猷言當位也江漢之詩曰王猶允塞徐方既來言致一也有是四者以正衆志畎畝而寄軍令焉何不可之有故師者容民畜衆之象也民衆既聚經畫乃貴水行地中乃井乃澮及其究也以類族辨物初六師之臨師貞丈人吉无咎臨元亨利貞至于八月有凶師出以律否臧凶象曰師出以律失律凶也正曰臨之八月則夏六月也周之六月則夏四月也盛夏而出師師律之所諱也然則六月之詩不諱之何也謂匡王也有嚴有翼既佶且閑蓋言律也律以正衆雖王者猶用之殷誓曰爾無不信朕不食言爾不從誓言予則孥戮女罔有攸赦牧誓曰爾所弗朂其于爾躬有戮夫亦為律動也不然則是傲命也何臧之有九二師之坤師貞丈人吉无咎坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也正曰師中之動得兩无咎雖膚功不易之矣何也順也順者鬼神之所助也而况於王乎靡笄之役郤獻子見公曰子之力也夫對曰克也以君命三軍之士三軍用命克何力之有范文子見公曰子之力也夫對曰爕也受命于中軍以命上軍上軍之士用命爕何力之有欒武子見公曰子之力也夫對曰書也受命于上軍以命下軍下軍之士用命書何力之有是役也師勝而反范大子後入武子曰爕也吾望女久矣對曰師郤子之師也其事臧非爕之臧也敢先屬目乎武子曰吾知免夫郤獻子之先迷范文子之後得以順將之猶可无咎則亦近於寵命者也六三師之升正變象師貞丈人吉无咎升元亨用見大人勿恤南征吉師或輿尸凶象曰師或輿尸大无功也正曰南征方吉而或輿尸何也曰師之為道无有勿恤者焉功不可倖勝不可騁勝敗利鈍不可寘不問也謂有多士之命存焉采薇之詩曰憂心孔疚我行不來出車之詩曰憂心悄悄僕夫况瘁是之不可不䘏也泰誓曰罔或無畏寧執非敵詎是不當位之故乎升不當位猶有所疑也故或之疑謀无成疑事无功大人之勿䘏蓋猶有不存者焉而况於弟子乎而又况於小人乎六四師之解師貞丈人吉无咎解利西南无所往其來復吉有攸往夙吉師左次无咎象曰左次无咎未失常也正曰解緩也緩而左次不尚强也城濮之戰楚師既陳晉乃退舎軍吏以請子犯曰偃也聞之師直為壯曲為老二三子忘在楚乎退三舍避之鄢陵之戰欒武子欲戰范文子不欲曰惟厚德者能受多福無德而服衆必自傷也且惟聖人能無外患又無内憂盍姑釋荆與鄭以為外患乎故子犯與文子則可謂知師也知師則可謂知易也易以无咎而當元吉夙往夙復蓋其審也何緩之有六五師之坎師貞丈人吉无咎習坎有孚維心亨行有尚田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也正曰師之為道不可貳也師而坎則貳也長子居中而弟子外制執則執矣險乃已甚詩曰上帝臨女母貳爾心言心之必不可貳也晉之三郤君臣相貳各有違言慶鄭貳於惠公以殞於韓林父貳於先縠以敗於邲襄公貳扵先軫以不復於箕繇是以有功亦不足貴也而又且喪故曰師克在和不和无謀故升之前進不如解之退也坎之行險不如坤之順也此兩者亦所謂臧律也是古丈人之道也尚德而後功且是蒐苖獮狩者不可以不教不教則棄輿尸棄之也上六師之蒙師貞丈人吉无咎蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也正曰王鈇之道不下掣也大纛之柄不下掲也丈人畜衆小人喜功童蒙瀆師國家所不利也夫兵戢而時動動則威觀則黷黷則無武胥臣曰籧篨不可使俛戚施不可使仰僬僥不可使舉侏儒不可使援矇瞍不可使視嚚喑不可使言聾聵不可使聽僮昏不可使謀童昏之使為國家其亂可跂而待也詩曰駟鐵孔阜六轡在手公之媚子從公于狩蒙之所以功也有車鄰鄰有馬白顛未見君子寺人之令蒙之所以終也周公曰繼自今立政其勿以憸人其惟吉士用勱相我國家穆王之命曰爾無昵于僉人充耳目之官迪上以非先王之典嗚呼其深於命國家者矣正曰蒙之師不利為冦師之蒙勿用小人何也曰憂其雜也師者致一之卦也謙豫則猶之致一也師以一陽居中而錫命謙以一陽前進而徂征師得其法而謙得其意故謙者師之制也不多勝人而後衆莫之勝然則師之三五皆有輿尸何也曰其丈人治律其弟子喜功以其位而乘其勢若楚得臣秦孟明晉荀林父皆是也曰是非丈人乎曰丈人者不怒而威不戒而信黄髪是詢則罔所愆據位藉勢何文人之云乎然則蒙之稱為冦何也曰戒夫丈人而有弟子之行者也然則謙利侵伐侵伐亦律歟春秋言伐百有三十多與中國也言侵五十有四其半戎狄不則荆楚也侵而為律則冦亦為律歟曰冦則欲多勝侵則不欲多勝也詩曰依其在京侵自阮疆故以鐘鼓鳴豫不若不以鐘鼓鳴謙之勝也然則春秋出師書次者六君子皆未有與焉何也曰謂夫徴義而緩也然且不失於无咎齊桓三次獨次陘无譏聶北及匡亦未為悖也然則韓厥之次鄫叔孫豹之次雍榆亦得无咎乎曰荆齊亦皆勍敵也獻子穆叔亦未為不知道也得解之意以用左次何緩之有然則師貴致一而晉常以諸卿方行天下何也曰六卿並出亦非晉之舊也城濮之戰以公在焉諸卿皆從至於邲而衰矣至於桑隧而又衰矣然則復亦致一而曰勿用行師終有大敗何也曰師正也謙中也復則已遠矣有遠功者必有近禍一敗之卒十年不復是易之所戒也然則同人離兩濟皆非致一也而克遇獲嘉鬼方賞國皆有所取之何也曰是火德之所革也介胄戎兵在焉以義用衆則固有勝者矣然則易之意何在乎曰易不勤遠畧不尚久功以其治人者反以自治則比之蒐狩豫之薦樂猶未失律意也比吉原筮元永貞无咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也象曰地上有水比先王以建萬國親諸侯正曰天下之當位者其惟比乎衆輔之上必有隆棟然天下之臣不如其君者多矣反師而勝君盈於上臣比於下伐知而多力怠教而重斂暱益婦田是古人之所慮也故比之有不寧寳龜之遺告也先事而戒之推本而究之泝其方來圖其終永是亦可以吉矣臯陶曰慎厥身修思永蔡仲之命曰慎厥初惟厥終終以不困不惟厥終終以困窮是則圖寧於後夫者矣故比者建萬國親諸侯之象也封建井田兩義一致不升不封天下无功明王之智不營阡陌及其究也以順天休命初六比之屯比吉原筮元永貞无咎不寧方來後夫凶屯元亨利貞勿用有攸往利建侯有孚比之无咎有孚盈缶終來有它吉象曰比之初六有它吉也正曰屯者易之始交也始交而孚長子建侯遠險而内親初動而衆順建侯之貞不可有它也而謂之有它何也輔上得衆天下所共與也君子始仕不享其祿致主不祈其爵詩曰瑟彼玉瓉黄流在中豈弟君子福祿攸降天下之失生扵飲酒其孚生扵不薦盈缶有虞則猶之不薦也比之屯見難而多虞易以之始未濟之解患過而少燕易以之終故盈缶濡首初終異義它吉虞燕顒若殊致辨四有孚者盡其㫖矣六二比之坎比吉原筮元永貞无咎不寧方來後夫凶習坎有孚維心亨行有尚比之自内貞吉象曰比之自内不自失也正曰君子不修聲於人不修色於人亦不失聲於人失色於人何也其聽睹内也聽睹内者其外引絶夫似有愚人之心也乃與衾影自為婚媾世見其淵靜以謂之内險見其卬須也以謂之多援而君子无有也詩曰民各有心覆謂我僣記曰禮義不諐何䘏于人言古之人嘗用之者文王是也是比之常德行也六三比之蹇正變象比吉原筮元永貞无咎不寧方來後夫凶蹇利西南不利東北利見大人貞吉比之匪人象曰比之匪人不亦傷乎正曰易未有質盡之詞也質盡之以為比匪則在是爻也隂不當位以近於險險人當衡委體從之殉勢而忘難以至於蹇不亦宜乎郤至入周王尗生見而悦之召桓公曰陳尗必且有咎白公之入子西主之葉公子髙曰國家將敗必用姦人而嗜其疾味王尗生與子西未為匪人也然而不見大人柔險相比大難從之而况於委體以事匪人者乎詩曰毋教猱升木如塗塗附傷之至也傷而療之如何曰反身修德亦庻可以免矣六四比之萃比吉原筮元永貞无咎不寧方來後夫凶萃亨王假有廟利見大人亨利貞用大牲吉利有攸往外比之貞吉象曰外比於賢以從上也正曰十家五耦過之必下謂或有賢人存焉又况於衆萃者乎萃之於外而審之於内審而後比之叔向見司馬侯之子撫而泣之曰自而父之歾吾蔑與比而事君矣藉偃在側曰君子有比乎叔向曰君子比而不别比德以贊事比也引黨以封已利已而忘君别也君子内比不違其親外比不遠其讎喜怒以衆刑賞以國故曰觀其所聚而天地萬物之情可見矣九五比之坤比吉原筮元永貞无咎不寧方來後夫凶坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也正曰比者隂私之道比无顯者也小人私比以樹人而主不知以排人而主不疑以怒人而人不敢怒也王者斂福敷錫庻民比於德不比於法比於法不比於禽前禽雖失何誡之有洪範曰凡厥庻民無有淫朋人無有比德惟皇作極天下之有朋比則自皇極不建始也天子比於左右左右比於邪慝三驅多誡而飛走競亂若火燄燄攸灼弗絶則始於此矣洪範曰凡厥庻民極之敷言是訓是行以近天子之光夫近天子之光而能得天子之意以戢寧邦國非顯德而能之乎詩曰克順克比比于文王其德靡悔是可謂厚德載物者矣上六比之觀比吉原筮元永貞无咎不寧方來後夫凶觀盥而不薦有孚顒若比之无首凶象曰比之无首无所終也正曰是於卦德象彖无所取之取諸位也柔在三上是多凶者而以觀為无首何也觀者宗廟之道墟墓之位也内史過曰國之興亡聽於民不聽於神瀆神之與瀆民其敗一矣隂柔在師保而天子不制又以黨比罪其臣民則是教亂也趙宣子謂韓獻子曰聞之事君者比而不黨周以舉義比也舉以其私黨也上之於五則私也於三則黨也當衆順之時而髙位是狥主孤於上民惑于下君子憂之故用九无首君子亦有不敢用也用其敬於民事薦享朝夕者耳詩曰自古在昔先民有作温恭朝夕執事有恪師比一陽之卦也次於屯蒙以輔南政屯蒙之日晝短百六十八又六日而退十二日道之髙下蓋有前郤焉歴四十五日至於謙豫而猶有促晷也天道之漸浸百世猶用之易不以一卦之蓍治一嵗之歴而其道則相暨也師比之兩上升觀皆凶正言若反以為德之不勝位也勢也夫德之不勝位者多矣坤之師中解之左次坎之内心萃之外比四德顯然位亦何勝德之有故位之與德相較而得貞勝者也序卦傳曰訟必有衆起故受之以師師者衆也衆必有所比故受之以比是亦有義例乎曰是何義例之有以言其理則似矣自成公癸酉伐鄭之嵗至於昭公庚辰至河乃復六十八年天下所眎者楚之車轍耳容畜親建則未有講也鄭以區區為晉楚玩具乍彼乍此諸國從之啓處不遑討邲以要之蟲牢以收之馬陵以周之銅鞮以匡之瑣澤以平之鄢陵以傷之柯陵以虞之首止汝上以趨之三假王命以殊之鄫以次之戚以蒞之雞澤以疑之戲以持之北林以施之蕭魚以維之蓋自楚共三十一年之間无嵗不爭非獨為鄭則為衆盟國之故也楚康既立東吳已張臯舟之隘楚人不戒獲公子宜穀而晉悼亦故世无盟主于庚嘗兵于汾南風不競而齊晉始騷諸大夫狃於溴梁之盟相殺相樹日相繼也向戌息兵盟於澶淵前後戢寧亦七八年趙武屈建塗塈於外穆叔子皮衣繻於内虢之㑹晉楚輸平悼平亦媮楚人再弑其君而尚為申之㑹援六王三公之事用齊桓召陵之禮故容畜親建天子不能用而楚人竊用之也越既伐吳吳敗楚於長岸於是天厚晉楚覇澤亦替諸卿大夫各弱其君无首之比後夫之凶於是亦盡矣然則鄢陵之戰射楚中目其輿尸乎曰未之知也繻葛之戰射王中肩其屯邅乎日月之薄食亦有其數意之則以為偶值測之則有其度蓋自晉重耳出亡之嵗以至於魯新宫災迨於華向入于南里之嵗二百一十一年齊晉秦楚遞為盟長秦以僻遠創於杌隉不爭夏盟而卒以彊起屯蒙需訟師比之義或在於是乎小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也象曰風行天上小畜君子以懿文德正曰乾西北之卦也巽風之上者也雲聚於乾而射於巽隂德已就而陽功未致以為雨則不降以為乾則未成十五王之澤蓋猶在髙山也詩曰陶復陶穴未有家室又曰乃睶西顧此維與宅天命未至聖不能邀曰吾自修文焉耳弓矢秬鬯則猶未之敢冀也然則巽不可語權乎曰巽事之最順者也健以持之巽以行之何權之有詩曰王室如燬父母孔邇此之謂也故小畜者懿文德之象也天上无雲日星乃明薰風之來萬物以親及其究也以作樂崇德初九小畜之巽小畜亨密雲不雨自我西郊巽小亨利有攸往利見大人復自道何其咎吉象曰復自道其義吉也正曰小畜而巽文王之所為權也非巽何道非巽何復巽小而文乃與道隣故望道而有矜色君子之所惡也書曰不矜細行終累大德畢公之命曰惟公懋德克勤小物故終周之世能師文王者其畢公仲山甫衛武公乎武公九十矣而自謂小子仲山甫有大功於王家而日訓小心詩曰帝謂文王予懷明德不大聲以色不長夏以革自道之謂也自道者卑馴之至也九二小畜之家人小畜亨密雲不雨自我西郊家人利女貞牽復吉象曰牽復在中亦不自失也正曰牽畜也畜而牽之止於外而閑於家名利謝於外則簞席怡於内君子之學不厭博問不厭辨約而收之引而連之若取諸宫非以為功也若寄諸隣非以為人也詩曰我有㫖蓄亦以御冬又曰何有何亡黽勉求之得是道也亦可以富范文子曰寡德而求功多欲故多憂見夫無土而欲富者樂矣哉九三小畜之中孚小畜亨密雲不雨自我西郊中孚豚魚吉利渉大川利貞輿説輻夫妻反目象曰夫妻反目不能正室也正曰是非家人也而家人之其信猶有存者焉為雲則未雨也為川則未渉也而衆猶信之者順也剛而動動而説室雖色不及於市故曰輿説輻猶足以有行也夫妻反目猶足以有明也畜而有孚猶足以親也季武子之取卞也公欲以楚伐魯榮成伯曰不可楚若克魯諸姬豈𫉬闚焉宿之事君何敢不悛醉而怒醒而喜何怪乎取鄆之役楚人執穆子既歸武子勞之日中不出曽阜曰雖死於外庇宗於内猶養吾棟也既免大恥而不忍小忿可謂能乎乃出見之故畜而中孚則猶可以正室也君子之為道不信於國人猶信於户庭六四小畜之乾小畜亨密雲不雨自我西郊乾元亨利貞有孚血去惕出无咎象曰有孚惕出上合志也正曰畜之血所為疑也乾之惕所為斷也斷以去疑非乾而能之乎乾足以孚矣而後斷之魯僖公之雩也巫盡不雨逐佞臣七人而雨如注桑林之禱詰及女謁暨於包苴夫以敬躋之朝而有昌讒如末世之云者乎不疑不斷小腆大戒一龍之漦而灑旤五百年周頌曰予其懲而毖後患莫予荓蜂自求卒螫肇允彼桃蟲拚飛維鳥是之謂也故知小畜之乾者亦可以无咎矣九五小畜之大畜小畜亨密雲不雨自我西郊大畜利貞不家食吉利渉大川有孚攣如富以其鄰象曰有孚攣如不獨富也正曰富不家食則其為鄰也衆矣君子飭躬以立其質多聞以相其行遲久而無干祿之心達而不侈塞而不濫以小致大積而非積也詩曰古訓是式威儀是力天子是若明命使賦是仲山甫之行也晉文公學於胥臣三日曰吾不能行也咫聞則多矣胥臣曰然聞而畜之以待行者不益愈乎故天下惟學而行之為有隣也繇余郯子學於戎翟而行信於秦魯故惟學而行之之為有隣也上九小畜之需小畜亨密雲不雨自我西郊需有孚光亨貞吉利渉大川既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也正曰小畜不雨需則雨矣雨則可以進矣然且不進何也畜而止止而又待之詩曰江有汜之子歸不我以不我以其後也悔匏葉之詩曰招招舟子人渉卬否人渉卬否卬須我友古之君子積德需時時至而不疑月望必虧日中必昃幾望而守其婦貞則是險以自予也周公之命召公也曰耉造德不降我則鳴鳥不聞故甚矣小畜之貴斷也斷而後文德立焉武功備焉否則已懦故利渉三義易之所以勸也履虎尾不咥人亨彖曰履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也象曰上天下澤履君子以辨上下定民志正曰乾之氣足以為澤也澤之氣不足以為雲為人下者不亦難乎盛陽在前隂以柔之不悦則咥也悦之則媚也詩曰百辟卿士媚于天子虞書曰汝無面從退有後言夫履虎尾而无後言者難矣古之事君者有犯而无隱後之事君者有隱而无犯詩曰有菀者柳不尚愒焉上帝甚蹈無自瘵焉夫以甚跼之臣事甚蹈之帝不媚必咥何以已之其亦惟禮乎禮者威神之所弭耳也故履者辨定之象也天髙澤深魚鳥不知禮法之崇絶祥去疑雖有兇人不生其私及其究也以稱物平施初九履之訟履虎尾不咥人亨訟有孚窒惕中吉終凶利見大人不利渉大川素履往无咎象曰素履之往獨行願也正曰履而訟則亦可以不訟矣君牙曰心之憂危若蹈虎尾渉于春氷小人履炎謂不憂危者也説命曰惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬抑戒之詩曰夙興夜寐灑掃庭内惟民之章修爾車馬弓矢戎兵又曰君子無易繇言若是則可謂素履者矣九二履之无妄履虎尾不咥人亨无妄元亨利貞其匪正有𤯝不利有攸往履道坦坦幽人貞吉象曰幽人貞吉中不自亂也正曰履虎不懼是豈為勇乎申編曰變經之生則人之精燄以取之邪慝動於中則靈爽亂於上三辰之災𤯝於是乎或攝之矣故妄則无正正則无𤯝幽庭舒歩猛鷙之所不搏也詩曰周道如砥其直如矢君子所履小人所視言无妄也齊書曰夜行者獨有夫夜行者其有幽人之心乎茂對時育則亦繇此也六三履之乾履虎尾不咥人亨乾元亨利貞𦕈能視跛能履履虎尾咥人凶武人為于大君象曰𦕈能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也正曰甚矣事人者之難也鼎鑊滿堂桂薪无光靜則自臧動則以為不祥眇視跛履自存而已不可以御天子詩曰聽言則對譛言則退言明健之无當也云不可使得罪于天子亦云可使怨及朋友言咥人之多凶也梓材曰予罔厲殺人亦厥君先敬勞肆徂厥敬勞武人為君奚貴于元亨者乎詩曰矢其文德洽此四國豈敢言健則亦云救也九四履之中孚履虎尾不咥人亨中孚豚魚吉利渉大川利貞履虎尾愬愬終吉象曰愬愬終吉志行也正曰信而猶戒何也寵利者殺身之務也明盛者憂危之道也堂陛者岸谷之路也以尹旦之賢也而恒恐不克終范宣子過言文子執戈而逐杖之折笄子服它繆諫孟獻子執而囚之七日故人之樂有父兄也所以教夫人之事君者也詩曰大命近止毋棄爾成何求為我以戾庻正是周宣王之盛也小心翼翼昭事上帝聿懷多福是周文王之正也夫如是則可以事君者矣可以事君而後可以行志非獨為緩死者也九五履之睽履虎尾不咥人亨睽小事吉夬履貞厲象曰夬履貞厲位正當也正曰雷霆之用不以析物钁耝之動不以决事異同之言聖不先謀阿柄當嵎不足以雄履雖當位猶有離心以制大事則危厲從之矣周公曰嗚呼自殷王中宗高宗祖甲及我文王或告之曰小人怨汝詈汝則皇自敬德省厥愆不啻不敢含怒今或譸張為幻曰小人怨汝詈汝汝則信之不永念厥辟不寛綽厥心亂罰無罪殺無辜怨有同是叢干厥身故夬履貞厲當位者之所戒也同異之文君子考祥焉耳上九履之兑履虎尾不咥人亨兑亨利貞視履考祥其旋元吉象曰元吉在上大有慶也正曰先行而後言行出而民信言出而民悦夫非聖人而能之乎聖人不務悦人而惡夫傷人者麟鳯鏘鏘鳥獸以輝以上下則為定志以朋友則為麗澤詩曰之綱之紀燕及朋友又曰以洽百禮降福孔皆言夫有禮而悦人鬼之所共享也故祀禮有百而秋嘗為大燕禮有百而冬烝為大言夫視考之所以旋也故知履之考旋者以在宥天下刑措可也何咥人之有吕刑曰一人有慶兆民賴之是之謂也小畜履一隂之卦也次於需訟以輔北政需訟之日晝長百九十二又六日而進十二何也曰道之驟髙也有進於常度者久而後平行隨蠱噬嗑賁是也中孚之説輻訟之素履亦似有疑也大畜之富隣乾之大君則亦无所不著也故曰象不如彖之著也凡卦合體相乘者四千九十六得爻二萬四千五百七十六以日積之為年六十七大餘百有五四卦積年二百六十九大餘六十過甲之所更始也以三百六十除之積年二百七十三大餘二十四氣象之所更終也以十五乘之而盡體積之象合用相乘者五千一百八十四得爻三萬一千一百四以日積之為年八十五大餘五十九六甲之所更端也以三百六十除之積年八十六大餘一百四十四嵗候之所倍起也以四積之三百四十餘嵗而天地小週又積五百十一而日辰分秒於是總整故四積之卦體殊趨而南北分政其用一也從是泰否又别為令與乾坤反復同象而分起矣序卦傳曰比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履是何所取之曰即以是取之也君子之為言也不比於數不膠于物當理而已自易乾坤以來於是四際衡倚上下各各異視以圜圖起之則是周景王庚辰小畜之始也明年辛已王室亂劉子單子以王猛居于皇入于成周猛卒王子丏立是為敬王尹氏立王子朝單劉以王如劉王子朝入王城次于左巷又明年乙酉天王入于成周尹氏召伯毛伯以王子朝奔楚於是吳弑其君僚又六年辛卯魯侯薨于乾侯覇主覇臣盟㑹討義之風絶矣以為黄父之㑹輸粟戍周扈之㑹謀周定魯而取賂苟偷名實偕喪齊晉之將敗兆於是矣召陵之㑹輟於荀寅臯鼬之求主於季氏明年吳入楚明年於越入吳又二十五年甲辰趙鞅叛于晉陽荀寅士射吉叛于朝歌凡四十九年而越遂滅吳先九年而陳恒弑其君後十六年而荀瑶趙氏韓氏魏氏共分晉地貞定王丙戌之距景王庚辰六十七年趙韓魏共滅荀氏而成周之諸侯陵替盡矣晉霸最盛而最先亡齊覇次之其餘僅延者也故履小畜五君而一民君子之所畏也參之衡倚二圖南至於隨蠱北至於謙豫參之用圖則是履畜謙豫之合也君子不任爻象之德而慎隂陽之序隂陽之序八際中分雖天地亦凜乎畫界也然則六六之分每六卦為一際乾乾坤坤宜與屯蒙為一際需訟師比小畜履為一際今另舉乾坤而别分四卦者何也曰尊乾坤也乾坤在春秋之前盡四卦而春秋之義變故復尊春秋而舉泰否泰否與隨蠱交限而後四體卦盡於上篇是四三之運雖不相追而上下分際各自為義並行不悖固其所也易象正卷二
