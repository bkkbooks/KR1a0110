body:
  text: 易象正卷十二明黃道周撰乾乾第一乾元亨利貞乾元亨利貞正曰重乾為政天地熏灼金革盛行如火烈烈萬物􅻩喙困於飢渴馬不解羈車不輟軛冰雹炮擊厲於霜雪君子無以豫小人無以悅方斯時也非夫砥才礪德名世應時之器何以安轡龍馭得其解澤乎詩曰言念君子溫其如玉在其板屋亂我心曲是之謂也坤坤第二坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉正曰重坤為令道路坦易剛夫解甲館人安次府守其文吏習為治車行一舍馬食品餼惰農歌於野炫賈適於市堂有耄耋之几家有曽元之裔方斯時也羽籥貴于干戚詩書尊於鐘簴百里之城六尺之子坐而治之詩曰判奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣是之謂也乾坤第三見羣龍無首吉正曰純乾為坤天地乃革君臣離次萬物變易豪雄競出龍蛇交搏金玉委路鐘鼎改作大人值之凝命小人值之易服詩曰民之無辜并其臣僕瞻烏爰止於誰之屋坤乾第四利永貞正曰牝馬乘龍主母自雄金輅之退而牛車之式質或以文文或以質天下無故而彊臣為辟熏燎宵炬賁於白日詩曰髙岸為谷深谷為陵哀今之人胡憯莫懲屯鼎第五屯元亨利貞勿用有攸往利建侯鼎元吉亨正曰大人經綸德音不瑕馳駟四方復歸其家戎狄交征中庭不譁水火猝於外風雷和於內鴟梟無音疑言勿生詩曰匪疚匪棘王國來極于疆于理至於南海蒙革第六蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞革已日乃孚元亨利貞悔亡正曰釜甑鳴於內行旅困於外戰不得克祭不得福不求之則為傲求之則為瀆方斯時也不亦難乎君子正志正行言不改慮動不變色守其不變以待其自落詩曰既克有定靡人弗勝有皇上帝伊誰云憎需晉第七需有孚光亨貞吉利涉大川晉康侯用錫馬蕃庶晝日三接正曰父母既適男女無怨兩澤既釋巑岏乃出去險而就夷舍晦而就明庸夫之智齊於聖賢詩曰喪亂既平既安且寧雖有兄弟不如友生訟明夷第八訟有孚窒惕中吉終凶利見大人不利涉大川明夷利艱貞正曰惟口起差惟才見咎悻直自理其道足死渾渾之源足以藏鱗林鳥不鳴孰與繳親正靜之居明神與鄰終訟夷傷匪艱曷貞詩曰臯臯訿訿曽不知其玷兢兢業業孔填不寧我位孔貶師同人第九師貞丈人吉無咎同人于野亨利涉大川利君子貞正曰何以動衆使衆為用何以服衆不為衆誑專陽生公專柔生明公明相宣萬物不傷盜寇以息大衆不作牧牛放馬復還其野頌曰載戢干戈載櫜弓矢我求懿德肆于時夏比大有第十比吉原筮元永貞無咎不寧方來後夫凶大有元亨正曰比得高位以從於隂四夷陸梁諛佞相尋五穀狼藉輿馬湧貴瓦車楮神騰奮於市方斯時也聞諫不敢入鞀鐸不敢致小人蛙鳴君子虎視詩曰舟人之子熊羆是裘西人之子百僚是試小畜豫第十一小畜亨密雲不雨自我西郊豫利建侯行師正曰小畜而豫隂謀在於內師衆動於外阿柄不斷寇攘乃大詹詹之謀不出國城爪牙之士裹糧從兵詩曰發言盈庭誰敢執其咎如匪行邁謀是用不得於道履謙第十二履虎尾不嘻人亨謙亨君子有終正曰恩澤未沛土功壅塞威主彊相旅興是力賢者絀其誼智者絀其識卜肆之長為有道師空谷優游誓言不來詩曰不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有懸鶉兮彼君子兮不索餐兮泰否第十三泰小往大來吉亨否之匪人不利君子貞大往小來正曰天地之運至於泰否自為一際日月已環風靁已行山澤已陳隂陽燦然內外時乘夫常泰而盡變之時萬物敷榮君怙其世臣耽於仕天下睢睢非宦不稱羣邪煽之蚍蝣宵行鬻爵貿官寶賂始尊是雖未至於亂然其道已不可治矣詩曰菀彼栁斯嗚蜩嘒嘒有漼者淵雈葦淠淠言夫物盛而將衰時極而將退者也否泰第十四否之匪人不利君子貞大往小來泰小往大來吉亨正曰否之盡變天地沓合血戰雖勝元黃猶雜往者未艾來者又戒大者未安進小者未安退日之方且其舍猶昧詩曰陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷同人師第十五同人于野亨利涉大川利君子貞師貞丈人吉無咎正曰同人之師得其柄師之同人失其令謀之以和斷之以貞衆跖成池衆志成城三千一心賢于如林師錫之先昆命則亦謂此也詩曰濟濟多士克廣德心桓桓于征狄彼東南夫廣德心者其惟丈人乎大有比第十六大有元亨比吉原筮元永貞無咎不寧方來後夫凶正曰金火已鬪水土再摶入别其母出畏其敵彊貴之門不可以託喜義者置德喜利者置服龍寵之餘必有垢辱詩曰不憖遺一老俾守我王擇有車馬以居徂向謙履第十七謙亨君子有終履虎尾不嘻人亨正曰履之謙則不得其位謙之履則得其所貴猶之有制也而名實異義安勉殊致或為上以下壅或為子以母貴詩曰小心翼翼昭事上帝聿懷多福厥德不回以受方國豫小畜第十八豫利建侯行師小畜亨密雲不雨自我西郊正曰羣疑之門哲人不游久隂密雲下有邪謀雷頤將動風畜而止而澤不霈衆怨乃起大人以弛其功小人以輟其事君子相時修文畜德交鄰服恭不見疑色詩曰無已太康職思其憂好樂無荒良士休休正曰乾坤交動男子為政屯蒙反復不言鼎革而鼎革之義實從此出屯蒙之後比政坎治需訟師比冒於天地晉夷同有亦以義互起風澤繼之以隱山雷天冒於地几八交而為天地大際火始為政日月麗天雷山附地同有謙豫始出為政師比履畜亦藏其義故同有謙豫師比履畜天地所命以先神明之治也然則山雷之不先於風澤何也風澤動于天山雷出於地故先天者以為上際後天者以為下際觀於泰否之前隨蠱之後兩地者一天兩天者一地水火風澤山雷之次而天地六子所上下治槩可見矣隨蠱第十九隨元亨利貞無咎蠱元亨利涉大川先甲三日後甲三日正曰泰否主際隂陽反易上厯四象水雷引之地貫天中風澤從水以佐乾政師比畜履各戴其德為天地四輔凡厯九卦六百五年餘日未究而隨蠱主際隂陽反易下厯四象火雷間之天環地外山雷從火以佐坤政頤過坎離各兼四象為乾坤具體故泰否隨蠱間於天地綱紀二九一千二百十一年而上下分治方隨蠱之時萬物嚮晦六甲更起雜霸為政王迹乃息蓋春秋起屯五百三十九嵗而臨觀為治先王之禮樂文武之風雅若墜若垂其詳悉不復可問矣故四乘五百四十嵗者是聖人所中分天地也蠱隨第二十蠱元亨利涉大川先甲三日後甲三日隨元亨利貞無咎正曰物蠱而隨聖人無為後甲者起先甲者退雷伏於澤龍蟄於水天時未至聖人不起詩曰君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來臨遁第二十一臨元亨利貞至于八月有凶遁亨小利貞正曰臨戎隂長遁為八月以丑趨未靡之若熱然是元金各得其母坤上事乾不失其理體不當用則君子避小人用當其柄則小人避君子詩曰毋教猱升木如塗塗附君子有徽猷小人與屬觀大壯第二十二觀盥而不薦有孚顒若大壯利貞正曰木託於地其根麗土雷動從乾乃易其所觀靜而敬壯動而競為德不終乃以力騁神明離次草木豫聖詩曰為民不利如云不克民之回遹職競用力噬嗑井第二十三噬嗑亨利用獄井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶正曰為法以拯人非以斃人也獄閉而井通多懼而不窮古之君子不擾獄市於死求生不於生求死火雷水風則猶之一家也詩曰魴魚頳尾王室如燬雖則如燬父母孔邇賁困第二十四賁亨小利有攸往困亨貞大人吉無咎有言不信正曰山下有火澤中無水夜行不迷雖困不瘁艱貞久塞反得其位故去文而反質怵言而敦行君子之所貴也詩曰狼跋其胡載疐其尾公孫碩膚赤舄几几剝夬第二十五剝不利有攸往夬揚于王庭孚號有厲告自邑不利即戎利有攸往正曰寇媾相尋往亦得平垂墜之舉君子自寶快意之業大人斂手寒暑之來觀炭與灰正與醜鬪莫之敢救道人旁觀撫手一笑詩曰我言雖服勿以為笑先民有言詢于芻羌復姤第二十六復亨出入無疾朋來無咎反復其道七日來復利有攸往姤女壯勿用取女正曰隂陽顛撲龍蛇始戰為善不卒肘腋興變婦言是用童昏是戀上帝四顧於是不眷詩曰婦有長古維厲之階亂匪降自天生自婦人無妄升第二十七無妄元亨利貞其匪正有眚不利有攸往升元亨用見大人勿恤南征吉正曰得類偕行去妄而誠邦國將否突然出焉邦國將治突然入焉匪祿是嗜為政以制辭髙而卑辭富而貧厥德乃崇邈與天鄰詩曰皎皎白駒食我場藿縶之維之以永今夕所謂伊人于焉嘉客大畜萃第二十八大畜利貞不家食吉利涉大川萃亨王假有廟利見大人亨利貞用大牲吉利有攸往正曰天山出雲澤地藏水神明所託鬱然懋起鳥獸龍蛇以為朝市君子積學以為道選才以為藝積古以為誠慮逺以為智利不與衆共食患不與衆共避詩曰君子至止福祿如茨韎鞈有奭以作六師頤頤第二十九頤貞吉觀頤自求口實頤貞吉觀頤自求口實正曰自乾坤至頤五百九十六嵗餘五十八日四時山雷涵坤澤風涵乾為天地中限夏秋交際月納於日日光不失上下反復自得口實君臣和柔禪受相期虎鼠鸞梟相為雄雌詩曰羔裘逍遙狐裘以朝豈不爾思勞心忉忉大過大過第三十大過棟橈利有攸往亨大過棟橈利有攸往亨正曰大過反復君臣相敵牆高基下土虛木濕都邑未變四夷侵軼工作繁興民困於役詩曰徹我牆屋田卒汙萊曰豫不戕禮則然矣頤大過第三十一頤貞吉觀頤自求口實大過棟橈利有攸往亨正曰變虛以盈動滿且覆武人顛頤何其驕溢以口喻腹不知其適國無十年之法人有百年之疾詩曰匪我言耄爾用憂謔多將熇熇不可救藥大過頤第三十二大過棟橈利有攸往亨頤貞吉觀頤自求口實正曰頤而大過虛動以盈大過而頤盈冲以虛剛而能柔敷政優優柔而能剛邉圉孔張夫以剛治巖廊以柔治邉圉不得其道則劍珮易序矣詩曰癲我饑饉民卒流亡我居圉卒荒蓋是之謂也坎坎第三十三習坎有孚維心亨行有尚習坎有孚維心亨行有尚正曰天下將競道人信命竒險相侵君子維心習習之鳥各歸其家浼浼之流各底於海動不愧心行不愧蹟君子何悔詩曰風雨瀟瀟雞鳴膠膠既見君子云何不廖離離第三十四離利貞亨畜牝牛吉離利貞亨畜牝牛吉正曰關石和鈞王府則有典章禮樂厥辟受之雖有愆忘士未去口雖有高下吏未去手明明制度子孫勿替聖者何作明者何議饑饉寇攘不失其次詩曰無競維人四方其訓之有覺德行四國順之坎離第三十五習坎有孚維心亨行有尚離利貞亨畜牝牛吉正曰水臨雜動火莫能客水險雜舉火莫能主佞之見佞喪其田詐之見詐喪其賂小人以貪利捐身君子以貪功失度詩曰天之降罔維其幾矣人之云亡心之悲矣離坎第三十六離利貞亨畜牝牛吉習坎有孚維心亨行有尚正曰火烈具阜勢必莫火烈具揚勢必亡自焚不戢無庸自及雖有戰功銘之簦笠以狩以田足以舉筵十日在野必喪其馬詩曰四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎貝禍以燼正曰坎離頤過兩反兩交亦猶之乾坤也反者不交交者不反而又兩用之何也曰易無偏舉者也其偏舉之則有藏顯者也顯者為仁藏者為用乾坤舉交其體藏反屯蒙舉反其用藏交顯體藏六為三十六因而重之天地之道乃備故書不盡言言不盡意易之大藴使人默取之也上經三十六卦以同人大有師比豫謙畜履為主屯蒙噬嗑賁為客以頤大過坎離為體以隨蠱泰否為限凡體卦相乘之嵗六十有七餘日百六用卦相乘之嵗八十有五餘日五十九南北分政四際九卦自六百五嵗至七百六十六嵗差一百五十二嵗餘五日南北兩差為三百四嵗餘十日仲尼所以綱紀全詩也咸損第三十七咸亨利貞取女吉損有孚元吉無咎可貞利有攸往曷之用二簋可用享正曰闞山於澤得其意挹澤於山得其利肥鱗堅材使民自來穫葉孕波使民自多君子虛已以受人損已以與人故動得民之義靜得民之志詩曰瞻彼早麓榛楛濟濟豈弟君子干祿豈弟恆益第三十八恆亨無咎利貞利有攸往益利有攸往利涉大川正曰恆而得益風雷頻薄政令苛急善者恆與怒者恆奪與有恆賞怒有恆罰驟喜驟怒此收彼脫詩曰君子如届俾民心闋君子如夷惡怒是違遁臨第三十九遁亨小利貞臨元亨利貞至于八月有凶正曰亨小隂內也元亨陽內也利貞之象無所届也遁而臨之有所待也反復八月進以退也先處後出尚征邁也與時往來禍未沫也守之若城固不害也驟來之貴不可受也驟來之凶君子有所不怖也詩曰終風且霾惠然肯來莫往莫來悠悠我思大壯觀第四十大壯利貞觀盥而不薦有孚顒若正曰陽而驟隂剛而驟柔荏苒之絲與弦相求望望之視厥志未納遲遲之來厥悔未及名位猶存中立何失詩曰舒而脫脫兮無感我帨兮無使尨也吠晉需第四十一晉康侯用錫馬蕃庶晝日三接需有孚光亨貞吉利涉大川正曰時􅛱而酺衆有未舉日出而雨敗醬滿筥康莊命車遂臨大川褰惟以帆輟楫而轅雖有旨酒又何啜焉君子不以名位改志不以酒食改氣詩曰彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望明夷訟第四十二明夷利艱貞訟有孚窒惕中吉終凶利見大人不利涉大川正曰以晦用明乃不自理戒懼恐惕乃諒君子冬晝雖短晴明者多夏日雖長奈霖雨何羑里羇庫卒免於禍詩日戰戰兢兢如臨深淵如履薄冰正曰自咸恆而來六子為政坎離之用次於天地遁壯晉夷以涵乾坤臨觀需訟復來為客再厯三辰而天地易位夬姤萃升南北更次故智者觀於大象主客之位可以不假詞義而得其藴意矣家人解第四十三家人利女貞解利西南無所往其來復吉有攸往夙吉正曰家人之始乃和乃緩雖云嗃嗃蕭斧不斷西南之雨以作百果雞魚祠竈不違其所故家有其圃不尚廣野家有尊政不貴天下詩曰君子陶陶左執翿右招我由敖其樂只且睽蹇第四十四睽小事吉蹇利西南不利東北利見大人貞吉正曰求與義違教諫道絶君臣相邈禮樂乃缺君子寶其道小人惜其力愚者尊其意賢者尊其蹟詩曰鞠人忮慝譛始竟背忮外者慝中譛始者背終睽而蹇之謂也蹇睽第四十五蹇利西南不利東北利見大人貞吉睽小事吉正曰高趾多躁望目多怒强言無朋或摘其舌强步少交或掃其蹟故為良臣曲其躬為美婦巧其目睨目直躬乃垢乃辱故曰蹇蹇之言莫與為朋悁悁之徒莫與為朋詩曰不我能慉反以我為讐既徂我德賈用不售蹇而睽之謂也解家人第四十六解利西南無所往其來復吉有攸往夙吉家人利女貞正曰雷動而風不足以雨水動而火不足以處男子輟耕婦人輟纖元首不喜股肱不力詩曰喪亂既平既安且寧雖有兄弟不如友生損咸第四十七損有孚元吉無咎可貞利有攸往曷之用二簋可用享咸亨利貞取女吉正曰損之咸可益也咸之損亦可益也咸之損不可損也損之咸亦不可損也山澤無聲而人呼之關市不嚴而行者戒途故損已而虛則進於道矣詩曰雖無德與女式歌且舞蓋損已虛受之義也益恆第四十八益利有攸往利涉大川恆亨無咎利貞利有攸往正曰恆而益之則不利益而恆之則利也往而遷改之則不可遷改而往之則可也風之起以雷風之止亦以雷詩曰君子如怒亂庶遄阻君子如祉亂庶遄已正曰咸恆至於損益六子之治乾坤宅中每差十七餘日三百有十三差之等五十三嵗餘日二百故三差五十有四中嵗之交天地六子别日為治夬姤萃升由此分始也夬剝第四十九夬揚于王庭孚號有厲告自邑不利即戎利有攸往剝不利有攸往正曰朝市之倫與語物價山藪之倫與語道竅在消息中消息不親舟人言潮猶與潮鄰出入日月乃知其真故小人莫以咎君子君子莫以咎小人詩曰無言不讐無德不報惠于朋友庶民小子姤復第五十姤女壯勿用取女復亨出入無疾朋來無咎反復其道七日來復利有攸往正曰復而之姤傷其生姤而之復葆其精復而之姤益其疾姤而之復百不失諛臣成羣堯舜聼熒彊臣孔聖堯舜罷聼詩曰成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之蓋此義之謂也萃大畜第五十一萃亨王假有廟利見大人亨利貞用大牲吉利有攸往大畜利貞不家食吉利涉大川正曰禮樂攸興麟鳯來庭翹翹之弓先之以旌君子以得其翼小人以食其福煢獨有以養行旅有以宿委珮之儒以帥以牧詩曰方叔率止約軧鍇衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩是也升無妄第五十二升元亨用見大人勿恤南征吉無妄元亨利貞其匪正有眚不利有攸往正曰厚味宜毒薄祿宜福轟車之下無有卷耳鐵冶之傍無有側理木過百嵗必細其枝十丈之松是生兔絲耽仕不已老馬重齒詩曰彼昏不知一醉日富各敬爾儀天命不又蓋謂升之無妄也正曰夬姤一隂越次而南萃升二陽越次而北夫姤之從剝復猶升萃之從無妄大畜自乾坤分政至於損益十有二卦千嵗之厯餘二十二兩差之積二百一十六乾策所分坤策從之望人分揲以為交限南北殊分則亦取諸此也困賁第五十三困亨貞大人吉無咎有言不信賁亨小利有攸往正曰澤水方決山火遇之辨者失其智亷者失其誼仁者失其慈勇者失其勢用以決戰則賁者為客困者為主用以御下則賢士皆敗良民皆敝矣詩曰如彼嵗旱草不潰茂如彼棲苴我相此邦無不潰止井噬嗑第五十四井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶噬嗑亨利用獄正曰水得火而以明㢲得震而以起纍纍之瓶見震而疑引繩就竈乃知其資德法相扶君子所懷舍地任法小人以摧要於致養不失吾素詩曰獻酬交錯禮儀卒度笑語卒獲神保是格是之謂也革蒙第五十五革已日乃孚元亨利貞悔亡蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞正曰鐘鼓既設彤弓不降虎豹司關理道未通疆埸鋭夫謀於閽公十叩九默精誠鬱結用圭先金如水沃石詩曰告爾憂恤誨爾序爵誰能執熱逝不以濯鼎屯第五十六鼎元吉亨屯元亨利貞勿用有攸往利建侯正曰鼎可以行屯則廢也鼎可以新屯則昧也鼎之經綸不久頓也動而險生未為頥也已為元子而又建之無所進也君子不以未成之故墜已成之物詩曰敷時繹思我徂維求定時周之命於繹思震㢲第五十七震亨震來虩虩笑言啞啞震驚百里不喪匕鬯㢲小亨利有攸往利見大人正曰出齊南東養長之鄉同德異姓曰姬與姜君子束修仁禮相輔戒懼申㢲動循其故仡仡勇夫莫之或取詩曰有命自天命此文王纘女維莘長子維行震而巽之謂也艮兌第五十八艮其背不獲其身行其庭不見其人無咎兌亨利貞正曰山與澤通雲物所趨萬物喜成以利相娛君子詰姦以戢禍亂薄其徴賦使往者勸故富藏於民而道得其貫詩曰終南何有有紀有堂君子至止黻衣繡裳佩玉將將壽考不忘蓋是之謂也正曰困井革鼎始命六子通貫經始以正下事震艮受之代天地柄以敷六政故坎先於離頤先於大過震艮之先㢲兑固其序也漸歸妹第五十九漸女歸吉利貞歸妹征凶無攸利正曰流俗之敝女風為籥君子視其家政大人觀其內樂登庸而不驕退窮而不惡進遂其媾歸遂其服故有正進者必有正歸臣道婦儀粲如素絲詩曰淑人君子其儀一兮其儀一兮心如結兮歸妹漸第六十歸妹征凶無攸利漸女歸吉利貞正曰山川何逺各以其家陽秋何踈各以其華志願所適不厭蓬蓽從父與君不逺戎狄正心凝志固於膠漆故亂則一室以為天下治則天下以為兮一室詩曰有扁斯石履之卑兮之子之逺俾我疷正曰泰否隨蠱主於上際漸歸兩濟協於下極泰否令於君臣兩濟令於華裔隨蠱令於丈夫漸歸令於女子四令而隂陽大治漸歸之距乾坤十有五卦體卦之積一千九嵗餘日百五十用卦之積一千二百七十七嵗餘百五十有五兩差之距二百六十八嵗餘日三百有五故漸歸妹者聖人所啓詩以正二南之朕也豐渙第六十一豐亨王假之勿憂宜日中渙亨王假有廟利涉大川利貞正曰􅉏御執事精誠是治笑不至矧立不敢倚日中褰裳河水瀰瀰功不可茍致名不可易取棄名與功靖心正誼故水火不爭而風雷相起詩曰嗟爾君子無恆安處靖共爾位正直是與是之謂也旅節第六十二旅小亨旅貞吉節亨苦節不可貞正曰鳥獸異趣飛潛殊務一正一邪三日離家一邪一正片言啓釁貞婦驕賈不相為語君子與小人開物小人不與君子成務詩曰我雖異事及爾同僚我即爾謀聼我囂囂我言維服勿以為笑㢲震第六十三㢲小亨利有攸往利見大人震亨震來虩虩笑言啞啞震驚百里不喪匕鬯正曰平道可巡峻阪是臨拾級終年驟為喬遷以㢲之震髙貴是慕雷電在麓乃迷厥路使鴻學焉使鳥希龍不獲其用反失其趣詩曰老馬反為駒不顧其後如食宜飫如酌孔取則此義之謂也兌艮第六十四兑亨利貞艮其背不獲其身行其庭不見其人無咎正曰樂則行之憂則違之樂而不行憂而不違夫獨異人與道委隨君子見利為禮而止夫豈不賴其心不市故度首而辨度足而履匪獨為智亦為義也詩曰中堂有甓卭有㫖鷊誰侜豫美心焉惕惕正曰震艮㢲兑間以漸歸畜履同有間以否泰謙豫臨觀間以隨蠱分義雖有殊而意象則一也渙豐第六十五渙亨王假有廟利涉大川利貞豐亨王假之勿憂宜日中正曰黍已為黍稷已為稷青耒丹耜天子之力稷已為稷黍已為黍丹簋青登神明之舉君子不聚民之財不豐已之功薄末而厚本薄始而厚終詩曰俾爾單厚何福不除俾爾多益以莫不庶節旅第六十六節亨苦節不可貞旅小亨旅貞吉正曰君子不自為達手其櫛櫛其髮君子不自為大理其髮櫛其紒自大者窮自貴者亡細事之勤旅人之安故處確而能肥行道而能盤詩曰考槃在澗碩人之寬獨寐寤言永失弗諼是之謂也正曰豐旅渙節間以艮兑困井革鼎授於震艮六子之位序長幼之分辨庚丙辛丁相守而流天地之才託於戊已故知父母六子之序者則知天道人道所以次第也中孚中孚第六十七中孚豚魚吉利涉大川利貞中孚豚魚吉利涉大川利貞正曰中孚離也㢲與艮相摩而然火與金相守而焚故頤之為離不如中孚之為離也頤先於大過中孚先於小過故觀於中孚而知火水之究天地也君子信其身而後諫其君明其身而後保一人詩曰既明且哲以保其身夙夜匪解以事一人中孚小過第六十八中孚豚魚吉利涉大川小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉正曰潛匪飛也而或以飛魚匪鳥也而鳥是來食月非日也月食而月不為災信而得過君子不以為過也匪禍之禍君子不以為禍也詩曰鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之圍爰有樹檀其下維籜他山之石可以為錯小過小過第六十九小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉正曰小過坎也止而動動而止動止鳴飛則小過生焉小過之義不可復反復反而過小乃不逺鷦鷯之自適與鴻鵠比翼詩曰沔彼流水朝宗于海鴥彼飛隼載飛載止莫肯念亂誰無父母小過中孚第七十小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉中孚豚魚吉利涉大川正曰魚而鳥非過也鳥而魚則過也蛇而雉非禍也雉而蜃則禍也小過為氣以食中孚故離交於坎中孚為體以食小過故坎陷於離離日中隂而或以月坎月中陽而或以日中孚之得豚魚小過之得飛鳥陽燧才諸之所從取也二物之交君子則致具戒謹焉耳詩曰匪鶉匪鳶翰飛戾天匪鸇匪鮪潛逃于淵既濟未濟第七十一既濟亨小利貞初吉終亂未濟亨小狐汔濟濡其尾無攸利正曰既濟則水上也未濟則火上也水上火下人之交也火上水下天之交也人交者得其用天交者得其通人用天通濟乃不窮君子以既濟設未濟之慮以未濟惕既濟之防詩曰濟濟多士克廣德心桓桓于征狄彼東南言既濟而不自為濟者也未濟既濟第七十二未濟亨小狐汔濟濡其尾無攸利既濟亨小利貞初吉終亂正曰未濟則水下也既濟則水上也水上而火爭火下而水戰且以未濟而自為既濟者終亂之防必自此毁矣自漸歸妹而來體卦得五三百三十六嵗餘日百六十六用卦得六五百一十一嵗無有餘分故體卦之用入於日交與納虛同限用卦之體入於統數與卦運同厯君子觀於未濟之既濟而知聖人之慎也與民同患懼以終始既濟而未濟則或以吉未濟而既濟則終以亂君子不惟其才而惟其德不惟大德而惟小心詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國言夫彌綸天地得濟世之實者也正曰明天地者莫大於日月濟天地者莫大於水火故為水火以終天地為兩濟以當乾坤乾坤之體歲於頤大過日月之象顯於中孚小過至於兩濟而天地之用極日月之交至矣故乾坤者兩極之分首兩濟者日月之分道也日月之分道中於兩濟冬夏之晷影極於乾坤南北分政隂陽殊路因而分之兩濟上下取於乾坤各十有八卦每卦之厯八十五嵗餘日六十小餘八分五釐二毫五絲十八卦之厯為一千五百三十三嵗以四乘之為六千一百三十二嵗無大小餘而日分以正贏縮差中舉易不易之義備見於此也然則日分於四分之內除三百六十六為法僅立二千一百三十四為日分而古今所用之厯皆自四分以內酌差九十餘分上下今驟舉成數裁其四倍雖有贏縮猶覺太狹何以齊之曰日月天行各有嬴縮天行盈縮於六十三年之內猶日月盈縮於九十一度之外也一嵗積贏六分弱至三十一嵗半而贏極贏極反縮一嵗積縮六分弱至三十一嵗半而縮極縮極復贏贏縮之間平行一百八十三猶於四分之內平立二千三百一十七也故以二千一百三十四為法以二千三百一十七為實以五分六釐二毫四絲為法以七分八釐六毫四絲為實繇是而差法可定斗轉星回不乖其次也然則日行嵗差不過一百五十六為六十四嵗約差一度今四分定餘一百八十三則五十五嵗當差一度何以裁之曰是亦盈縮遲疾之故也漢厯最濶斗差亦遲齊梁之間日分稍縮斗差最疾唐差又遲日行平中今洪武元年在箕九度甫二百六十年而在箕三度約其差度不過四十五年是天行又在縮厯之中日度亦當自縮而贏凡五百一十一年而贏縮更端中差八度故紆自一百二十九速自一百八十三上下二十七度為日行嵗差之平行度贏自三百十七縮自二千一百三十四上下一百八十三度為嵗行十分之平行度平行减半得其中度而古今逺近遲速先後之數備存於其中矣然則日行一百八十三必於四分之內立三百六十六半用而半不用故四分其名而二辰七分八釐二毫四絲其實也如以平行為實則當以二千二百二十五半為法使其進之可至於二千三百一十七退之可止于二千一百三十四如以五分六釐二毫四絲為實則進之可至於二千二百二十五半退之不可止於二千四十二半何以裁之曰天道贏縮積微而漸四五千年之內固有贏而四分長三百六十縮而五分短三百六十者矣以其微著衆所不見故舉二千一百三十四為法折平行之半以進退於九十一半之中使其贏中於二千二百二十五半縮中於二千四十二半而日分始均且以漢距今千四五百年四分之厯己縮三百餘分如平分三千六十六嵗為進退則四分之內或退至七百二十亦未可知度其最近者以九十一半贏縮其間使進不太踈退不太促疏不至于二千五百促不至於一千七百六十八以前後簡定進退其間故百世之葉視於天衡非咫尺之務存於目巧也今為差分贏縮定圖附於左日法萬辰法八百三十三小餘三釐三毫三絲三秒三忽分法八十三小餘三釐三毫三絲三秒三忽釐法八分三釐三毫三絲三秒三忽毫法八釐絲法八毫三毫三絲三秒三忽三絲三秒三忽定法五萬二千一百三十四實法五日二辰五分六釐二毫四絲六絲二辰當一千六百六十六六釐六毫五分當四百十六分六釐六毫六絲六忽六釐當四十九分九釐九毫九絲九秒二毫當一分六釐六毫六絲六秒六忽四絲當三釐三毫三絲三秒三忽贏法二分一釐九毫六絲二分當一百六十六分六釐六毫六絲一釐當八分三釐三毫三絲三秒三忽九毫當七分四釐九毫九絲九秒九忽六絲當四釐九毫九絲九秒九忽縮法二分一釐九毫六絲分數法同為一百八十三進法實五萬二千三百一十七退法實五萬一千九百五十一進平法一分退平法一分九毫八絲九毫八絲平進實五萬二千二百二十五半平退實五萬二千四十二半贏極法二千五百縮極法一千七百六十八嵗法五百一十一全法一千二十二贏縮嵗三百五十五半嵗贏法三釐五毫八絲二秒每嵗贏三釐五毫八絲二秒二百五十五嵗半積贏九十一分五釐五百一十一嵗積贏一百八十三分千二十二嵗積贏三百六十六分而極故四千八十八嵗而贏縮四周約虛八嵗以為分差與卦氣相值而贏縮更始也嵗縮法三釐五毫八絲二秒每嵗縮同以五百一十一嵗為中千二十二嵗為極二百五十五嵗半為贏初縮末縮初贏末之候嵗差法六十四差贏嵗七十三差縮嵗五十五定分嵗行一百五十六縮分嵗行一百三十七贏分嵗行一百八十三之度不關嵗行餘差地嵗凡嵗移斗差自是地行退行一百五十六分至六十四嵗而滿萬分為天差一度其遲行者嵗行一百三十七分至七十三嵗而滿萬分差一度其速行者嵗行一百八十三分至五十五嵗而差一度積漸差池非目所睹但以嵗候推之不過六十四嵗上下九年內外如以為日分所生則四分之前應無差分其日餘二百分而上皆四五十嵗輒差一度而唐虞迄今三千六百餘年星虛之移僅差六十度則其槩可知矣用卦周年雖五百一十一四周之嵗二千四十四而其歸宿皆與體卦相凖贏縮之法大略相同故不復舉而附諸圖於後焉圖說四分外立百五十內法硬實與前圖微殊前六半分七十八其七十八入四分之內者則日分止二千四百二十二其七十八出四分之外者則日分滿二千五百天道不變而日道盈虛相與以為消息故前圖氣閏之說與是日法互為劑量也易象正卷十二
