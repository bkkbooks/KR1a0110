body:
  text: 易象正卷終下明黄道周撰大禹作範其子寅疇孔聖作詩春秋皆於易外别自為易箕實皆圖書也圖書一體而河圖近先天河圖不去十則整數百萬易皆整數百萬聖人為去十而用之只得五十三萬一千四百四十一其四十六萬八千五百五十九即藏於戊巳同納之中毎卦一萬五千六百二十五以三乘之凡四億九千六百萬是易之極賾也今就圖據十而觀之其現成不易者南之二七據五為離則北之一六據十為坎以五交十則南艮而北兌東之三八據五為兌則右之四九據十為艮以五交十則東坎而西離兌艮反復以得㢲震二五三十以定乾坤因而交變以五為統以參起之以兩因之陽之三爻各得五陽隂之三爻各得五隂兩參合五以得百萬故曰參兩倚數又曰參伍其數錯綜其變徑以此徑圍以此圍勾以此勾股以此股圭以此圭黍以此黍遇五持之遇十併之一之至九各自為部而十不為部一之至九各自為子而十不為子猶后夫人之不自當位與自立子也然微后夫人亦不得當位不得立子故易之去十非去十也用事於内則不用事於外與之有終而不用其成數故易數百萬而用五十三萬一千四百四十一象之比數差七千一百五十三絀其半而盈其半象皆足以納之亦皆足以消之皆足以消之納之則猶之无差也故易之於河圖猶无所去取也然則詩之用三百一十一春秋之用二百四十二何取之乎曰詩取諸河圖春秋取諸雒書亦皆圖書也而詩取五春秋取九焉詩之取五春秋之取九何也曰易數百萬數中十五以百乘之為百五十合舉其數又置五焉為三百有五大衍五十以六乘之又置五焉亦三百有五故詩者天地之中數也本於性情止於无邪得其中節而止矣凡日法一萬度法亦一萬天行一歳而差一百五十六分積六十四差而退一度甲乙兩差合退三百十二分五釐去其一分五釐為三百一十一泛差前後六分實行退差三百有五故易逆數也而詩乘之一萬九千九百四歳而退三百一十一度故詩者天道之左次者也天行兩嵗而詩退一部詩積十四部而天行一嵗天行一嵗而詩差二十九分兩嵗差五十八分合於一部之退四六分上下魯商所為升降也兩差贏一則六百四十限贏三百二十以每嵗十四部所少二十九分除之贏縮四六年間是詩所綱紀天歩也為詩退度斗差圖如左右所為退度圖未及於斗差也凡詩退數中交一百五十六正交三百一十二則逆行而反如東山之退於䲭鴞關雎之退於殷武也然詩原以退行為序一歳十四積退二十九故復以順行數之亦麤舉為例以見聖人制作之意未敢詳布以規條天地也其日纒斗差代各殊測今未暇舉其贏縮黄赤二厯但為約略立限自箕九度至於虚危日短星昴之㑹可四十九度合行三千百年春秋至至元辛巳二千有三年除漢初距春秋五百年日在牽牛之首至元距漢初千五百年只行斗二十三度入箕之末則是一千五百三十六年只行六行十四度也今距至元辛巳三百年日在箕三度則疾厯不及六十年過一度矣厯法自何承天而後宋梁之間最盛亦至宋梁最錯皆拘殷祀六百夏厯四百之文益以周厯曁於唐虞近二千嵗不應日在於虚其實史記及竹書皆无夏殷千嵗之厯即有之則牽牛以前皆行遲厯遲不過七十二歳斗津而後皆行疾厯疾不過五十六嵗遲疾之間聖人所裁每一嵗天差百五十六分二五不為淺也或謂易行六十八嵗而周或七十五六而周或八十五六而周則天差宜自六十七八而上其實易行多寡不關斗差天地推移非夷所測日月自用九六天地自用七八故以六十四差定其凡焉然則圖之不舉日纒何也曰日纒自漢而下始可舉也牽牛至於神宫不過二十四五度屈指可數五位三所至於日虚星昴莫能徴之矣必為定次則至元辛巳而上至於春秋二千年間詩退差圖可得而言云至元辛巳日在箕九退殷武至殷嘉定丁丑日在箕十退賚至閔予建炎癸酉日在斗初退武至臣工元祐己巳日在斗二退思文至清廟天聖乙丑日在斗三退召旻至抑建隆辛酉日在斗四退蕩至行葦大順丁巳日在斗五退生民至大明太和癸丑日在斗六退文王至采綠大厯己酉日在斗七退都人士至鴛鴦大足乙巳日在斗八退桑扈至无將大車貞觀辛丑日在斗九退北山至小宛大建丁酉日在斗十退小旻至白駒天監癸巳日在一斗十退祈父至菁莪元嘉己丑日在二斗十退彤弓至華黍寧康乙酉日在三斗十退白華至鹿鳴多一篇太興辛巳日在四斗十退狼跋至候人延熹丁丑日在五斗十退蜉蝣至墓門初平癸酉日在六斗十退東門之楊至黄鳥永建己巳日在七斗十退終南至鴇羽永平乙丑日在八斗十退羔羊至十畝之間元始辛酉日在九斗十退陟岵至南山元康丁巳日在十斗二退東方未明至子衿元朔癸丑日在十一斗二退風雨至遵大路漢高己酉日在十二斗二退羔裘至葛藟周赧乙巳日在十三斗二退兎爰至河廣顯王辛丑日在牛一退芄蘭至蝃蝀安王丁酉日在牛二退定之方中至北風貞定王癸巳日在牛三退北門至擊鼔景王己丑日在牛四退終風至小星簡王乙酉日在牛五退摽有梅至麟趾襄王辛巳日在牛六退汝墳至關雎凡詩十四部四千三百五十四退天二十九辰積六十四差退一千八百五十六分為六部不及十辰故每限又退一什此與斗差分亘不相同蓋别自一義并行不悖也自至元辛巳泝周襄王辛巳一千九百八十年行三十一度過此四百年日在嬃女之中周人所以命姬謂日月星辰皆在北維者也然則詩行二千四十八年再退一什而在魯駧之端雅頌以齊自辛巳而下六十四年至正乙酉將在殷武抑在關雎歟曰蓋自汝墳至於關雎也然則詩亦用辛巳元也曰詩逓為進退辛巳詩之未限也郭史斷章以為厯首偶與詩合其自春秋而下戊申而上别自為部非辛巳所及治也然則春秋之用己未元何也曰易以八為象以九為數立元用數者也數始三九以三乗之八十有一以六乗之為四百八十六是一部之統數以九乘之為七百二十九是六分歳之辰數六分歳辰而絀九數積四百八十六歳而退一歳之辰故兩春秋而退一交歳一春秋而在交中春秋之年三其八十一自己未至於辛酉故詩有不盡之年春秋有不盡之歲各退一焉而亦皆用之詩有六十四之斗差春秋有四百八十六歲之元差皆逆數也故為春秋元差圖如左凡春秋十八部而追天之歳不及九辰凡九歳不及八十一辰二十七嵗而退一部四百八十六歳退十八部而又與天㑹故春秋以四百八十六歳為元六其八十一之數也九六互相為用故九其八十一為七百二十九六其七百二十九為四千三百七十四必如春秋止於獲麟是本數上再逆行一歳以三乘八十一為二百四十三逆行一數以三乘之為七百二十六以六乘之為四千三百五十六則毎歳不及天二十七辰九嵗不及天二百四十三辰故以九嵗為限其九嵗而退一部與二十七嵗而退一部其法一也詩用三百十一春秋用二百四十三與本數上已退一度故不復再退而統以四百八十六立元每四百八十六年退立一嵗以為元法春秋積元圖二百四十三年退辰二千一百八十七作二百四十二年半算四百八十六年退辰四千三百八十四作四百八十五年算古上元甲子積四百八十六年而退滿一歳為易象數逆行之一㑹以上為甲子元次元己巳猶日之右旋太嵗之左轉也故為十二元圖如左甲子元四百八十五年己巳元四百八十五年甲戌元四百八十五年巳卯元四百八十五年甲申元四百八十五年己丑元四百八十五年甲午元四百八十五年己亥元四百八十五年甲辰元四百八十五年己酉元四百八十五年甲寅元四百八十五年以上十一元五千三百三十五歳上逮羲農下逮周平王四十九年即春秋己未元已未元四百八十五年以上十二元五千八百二十年自羲農下逮秦始皇三十一年甲子以下備在史册王霸古今之義斷於是矣以大象六十年積之每六十為一部凡九十七部得五千八百二十年而象疇大齊以三百一十一加之為六千一百三十一與用卦專乘之數會以三百退之為五千五百二十與體用兼乘之數㑹故詩春秋易象相為進退也秦始皇甲子至平帝丙寅立孺子嬰之嵗為春秋交中新室丁卯至魏嘉平元年己巳司馬懿殺曹爽何晏之歳為春秋交終自嘉平己巳至齊永明癸酉齊主賾殂立太孫昭業之年為春秋交中明年甲戌蕭鸞弑昭業立昭文尋遂自立至開元癸酉為春秋交終開元甲戌至太平興國元年丙子為春秋交中至嘉定十一年戊寅蒙古破燕之三歳為春秋交終明年為己卯元凡入元之先後不關帝王之盛衰而詩與春秋每相禪代中交交終之際不能无故雖玉歩不改而鍾磬殊音蓋自嘉平己巳以前春秋所治其交中交終皆以春秋為序嘉平己巳以後詩之所治其交中交終皆以詩為序春秋所退五十有五者兩詩所退五十有五者一故以百一十而裨春秋為一嵗之朔實以五十五而裨詩為一嵗之通朞也凡詩春秋刳方刓圎之數氣朔外盈内虚之分黄赤南斜北倚之度日月交㑹衝食之故皆備於天方圖天方圖无言語文字而自有圖象以來言語文字皆從此出其徑圍積實方田圭黍弦弧面罨勾股周髀皆與天經易緯相為表裏詳見三易洞璣此具其略云凡為天方圖立六十四因倍豎之百二十八以為徑率規而圜之三百八十四矩而方之三百六十規而圜之二百七十三矩而方之二百五十六此内方圓七週卦實之所充也此外方圓二週日月星辰之所游也凡方圜九成合十八變而歸於極其方者皆四分損一以為圜圜者皆十六分損一以為方大方四周一百二十八為五百三十二四分損益得三百八十四弧矢之罨十九餘强則外周之弦扺於次周之背圭黍之稜三分有半中間空道實得三分則外圭之邸託於内邸之圭自平極而上四十有八減三為五為四十有五以八乘之為通朞之日道是天地自然非可强鑿為智也三分之道截於八圭日月所游在一分四釐而上故得三百六十五日二分五釐次層弧背因復浮上為二百七十有三其實次層徑率只得九十以三圍之二百七十其浮為二百七十有三猶圜分之浮為六十有五也揉方就圜每減十六分之一徑三圍一每不及圭黍之分故日月交食每在二日六分八釐上下折之為一日三分四釐是日月交旣食甚之限皆在圭黍半折之中也外方四八三十二方只得方圜兩周弧背弦矢十九與十三相次并不得餘分内方四八三十二方共得方圜七周以十六分為兩際外際二八十六方得方圜兩周内際二八十六方得方圜五周弧背弦矢九與七相次亦不得餘分自是又空圭黍二分為三十二卦之游道以二八分為兩際外際一八得方圜兩周内際一八得方圜三周弧背弦矢以四半三半相次雖有餘分而四分中極表影俱盡矣故參兩倚數易之所致用也規參而矩兩倚而察之以得圭黍衝食之路乾坤兩濟之所從交也二七二五二三極於一兩是三分損益之所従出也道未有出於三分損益者也天方積實之數一千六百七十七萬七千二百一十六以六十四分開之每分二十六萬二千一百四十四即以四千九十六乘四千九十六之數也度量權衡皆從此立律雖用九與八殊趣而約於内方第四乘圜分之數則適相值矣蓋天方每方實通十六以十六乘四千九十六為六萬五千五百三十六以四乘之為五十二萬四千二百八十八即大象之倍實也大數圜分實得五十三萬一千四百四十四凡長於大象七千一百五十三猶天方初圜與削方之數相差二十有四是也納於近極之四方於貞卦為孚過兩濟之限於先天為夬姤剝復之限所稱四千九十六不過中方面羃之皮分不及四周積實之一也凡河圖外周三八四九一六二七之圜文即天方圖再方再圜日月所經之路中間十五乃為天方積實八八相命之區又如雒書一九三七為平凖徑率之方八二四六為圭黍倚數之位也天方圖刳中八道實得七方七圜幷中皇極四周視之皆得十五其自二八而内五方五圜只共得十故十五為通理之文四十為旁行之數四十有九為七政之塗五十有五為隂陽之宅也其實是圖專為表晷而設八尺之表立於極中夏至无影則天中九十一度以三十六為北極出地以五十五為北陸度端夏至景長一尺五寸則北極出地三十七度天中南差一度四分自是而下四十八度為日月出入其實北陸度端在九十一度之二十四中分距極六十七度四分以當一限六十七歳百五日之㑹也其五十五度只當土中表位不在度端去極漸遠則中道漸高三十六之出地五十五之距極皆不足為據惟裁南北二十四度之赤道餘上下六十七度之天分足為定本耳日月交道視其中差以繩量倚測其表端可知日晷所直爻象大約八尺之晷不出八方四千九十六卦之外為河圖十五雒書專五之所範圍詩春秋用以綱紀進退天地變化而行鬼神者也雒書四十五用蓍九四十河圖五十五先天五二十四十五二十五九十八十加五十五一百三十五一百三十五一百八十一百九十二百二十五二百四十五二百七十三百三百一十五去十存五三百五十五三百六十去四十九存三百一十一去五十五存三百有五大衍五十蓍䇿四十九五十歳朔三百五十四一百三百五為體四十九為用一百五十通基三百六十二百三百十一為體四十九為用二百五十三百加五十五為歳朔三百五十去四十五為詩實此以八乘雒書以九乘大衍以河圖而去雒書為三百有五之實以洛書而去大衍亦得三百有五之實以蓍數而去雒書得三百十一之實以蓍數而去大衍只得三百有一故盈虚繇此生變化繇此出也今以三百十一為法以十四為限每周限得四千三百五十四不及天行二十九則是每嵗逆行二十九積一百五十一而退一嵗之厯故以一百五十一為限凡二十九限而周全易之歳即如春秋以二百四十二為法以十八為限每周限得四千三百五十六不及天行二十七則是每嵗逆行二十七積一百六十二嵗而退一嵗之厯故以一百六十二為限凡二十七限而周全易之厯此兩者詩春秋之關鞬也春秋之空壬戌前一歳猶詩之有六逸詩得併六逸之篇則春秋得併辛酉之歳故春秋以二百四十三為法四百八十六為限因為起元之本也然則是與用卦兼乘專乘二法兩不相入者歟曰亦并行不悖也凡卦各以體卦通朞之數為准以用卦及兼乘之數參之至如用蓍定䇿之法尤為簡便如易每爻得三十䇿以為一月每限六十四卦得三百八十四箇月為三十二年以六十四限乘之得二千四十八年即春秋已未元年至元泰定帝乙丑二年易象中分之嵗也然則蓍法有定而氣閏參差為之如何曰猶之通朞也一蓍之䇿而當一萬一爻之䇿富三十萬於每爻中減四千七百一十以為朔虚於三百六十萬上加五萬二千四百二十八以為氣盈合盈虚之䇿通得十萬九千二百二十五以為章歳之閏約其定數為五日四分五釐餘百四十六即體用相乘積嵗之數以十乘之而得氣朔平分之度也然則二千四十八年僅當易象之中而於日月嵗數各差二百七八十何以御之又自已未隱元至龍興之㑹二千九十嵗尚餘四十二年不繫爻象進退何屬曰逆行者愈退順行者愈進日月交㑹終古无極四千餘年非為隂陽之稅駕也一週不及二百八十七積十五週得四千三百六年年而與日㑹此即積實之數與通朞距差六十三通朞之與月䇿可以互通也今為月䇿厯年圖如左右每限三十二年以六十四乘之為二千四十八年即易象之分半也自周平王四十九年至元泰定帝三年外餘四十二年而戊申革命此四十二年在復頤之交非龍飛之㑹以三乘起之其子卦乾坤姤復相銜而起當在乾夬之間眞人始生豫膺帝睶四大之限皆在南方詩所謂篤生保佑者也前二十二圖皆論反復卦至先天圖以倍分為序隂陽逓次不論反復然以三十二年倍合得七百六十八箇月以六十四限來之得四千九十六舉今觀後則泰定丙寅四十二歳之餘猶當積為初終之限也此即四千九十六年積月之數也易象主日而蓍主月蓍既得爻則不復存蓍而爻既得象則常存爻故爻通日月而論月不如論日之審也此據月法兼反復二卦為十二月始於春秋已未終於泰定丙寅亦得天地之端竟隂陽之中會然其八際八交在唐宋之界間有難明必取三乘全圖較其體變然後治亂絶續可得而言也曰然則三聖之時不知有先天圖歟曰羲軒之文與天地存安在其不知先天圖也先天圖界分明隂陽倚伏可以摹捉自文孔定次而後讀者徒以理求序者强以義貫其提綴百王差等千世之意如景慶之无朝夕神龍之无首尾有終身研之不知其味者矣然則易序出而先天圖廢又曰先天圖出而諸圖皆廢何也曰道晦而後明明而又晦自有先天圖時不知易序聖人抉其精微簡其要㑹稍一通變而上哲之士聞知相承不復尋其初本既而漸狎漸忘讀易序者不知所出驟見先天圖疑易序之牽率不如先天之自然也此皆虚談理竅不窮天道疑人形之枝節侈鳥鷇之渾圜者耳嚮使帝王升降治亂循環皆如先天圖八際八交截然明辨則初學之士闖藩而進管郭皆號升堂京焦相攜八室矣惟其不然所以秦漢只目卜筮之書晉宋謂談性命之路高者求之元虚卑者安其中節也然則乾象大衍諸厯亦皆以蓍定䇿以爻定月不知一卦之有三十二年周卦之有二千四十八厯歟曰安得而知之文獻定而後徴信足徴信足而後彰察明自姬孔而前皆无諸厯雖姬孔不敢移先天之序自元明而前若无諸厯雖聖賢亦不敢信易序之積也然則聖人皆有藏往而无知來者歟曰聖之一也學者信而巳記曰不言而信又曰信而好古如當泰定乙丑而後尚有四十二年海内殷庶天下无事以易春秋推之遽云當亡其誰信之好學不精信道不篤是陸機所覆族於諸王許衡所歾身於前朝也然則先天起於分極无反復兩卦今以反復加之何也曰一反一復易之定體且不如是无以究諸厯之全然則是遂為全厯歟曰十二圖皆全厯也十二圖多者不過六千一百三十二年中者不過四千八百四十四年如以䇿定月則當六乘全易之厯億萬无窮何所稽之曰舉歳則太侈舉辰則太弇歳辰之間舉月與日聖人亦皆用之然而月不如日之中也譬今體卦一限二萬四千五百七十六箇月以十二約之為二千四十八年則是每一限二千四十八年當月䇿之全圖即易象之半交也六十四限當十三萬一千七十二年為體卦全象之中以一卦通朞六十八年零九十六日約之毎一大限當三十小限六十四大限當一百九十二大象大象者即三十二限通朞積實之總卦也邵氏經世亦得此意然空數通朞不積爻象於進退損益之際未易言也然則六十四大限僅當大象之全半若全厯大象必須一百二十八限歟曰易通兩象象包二卦如乾之通坤屯之通蒙反復對化舉兩成一故有半象之十三萬一千七十二即有全象之二十六萬二千一百四十四因復倍之為五十二萬四千二百八十八雖復周極分起未有單邉獨成者也然則易之通數只有三十二卦而无六十四卦反復對化只有三十六卦而无七十二卦歟對既有反復對化則安在其无之也然則僧一行邵堯夫之不以全象起例何也曰智有所極則明有所不足􅌊火測管不見左右要其所至極晰而巳然則一行堯夫不知開元之播蜀靖康之北狩歟曰易失則鑿鑿失則賊聖人有所不知賢者有所不鑿唐𤣥宗開元七年卦䇿入坎歳在已未又三十二年出坎矣卦䇿入蒙歳在辛卯又六年丙申乃避祿山至於扶風宋徽宗崇寧二年卦䇿入萃歳在癸未又二十四年丙午將出萃矣乃父子銜璧降於金營先天月䇿何足以知之也使先天月䇿足該治亂則聖人不復損益以為定位定序之圖矣然則堯夫預卜安石不足以知之乎曰洛下諸賢多誦荆公者堯夫與景仁同智非卜之謂也寳元康定間距靖國靖康上下百年而以鳥鳴風角别其治亂亦衆笑其闊矣然則體卦定位自幽王元年來者至徽欽之辛亥究於漸歸用卦定位自幽王元年來者至順帝之癸已究於鼎革皆始於幽王之元年何也曰衰周之端有兩己未皆天地之第十二元也宣王之己未幽王已立則幽王得以已未稱元幽王之不以已未稱元聖人取元以與魯聖人不取元以與魯則天地仍取元以與周故魯隱之始屯周幽之始坤二者聖人與天地相揖讓也平王二十五限至洪武壬寅究於鼎革又八十六年而為己巳土木之變發於中造遷國有隆替則復辟有成敗乾坤所命則後代因之兩者聖人所共察也易曰至哉坤元萬物資生乃順承天自周幽王已未元年至乙酉莊王元年上有四元體用十二圖分取焉而兼乘之卦皆取於幽平以抵於革鼎艮震為廿七八限體卦之抵於豐旅三十一限用卦之參於萃升鼎革為二十五限皆可屈指而數也有聖人起則必致詳於體用十二圖之說以扶植仁賢修持禮樂維輓天地於將傾之候如周公之錯洛邑親親尊尊區井田布列國繁文厚情遲久而復者是聖人所豫䇿於四五百年之始也然則月䇿者聖人所不用歟曰聖人不用月䇿則何以知泰定之際眞人始生何以舍周幽之已未就魯隱之已未何以知辛卯之嵗秦在沙丘理宗之終差於癸亥何以證宋理之剝極於晉惠之姤端何以印周莊之元年於晉武之乙酉耶然則四千九十六年而外餘二百七十三年何以命之曰是詳言之矣是天地之所命限也四卦之厯舉其通朞二百七十三以月䇿每限六十四除之餘十九歳為一章之法故二百三十章而得四千三百七十歳一千六百一十閏從一章之餘以泝全象之厯則二百三十章燦然見矣是易所謂逆數者也然則易詩春秋之繫命如何曰是皆繫於先天圖也易六十甲子週厯之辰内空八百三十六以詩追之每嵗十四週不及天二十九以春秋追之每歳十八週不及天二十七故詩春秋各以不及天之數為退天之空分又以不及易之數為退易之空分詩不及易者十五春秋不及易者十三是萬物繫命休咎吉凶之所從出也因其餘而逆積之詩十四積之餘二十九凡一百五十一週而退四千三百七十九不及天者四辰春秋十八積之餘二十七凡一百六十二週而退四千三百七十四不及天者九辰是皆以實積引滿而得之順積者為剛逆積者為目順積者以求歳月逆積者以求日星萬物繫命聖人治之不可逃也以其名象繁多不可圜圖又為散圖如左詩元命圖追易一限十三部縮五十三追天一限十四部縮二十九十三追易積象十四追天積辰只用退十五仍虚十三强復周南關雎部至鄘風干旄周南關雎部至采蘋頤鄘風載馳部至齊風猗嗟甘裳部終風至邶風屯魏風葛屨部至豳風九罭擊鼔部柏舟至鄘風益豳風狼跋部至无將大車牆有茨部蘭至衞風芄震小雅小明部至大雅崧高河廣部緇衣至鄭風噬嗑大雅蒸民部至周南兔罝將仲子部至風雨隨周南芣苢部至衞風芄蘭子衿部載驅至齊風无妄衞風河廣部至碩䑕猗嗟部至唐羔羊明夷唐風蟋蟀部至小雅天保唐風鴇羽部至秦風權輿賁小雅采薇部至瞻彼洛矣陳風宛丘部至曹風蜉蝣既濟裳裳者華部至周頌清廟候人