太極中分二十七春秋兼用之春秋盡於庚申則十八部而餘一九春秋盡於辛酉則十八部而餘三九餘三九者一百六十二年而合餘一九者四百八十六年而合一九之餘當消於匹十目之内三九之餘當消於十三日半交之内故每限各立九際二十七際日月所為交合萬物所為明晦也本是三者以明易道又明於憂患與故則易之道其庶矣乎今再以春秋繫命及詩所用河圖蓍法春秋所用象變月交並附於後焉春秋元命圖追易用十七積退十八追天用十八積進十三復隱公己未十七部退十八定公癸卯隱公己未十八部進十三桓公辛未頤定癸卯部鸜鵒來至昭甲申桓壬申部家父求車至桓甲申屯昭乙酉部章華至昭丙寅桓乙酉部長勺至莊丁酉益昭丁卯部澶淵至襄戊申莊戊戌部觀社至莊庚戌震襄己酉部城鄭虎牢莊辛亥部夏陽貫至襄庚寅至僖癸亥噬嗑襄辛卯部鞌袁婁至成壬申僖甲子部牡丘匡至僖丙子隨成癸酉部晉趙盾至宣甲寅僖丁丑部天王狩河陽至僖己丑无妄宣乙卯部秦敗彭衙僖庚寅部暴至文丙申至文壬寅明夷文丁酉部楚滅項至僖戊寅文癸卯部猶三望至宣乙卯賁僖己卯部齊救邢至閔庚申宣丙辰部斷道至宣己巳既濟閔辛酉部又鄄至莊壬寅宣庚午部瑣澤至成壬午家人莊癸卯部求車至桓甲申成癸未部三卜郊至襄乙未豐桓乙酉部瓦屋浮來襄丙申部澶淵至隱丙寅至襄戊申離隱丁卯部毫社災至哀庚戌襄己酉部至河乃復至昭辛酉革哀辛亥部晉執宋仲幾昭壬戌部蔡逐朝呉至定壬辰至昭甲戌同人定癸巳部至昭甲戌昭乙亥部次于乾侯至昭丁亥臨昭乙亥部无冰至襄丙辰昭戊子部得寳玉大弓至定庚子損襄丁巳部戌鄭虎牢定辛丑部執邾子至襄戊戌至哀癸丑節襄己亥部五卜郊至成庚辰哀甲寅部鄭來輸平至隱甲子中孚成辛巳部陳夏徴舒隱乙丑部兩烝至宣壬戌至桓丁丑歸妹宣癸亥部楚蔡厥貉桓戊寅部紀酅至文甲辰至莊庚寅睽文乙巳部衞滅邢至僖丙戌莊辛卯部同盟于幽至莊癸卯兌僖丁亥部甯母至僖戊辰莊甲辰部蜚至莊丙辰履僖己巳部觀社至莊庚戌莊丁巳部禘致夫人至僖己巳泰莊辛亥部伐衞至莊壬辰僖庚午部盂薄至僖壬午大畜莊癸巳部鄭敗王師至桓甲戌僖癸未部毛伯來錫命至文乙未需桓乙亥部槖臯至哀戊午文丙申部有孛入北斗至文戊申小畜哀己未部得寳玉大弓至定庚子文己酉部陳殺洩冶至宣辛酉大壯定辛丑部天王居翟泉至昭壬午宣壬戌部城鄆至成甲戌大有昭癸未部至自晉至昭甲子成乙亥部晉殺三郤至成丁亥夬昭乙丑部同圍齊至襄丙午成戊子部救台入鄆至襄庚子乾襄丁未部築鹿囿至成戊子襄辛丑部齊崔杼至襄癸丑姤襄己丑部邾戕鄫子至宣庚午襄甲寅部章華至昭丙寅大過成辛未部公子遂至文壬子昭丁卯部曹出公孫㑹至昭己卯鼎宣癸丑部隕霜不殺草至僖甲午昭庚辰部隕霜殺菽至定壬辰恒文乙未部牡丘筐至僖丙子定癸巳部呉敗檇李至定乙巳㢲僖丁丑部郎薛秦至莊戊午定丙午部槖臯至哀戊午井莊己未部北杏至莊庚子哀己未部入許至隱己巳蠱莊辛丑部紀敗宋至桓壬午桓庚午部紀敗齊師至桓壬午升桓癸未部戌伐凡伯至隱乙丑桓癸未部齊无知至莊乙未訟隱丙寅部桓僖宮災至哀己酉莊丙申部姜至莊戊申困哀庚戌部呉伐越至昭辛卯莊己酉部鄭棄其師至閔辛酉未濟定壬辰部意如歸至昭癸酉僖壬戌部醎至僖甲戌解昭甲戌部盟于宋至襄乙卯僖乙亥部如楚乞師至僖丁亥渙襄丙辰部同盟于戲僖戊子部閏不告朔至襄丁酉至文庚子坎襄戊戌部城中城至成己卯文辛丑部取濟西田至宣癸丑蒙成庚辰部陳殺洩冶宣甲寅部楚圍宋至宣辛酉至宣丙寅師宣壬戌部毛伯求金宣丁卯部城中丘至文癸卯至成己卯遯文甲辰部天王出居成庚辰部如晉至僖乙酉至襄壬辰咸僖丙戌部救許至僖丁卯襄癸巳部齊圍桃至襄乙巳旅僖戊辰部肆大眚至莊己酉襄丙午部天王殺弟侫夫至襄戊午小過莊庚戌部祝丘至莊辛卯襄己未部齊納燕伯至昭辛未漸莊壬辰部狩于郎至桓癸酉昭壬申部鸜鵒來至昭甲申蹇桓甲戌部齊敗于艾陵昭乙酉部城中城至哀丁巳至定丁酉艮哀戊午部侵齊再至定戊戌部毫社災至定己亥至哀庚戌謙定庚子部王室亂至昭辛巳哀辛亥部來求賻至隱辛酉否昭壬午部比大雷雹隱壬戌部從王伐鄭至昭癸亥至桓甲戌萃昭甲子部圍桃至襄乙巳桓乙亥部至自齊至桓丁亥晉襄丙午部晉殺三郤莊戊子部北杏至成丁亥至莊庚子豫成戊子部斷道至宣己巳莊辛丑部戎徐至莊癸丑觀宣庚午部榖至文辛亥莊甲寅部首止至僖丙寅比文壬子部衛及狄盟僖丁卯部狄救齊至僖癸巳至僖己卯剝僖甲午部縁陵沙鹿僖庚辰部四卜郊至僖乙亥至僖壬辰坤僖丙子部鼔用牲至莊丁巳僖癸巳部敗狄于醎至文乙巳是皆主易也不復追天追天則辛酉之符用一九庚申之符用三九也主易者以庚申獲麟歳二百四十二為主以十七乘之四千一百十四退其十八為四千九十六以六十四乘退數得一千一百五十二以十乘一千一百五十二為萬有一千五百二十此春秋歸餘約於易象之所從出也追易即以追天裁其納虚以滿易彀則春秋與易亦无虚實之分也其追易全數以十八乘之四千三百五十六進其十三為易象㑹以六十四乘進數得八百三十二併其餘分為八百三十六即易行納虚一週常數殽於春秋一千八十八部之内也以餘分加積四限之數歸於全象為千九十二部以四乘之為四千三百六十八部併其餘分而春秋與易同積矣凡積限八年皆有參差别須以數求之此與詩限同積不過紀其大略耳至其奥渺非夷所思亦非言說之所得至也然則是於辭義皆无所取之乎曰何為其无所取之也春秋一書本天行王以正萬世之亂臣賊子易為變通趨時致謙守位之說若不相入者夫子於坤之初六直云臣弑其君子弑其父其所繇來者漸矣如此看易與春秋豈有兩義必若因象至命觀物測則易詩春秋治百世不治一世治帝王聖賢不治匹夫言之詳矣然則百世與一世帝王與匹夫有異乎曰其稱名小其取類大探索鉤致亦在人自取之也凡易詩春秋繫命治天下百世皆在於其中交吉凶禍亂與食法相遇故日月之食禍謫於天聖人因之以糾䖍脩救及其无妄不藥曰无如之何也匹夫之命與道升沈若水漸魚而已困以辨德坎以立信蹇以反身大過以正志君子又何問焉然則求之如何曰五十有五萬物之所立體四十有九萬物之所致用也詩三百有五益五十五以㑹於日月退五十五以㑹於春秋詩三百十一進五十五以出於日月之交退五十五以入於日月之食中分五十有五為二十七半又半分之為十三分七釐五毫此隂陽之衷五行之街道也乘除之交萬物乃遷一朞之日五退河圖而餘三十者值其泛交食緩而淺五退河圖而餘三十六者値其正交食速而深故曰咸速也恒久也咸在前限百八十之交恒在後限百九十二之交也自冬至以至秋分日行贏二百七十而强夏至以至春分日行縮二百七十而弱各先一月為正交道星辰之所警蹕也隂陽且戰謹持其端是不論月限但以三元所起値其交數則得失之報見焉四十九者日月南北相距之隱界也分而揲之北陸二十有四物因之執南陸二十有四物因之寒萬物善熱而惡寒寒熱之競相靡為端不備而凶極備而凶五福六禍之所繇分也凡五行街道皆去其一以為開塞五十五之中分小分二十五四十九之中分小分二十五皆隂陽日月所相引避也隂陽日月相為引避故徳讓出而仁義生焉二七十四以部命詩二九十八以部春秋春秋上下二十有七詩上下二十有九上下間道或得而死或得而生剛柔兩克則必有知其端者矣月實之朞三百五十五以六退之三百三十餘二十五以退圖象關雎騶虞守其天數朞餘積縮三百五十四以七退之三百二十九餘二十五以退蓍䇿關雎騶虞守其衍中故關雎騶虞君子之所貴也然則坤之初六不於是始乎曰冰堅龍戰皆於是始也一交之後而星物遷次矣然則駉駜殷武无稱乎曰何為其无稱也九者四五之合也天道用九萬物以究逆而數之九備兩恪焉雒書之則實用五九以四十五為則順而數之去其七則三百十五其餘四十除其盡數以八去之三百六十復更其端皆始於清廟極於殷武故聖人以圖書為堂奥而登降寢息之也詩一千一百四十春秋九百六十八相距一百七十二猶關雎葛覃之於白華華黍也以六十四乘二十七為一千七百二十八併其餘分三十二有餘以六十乘二十九為一千七百四十併其餘分三十不足而春秋兼用之故春秋紀事一千七百六十四聖人於此則必有取之矣聖人之為詩春秋而不足以明天道治人事與日月出八使鬼神聽服焉則猶是纂組刀筆之務也聖人皦然不為之矣然則聖人之為之如何曰聖人觀㑹通以行興禮六十四事皆所以扶顚撥亂也扶顚撥亂則其不稱用師何也曰用師而撥亂非聖人之所貴也聖人之救時至於修刑而已下矣易六十有四事修德三十有六經綸敎養二十有二修刑六者而已自噬嗑而外則皆輕典也然則爻彖皆稱用師何也曰爻彖八稱用師其戒勿用者參半焉聖人修德其通足以格天下君子用之猶足以去頑格奸容蓄勸勞以治其先振育遏揚以匡其後思患豫防以圖其終雖數百年兵革不試可也然則易其猶太古之意乎曰易猶盛世之意也世雖不可常盛而聖人常以盛世之治治之然則九德之義皆為治身不為治天下發何也曰治身以治天下天下與身則非兩事也以天下治天下其道一世以身治天下其道百世否之儉德蹇之反身大過之无悶小過之過哀過儉似非為治天下者也然而治天下之君子猶用之曰相與以永无弊焉耳君子以九德治其身以六十四事治天下為春秋以本禮為詩以本樂易者禮樂之精神詩春秋之魂靈也春秋之治二百四十二年而一變二千四百二十二年而一大變詩之治三百一十一年而變三千六十六年而一大變兩變相差六十八年九十六日而詩與春秋交㑹八交㑹而小成六十四交㑹而大成故易之有詩春秋猶天地之有日月也然則詩用圖書而春秋不用圖書何也曰何為其不用圖書也合春秋之數四百八十有五約以為蓍以通於圖書以十三乘之為五千五百五十五以闡河圖而贏其一是春秋之用圖書也詩以為龜春秋以為蓍視其羸縮以為長短詩不加長春秋不加短夫各進退衷之於易也然則合詩春秋五百五十而餘其三何也曰五百四十而餘其七羸縮進退則猶之无餘也故進退者易之大用也易之大要五十有五以十乘之為五百五十而春秋與詩合取之天地之變化鬼神之情狀所以成行也故五十有五四十有九二者為詩春秋之大候日月出入鬼神所以視聽也然則詩有五際各六十餘一春秋三際不及八十有一何也是則化裁之在人矣天地之道一贏一乏視其所㑹以相救治聖人之所與而不隱即其所隱而不與也河圖五十冇五其精去十大易用九與六其㣲體七體七故其用愈㣲去十故其體彌精進十則數順退一則數逆去十體七退一而天地之奥備鬼神之秘得故五九之治三百一十五各去其一為三百一十而六九五十四无去焉葛屨之至狼跋一百五十六章是也唐魏之終霸秦豳之終王上下百七十八章盛衰之道具强劣之風併故有能知五九之用六笙之㫖者吾與之觀妙於帝王觀竅於天地矣然則易之精㣲盡於是乎曰其動賾則盡於是也顯道神徳行酬酢變化則雖聖人有所不知也以謂詩春秋足以盡易之用故復以詩春秋為易本命二端具圜圖如左七十二限乘體卦六十四凡得六十七年百有五日者七十二是得四千八百四十四年餘二百六十日也以丰分之以十約之為二百四十二年八十五日所乘體卦不必先天自四千九十六者皆可乘也而終卷發於先天故以先天為例以春秋麗之凡得春秋者十而天地中分二十而天地終始中分之㑹視體卦積實之數差二百六十九年五十五日四積之數也以通朞乘之四千九百十五年餘七十二日去爻彖本實餘五百四十五故天地之數至五百五十則退而又反矣詩亦猶是也七十二卦相經之數五千一百八十四其爻三萬一千一百四此即詩所為本也春秋行十詩行以百故春秋浹於人事而詩通於萬物草木鳥獸所貢其爻象也三萬一千一百有四以百經詩而餘其四故時有七百二十部以十六乘之為萬有一千五百二十部俯仰觀察之通數也然則是以十命也曰十之於百通命也用卦一限八十五年餘五十八日贏縮之間約六十日以七十二限積之六千一百三十二年中分三千六十六年以十約之為三百有六空其四十有四為不及六虚之數南陔而下所聽其消息也三萬一千一百餘四為不及五實之數駉駜而下所乘其權輿也四虚四實終始相嬗而皇帝王霸乘除之端略可見矣四實之乘發於關雎順行而進二百八十有八四虚之乘發於閟宫逆行而退三百一十有七盈縮相劑縮於三百盈於三百有五順逆兩端虚六以相交也虚六兩端在啇周之交關雎以慎其始閟宫以慎其終故乾坤兩濟之際治者以治亂者以亂戎者以戎夏者以夏水火𤣥黄此其大界矣然則詩春秋之不與天地同體何也曰用者德之神也神无方而易无體與神同方則不能盡其神與天地同度則不能進退天地矣然則不知詩春秋之數度則不足以與於易不足以與於易則不足以治天下乎曰制數度議徳行非獨易之一節也中和繇此建禮樂繇此出聖人所裁成輔相顯神黙存行其典禮措之事業則舉此物也曰然則節之不與於九德何也曰臯陶九德不稱中和節之與中和猶飲食之有鹽梅摰生之有黄理不以一德自名而百行歸之為禮樂厯律分布之六十四事亦各中其節而已矣然則六十四事之亦有序次乎曰六十四事之序次猶象彖之序次也易无妄說亦无茍次既有倫脊即為典要故又為六十四事序象終馬序象正曰大人者與天地合德與天地合德則與隂陽合序乾乾終日萬物所以資始也萬物資始則能載地載地則能載物能載物則厚德歸之矣故健而厚者君子所以經綸也經綸之始莫如蚤建子蚤建子莫如告德行故屯曰經綸蒙曰果行育德果行育德而後可以燕亨酬酢燕亨酬酢而後可以通衆志謀始事故需曰飲食宴樂訟曰作事課始謀始事垂永業者莫大於井田井田之治莫大於封建師者井田之治比者封建之務也故師曰容民畜衆比曰建萬國親諸侯井田封建矣而後文德修文徳修而後上下辯民志定故小畜曰懿文德履曰辯上下定民志文徳辯定而後財成輔相萬民有所左右天地无所輔相萬民无所左右則德難雜生君子不試故秦曰財成天地之道輔相天地之宜以左右民否曰天地不交否君子以儉德辟難不可榮以祿此兩者族物所繇辯也循是之為善逆是之為惡順者揚天休逆者於不祐故同人曰類族辯物大有曰遏惡揚善順天休命善惡旣明持之以平遏揚既清禮樂乃興平以為禮柄興以為樂根故謙曰裒多益寡稱物平施豫曰作樂崇德殷薦之上帝以配祖考族物旣定禮樂旣作上宴息而不煩下振育而不瀆宵德甚靖畫德甚夙故隨曰嚮晦入宴息蠱曰振民育德隨靜而蠱動隨无為而蠱有作也夙夜以時動静不失而後教成於天下故臨曰教思无窮容保民无疆觀曰省方觀民設教自是而後可以敇法也不教而敇法則是以法教亂也噬嗑曰明罰敇法賁曰明庶政无敢折獄是聖人之不敢以法為治也聖人為治先教而後罰薄賦斂罷征輸先農夫而後商旅剝曰厚下安宅復曰至日閉關商旅不行后不省方言省刑薄歛之相次為義也立教省刑薄歛三者相次而後四時得其序萬物遂其生而後上可以質聖人下可以垂來裔不愧於前言往行故无妄曰荗對時育萬物大畜曰多識前言往行以畜其德於是則王道成聖學就過此以往則疾疢時命之事也頤養不節而生疾疢時命將顚而有大過君子修其節慎无所懼悶故頤曰愼言語節飲食大過曰獨立不懼遯世无悶是非獨賢者之道也君子於此亦曰德行教事萬世无弊大人以之教胄子君子以之示後世常習明德求為可繼而已坎曰常德行習教事離曰繼明照四方二者乾坤所授體綸經之終事也是古先聖王所治天下之次也君子欲治天下則先治其身治其身則先治其心其心不治則身不治身不治則无以治天下國家矣咸者心之静也恒者心之定也静心以與人定心以與身故咸曰虚以受人恒曰立不易方虚以受人則難於遠小人立不易方則无以觀禮之通故遯曰遠小人不惡而嚴大壯曰非禮勿履兩者所以治身心之要也君子以禮修身以禮遠小人故以自昭得其明以莅衆得其智晉曰自昭明德明夷曰莅衆用晦而明兩者仁智之通義也仁不用文智不用術故内有以信其言行外有以服其辨治家人曰言有物行有恒睽曰以同而異同異者言行之辨也君子舍禮則何以辨德舍德則何以辨其言行矣君子之先德而後刑先治已而後治衆不自上世始也蹇曰反身修德解曰赦過宥罪雖在末世則猶用此道也君子密於自治不以德成而廢懲窒勇於師人不以道凝而廢遷改損曰懲忿窒慾益曰遷善改過雖在聖人則亦猶用此志也古之學易者取於損益以為易止於是矣而又用以施祿施命逮及四方不如是則不足為治夬曰施祿及下居德則忌姤曰施命誥四方言夫為德而不居行政之及遠也用戒不虞克勤小物兩者用政之大要也萃曰除戎器戒不虞升曰順德積小以高大是亦虚心質行者所致其問學也繇是以入於患難而神不傷投於艱大而勞不輟困曰致命遂志井曰勞民勸相是君子之舍命而有事也君子不以學足而祁通不以行高而謝事不以遘閔而隕心不以小喪而墜志湯武之革命堯禹之正位則猶之寒暑飲食不足以貳行也革曰治厯明時鼎曰正位凝命震曰恐懼修省艮曰思不出位君子之視常變動静則猶之鷄鳴風雨也故君子進之不與習俗同趣反之不與天下同敝漸曰居賢德善俗歸妹曰永終知敝是君子之進反也君子无所甚惡惡夫下蔽其上无所甚畏畏夫濫刑而留獄去是二者以輯辭於百姓收益於朋友故德日以明政日以清豐曰折獄致刑旅曰明慎用刑而不留獄㢲曰申命行事兌曰朋友講習四者是君子所為律令也君子之律令曰修已治人而已矣修已莫若敬治人莫若誠上帝宗廟不督人敬而人敬之不教人誠而人誠之數度繇此立德行繇此出渙曰亨于帝立廟節曰制數度議德行是禮樂之飭歸也故君子寡過者也君子以天處人故人獲其命以地制身故巳獲其性議獄之有失出制行之有已卑是非君子之過也君子成信焉耳中孚曰議獄緩死小過曰行過乎㳟喪過乎哀用過乎儉君子於此未始不尚乎中道也君子研㡬於易以知禍敗之所在隂隲相恊以奠萬民之居故天地有所終萬物有所始其憂患吉凶生民與共君子或未之免也曰不失吾正云耳旣濟曰思患豫防未濟曰慎辨物居方慎者人事天道之所繇總也故序易者有五道焉先自治而後治人一也尚德而緩刑二也謹身而寡過三也先物而救敗四也言教養而不言行師五也有是五者而終之以慎故六師之長失其勇五行之吏失其智民生有所享死有所葬上世之師天地下世之師山澤取於誠慎而同得其用一也凡易為救世而作也世有憂患聖人與共四方有敗必先知之故爻彖胗脈者也六十四事制方者也為爻彖而无大象猶切脈而无方藥也君子之為道嚴於責君子而寛於責帝王易之言先王者七后大人者三餘皆君子也故君子為王后救世而治方藥者也救天下而以干戈救君上而以諫諍君子慎用之故建侯行師遇主納約爻彖間或言之至於六十四事修德行政而已上經取法天地終於日月其為道自韋布通於君相下經取法山澤終於水火其為道自君相通於百執事為治而不知六十四事之象雖明知吉凶與世同患於以救敝起衰无繇矣故作大象序而又為六十四事圖終焉易象正卷終下
